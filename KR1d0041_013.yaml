body:
  text: 儀禮析疑卷十三翰林院侍講銜方苞撰旣夕禮註謂上士二廟則夕哭先葬三日疏因謂大夫四日諸侯六日天子八日非也婦人不居廬不寢苫以起居動作與男子異也一夕朝廟可於帷幕中坐以待旦若至三日五日則廟中將别有婦人栖息之所乎抑仍反其寢宮乎天子崩國君薨祝取羣廟之主藏諸祖廟主旣出廟則日朝於無主之廟何為卒哭成事而後主各反其廟則朝祖廟時羣廟之主皆在焉雖天子諸侯同此一夕之期明矣惟大夫喪禮無考按諸侯在其國車服政敎多與天子同大夫在其家號名禮度多與國君同廟數既異雖藏主一節上同於人君不為僭忒也惟上士二廟可由禰以之祖耳請啓期告于賓既卜曰即告於賓賓知葬日則知啓日矣而前夕又告者喪奠大夫以上用諸臣士則朋友虞祔然後退不獨賓長三獻即衆賓亦代主人執事倘届期或有喪疾或服公事不得與奠則當更易其人次叙其事非啓之前夕不能定也喪禮質請於主人故無辭下文曰夙興則為明旦不待言矣故與祖期告以日側異也聲三啓三命哭營葬宜虛中以檢察附棺之物屬引下窆及待親賓之事宜故男女夙興皆不哭祝要節而命之祝降與夏祝交于階下取銘置于重敖氏謂周祝取銘而降非也使祝取銘則與夏祝交於階下於文為贅矣周祝方執醴酒而降則夏祝之升為取銘無疑也疏因此奠不言所置之地遂謂亦遷於序西南以下經曰奠從遂謂宿奠擬朝廟所設皆非也朝廟大禮不新之而以宿奠薦不亦悖乎祭奠品物從無復薦之禮柩旋出殯宫宫門當閉宿奠必徹於造而别用之故不復陳於序西義與柩在殯宫異矣即此可徴奠從為朝夕新奠商祝拂柩用功布幠用夷衾觀此則夷不可以尸訓益明矣蓋更作大衾與柩相稱也既蓋棺而名為尸衾何義乎經云自小斂以徃用夷衾正以别於始死之斂衾也前此所陳夷衾大斂既盡用之則此别為覆柩之夷衾明矣遷于祖用軸天子諸侯殯皆用輴車承柩置肂中蓋為火備倉卒可御以行也士用輁軸亦宜置肂中上篇升棺用軸謂承棺以軸然後可傅衆力以舉之非謂以軸轉而上也此亦人舉之以降然後御以遷於祖非以軸轉而下也階有級軸不能轉而上下棺無輁人不能徒手以舉之輁狀如牀前後横木兩旁直木束棺於輁然後衆手可齊舉下經正柩於兩楹閒用夷牀亦人舉輁軸以升而後遷於夷牀以正其位也雜記大夫死於外至於家而脫輤載以輲車至于阼階下而脫車舉自阼階升適所殯此禮蓋上下同之故諸侯升正柩至五百人蓋或舉之或挽之升降出入更番以傅其力也桯蓋柄之容達常者故註以名軸髀之容軸者按檀弓記惟天子諸侯用輴魯三家猶未敢用註乃謂大夫宜用輴疏既知大夫殯葬不用輴又以士朝廟用軸為大夫朝廟當用輴之徴皆曲說也重先奠從燭從柩從燭從主人從疏以至祖廟後接時而再設奠疑始設者為夕哭之宿奠遂於上經祝降云所徹宿奠擬朝廟用之獨不思已奠之物決無更薦之理果一宿一新則宜有特文以見之蓋二奠皆新而夙具以從也子婦事父母舅姑昧爽而朝慈以甘㫖然後具朝饋啓肂本宜有奠而夜中非進食之時肂旁非設奠之地柩方行諸事迫遽亦無更設奠於室中之理故必待至祖廟既正柩而後設之既奠而後質明則設時正昧爽而朝之節也朝祖載柩而又奠則朝饋之節也是日已再奠至日側則前所陳如殯之祖奠設焉故無夕奠厥明少牢五鼎之遣奠設焉故無朝奠如父母生時有嘉好慶事具盛饌則朝夕恒饋不復陳皆事死如生稱情事而為之節也殯初啓柩將行主人拜賓至是從柩者惟主人則賓不從明矣而柩至祖廟又曰拜賓則知啓時主人拜賓後賓即前行而俟於祖廟矣蓋賓若從柩則必與婦人相先後且有執事之賓如祝宗人巾奠匕牲者宜先至祖廟以待事也註謂男賓在前女賓在後主人居中男女分左右以行敖氏謂女賓從男賓在後皆未安喪之女賓乃姑姊妹女子子已嫁宗婦之以事相助者皆宜與衆子婦偕行賓及執事者先俟於祖廟則主人從柩丈夫先婦人後自然之序也婦見舅姑兄公羣叔並立階下而不正行相見之禮送喪乃序昭穆而使同等之男婦相左右何義乎升自西階自始殯升棺於西階及啓肂降自西階而用軸遷於祖廟復升柩於兩楹之閒而用夷牀既正柩朝祖又自夷牀降載於車中途屬引執披及壙負繂下棺所用人數及以升以降以行以載以束以引以窆之法乃喪紀之最要雖微而不可畧者而經第曰升曰降曰正曰載曰束曰窆而不更置一辭必其法已詳具於諸侯卿大夫之喪而無庸更舉也主人從升婦人升東面柩升自西階而正位於兩楹閒故主人之升暫立於西方以俟之正柩畢乃轉適柩東而西面猶婦人本位柩西及主人既降而不復升則轉適柩東而西面以再奠仍設於柩西升降皆自西階故辟之也正柩于兩楹閒用夷牀既以輁軸升柩而必遷於夷牀何也輁軸所以行也始朝祖不宜遂用行具且其形迫地非所以尊先靈故必正柩於夷牀而後降載於柩車未含飯死者南首不忍遽用死禮也遷尸於堂殯於西階則北首不敢仍用生禮也惟既祖降載於柩車旋車之夕則南首以出廟由堩至於壙皆宜北首席升設于柩西設奠之東西先儒多據尸首所鄉南北為義但以事義求之尸在室婦人俠牀東面主人坐於牀東小斂男女如室位設奠自宜近主人而與婦人相避也大斂之奠設於室中而初陳奠時衆賓位在西階下升棺為肂工役執事者皆升降於西階舍阼階下别無可以陳奠之地至朝祖則柩東主人在焉主人降則婦人即焉西階上别無堂事自宜設奠於柩西婦人可暫避於室戸西以待主人之降而東也至祖奠則將載時奠於柩西以降自西階暫停焉以俟車之旋既旋車乃饌於主人之南蓋方是時明器陳於乘車之西公賵賓賵奉幣將命皆在庭西舍主人之南更無可以設奠之地也遣奠在阼階下與祖奠同皆時義宜然義不起於尸之南北首記云祝及執事者舉奠卒束前降奠席於柩西即經所謂降奠當前束也記云舉奠降席而不言饌至旋車之後乃云祝饌祖奠於主人之南則舉奠降席祝及執事者手執而不設與大射禮服不以所得獻爵祭侯薦俎皆執以從而不奠直待祭侯畢然後奠於服不所居之乏前同義禮之細入無閒若此薦車直東榮薦車馬事宜相連而分舉之何也昬夜惟車可陳馬則宜以質明薦也直東榮階閒乃柩車之位也故下經陳明器於乘車之西柩車之東徹者升自阼階降自西階前此奠升後此奠降皆自西階而徹者升自阼階則口實不由足過義自著見矣乃奠如初註以此為陳鼎如殯之奠果爾則日側之祖奠必别陳鼎俎經宜特文以見之蓋自殯以後朝夕常奠未嘗一日闕故朝祖夙具二奠以從至日側祖道乃用前陳之奠經所以三奠同辭而不别白之者以祖用如殯之盛奠不待言耳賓出主人送于門外賓中夜以興至是可就次少休息進食飲以待後事矣其有執於載柩飾柩降奠設奠陳器還車者宜復入以治事衆賓送葬則俟於門外可矣有司請祖期曰日側祖者餞行之祭故不以日中亦卜日先遠之意且容載柩說飾屬引陳器之節也不以日夕者容公賵賓賵書方書策之節也主人入袒乃載儀禮中有必不可畧之大節而篇中則闕焉如覲禮所闕必已見於朝宗也此篇朝祖曰薦車非後記則不知其為何車也此節云乃載非後記不知其載於何車一似仍用遷祖之輁軸矣蓋自天子諸侯以至卿大夫朝祖必薦生時所乘之車正柩後天子諸侯陳柩輅卿大夫陳命車已屢書不一書故於士畧之周衰禮廢及漢初河閒獻王所獻邦國禮藏於内府而列於學官者惟十七篇故諸老儒各為傳記以補其闕商祝飾柩一池紐前䞓後緇齊三采無貝張爾岐曰牆柳自其縛木為格者而言帷荒自其張於外者而言折橫覆之抗木橫三縮二壙中虚土壤易䧟故以木抗之猶懼其撓折又於其下設折以承之折但言横敖氏以為未必有縮是也記曰罋甒筲衡實見閒而後折入日入則在壙内周圍必疊石甓為短垣以承折折入適與壙平然後加席設抗而實土以為塜折不言數以排列滿壙為度所用之木但取堅實大小不可定也設折與抗每加席者木與木相凑其間或容塵壤也折之橫者為一重抗之縮者再重橫者三重橫從相任則雖久而無撓折之患矣抗之廣輪必周於壙外縮二橫三雖大木必連木而中貫之然後能合度秦晉之閒疊石為垣覆以大石視抗折之用木更為可久註謂折亦縮三橫五似折亦再重但經止言橫記言却之則不可謂再重疏謂壙口大小容棺明器皆由羡道入尤遠於事理加茵用疏布緇翦有幅亦縮二橫三張爾岐曰茵設壙中先布橫三乃布縮二厝柩後施抗壙上先用縮二乃用橫三註云木三在上茵二在下據既設後人所見而言其實抗茵皆三在外二在内象天之包乎地也器西南上綪茵上言陳明器於乘車之西折抗茵席乃藉覆棺柩之物宜以類從不可别見也故先列之以為表以示明器之陳由是而西以南為上屈而反之以取方焉抗上於折茵加於席四物重累而茵在上故獨舉茵張爾岐曰綪當連下茵字為句言陳器從茵屈而北也非然則前已詳茵不應更舉無祭器明器中無祭器上下同之註謂士禮畧大夫以上兼用人器鬼器敖氏謂大夫有無未可知諸侯以上則有之皆臆説也壙中藏用器樂器孝子不忍死其親之意耳祭器所以享祖考而納諸壙中則誣且䙝矣周禮春官之樂器夏官之兵器廞之奉之藏之每職必舉不厭其煩而鼎鉶籩豆天官膳夫以下諸職無一語及此此天子明器中無祭器之明徴也證以肆師職大喪共祼器遂貍之更無可疑蓋未葬以前先王之體魄在堂無灌以求神之理及葬則新陟王永離裸享先王之事平生所用灌器嗣王不忍復用故貍之宗廟階閒仁之至義之盡也康成既知貍於祖廟而又謂祼器遣奠所用則惑之甚矣賈疏因謂祖祭以前奠小不合用彝惟大遣有此裸器益謬悠而義無所處有燕樂器可也曰可也則不有亦可非若用器役器必不可無也而祭器不可入壙義益明矣乃祖後言乃奠則此言乃祖者以將還車而設祖奠告於柩也祖還車不還器車必還乃可駕而行器則人持之無所用還布席乃奠如初每奠之先必布席者擬神降於席而受享也賓出主人送至是則有執事之賓亦可退休而即次矣惟擯者及宰留待賵奠賻贈宰由主人之北舉幣以東張爾岐曰此時主人仍在門東北面經云主人之北指柩東定位而言此時此位雖無主人宰不得履之以過故由其北主人拜于位不踊主人自啓以後至虞以前夙夜不寧哭踊無算者五要節而哭踊者十有九雖强有力者亦憊矣親賓賵奠賻贈之事並集於一時尤煩且充故自公奠公賵以外皆有拜而無哭踊即拜亦不離其位不惟力不能勝時亦懼不逮也士受羊如受馬註於士皆以為胥徒之長非也古者下士多而胥徒少士之喪不得多發官中胥徒所謂士必其族姻朋友州里之下士也君有賵而敢使胥徒受乎士生時不得用少牢助遣奠而以羊必卿大夫也故亦不敢使私人受主人拜賓坐委之聘禮陳幣布幕則受幣亦布幕可知蓋玊幣親授皮則設於幕上也主人獨以賻出門何也賵奠以禮死者致命於柩前故主人拜於位賻以助生者物將於門外不得不出拜也賓於賵幣親奉之而賻物則坐委之亦重禮而輕財之義若無器則捂受之惟賻物有盛之之器何也賵幣有定可手奉以授賻則多寡無定數布帛則承以筐篚泉布亦别以器貯其無器則賻物少可手授擯者若坐委之嫌於約而為泰故捂受也兄弟賵奠可也賓可兼賻而兄弟止於賵奠何也恐其力不能備禮也於賓則受賵之後曰出請曰又請則或備其全或舉其一二於兄弟之賵奠曰可也則或加焉或損焉皆稱其力之所能致明矣惟所知則賵而不奠蓋於䟽者過厚則親者必轉薄所以稱情立文而責之以分誼之實也别言贈者則不問親疎貧富而皆可行賵奠賻備具而復有贈焉可也未舉三者而獨有贈焉亦可也故記曰贈幣無常乃代哭如初代哭之禮後儒或以為疑不知先王所以養天下忠敬仁恕之心而厚其俗端由於此蓋大夫以上使官代哭示久故相承之義不可忘也士則族姻示親戚相依之情不可恝也且使子姓近親觸耳動心蹙然有隱時自驗其哀敬之誠否則所以警發乎人心者至深且切矣宵為燎于門内之右宵為燎之後直接質明無夜事主人衆主人宜就其位而張帷幕婦人宜張幄幕於東夾之南柩既降於庭中不得復入東房遠兄弟姻賓宜張次於西夾之南私有司隸子弟宜次於門内之左右柩車幕覆以備風雨此宿夜之事必不可缺者也古者貴賤有等士之壙宜具廣輪之度折與抗木宜具廣厚之度而經記皆無文宿夜之事必已前見壙封折抗之度必可以爵等比次而得之今所存惟士禮故無考厥明陳鼎五于門外遣奠得用少牢猶冠禮之用爵弁昬禮之用墨車也昬冠則假之於始以厲其志宵雅肄三之義也喪奠則厚之於終以報其勤士有賜帟大夫没不呼名之義也祖奠以前猶用事生之禮不敢踰也葬引則自是而終矣故於遣奠而特假焉而禮之起各有其義學士而至於冠則入大學者六年矣九年出學舎不帥敎未有不身為士者三十而受室則郷邑之士或升於司徒而入於太學矣太學之士或升於司馬矣虎門之士或列於侍御僕從矣既身為士則攝用大夫之禮可也守官之士終其身而無廢事如天假之年未有不厠下大夫之列者故特假焉以示能於其職而君恩方渥也故大夫廢其事則以士禮葬之蓋即是以勸懲焉東方之饌自小斂以後皆曰東方之饌亦如之而此復具列其物以籩豆倍加也舉醴酒則瓦甒觶柶可無更舉矣賓入者拜之此時惟有執事之賓如祝史苞牲執披者然後入其餘皆待於門外柩就塗而執紼以廟庭中不能容也甸人抗重出自道道左倚之重先柩而出者以柩出則廟門當闔反葬則日中而虞不暇更舉抗重之禮也自始作重位在柩前及啓重先柩後又無柩出而後抗重之義故先出而倚之道左東階主人平時行立之處故即而埋之甸人蓋助耕圭田者薦馬馬出自道車各從其馬朝祖時柩車入廟中闑與下檻已脫去矣河北高門旅店車出入皆旋脫闑檻故重與車馬得由中道出也註云不由闑東西似闑尚未脫有闑則車豈能出入乎徹巾苞牲取下體擬上體神已歆饗也䟽謂留以分禱五祀五祀外神敢以喪奠之餘禱乎且記行禱於五祀在卒之前而以為柩出宫之後可乎張爾岐曰牲體陳於俎其脛骨在兩端故註云脛骨為俎實之終始也行器茵苞器序從車從入壙之器已列序而復特言行器以著器與車之先後又以見器皆人持以行而不以車載也首舉茵苞則苞以人持士無遣車亦於此可徴矣公史自西方東面命毋哭周官太史凡喪事考焉御史之屬史百二十人故士之喪公使讀遣以示恩禮而僭忒亦無由生矣亦所以飭喪紀也上言主人之史此曰公史則凡假以有司之名者非公士具見矣主人主婦皆不哭讀賵則哭者事已過矣不過以告於神而柩將行主人主婦哀不可抑也若遣則附棺之物必誠必信雖執事者自無遺忘而主人主婦必傾耳而聽之於心始安故俟讀遣畢而後命之哭也商祝執功布以御柩執披古者載柩用車設披屬引以防傾虧不若後世以木架承柩人舉之為安非聖人之知反有所未周也其時肩輿之制未興先王以人道使人故念不到此出宫踊襲註曰哀次疏謂次為平時賓客所受大門外舍國君朝門外設次以待聘賓卿大夫或亦有之俾屬吏待事者次焉士不宜有此未知所據至于邦門公使宰夫贈親賓贈於家君則致於邦門者使國人榮之由左聽命賓由右致命公使人弔賵主人皆在門東使者在西以至其家則使者有賓道也贈於塗則主人在西使者在東以國門乃君之門使者有主道也其義與君弔位東序端相發賵北面將命向柩也則贈南面不待言矣主人哭拜稽顙君賵拜稽顙成踊贈則稽顙而不踊非以在塗而殺禮也柩行至壙鼓窆實土日未中而反虞恐時不逮耳下記惟君命止柩於堩其餘則否蓋遠方親賓赴弔後時及賵贈者皆從柩以之墓而柩車不為之停以葬必在日中以前少遼緩則防虞祭矣至于壙陳器于道東西北上註疏未分句讀敖氏繼公以西北上為句非也道即羨道入壙乃便且士之羨道上不覆土若專陳於道東藏器時將踰羨道而西乎抑迂出於羡道之南然後折而西又轉而北乎器陳於廟中南上將出門也陳於墓前北上將入壙也茵先入註謂士葬則用輁軸疏謂先以輁軸由羨道入並誤周官遂人及窆陳役遂師抱磨喪祝及葬説載小喪亦如之則雖天子諸侯用輴及壙則脫之矣喪大記凡封用綍去碑負引君以衡大夫士以咸以鼓封則雖用輴者皆以碑綍下棺明矣檀弓記所謂輴而設幬為榆沈故設撥為柩引在路言之耳而以為載柩入壙之徴又因此決大夫亦用輴上士用輁軸豈不謬與然則壙前之設羨道何為也壙之南有埏門門之下為羨道使水潦下洩而不滲於壙中也乃窆主人哭踊無算窆以鼓俾引者聽鼓聲以為節也主喪者一人哭踊猶可使衆主人婦人皆哭踊轟囂雜亂則鼓音難辨贈用制幣入藏器物詳見於經而贈幣不見即公所贈也春秋傳曰若命服生弗敢服死又不以將焉用之公所贈幣不以入壙將焉用之乎其曰制幣以非適士公或無贈亦可以用親賓之贈也賓出則拜送不曰退而曰出者言退嫌於尚立而待事曰出則既窆而退者不復從至喪家朋友與虞袝者亦各還其家然後復弔具見矣墓無門階而有塋域故亦可言出藏器于旁加見此謂棺旁也下曰藏苞筲於旁則見旁也蓋用器役器燕器皆久而後敝之物故切附於棺之兩旁而加見焉甕甒苞筲之實皆速敗之物故以見覆諸器而後寘之見與壙之閒記曰甕甒筲衡實見閒而後折入是也敖氏分左旁右旁失之矣用器役器燕器衆多甕甒苞筲則少分左右藏之或蹙或曠界限亦不均加折郤之加抗席覆之折必以善面向下然後措於土者平以粗面向上然後著於席者固實土三主人拜鄉人歸而反哭日中而虞故以實土為節不得俟束版以為封也乃反哭入升自西階東面朝祖而行據生者之義宜歸告於祖迎精而反探死者之情亦必先就考妣而後可反其私室故反哭於廟而後虞於寢也凡為人子之禮升降不由阼階故自小斂大斂以至於啓升降皆自西階其在堂上亦未嘗就阼階之位不忍死其親也既葬迎精而反仍升自西階儼若神之陟降於堂猶在生時有事於廟中阼階上之位故東面以向之是乃孝子悵愴惚恍之實情他日僾見愾聞思成之始事也註疏以西方神位為義指未分明主婦入于室踊出即位未小斂主婦及婦人親者皆在室至此入室者惟主婦何也居常寢室婦人親者亦入焉尸未斂不忍離故並立於室中至祭祀饋食於廟惟主婦與主人有事於室中故反哭入而致其哀記所謂反諸其所養者謂與主人追養考妣之所非謂宫中饋食之奉養也且柩已出宫餘婦人何為入祖廟之室哉主婦既出及丈夫哭踊則婦人之親者疎者皆從主婦而哭踊可知矣不言衆婦人之踊何也婦人而送葬至墓必親者也丈夫之疎者皆與主人拾踊則婦人之親者與主婦拾踊不待言矣賓弔者升自西階曰如之何主人拜稽顙衆賓偕弔惟長賓致辭賓降而遂出以主人即適殯宫也主人拜稽顙者再皆總拜衆賓小斂畢凡襚者主人皆拜稽顙以附身之事畧定可勉赴禮節也及反葬賓升自西階曰如之何則自始喪来助至虞袝而後退其勤至矣故主人稽顙至於再遂適殯宫皆如啓位拾踊三虞於殯宫以主未入廟神當反於寢又母葬則立女尸不得於祖廟也拾踊三之後當行虞祭以别為一篇故此經不載兄弟出主人拜送虞禮兄弟賓即位於西方則此時小功之兄弟及朋友或以事暫反其家而日中復来㑹故主人拜送其無事者則出廟而仍俟於殯宫之外也凡喪禮賔兄弟出門未有不拜送者啓在夜中賓出殯宫即先赴祖廟明矣而主人拜送祖後賓宿夜以待送葬而賓出主人亦拜送故知反哭拜送後無他事者仍適殯宫以待虞祭也小斂時惟有送賓之文則兄弟皆次於階下而不出也自啓以後惟有拜賓送賓之文則知大功小功皆包於衆兄弟之中從主人之後而未嘗離與未殯之前同故直至卒哭始有拜送兄弟之文兄弟自啓至葬宿廟必有次既窆内外男子婦人食飲必各有次初啓時賓之入廟宜有時有位經皆無文非已别見不宜疎濶至此乃就次少息而後虞可更舉也猶朝夕哭不奠註疏謂卒去廬堊室無時之哭惟殯宫朝夕哭以經文按之顯然相悖蓋葬後猶朝夕哭至三虞並卒去朝夕之哭惟廬堊室中哀至則哭耳未葬以前朝夕哭奠周語所謂日祭也卒哭以後朔奠望奠所謂月祀也先王緣人情而制禮雖中人以下未葬之前未有遽忘哀痛者故朝夕奠哭乃事之不容苟已情之不能苟安者也既袝之後使朝夕哭則或有哀情漸釋強為號哭以觀衆人之耳目而中誠不應者惟廬堊室中聽其哀至而哭則賢者可自致其誠而中人以下亦不至以禮為偽焉耳敖氏謂此朝夕哭乃未虞以前之禮與戴記葬日中而虞異疑記非舊典蓋以辭而害意也此於反哭後總記虞祔而約其文謂虞之夕及閒日之朝夕皆哭而不奠耳有疾疾者齊養者皆齊記齊室即適寢也凡有疾即居焉所以敎疾者持生之道盡矣養者皆齊所以敎子孫妻妾忠養之道盡矣及至於大病亦不待遷移而終於正寢聖人制禮所以盡人之性也御者四人皆坐持體詩曰小大莫處御於君所内則父没母存冢子御食曲禮曰御同於長者則御乃卑幼侍於尊長之稱曾子寢疾病樂正子春坐於牀下曾元曾申坐於足則持體者必子弟門人註謂侍御之人誤矣孔子曰與其死於臣之手也母寧死於二三子之手乎伯魚早卒子思尚幼故云然若子弟門人環立而使死於僮僕之手忍乎哉䟽引大記内御者抗衾而浴以證之益非也持體非喪浴之比生時父之浴御者多僮僕即母之浴亦不使女婦御故喪浴不得不用内外御者耳男子不絶于婦人之手婦人不絶于男子之手凡人遘疾以至於死彌留之際親身䙝事亦不能不假手於人慮夫婦溺愛而不自嫌故特設此禁使母相瀆以正其終耳若母將絶子豈忍離子將絶母豈忍離特䙝事不以手治男子則子弟及外御者親之婦人則女婦及内御者親之耳室中唯主人主婦坐兄弟有命夫命婦在焉亦坐據經惟主人主婦坐據傳則命夫命婦亦坐據喪大記則父兄主人主婦姑姊妹皆坐蓋經乃成周所布之典禮記則隨世而增之變禮也主人主婦之坐非以優尊自父母疾病晝夜服勤以至含斂豈惟心絶志摧即筋骨亦勞苦倦極矣實不能久立故有事而後興也禮之變必始於期大功之兄弟有同為大夫者年過艾耆亦實不能久立故大夫之禮室中有命夫命婦皆坐又或士之兄弟有為大夫者覺獨使命夫命婦坐而同等者立情不能安故兄弟姑姊妹皆坐也禮之中變有久近俗之相承有異同故此記又與喪大記别耳至於父兄行則雖無爵而必坐子姓行雖異爵而必立則一定而不可移故此記與大記並以兄弟姊妹為限也實貝柱右齻左齻張爾岐曰齻兩畔牙最長者以貝柱象生時齕堅縓綼緆張爾岐曰在幅裳之側緣也無踊節未小斂主人主婦俠牀以守尸如斬如剡而使時坐時起以赴踊節轉不得自致其情故哭不停聲而不制踊節凡浴沐飯含揜幎襲冒皆宜踊之節也而經無踊文至於拜賓受襚又特文以揭之曰不踊直至小斂畢而馮尸然後踊無算蓋以恤孝子之病俾哀痛中兼注心於附身之事也不曰未小斂不踊而曰無踊節者以君使人弔則踊始死婦人爵踊則丈夫辟踊可知但此二節外皆無踊法耳或曰小斂設奠及徹主人主婦皆要升降之節而踊此辟奠不出室中故無踊節大夫升自西階階東北面東上既馮尸大夫逆降復位惟君親視斂然後有升卿大夫之禮君不在則賓不視斂不馮尸無堂上之事蓋自小斂侇尸於堂大斂入棺止宜使主人親者專致其哀誠且婦人俠夷牀外賓不宜閒之其中或為死者同道同志之友則於始死未襲斂時入室而親襚蓋義同兄弟使得一見其形貌經於賓之外别言朋友則其人無多皆虞袝而後退者也大夫馮尸其朋友而兼親懿者與居倚廬殯在西階上故知廬在東方廬在門外故知戸必北鄉不說絰帶以故興物者惟喪禮為多婦人不居廬而聚於内次喪期之内不説絰帶豈惟過行無由而作即動作語言容貌之閒或違於禮則衆目所視莫能自掩而自顧所居所服必有不安於心者矣是謂制於外以養其中也主人乘惡車註謂拜君命衆賓所乘車未知何據君子不奪人之親故曰喪公弔之必有拜者雖朋友州里舍人可也君弔主人且不親拜况衆賓乎或既葬而親拜於門義亦可通然於君則為重拜矣非所安也故禮經無之春秋傳列國之君親弔或奔喪主國未聞使人拜勤則成周之典禮可知其以喪事出則如筮宅主人皆徃是也以弔事出則有殯聞遠兄弟之喪是也至君與父母同時而喪其歸於家及反君所無問孰先孰後其乘惡車並以君喪為主有君喪服於身不敢私服是也御以蒲菆以菆為幹而繫之以蒲也漢時尚用蒲鞭犬服行於道路輿必有衞雖喪不廢貳車白狗攝服士無二車喪則有之以衆主人老者疾者不能徒行也惟乘車者衆主人故服以白狗加攝焉以别於主人之斬衰者又以見犬服革無毛且不緣也從徹者而入玉藻見先生從人而入平時且然喪事縱縱故進退皆從執事之人埽室聚諸窔聚諸窔恐塵之揚也卒奠而執帚垂末則於時乃斂諸箕明矣燕養饋羞湯沐之饌如他日下室之饋義與祝祭於主索祭於祊同不知神之所在於彼於此而孝子因以致其思慕恍惚之忱焉其執事之人與陳薦之儀必以前見而畧也冢人物土古者族葬兆域雖共而土壤之墳埴水泉之淺深尋常閒即不能齊故有冢人物土之法與周語物土之宜同義重止于門外之西註疏為日朝一廟之説蓋據此記自襧適祖不知重止於門外而不入奠徹而從於祖廟則並在一日明矣禰廟惟有兄弟之位而賓皆不與蓋惟恐日不暇給也疏乃據序從如初謂燭在其中朝禰與祖必各分一日不知此正必不可分為二日之徴也蓋朝禰在丑寅之交至祖廟猶未辨明故必以燭從也巾席從奠以降而柩即從經文顯著則日朝一廟之誤不待辨而明矣然則大夫三廟何不可更早啓期同日而畢事也朝一廟啓可以丑寅兼二廟則啓以子初猶恐其薄遽若朝三廟則啓必以啓之前夕而非啓之日矣徹乃奠上記曰饌於禰廟此曰徹乃奠則所徹乃從柩而入升於柩西朝奠之脯醢此則前饌於禰廟如小斂之奠下記舉奠兼此二奠蓋禰廟將闔凡奠皆宜適祖以供宿夜之衆也蓋義以祖廟為重而仁於禰廟尤親故辭禰而適祖用小斂之奠辭祖而適墓用大斂而殯之奠遣則事親之終事故用少牢哀彌深而禮愈隆也朝禰朝祖一日而再用有牲之奠故夕奠之常不復陳祝及執事舉奠巾席從而降柩從序從如初適祖主人踊畢奠隨巾席而降柩從奠主人以下從柩適祖中間無俄頃之停正以朝祖事方殷惟恐費時而失事也如註説柩止於禰廟此明日舉奠適祖之序則此日夕奠之陳夕哭之節弔賓之退主人主婦親者衆主人衆婦人之位次有司從者所執之夜事必一一具列然後大書厥明適祖然後其事備其義明乃於奠升主人踊之下直承以奠降柩從序從適祖本欲著二廟分日以朝之禮而反為同日以朝之辭使觀者索之而不得其解強為之説而必不可通記者不宜鹵莽暗昧至此觀敖氏之說則其失顯然矣干笮革靾弓矢經載用器中而註云有干無兵有箙無弓矢豈兵器中之弓矢不用而但以備用器耶周官大喪廞五兵則國君以上可具兵衞載旜載皮弁服乘車道車槀車各載生時所服何也柩入壙斂而載於柩車迎精而反將以設於寢廟也旜可攝而服止於皮弁何也爵弁服盡用於襲斂也遣以少牢乘車載旜攝盛以觀示國人昭君之恩禮也而被於身設於寢廟者不得踰其爵等故襲斂極於爵弁喪車惟載皮弁朝服也卒窆而歸不驅至窆後則孝子之憊甚矣且非從柩之比不必徒行也詳考士喪禮惟主人拜賓賓於死者雖親襚有哭踊而無拜非惟弔賓即衆子姓兄弟親者踈者亦然蓋主喪者惟適惟長餘則自致其哀誠而禮不敢參也觀父不主衆子之喪則其子得以杖即位可知此義豈惟士大夫天子之喪諸侯卿大夫亦無拜禮顧命卿士邦君入即位惟太保祭酢乃拜是也諸侯奔天子之喪似宜拜殯而康王嗣位二伯率諸侯以見新君並無特拜殯宫之文惜邦國禮亡他無所見但士大夫奔喪亦無拜尸拜柩之禮蓋子事父母必歳時嘉慶乃有拜事朝夕問寢上食未聞進拜故親始死不忍異於生至既葬虞祔練祥然後主喪者得拜於寢廟其餘亦惟各致哀誠於其位次而已儀禮析疑卷十三
