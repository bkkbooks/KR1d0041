body:
  text: 儀禮析疑卷二翰林院侍講銜方苞撰士昏禮親迎昏以為期蓋必既成夫婦而後可見于舅姑若早至而不見所尊則嫌于慢且未成夫婦而坐對一室語言不接面目難施故緣情制節必近夜為宜下達敖氏謂自天子下達于庶人納采皆用鴈非也臣下之贄乃用膳物大國之孤則更以皮帛矣然則惟卿以下宜用鴈耳天子穀圭以聘女諸侯大璋合之以幣安用參以食物之細微者下經序納采之禮自主人筵使者至始則達于媒妁而有成言明矣注不可破即用敖説亦宜謂下達于庶人皆備六禮納采用鴈納采問名本一事也媒妁通言而未見女之父母故使人執贄以請示已見采擇俟受鴈而後問名以漸而進也鴻鴈性難馴且非時非地不可必得昏禮及大夫所執皆舒鴈耳蓋取其潔白而安舒主人筵於戶西西上右几設几筵以依神而無奠告何也祭禮繁重不可與昏禮並日而行且先嫁之三月教于祖廟宗室既有祭矣女至壻家必三月而後成婦故殆歸亦無祭告也傳稱伍舉之辭曰圍布几筵告于莊共之廟而來而士昏禮無文何也納吉之辭曰加諸卜占曰吉則必告于祖禰其節當在問名之後而文略耳冠禮不設筵几何也以冠者立于房西受醴于戶西也且禮行於禰廟以著代則不待設席以依神而已洋洋如在矣使者玄端至按周官庶尹為上士則其屬有中士下士中士亦然注疏以使者為屬士據此但約婚非冠子之比不宜以僚友為使又注云下士之屬亦有下士更不可通敖繼公以為家臣非也士無家臣其室老不過與胥史在官者等耳而可使與僚友執友分庭抗禮乎宜以姻黨士友中齒少而分卑者為之主人如賓服迎于門外再拜賓不答拜主人再拜致敬于壻之父非拜賓也故不答拜猶諸侯之臣相為國客主君拜逆拜至皆避而不敢答以其致敬于君而非為已也賓升西階當阿東面致命主人阼階上北面再拜授于楹間南面注以阿為棟敖氏曰未詳蓋以主人立阼階上賓不宜深入堂中以致命疏釋今文謂楣前接簷為􅔑似得之蓋致命于簷前而後進授鴈于楹間也敖氏謂授當作受蓋以主人之受無文然下文主人降授老鴈則北面再拜後進受鴈于楹間具見矣經所以不言受者鴈非使者之物主人無儀之可展無辭之可致故以下授鴈見之問名之鴈亦但言賓授蓋使者受醴取脯以反命則主人受鴈不待言也主人迎賓于廟門外揖讓如初升主人北面再拜賓西階上北面答拜前此門外再拜拜壻父之以禮先也阼階上再拜拜所致之命也至此乃正拜賓之勤故賓答拜主人拂几授校拜送賓以几辟北面設于座左之授几以安賓主人不自設而授賓使設何也敷筵設几而不授者于喪于祭所以事鬼神也天子諸侯之禮事則有司所以奉君也公食大夫則君之所以禮臣也主人筵賓擬以事神之禮則不倫比于臣之奉君則非受者所安比于君之禮臣則非施者所宜故自儐尸以及賓客之事莫不親相授受疏謂冠賓輕故無几非也冠賓與主人敵體豈得反輕于昏賓蓋冠賓乃主人朋好猶鄉飲鄉射及燕賓皆本國之人故禮從簡略而几可不設昏賓則來自壻家致舅姑之命猶聘賓來自他邦致其君命禮宜嚴重而几不可不設也公食大夫內兼本國之臣而有几何也大夫有勳勞德望然後禮食焉左傳晉悼公將使魏絳佐新軍與之禮食故雖設而不授所以别于聘使也賓即筵坐左執觶祭脯醢以柶祭醴三西階上北面坐啐醴建柶興坐奠觶遂拜主人答拜賓即筵奠于薦左受醴于筵前復位于西階升筵以祭醴反西階而啐醴奠觶于西階復即筵而奠於薦東皆易以敬也賓啐醴奠觶而不飲與聘禮醴賓同非飲酒之禮無卒爵也降筵西北面坐取脯主人辭辭其坐而取脯也納徵玄纁束帛儷皮如納吉禮致幣之儀不具何也士庶人所通行人皆知之又使者執一兩以致辭其餘從者執之儷皮陳於庭中不言可知與冠禮不言設屨與著之同也尊于房戶之東無玄酒篚在南實四爵合巹四爵合巹為夫婦之酳而設于房戶之外何也尊設於室中北牖下正當戶婦立于尊西則尊之南正執事者出入往來所由不可置篚以隘之室中有玄酒示禮有初兼兩尊相配也外尊贊以自酢以酳媵御則無取焉主人爵辨纁裳緇袘爵辨纁裳純衣緇帶已見冠禮故獨舉緇袘而繫于纁裳見以緇緣裳惟親迎之服為然猶女之緣袡也乘墨車古者三十而娶則宜有升于司徒司馬及任官而身為士者矣故得攝大夫之車婦車亦如之有裧注以裧為裳幃即周禮所謂容有容則有蓋是也敖氏乃謂在上曰裧未知何據婦人出門必擁蔽其面况始嫁加景以禦塵乃有蓋而無幃乎姆纚筓宵衣在其右女從者畢袗玄被顈黼在其後注于宵衣顈黼並以領詁疏曲為之解似未安敖氏謂皆指衣言是也據少牢特牲宵衣次于褖衣女衣褖則姆衣綃宜也獨舉領而不言其衣何義乎顈黼曰被示覆于袗玄外也領而曰被則辭不當物矣主人玄端迎于門外西面再拜賓東面答拜主人揖入賓執鴈從至于廟門揖入三揖至于階三讓主人升西面賓升北面奠鴈再拜稽首降出婦從降自西階主人不降送記曰古之君子不必親相與言也以禮樂相示而已儀禮中此類甚多必各求其所以然然後知先王依人性以作儀之意凡主賓初接必有禮有辭惟壻親迎主人主婦之與壻接則無辭可致故壻至門外使擯者請事傳辭而主人出迎賓升堂奠贄主人西面主婦南面相視而不為禮不交一言壻降出婦自從之以明授受養亷恥皆體性而為之儀則也主人不送賓仍立西階蓋俟女出而面戒之又女與壻相從父母不宜參故惟庶母送之及大門以內稽首非君父無所施以鴈授婦曷為有此禮娶婦以承宗祀奉粢盛供盥饋祖宗父母子姓皆將託焉故重為禮於其祖禰以示待之厚望之深也女不親受其義有二未成夫婦不可親授受又以避夫之稽首即舅降洗婦避于房之義也主人之不答其義有三壻出女從不可參也又以示稽首之禮乃致敬于己之祖禰而非己所敢當猶聘禮主君拜逆而使者不敢答也且禮之有報所以相稱也納采以下五禮主人皆拜于門堂者再而使者不答故于壻之重禮一不答亦所以為稱也納采但言授鴈問名門外言執登堂但言授惟此言執鴈從則餘皆使人奉鴈俟于堂下而後賓取以授也婦見舅姑及廟見皆言下堂取笲而不言執笲以待事者蓋四禮皆賓致主人之命親迎則壻以為贄于女義不得使人代執記云執贄以相見敬彰别也壻攝盛主人則不可以朝祭之服即私事壻御婦車授綏姆辭不受姆為婦辭蓋從女而歸于壻家也七出中惡疾惟母家可歸五者皆身為不義可聽其所之惟五十無子者情可矜憫其不肯再適人者或母家貧不能相養則使姆教他人之女而依以終世得自完其從一而終之節凡此皆聖人所以盡人之性贊天地之化育也姆辭不受壻宜執而拖諸軫間俾女自取之然後御輪三周而下婦乘以几升以漸則體安尸乘以几尊之故欲其安也婦乘以几恐失容于壻前使其升易也媵布席于奧夫入于室即席婦尊西南面親迎以前六禮皆男先于女入寢門之後媵先布夫席婦久立以待則女下于男咸恆之義也媵布夫席沃盥示服事其君之禮也婦入門則壻稱主人入室則稱夫而間家之義具矣婦立于尊西然後設俎豆醬湆黍稷者得自展布即早設對席陳饌者往來非獵席必避席故直至啓會告具而後揖婦即筵也御謂夫家內御者不必改讀為訝贊者徹尊幂贊者乃姻黨中老婦與冠之贊同非內御者之比故主人及婦皆與交拜舉者盥出除冪舉鼎入陳于阼階南西面北上喪奠陳鼎于阼階前將匕載而後除冪以陳鼎于未斂之前俟斂畢而後載俎時久不可以早除冪也昏禮則陳鼎與匕載同時旋用之故除冪而後舉少牢亦然少牢鼎陳于洗西當東序以在廟主人子姓兄弟並立于阼階下也此陳於阼階南以階下無立者近堂室便陳饌也二斂將舉阼階亦無立者故鼎可陳俎入設于豆東魚次臘特于俎北特言俎入明别有以入者不言其人蓋男不入內內御者以入可知設黍于臘北對饌不言豚魚何也席東西相對夫之豚俎設于菹豆東魚在豚東臘特于豚魚之北婦之豚俎設于菹豆西魚在豚西臘特于豚魚之南菹醢黍臘之位具則魚豚二俎可知矣黍豚臘三俎相次黍設于豚北而云于臘北何也臘特于魚豚二俎之間南北不正相直故因此以見東西之節也御布對席筵席皆不言布之者惟媵與御目其人義存焉爾贊爾黍授肺脊皆食以湆醬皆祭舉食舉也皆食以湆醬為句黍久陳宜溫以湆肺味淡宜擩于醬重言祭舉嫌前既祭肺食時不再祭也舉言食以别于嚌也凡獻酬肺脊有嚌而無食即公食大夫禮但以湆醬食惟尸食舉以祭主于養尸也婦始入室而食舉者夫婦之道以直以誠晨而興至是宜夕食矣故從質也大羮湆惟飯食用之鄉飲酒鄉射燕大射皆不設湆以有牲酒而無黍稷也惟昏禮及公食大夫義主于牲黍故食以湆醬士虞特牲湆雖設而尸不嘗以將飯已嘗鉶羮也少牢正祭無湆乃簡殘文闕宜與士虞特牲禮同儐尸設湆而不嘗以正祭既飯時則肺肉及燔皆嚌而不食也饋食禮祭舉而後飯尸象神禮多文也此既飯乃祭舉與朝夕恆食同從質也三飯卒食自朝食待事以至于昏不再食則飢矣而飯止于三緣婦之情不能飫也三酳用巹亦如之飲酒之禮雖一獻賓主人各既三爵冠之醮昏之三酳皆取義于三爵也酳以安食故祭禮惟主人稱酳昏則再三皆稱酳承夕食之後非飲酒之禮不可以稱獻也贊洗爵酌于戶外尊入戶西北面奠爵拜皆答拜贊自酢以婦始至未見舅姑不得用主賓常法出戶洗爵以酢贊也酌于戶外尊示房中之尊專為合巹設也疏云三酳乃酌外尊以自酢乃略賤者非也冠禮亦三醮具舉而後主人别醴賓則非輕賓可知矣禮辨于微禓襲不相因校足不襲執贊自酢自不宜酌于合巹之尊以為略賤則贊非賤者主人出婦復位復位避徹饌并改筵而布衽也御衽于奧媵衽良席在東皆有枕北止奧室西北隅夫衽席在東外方也婦衽在西內方也外內正位之義具焉北趾並南首也卧未有無枕者而曰皆有枕嫌男女共枕也前布于奧飲食之席也故曰夫此所設寢寐之衽也故曰良其辭彌親稱名之當如此主人入親説婦之纓説婦于房復稱主人對媵而言此復稱主人示婦之纓非主之者不可説也媵侍于户外呼則聞媵習于女異日當與女君分夕而敘御凡隂事所徵求無所嫌也夙興婦沐浴纚筓宵衣以俟見婦歸之次日即著事舅姑之常服而親盥饋焉以示昏禮既成即宜操作而無事於容觀家人之初間有家悔亡之義也席于阼舅即席席于房外南面姑即席姑之席不敢正對舅即主人席于奧婦尊西南面之義婦饋舅姑同席東面蓋並坐則上下已别也婦執笲棗栗自門入此言命士父子異宫者不命之士其出自寢室直升西階與北面拜奠于席拜舅不言東面以拜姑之北面見之拜奠于席下遺如初禮三字冠禮母受子脯猶俠拜以其禮重也莫重于始昏而見于姑無不俠拜之義觀三月廟見俠拜與舅同則此為闕文無疑姑坐舉以興拜授人注授有司非也祭祀助主婦薦徹者必婦人而况受婦之贄乎舅使宰徹則姑舉必授內御者婦以脯授人于門外則所授必丈夫送者皆曰授人而不目其人以其人不待目而辨耳贊醴婦舅姑不自醴婦而使贊代注以為親厚之敖氏以為示尊卑之禮皆非也婦未盥饋而舅姑先醴焉非理也故使贊代之且女之父母急望其當於舅姑俟婦既盥饋舅姑饗之而後以受禮歸報非情也贊代醴使婦先取脯以授送嫁者然後情安而理得贊者酌醴加柶面枋出房席前北面婦東面拜受贊西階上北面拜送婦又拜婦人相為禮有不俠拜者云婦又拜明贊者止一拜也北面坐取脯降出授人于門外以授送嫁之人與饗而歸俎同義以安其父母也不言歸脯簡微故略之問名賓取脯降授人而不出門以禮行于廟從者在階下庭中也婦取脯授人于門外以禮行于寢送女者在寢門外也特豚合升側載無魚臘無稷惟夫婦牲牢可共祭祀則神俎尸俎必用右體且設同几各有配享故祖考不可共牲牢也始婚則同俎男女初合而親之婦饋則異俎外內正位而别之亦具咸恆之義婦始饋而無魚臘無稷示朝夕盥饋惟在忠養潔敬而無取于備物也卒食一酳無從肝義與此同並南上婦見則舅姑别席示男女正位之義也婦饋則舅姑同席循朝夕侍食之儀也御贊祭豆黍肺舉肺脊乃食先祭醢次祭黍于醢舉器于敦舉實以豆兼菹醢二者皆祭敦兼黍稷而所食惟黍也昏之夕贊惟爾黍而不及稷先列肺于舉肺脊之上示别有婦祭之肺而非姑所舉之餘也姑所舉肺脊御並以授婦使嚌之而後食食據祭禮𧃊者皆祭婦饋舅姑而餕亦祭則曲禮餕餘不祭謂子婦朝夕侍食之餕明矣蓋𧃊食鬼神之餘故可以祭饋則侍食于舅姑之始故禮變于常姑酳之婦拜受姑拜送坐祭卒爵姑受奠之婦受贊醴俠拜受姑之酳不又拜者大親不文不敢以答贊之禮行于姑即受饗不敢辭洗舅降辟于房不敢拜洗之義也婦徹于房中媵御餕姑酳之雖無娣媵先于是與始飯之錯使媵御餕不敢使媵御徹則凡膳飲百物進于舅姑者必躬必親毋或疏忽而假手于他人義已見于此矣媵御之卑而姑親酳之國君燕射獻及于庶子有司內小臣上之接下以禮故下之事上以誠也媵賤無特見舅姑之禮故婦始饋舅姑始飯則使從婦以觀錯置俎簋湆醬之儀法故曰與也舅姑共饗婦以一獻之禮昏義云厥明此不言蓋既見舅姑受醴婦盥饋則饗為明日之事不言可知姑饗婦人送者酬以束錦别有婦人送者而合巹之夕布壻席者媵侍于戶外者媵其義益著矣婦人送者女行時不見于經歸猶得饗酬姆與女從者始見于經而饗酬不及則并依女以終具見矣婦人送者主婦及壻猶與為禮而所以待姆者無聞焉何也女與壻合巹之夕主婦必賓而食飲之盥饋之後女必私奉養之以無關于昏禮之正又雖不言而知其必然故可略也若異邦則贈丈夫送者以束錦敖氏謂古者婦人不越疆而送嫁但送女與慶弔異姆及娣姪皆留壻家父母之心必念悲女行之逺使婦人送嫁以察其當于舅姑與否也婦人送者饗與酬宜一同于同國大夫則别加贈幣以勞其辦護之勤若舅姑既沒則婦入三月乃奠菜廟見重禮也無鼎俎豆籩而奠以菜何也正祭必夫婦共之廟見婦事也夫不可從而獻薦婦又不可以自獻薦故惟奠菜為安然則父沒而冠何以可祭于禰也孤子免喪而未娶者可自舉時祭則雖因冠而特祭可也但已冠而祭已祭而見伯父叔父而後饗冠者則其禮必略或如聘使歸之以脯醢釋奠或如朔奠之陳三鼎而無獻酢可知矣崔靈恩云若舅姑偏沒則厥明饋食于生者三月又廟見於亡者是也注謂舅存姑殁則姑無廟然姑雖無廟必袝于祖姑官司一廟者祖禰共廟而廟見獨舉舅則姑袝于祖姑而廟見獨舉姑可也即有繼姑與舅同饋食同饗婦而三月奠菜于前姑可也席于廟奧東面右几席于北方南面吉祭考妣共席而設同几以不設女尸也廟見不設尸故可别席異面以象其生而姑無几蓋祀于廟而設同几舊矣未知神之所在于彼乎于此乎所以微别于生也婦始見舅席于阼正位乎外也姑席于房外正位乎內也饋食則舅姑同席將授之室則婦為主而舅姑同居賓位故皆東面也合巹夫婦同俎而異席同者情之親異者位之辨也饋食則舅姑同席而異俎同席者傳代之義宜變異俎者夫婦之位有常也至廟見則用生時始見之位舅東鄉姑南鄉匪是則姑有二三人不可以敘列矣婦朝饋及廟見夫未有不與之偕者而經記無文何也朝夕侍食于父母春秋致享于祖禰子之事而婦從焉宜也殆婚而朝饋廟見而釋菜婦之事而子從之則非宜故雖與之偕而不與其事其義與舅沒姑老子婦承祭姑未有不在廟者而經記無文以無事可記耳祝盥婦盥于門外婦執笲菜祝帥婦以入祝當為姻黨中老婦習禮事者或巫女也周官王后有女祝則民間禱祈宜有女巫在禮男女不同巾櫛祭禮夫人薦豆執校執醴授之執鐙尸酢夫人執柄夫人受之執足使祝非婦人豈可與婦共洗而盥相隨以入乎某氏來婦敢奠嘉菜於皇舅某子某子注舉姓敖氏舉諡士無諡宜舉姓若大夫則宜稱諡婦拜扱地坐奠菜于几東席上還又拜婦始見拜奠笲舅撫之婦還又拜此事死如生若舅撫其奠而俠拜也廟見拜扱地而生見舅姑拜不及地何也猶祭禮隂厭及尸傳神嘏主人皆再拜稽首而事尸不稽首至敬之中又有差焉幽明之體異也此獨表扱地則凡祭祀及父母舅姑生時拜皆頓首也左傳晉襄公夫人穆嬴頓首于趙宣子蓋過禮以逼之父母舅姑而不稽首蓋不敢用拜君之禮猶大夫之臣不稽首不敢同于國君也而隂厭受嘏則稽首廟見則拜扱地幽明之體異也喪拜則稽顙吉凶之體異也同等之拜皆空首所謂拜手也君答臣拜亦然婦人吉事則肅拜餘可以類推之戴記婦人吉事雖有君命則不手拜肅拜雖宜作非文訛婦降堂取笲菜入以是知廟門之外娣姪與御者各執笲以俟婦既盥執一笲以入則笲者皆從立于堂下以俟再取厥明見舅姑于寢之禮亦然始見及盥饋禮事甚繁非合巹之比媵不能獨供故送女者不一人敢告于皇姑某氏注謂以舅尊于姑未安生時婦始見奠笲舅撫之姑舉以興授人從姑言之不敢自同于舅則義之宜若禮辭有輕姑之意是導婦以悖也同時而告于舅既曰敢奠嘉菜則於姑從略而曰敢告乃設辭之法宜然非有所輕重也老醴婦于房中如舅姑醴婦之禮男女之辨嚴矣而使老醴婦何也贊醴婦以舅姑之命父母沒若使伯叔父母諸姑主其禮是以他人代已之父母心不安義不可也惟使老攝則儼若考妣之靈臨之在上故婦受醴于贊者舅姑不與焉而正其名曰舅姑醴婦之禮也胡不使婦贊者若女祝之類掌之也舅姑存親饗婦重禮在後故可使婦贊者先之贊者贊舅姑也舅姑沒則無所贊矣故親饗之禮廢而醴則使老攝焉所以重其禮也王后不與祭祀賓客之祼不使春官世婦攝而使大宗伯攝即此義也不曰宰而曰老何也容下士無宰則以隸子弟之老者任之不受醴於堂上何也贊醴婦在寢寢門內惟贊及媵御有事焉則受醴于堂可也奠菜于廟有司皆待事于堂階則醴婦于房中為宜受諸禰廟記舉禰示具二廟三廟者昏冠之禮必行於禰又以見官師以下庶人無廟者雖舉昏冠之禮而不得傋其儀物也臘必用鮮獸難于鮮猶為必然之辭則魚不待言敖氏之説非也祖廟未毁教于公宫三月若祖廟已毁則教于宗室宗室即别子廟也詩于以奠之宗室牖下謂大宗之廟以此記推之則别子之子為百世不遷之宗别子之廟亦宜百世不毁蓋雖天子諸侯之子孫有親未絶而列于庶人者矣如宗子為庶人而無祖廟則卿大夫士之女當教者其家可久舍乎又或有同時而教者其家能兼容乎惟大宗之廟不毁然後可各止于旁舍而並教于宗室耳內則曰若富則具二牲獻其賢者于宗子夫婦皆齊而宗敬焉終事而後敢私祭乃大宗之法也若别子之廟毁豈惟宗子為庶人卿大夫士之牲鼎無地可陳即宗子為卿大夫不過私立三廟以祀其祖禰而上祖之宗祏無存安得受族人之宗敬哉疏以宗室為宗子之家敖氏遂云别子之廟必三四世而毁不亦蔽于理乎問名主人受鴈還西面對賓受命乃降問名主賓之面位及親迎擯者出請入白主人出迎經皆無文蓋雖微記按事之節可知其必然祭醴始扱一祭又扱再祭賓右取脯左奉之乃歸執以反命疏謂贊醴婦之禮非也再扱三祭即納采問名後醴賓賓以柶祭醴三也右取脯左奉之即爾時賓降筵取脯之儀耳是以所記節次上承問名下接納徵如謂醴婦之祭則不宜間厠于此且與賓取脯不相屬執皮攝之內文兼執足左首隨入攝之而內文以便致命時釋外足而文見也主人受幣士受皮者自東出于後執皮幣隨賓者不目其人人微不足言與布筵席設几陳屨之不目其人同也受皮者稱士其在鄉邑則比長里宰之屬其在官中之士則如卜師卜人所屬下士十有六人否則隸子弟始嘗為學士而未升于司徒者故以禮之重者任焉異于羣隸也父醴女而俟迎者母南面于房外女出于母左父西面戒之必有正焉若衣若笄不言父出以女出父西面戒之則與母同出不待言矣女出于母左就父位以便戒而正之也于時母先至西階上俟女至乃戒焉母戒諸西階上不降母不降以既戒之後于女更無辭之可申也庶母則送至門而申父母之戒則禮意之仿偟周浹也使女降階至門惟婦人送者從則于父母之心猶若有歉焉耳贊者徹尊幂酌玄酒三屬于尊棄餘水于堂下階間凡賓祭齊酒牲體黍稷無虛陳而竟不一薦者故記曰明水涗齊又曰祭齊加明水則祭之時以明水注于五齊之尊此曰酌玄酒則注于飲酒之尊明矣如注疏所云則記文宜曰贊者徹尊冪以外器新涗水三注于玄酒之尊其事乃明凡酌酒以爵就尊而承之故無餘瀝淋濺酌明水以注酒尊亦必有小器以承之故棄其餘瀝注疏蓋疑明水不宜棄于階間故曲為之解獨不思隋祭尚可措諸地掃而埋之尊中之明水終豈能不棄于地哉笲緇被纁裏笲有被有裏棗栗腶修皆惡塵也婦執此以進象父母舅姑晨興朝饋以前子婦所進以待先嘗者自饘酏酒醴至滫瀡脂膏皆非新婦所能猝治故惟用其中棗栗而佐以腵修也婦席薦饌于房醴婦饗婦之席與薦皆預饌于房中待事至而後設於戶牖間薦脯醢于席前猶特牲少牢豆籩鉶敦並預陳于房中及時而後薦設耳婦洗在北堂直室東隅與室東隅遙相對兼明房之開戶於東北以通北堂也言東而不言北何也房東南之墉立者負焉曰隅則北已見矣不以户識所直何也東房有二戶也婦入三月然後祭行注助祭謂入廟觀禮習事耳疏曰舅在無姑或舅沒姑老非也古者宗子雖七十無無主婦非宗子無主婦可也則艾耆鮮不更娶者若舅沒姑老則子婦承祀不得曰助祭矣敖氏謂夫家之祭待婦入三月而後行尤謬禮過時不祭設婦以正月二月入則春祭可遲至孟夏仲夏乎問名曰某既受命將加諸卜敢請女為誰氏請問女為誰氏必辨其伯仲及夫婦之所生或妾婦之子又或兄及弟之孤女也春秋傳晉請繼室于齊公孫蠆尚以其子更公女故昏禮必謹焉卿大夫以下所主及兄弟之女而止諸侯則上兼先公遺姑姊妹以伯叔父皆人臣不敢上干也吾子有命且以傋數而擇之某不敢辭女所自出及行次年齒或别書于方或口對而記者略之耳注疏皆曲義不可通吾子有貺命某加諸卜有貺謂受鴈而許嫁也問名之辭曰將加諸卜女父以名告是命壻父加之卜也注以下記曰賜命因以貺命斷句未安父醮子醮子乃昏禮大節而不見于經何也古者記事記言多分而為二春秋傳曰先王之禮辭有之或别有一書其事已見于昏辭其義又見于冠醮故略之耳敖氏云注謂昏醮在寢果爾則事異于冠經記宜特著之疏謂醴女之禮重故于廟醮子之禮輕故于寢益失之迎婦以延先嗣主廟祭乃輕于遣女乎禮辭云承我宗嗣先妣之嗣似皆命于廟中之辭若則有常若順也順家則而有常也家人象傳順以則也又曰失家則也春秋傳曰不若于言者人絶之吾子命某以兹初昏使某將將訓不一無將大車扶持也仲山甫將之奉以行也又奉而出也此將與將軍將子將雛同義謂奉持以行勉之敬之夙夜毋違宫事父戒以毋違命順于舅姑之大綱也母戒以毋違宫事服勤忠養之細目也雖命不敢違而盥饋灑掃縫紉事違其節亦將失舅姑之意而遺父母之憂為婦之道傋于此矣命之違多由于不戒事之違多由於不勉而不戒不勉皆起于不敬是謂言近而指逺守約而施博也視諸襟鞶父戒揭其大綱母戒詳其細目人情不忘于大者易而不忘于細者難故獨舉襟鞶為時取以傋用可觸目而警心也若筓關于首衣被于身如曰視諸衣筓轉不若襟鞶之切著耳支子則稱其宗弟則稱其兄此謂無伯叔父則使者致命稱小宗之兄又無宗兄則衆兄屬親者皆可稱也曾子問昏禮有吉日而父母死伯父為致命則叔父視此矣宗子無父母命之則無父母有大父者可知矣經記無文不待言也冠禮言見姑姊妹而不言祖父母伯叔父母義亦如此曾子問已孤而冠掃地而祭于禰既冠而見伯叔父母若不親迎則婦入三月然後壻見不親迎必已及期父母暴疾子不敢離也大父母及母之父母疾篤禮亦宜然蓋二姓姻皆集事難再舉父母之心亦望子婦昏禮早成故使人迎亦禮之可以權制者女當趨舅姑之所與子同齊玄而養親迎女在途而壻之父母死女改服布深衣縞總以趨喪亦此類也父母疾愈而昏禮事必每簡焉以既見于舅姑也齊衰大功之喪壻及女各改服以就其次除喪則不復昏禮亦此類也儀禮析疑卷二
