body:
  text: 儀禮析疑卷十四翰林院侍講銜方苞撰士虞禮特豕饋食曰特豕以别於吉祭也自小斂至虞皆直指其物而不言牲惟苞稱牲以兼羊豕文當然耳自小斂至祖皆用豚遣奠及虞始用豕蓋未啓以前不惟主人及衆主人親者疏食水飲即遠兄弟姻賓執事者食可以肉而不忍飽也至遣及虞則執事者之勤甚矣必牲體充盈而後可給即用物之節而至教亦存焉昏禮婦歸之明日以特豚饋子婦忠養之始也既葬而虞以特豕饋食追養之始也此先王制禮事死如生事亡如存之義過此以往始有禴祠蒸嘗之名而儀禮春秋吉祭但曰饋食兼明士大夫之祭自羮定始而無薦血燔膋之節耳側亨于廟門外之右吉祭合升而虞止一胖何也吉祭敷筵設同几祖妣共之虞則或父或母即並有喪亦一先一後故義變於吉非有惜於牲體也設洗于西階西南以尸當盥於此敖氏謂以主人位於西階上未審其義尊于室中北墉下當戶吉祭尸或東面或南北面如尊於室中則無獻祝佐食之席位矣虞惟一尸故北墉下可並設兩甒吉祭衆賓衆兄弟有司執事者皆受獻與旅酬及無算爵必尊於室房之外乃便升酌虞所獻惟及祝佐食無室外之事且葬而反日中而虞人倦時促使尊於堂上則義無所取而不近於人情兩甒醴酒酒在東凡喪奠皆醴酒並設蓋象親生時饌有所宜時有所欲故孝子忠養不知神之所便於彼於此而隂厭所酌惟醴以朝夕常饋醴列漿飲中親沒未久仍奉以人道也至即遠而吉祭則薦馨致味必以酒為宜矣苴刌茅長五寸束之喪奠何以無苴柩未藏也初虞迎精而反主尚未作故設苴藉祭以示靈之所宜降也既祔後之朔奠則有桑主小祥後之練禫則有栗主無所用苴矣疏謂諸侯以下不立主非也尸在柩尚有重重既埋而無主可乎若無主則二廟三廟可以不立矣宗子去國必載主祏故庶子無爵而居者望墓為壇而祭正以廟無主故也匕俎在西孰之西羞燔俎在內西孰上以此知門之左右室皆中隔而內外並名孰也燔俎曰內西孰明匕俎在門外也鼎陳於門外故匕俎從設以俟升載牲爨在門外而燔俎乃在內孰者俟正俎既升然後以俎出受燔不相混也賓執事者如弔服虞之賓惟來執事者故特文以見之又以見反哭以前執事者皆賓與私有司至虞則賓或以官守不能皆留故取於兄弟以共其事也婦人及內兄弟服即位于堂亦如之小斂後婦人即位於堂以尸在堂殯在西階上也既葬而仍朝夕奠之位何也主尚未作而遽入於房義無所處又迎精而反子婦之心悵愴惚愾仍若神之陟降在庭且尸入當哭踊也既祔而主反於寢則朔奠薦新必即位於房中矣主宜成於末虞既畢之後厥明奉以祔廟左傳祔而作主據入廟而言公羊虞而作主據刋木為主而言其實一也相隔僅一夕耳以是知女賓即內兄弟及外宗送葬時必與衆子婦隨主婦之後注疏之誤即此可徴矣祝免澡葛絰帶布席于室中東面右几戴記虞而立尸有几筵合之此經則初虞尚未作主明矣如已作主則布几筵後宜有奉主入室之節特牲少牢饋食禮亦惟設几筵而無迎主主入之節康成注王制謂大夫士無主據此又據戴記祝取羣廟之主藏於祖廟主出廟入廟必蹕周旅酬六尸皆邦國禮故後儒不能辨正獨不思若無主則無為多立虛廟而庶人私祭高曾於寢亦無術以稽之無法以禁之矣記云重既虞而埋之又云殷主綴重焉周主重徹焉雖庶人必有重則雖庶人必立主此喪之大綱也作主之節必已見於王侯公孤之虞迎主之節必已見於王侯公孤之祭而大夫士之儀數已附見焉如大夫相見大夫士庶人見於君見他邦之君侍坐於君子一切言視之法飲食之禮執玊幣之儀皆附於士相見禮是也若以經記無文遂謂古無是禮則謂諸侯入覲無及郊以前之禮事大夫士筮尸惟祭其祖而下不及禰上不及曾祖可乎主人倚杖入祝從在左凡吉祭祝先入而主人從祝之接神舊矣故先入以導主人也虞則人子以神事其親之始猶親在時朝夕御食不忍遽變其常故主人先而祝從也喪奠皆祝帥執事者設之主人惟要節而踊以如斬如剡之痛方切雖視薦徹猶恐間其哀也虞為易奠之始故主人不親舉鼎不羞肵俎惟恐事益而哀心為之損也吉祭尸未入室設饌祝神祝酌奠者一主人再拜稽首者三虞則祝奠觶者再主人再拜稽首者三形音未遠致其恍惚以與神明交於尸未入宜詳也敖氏謂無尸之祭亦主人先入以聘禮釋幣徴之則不然未知何據佐食及執事盥出舉長在左惟喪祭之賓專為執事而來故上經云賓執事者如弔服此長謂執事之賓長也吉祭主人及佐食舉鼎主婦視爨設敦此時心絶志悲故一切不與贊設二敦于俎南黍其東稷設一鉶于豆南設敦與鉶主婦事也主婦方在堂東俟尸之入故贊代之主人再拜稽首自斂奠至遣奠主人惟哭踊至是而後拜何也子事父母之禮莫詳於內則而朝夕奉養未嘗有拜即世子問寢視膳亦無拜禮惟始昏婦餕餘姑酳之婦拜受姑亦拜送其初饋食亦無拜禮蓋拜者君臣朋友饗燕之禮也大親不文故就養無方無所用拜未葬親之魄體尚在宫中不忍父母而賓客之也至迎精而反則形已潛藏以神道事之故尸未入而隂厭為主人祭拜之始既設尸矣而復有厭祭何也頌所謂綏我思成記所謂入室僾然必有見乎其位周旋出戶肅然必有聞乎其容聲者正謂此時至尸入以後則升降進反拜獻揖讓之節繁而思其居處思其笑語如見於位如聞其聲者轉不能若是之誠一矣曾子以祭必有尸不若隂厭為疑正為此也然則何以必立尸也日遠則哀敬漸弛故禮有以故興物者執父母之書册杯捲必有動於中况設其裳衣而使人被服之則感痛倍深即生而未識其祖考者望其冠服亦將肅恭悵愾而思繼承之重矣又體祖考之情生時祭祀燕飲合食必與兄弟朋友獻酬渥洽而後盡其歡且下洽子姓旁及族姻而教以親睦莫此為切也命佐食祭佐食許諾鉤袒取黍稷祭于苴三取膚祭祭如初祝取奠觶祭亦如之不盡益反奠之此孝子躬祭於室中之始也鬼神依人而行故使祝佐食代祭冀迎精而反庶或陟降而馮之也喪奠無此禮尸柩尚在堂不忍使人代也吉祭隂厭無此禮僾見愾聞自致其恍惚可矣非若音容始隔不敢遽易朝夕御食之常也祝接神佐食事尸尸未入室隂厭之事宜皆祝主之而以命佐食故再言佐食許諾以見代祝而執其事也尸入以後則佐食自共其職而祝詔之以其節故不復有許諾之文祝祝卒主人拜如初哭出復位薦食飲冀神之歆饗不宜哭於室中蓋出戶而後哭也加哭於出之上見饗祝時不哭乃抑哀而自強故甫出戶而嗚咽不自禁與獻尸畢復位而不遽哭異也祝迎尸一人衰絰奉篚哭從尸尸亡者之親屬也以象神不可以哀弛其敬故使衰絰者奉篚以從而代之哭也哭而不踊以奉篚故也尸入門丈夫踊婦人踊奠之遣父母而賓客之所以為哀也虞之尸父母而神像之哀愠慕思之中變也吉祭主婦設豆敦鉶毛於室中以為隂厭至亞獻然後與尸接故位在房中虞則衆子婦衆女與父母舅姑之音容永隔一旦使人被其裳衣以象焉心絶志摧故隂厭之室事主婦不親而羣俟於堂視尸之入哭踊以致其哀而後獻薦於室中是以亞獻畢仍反於堂以俟尸之出而哭踊以送之也尸升宗人詔踊如初尸入戶踊如初哭止婦人入于房以此知喪禮有哭而不踊無踊而不哭也尸入室婦人入於房以尸為先靈所馮也故尸謖又復堂上之位主人及祝拜妥尸古人事死如事生廟中之神祝相主人以追養舊矣故吉祭惟主人拜妥尸虞而立尸則孝子以鬼享其親之始亦祝接見於新尸之始故與主人同拜然則不於隂厭時拜何也時祝方告饗命祭且代神祭酒不得與主人同拜也從者錯篚于尸在席上立于其北室中尊嚴而從者久立於尸左何也不忍遽異於生也婦人行動內御者必從母之尸有從者則父之尸不容有異非然則篚既奠從者當如宗人之立戶外佐食之無事則出矣吉祭則無此禮何也即遠而以鬼享惟宜致其恍惚以與神明交而聚衆從者於室中義無所處祝祝主人拜如初尸嘗醴奠之吉祭九飯主人拜尸亦不答説見特牲饋食佐食舉肺脊授尸尸受振祭嚌之左手執之虞之異於吉祭者不設肵俎不備庶羞尸不食舉佐食不舉魚臘亞飯舉魚臘實於篚而不以授尸祝不侑主人不拜蓋以主人心絶志摧不得已而虞以安神尸乃子屬與主人同憂惟九飯為饋食之大節不可減損不惟尸不忍食肺脊即佐食每飯舉魚臘以授尸祝每飯必侑使主人要節而亟拜亦不近於人情而於禮為虛故實篚之牲體亦不以歸於尸也張爾岐曰此肺脊至尸卒食佐食始受之實於篚中間食時宜奠於豆泰羮湆入自門入自門取諸鑊也飯以湆醬故湆必溫是以無尸則無泰羮湆也尸飯播餘于篚三飯佐食舉幹尸受振祭嚌之實于篚吉祭尸食舉此嚌而不食播黍之餘則雖備三飯之數而食者少播者多明矣此尸之哀見於飲食者故特著之篚奠於尸左親播之為便而幹因自實焉後六飯並曰如初皆尸自播自實也魚臘尸不食故佐食以實於篚肺脊最貴嘗醴之後即舉之而卒食始授焉故受者因代為之實舉魚臘俎俎釋三個牲臘並七體魚七個佐食前所舉牲體四則留俎者惟臂臑肫三故臘亦舉四醴魚舉四個而留俎者亦三個以將改饌於室西北隅不可虛也舉者實於篚故留者曰釋於亞飯舉魚臘見初飯不舉也於終三飯言俎釋三個見并舉初飯之魚臘實於篚而留於俎者惟三個也尸卒食吉祭拜妥尸而後尸啐酒告旨嘗鉶告旨九飯告飽者三祝三侑主人皆要節而拜虞拜妥尸而後嘗醴嘗鉶九飯一與吉祭同而主人皆不拜蓋思親之痛方殷故事尸之禮宜略也而尸亦不告旨告飽祝亦不侑皆致其內心以助主人之哀痛也使葬日之虞尸即告旨告飽祝即三侑則不情吉祭主人設肵俎尸食舉九飯之牲體皆佐食受而加於肵俎虞則從者錯篚於尸左尸執舉而不食不受魚臘黍與牲體自播自實於篚何也朝夕盥饋始變而為神享孝子之心愴焉恍焉如見親之容聲不忍遽用即遠之儀而設肵俎也尸於亡者非孫行則孫婦行猶如侍食於尊者受賜而捧持以歸故自播自實而不敢假手於佐食也舉尚不忍食手掬之餘黍尚不忍多食而播之篚况受魚臘以盡味乎凡此乃孝子之志人情之實聖人制禮所以循而達之也反黍如初設舉黍時佐食邇敦至是反其所主人洗廢爵酌酒酳尸祭名饋食以食為主尸九飯畢而後主人進酒故義取於酳而不稱獻也主婦賓長則主於進酒故並曰獻尸拜受爵主人北面答拜同一拜也吉祭曰拜送爵虞則曰答拜者沉痛惚荒不忍循獻酢之常儀惟見尸之拜而不敢不答焉耳尸卒爵祝受而不相者不以送爵命主人也義正與此相發祭肝加於俎而不加於菹豆亦遭變而不忍用常儀賓降反俎于西孰吉祭之肝加於菹豆將合摶黍以嘏主人也虞無嘏故仍加於俎而反之亞獻三獻之燔俎不反何也哀主人之遭閔凶而祭無嘏故特反之以見義也燔俎則俟禮終而與豆俎鉶籩同徹可矣尸卒爵祝受不相爵凡送爵未有不拜者主人哀痛方深無庸以呼唱為禮主人拜受爵尸答拜尸亦稱答拜而不曰拜送爵與主人同憂戚也主人坐祭卒爵拜尸答拜按雜記小祥之祭主人之酢也嚌之衆賓兄弟則皆啐之大祥主人啐之衆賓兄弟飲之而虞則主人卒爵此禮以權制與喪疾飲酒食肉同義也蓋自初啓以至反哭哭踊無算宵旦靡寧故緣亡者之情憫孝子勞苦倦極而假神賜使一卒爵以少扶其氣體祥之祭則惟懼哀心之懈也故以嚴終焉虞惟祝佐食有獻何也哀痛方深不暇與賓兄弟為禮也筵祝南面敖氏謂筵於北墉下尊之西似據少牢佐食戶內墉東北面比類而得之蓋佐食北面在墉東則祝南面必負北墉尊既設於北墉之東則祝筵當在尊西佐食雖與祝同獻以其為同姓子弟故室中不得設席而牲俎亦陳於階間主人獻祝祝拜坐受爵主人自飲之爵不洗而獻祝心絶志摧而與祝為小禮則不情又所承乃獻尸之爵示已與祝佐食皆受尸之賜而飲其餘瀝故不敢洗以致其私敬也吉祭亦不洗而獻祝義與此同佐食北面拜坐受爵士虞朋友不足則取於兄弟大功以下者佐食當以小功之兄弟故受爵北面而拜受爵出實于篚出當作降自反兩籩棗栗設于會南吉祭宗婦執兩籩戶外坐主婦受而設之虞則自反不忍遽變朝夕進食於舅姑之常而使宗婦傳致也觀此而不曰拜送爵與尸自播黍實牲體之義益明矣賓以燔從吉祭長兄弟以燔從當喪故以賓代尸祭燔卒爵如初如肝之祭嚌而加於俎卒爵祝受而不相爵也以虛爵入于房共祀事者祝與佐食為要求神侑尸禮莫重焉事莫勤焉古者賓祭必夫婦親之主人繼尸而獻之主婦不可不從獻也賓長洗繶爵三獻燔從如初儀亞獻三獻吉祭所以皆酢者體祖考之心凡有吉祥慶事必與子婦親賓共樂之然後快於心虞則主婦上堂入室悲不自勝賓亦為之惘然使尸抑哀而強致爵則酢者受酢者中皆不自得故廢酢乃所以達生者之情也觀此而主人獨受酢且卒爵為達亡者之情而輔其病義益著矣婦人復位吉祭婦人位在房中喪奠則位在堂上以尸柩在堂當要奠之升徹而踊也虞仍位於堂以要尸之入門入戶而踊也故尸入哭止則入於房三獻畢婦人復堂上之位以祝告利成主人哭則丈夫婦人皆哭尸出戶降堂出門皆踊如初也葬日虞冀先靈之安於寢室也故尸入戶堂上之哭止虞既畢主人婦人復堂上之位然後哭尸出戶然後踊恐室神之不安也尸不哭而使以篚從者代哭義亦然祝入尸謖吉祭三獻爵止後主人主婦交獻酢虞則獻加爵旅酬皆廢禮當然也從者奉篚哭如初以是知乃代尸而哭也尸出入衆主人婦人皆哭踊尸為主人之子行固宜與主人同哀者也以為尸而止哭故要其節必使人代焉祝前尸出戶以尸入戶祝從尸後故特著祝前以明其先導也凡導及詔相必於前從後則不能詔相周官寺人職凡內人弔臨於外立於其前而詔相之出門亦如之凡尸出主人不拜送禮事既畢則仍子行也祝反入徹設于西北隅徹而設於西北隅亦索祭於祊之意又衆賓皆退祝執事者不宜獨留故惟獻祝之席與俎出而饌則俟主人之兄弟宗婦自徹几在南厞用席厞隱蔽之意以饌不久停行當徹無庸一一巾冪而總以席蔽之也將祖徹奠巾席俟於西方則久停越宿之奠皆各加巾冪可知矣注當為變吉又明東面不南面傳寫吉訛古又訛文賈疏又從而為之辭固矣祝薦席徹入于房祝自執其俎出以此知佐食雖與祝同獻而席不設也薦徹入於房本自房出也佐食之俎不在室故自徹者惟祝少牢饋食禮佐食之俎設於階間特牲禮佐食受酢惟祭酒皆為同姓子弟之徴宗人告事畢賓出主人送拜稽顙再言賓出前所出廟門也故主人出門則哭止而賓主人皆復未入時序列之位俟宗人告事畢然後賓出大門而主人拜送於大門外也虞沐浴不櫛記葬日虞及日之未中而浴無暇更櫛斬齊之喪一也殺于廟門西主不視反而亡焉失之矣哀慕方切不忍視殺又當以其間沐浴無暇也主人在室則宗人升戶外北面宗人不入室佐食無事則出俾主人幽默以致其哀誠是以僾然必有見乎其位也尸謖祝前鄉尸還出戶又鄉尸還過主人又鄉尸還降階又鄉尸降階還及門如出戶每還必先鄉尸者雖無辭若告尸以行與轉之節也前後皆以戶階門為節惟過主人不言地以下言降階則適當階上可知也再言降階而後言還者祝先降鄉尸立待尸之盡階而後還也男男尸女女尸廟祭設同几惟喪祭在寢可設女尸祔用嗣尸專指男尸而言也練祥禫於寢則皆有女尸可知既饗祭于苴祝祝卒不綏祭無泰羮湆胾從獻世儒多謂古祭用尸不若後世無尸為安不知無尸則儀節不得不簡而羣義皆無由而見惟既葬日中而虞各致其哀而退尚若可行若時祭如此則與奠告無異於追養為率慢而不足以萃祖考之精神於親賓為涼薄而不足以盡十倫之義類矣主人哭出復位有尸則主婦亞獻主人復位而俟賓三獻婦人復位而俟至祝告利成然後哭尸出戶然後踊既無尸則出而哭同時而踊可矣祝闔牖戶降有尸則主人復位而祝迎尸既無尸則事神之事畢矣於孝子倣徨周浹之心未能慊也故闔牖戶冀神之憺安而久留於斯以致其思成之慤焉男女拾踊三曰男女兼朋友與內外宗也有尸則尸入門而踊入戶而踊出戶出門亦如之無尸則總而為拾踊三者三也祝升止哭以是知闔牖戶如尸九飯之間哭無停聲也自小斂以後未有哭踊如此其久者大斂即代哭葬之前夕亦代哭即踊無算亦要其節而後舉主人衆主人婦人哭踊正禮未有三者三無停聲如此其久者蓋至無尸則死者必惻然有隱而孝子之哀痛更深矣先王制禮皆所以效人情之實而不得不然者也主人入祝從啓牖鄉如初復入於室僾見愾聞如親奉侍也如初久立於位洞洞屬屬如將失之也有尸則不復入者尸神像也悵焉愴焉惚焉愾焉親之容聲無時不刻著於心目而復入於室則煩且黷矣隂厭之初主人入祝從在左西面此仍西面故曰鄉如初始虞用柔日葬日虞迎精而反不忍一日末有所歸也錯見傳記義極明著敖氏乃謂言用則非葬日又援祝辭夙興夜處以證之非也始虞宜用柔日則卜葬以柔日可知矣至祝辭乃云早夜不寧耳無以見虞之隔宿也外事用剛日內事用柔日鄭注以國中郊外言徴以郊用辛社用戊辰既不可通崔靈恩易為兵事廟祭考之詩書亦不盡合曲禮內事稱孝王某外事稱嗣王某則冠昏告廟及四時之祭皆內事也賓戎祀外神皆外事也觀武成祭周廟用丁未柴望用庚戌可徴哀子某哀顯相如稱亞獻之主婦則不得云顯稱三獻之賓長則不得云哀蓋謂衆子及嗣孫也弟副兄孫承祖皆天之顯道故曰哀顯相敢用潔牲剛鬛香合嘉薦普淖豕臘天産也黍稷地産也尸所飯惟黍故獨舉香合籩豆之薦陸産水草之和具備正所謂嘉薦普淖也辭意本不待釋而明注誤以曲禮剛鬛香合等為人君祝號而不知其為上下之通稱由此曲生支節義皆蒙混明齊溲酒喪奠皆兼用酒醴象生人之飲也至虞則用明水和醴齊漸易而即吉雜記所謂以吉祭易喪祭此類是也注謂以新水釀酒固失之敖氏謂溲酒為衍義亦未安三虞卒哭他用剛日亦如初曰哀薦成事記本謂三虞則廟寢奠祭之哭至此而終而注乃謂别有卒哭之祭蓋惑於檀弓記文而不知彼記所云卒哭曰成事者乃舉卒哭以當三虞曰以吉祭易喪祭者蓋於是日丈夫脫絰帶婦人脫絰則祭之儀物必有異於初虞再虞如雜記虞與卒哭祔異牢之類而非謂三虞後别有卒哭之祭也知然者下記曰獻畢未徹乃餞餞而事畢則三虞外别無所謂卒哭之祭明矣且哀薦成事乃三虞之祝辭與初虞再虞正相對者不容别為臆説也初曰祫事以當祔於祖告乃異日祫祭於祖廟之始事也再曰虞事魄體有歸得從先人於廟則靈魂可安也卒曰成事詰旦而祔禮終事備也主人出即位于門東少南婦人出即位于主人之北皆西面哭不止即位後主人衆主人婦人皆哭無停聲以俟尸之即席也至此則親之靈魂亦將離其室矣故哀心之感更深尸即席坐唯主人不哭洗廢爵酌獻尸尸拜受主人拜送哭復位尸即席主人將有事故以敬抑哀既拜送則獻事畢哀心不能自抑矣曰哭復位者號泣而行别於即位而後哭也三虞既畢而餞則喪祭既終而吉祭以始故用吉祭之辭而曰拜送祭酒卒爵奠于南方吉祭卒爵獻者拜尸答拜象祖考樂康嘉孝子之追養也虞以安神故承用其儀若餞則獻者哭男女衆賓皆踊而用從容獻酢之儀則悖人情而失禮義矣主人及兄弟踊婦人亦如之餞在廟門之外惟獻者不哭而衆人之哭不止每獻畢男女齊哭踊與室中不哭不敢驚室神異也主婦洗足爵亞獻如主人儀無從主人獻而尸不酢主婦獻而燔不從以餞行理無淹久又舉於三虞之末不宜過繁且詰旦而祔事宜預治時亦不暇給也賓長洗繶爵三獻如亞獻踊如初初獻尸卒爵主人及兄弟踊婦人亦如之亞獻主婦及婦人踊如初則主人及兄弟亦如之三獻則凡在列者皆踊哭之久踊之多幾與殯前啓後等哀親之魄體既藏而靈魂亦將離其室也虞以安神故室中不哭餞以送神故號泣而從每獻必踊各以義起也尸出門哭者止主人無送尸之禮以尸本子行也廟中則以神事之出門則仍兼子道無拜送之義祔仍虞尸則尸出門仍各反其次以待事也入徹主人不與文立於丈夫説絰帶之後婦人説絰之前以見婦人不與徹也吉祭設於室中堂上故主婦宗婦與諸宰並徹餞設於廟門之外則非婦人所宜有事故兄弟大功以下入徹而主人不與婦人則拜女賓後即自闈門而反其次矣無尸則不餞猶出几席設如初拾踊三上記尸出門右几席既設賓出復位主人出即位於門東婦人出即位於主人之北故此記明雖無尸不餞而主人婦人及賓猶出也猶出斷句几席設斷句則情事顯然注疏以猶出几席為句辭義俱不相貫尸先出則几席從之而後賓主人出無尸則主人主婦先出視几筵之設以致其哀慕曰拾踊三則賓亦出可知矣虞祔而退之賓義此於兄弟故與衆主人同踊遂卒哭舊説卒哭謂卒去無時之哭非也記曰父母之喪哭無時本無分於久近如斬如剡之痛有動於中乃以限於既祔而不敢哭非人情蓋自啓殯以後朝廟入壙哭踊無算反哭以後三虞及餞哭踊無算皆自是而終即既祔以後殯宫朝夕奠之哭亦自是而終也將旦而祔則薦卒辭曰哀子某來日某隮祔爾于皇祖某甫尚饗薦即餞也以音同而訛或記者即以餞為薦也末虞既畢將夕而後餞則餞乃虞之終故曰卒辭注蓋誤以此為卒哭之祝辭而謂别有卒哭之祭也獻畢未徹而餞則不得别為一祭明矣將謂卒哭在餞之前不惟經記無文且其後尚有餞之哭踊不得謂之卒哭蓋前記至告事畢賓出而止後記别一人所為故始於死三日而殯終於小祥大祥吉祭凡禮事禮辭為前記所未備者則以所聞補之而特揭卒辭以見其他辭事之同也如一人所記則饗辭宜附於饗之下祔辭宜次於末虞之後何故言之無序若此卒辭宜施於尸出門右設席置几時所以明餞神之義為將祔之本也疏謂迎尸之前誤敖氏謂既餞而復薦於寢無此禮義女子曰皇祖妣某氏父母之心哀其魂魄無歸故祔之蓋必祔廟而後可比於殤與無後者從祖祔食也其祭至適若長為父後者而止與妾母之不世祭同但妾母於適孫止而庶子之子可承祀女子無歸者則不及再世耳明日以其班祔疏謂天子諸侯始有主士大夫無木主以幣主其神臆説也曾子問天子諸侯出師無毁廟之主乃以幣帛皮圭告於祖廟載於齊車惟受命於主故可以幣代耳廟既毁主猶藏之祏况無木主而專用速朽易蠧之幣乎人壽以百年為極子死而已之父尚存者有矣父沒而父之祖尚存未之有也萬有一然則士大夫無高祖之廟安得祔於中一以上哉禮窮則變必有以權制如妾祔於女君者以其事曠世不見故經記無文耳用嗣尸注稱虞祔尚質未暇卜尸近之而義未盡也祔與奠告之祭相類為新死者設尸像其進見於祖祖之尸不必設也人君月朔朝廟聘使出入奠告皆不設尸為新死者設尸而改卜則悖矣故嗣用虞尸理當然也孝子某孝顯相夙興夜處小心畏忌不惰其身不寧未葬以前耳目思慮瞬息不在於親則為失其本心而無所畏忌又或昏忽懈惰則形色必違於禮故著之祝辭春秋傳叔向稱范武子之德曰其祝史陳信於鬼神無愧辭若主喪者及衆主人心無畏忌身實懈惰夙興夜寐無甚不寧而以此告於先靈能不怵然內愧而怍於族姻友黨乎先王制哭踊之節正薦告之辭皆所以振發人之本心而俾自循省也用尹祭尹正也三虞皆以將祔告於新亡者至此乃正告於祖而以孫祔乃祔祭之正也不必以脯曰尹祭詁劉捷曰虞祭側亨至祔特豕合升乃用吉祭之正禮耳適爾皇祖某甫以隮祔爾孫某甫尚饗時祭必祫則饗辭宜備告如一世無尸可卜則獻薦之儀同於因事奠告而不設尸者其事則同於以某妃配而受獻者惟男尸也中月而禫注謂與大祥間一月而禫記曰祥而縞是月禫則非間一月明矣魯人有朝祥而暮歌者孔子曰踰月則其善也故曰三年之喪二十五月而畢又曰禫而從御吉祭而復寢古者祭必以仲月除喪之日與吉祭近者必一月遠者或二月三月故不以月計而惟以吉祭為斷後世因此定為二十七月非古制固然也是月也吉祭猶未配母先父沒而不配何也母之祔食於祖姑也久矣吉祭與祔同月祖始祧廟始遷原亡者之心不忍遽改其舊故遲之又久而後配也用此知惟父沒廟始遷母祔於祖姑則其祭也亦如女子子未嫁而死及反父之室與歸葬於女氏之黨者從祖祔食焉耳周官大宗伯六享特揭饋食即指吉祭猶未配者蓋禘祫四時正祭外惟此為廟祀先王之吉祭而不與時祭同也大戴記言諸侯遷廟事畢乃擇日而祭焉宜上下同之儀禮析疑卷十四
