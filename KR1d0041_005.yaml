body:
  text: 儀禮析疑卷五翰林院侍講銜方苞撰鄉射禮鄉射及正齒位無介而立三賓與興賢能同何也教射則考德行道藝正齒位則書德行道藝皆以為鄉大夫興賢能之據故立三賓示將以充後舉之選俾羣士有所觀感也主人戒賓冠之賓贊始汜戒之前期三日筮之既筮而宿之前期一日告之鄉飲鄉射則並戒宿於即事之日何也冠子私家之事雖前期宿戒尚恐奪於公事興賢能習射則國政也鄉大夫既就先生而謀賓介則衆賓之當與諸公卿大夫之來觀者預傋之矣春秋習射其法有常其人有定故可以及期戒速同日而畢事也賓出迎再拜主人答再拜乃請賓禮辭許主人再拜賓答再拜凡賓主以禮事相見必再拜貴賤同之惟鄉飲酒賓出迎一拜俟主人再拜而後答焉比事以觀而先王教士以自重教公鄉大夫以下賢之義耿著矣州長教民習射故賓不宿戒不固辭一同鄉飲酒但不言拜其辱蓋此賓或在朝公士或不仕之君子與鄉大夫所舉賢能不同即或用庠序中學士亦奉長吏之教令而習禮無所為拜其辱也無介注謂義主於射故略於序賓敖氏謂介尊次于賓同于大夫射時難為合耦皆近似而未得其情也謂略于序賓則賓長三人皆得受獻而獨略于介何義乎謂難與合耦則大夫雖衆皆與士為耦介必學士之越其曹者乃不得儕于羣士而與大夫耦乎蓋大射鄉射公食大夫燕禮皆有賓無介有介者獨鄉飲酒耳五州之中德行道藝相比次者必有數人故立賓及介而介之禮亞於賓俾衆賓觀感而益自矜奮焉若州長習射則立賓以與主人行禮而倡衆耦足矣無所用介鄉射無介則黨正之正齒位可知大射燕禮則有位者皆在列賢者衆多不可以賓介盡之公食大夫則異國之臣惟正客當此盛禮而介不與禮以義起各有所當耳乃席賓南面東上鄉飲酒鄉射皆不言席賓之地何也燕禮司宫席賓於户西東上昏禮主人筵於戶西西上將醴賓改筵東上則凡賓席皆在户牖間可知矣注疏謂州射於序序無室故不言户牖非也果爾則宜特著布席之地下經尊於賓席之東則在户牖間之常位明矣衆賓之席繼而西鄉飲酒禮衆賓之席皆不屬此則繼而西蓋賢能以獻於君將出使長之入使治之故於興之之日即辨其等列若春秋習射即公士為賓亦宜與鄉之學士齒無庸過為區别乃張侯下綱不及地武不繫左下綱中掩束之凡經文彼此互見者其見之各有所宜如畫物者司空之屬掃所畫者司宫其升降皆自北階義當於大射見之大射既詳則丹墨尺度升降所由不容有異而鄉射之畫者掃者或州之有司或州長之私人不言而可知侯綱去地之數掩束左下綱之度説束繫綱之節義當於鄉射見之俾學士私居習射具知其儀法鄉射既詳則大射惟著三侯之高下與設張者量人與巾車而已聖人制禮審則宜類而使人曲得其情聖人之文隨事異形而措之各有其地凡互見者皆可以是推之乏參侯道居侯黨之一遠於堂而與侯近故曰侯黨羮定主人朝服乃速賓賓朝服出迎再拜主人答再拜退賓送再拜興賢能國之重典也故戒賓宿賓皆不言所服舍朝服無可服也會民習射疑可以常服故於速賓特舉朝服則前此皆常服可知矣鄉飲酒戒速賓皆拜辱此不拜辱者以已為賢能將獻於君而禮先焉故拜其辱習射乃春秋常法賓或公士或州之學士無為稱拜辱也賓少進少進而東以獨與主人揖讓也鄉飲酒之賓介禮宜同主人以賓三揖皆行主人接賓前後儀法皆與鄉飲酒同惟此言皆行鄉飲酒主人與賓揖讓而升介及衆賓徐進至階下事不相連鄉射則衆賓皆隨賓而行也興賢能則全用賓主之禮故聽其自行教射則兼用有司之法故使之隨行黨正之正齒位賓入而衆賓從之亦此義也鄉飲酒之衆賓主人不酬而鄉射則衆賓長亦受酬以大夫不與則長正當介位也敖氏似謂賓與主人同行果爾則宜稱並不宜曰皆及階三讓主人升一等賓升凡敵者讓登主人先登客從之謂舉步少有先後耳以下文拾級聚足上于東階則先右足上于西階則先左足知之此賓州民也故州長先升一等而後賓升燕禮則賓升公降一等而揖之義亦類此降席坐奠爵席南鄉北鄉以西方為上升席自下賓不宜由西以不欲與主人相背變其常故特著之降席本宜自西故不言賓坐取爵適洗北面坐奠爵于篚下注疏主人自內出故南面洗賓自外出故北靣洗非也古者為長之道通于師鄉飲酒鄉射之主人長也師也賓民也弟子也故雖執賓主之禮而兼存師弟子之義也有大夫然後以公士為實公士于大夫屬吏也大夫為遵則有主道公士亦宜屈然則主人之獻賓西北面賓酢主人東南面何也尊賓之義既明著於户牖間之面位矣其餘儀節又各有時措之宜主人實爵於尊南而進獻賓之席前自宜北面賓實爵於尊南而降至主人之席前自宜南面然則燕與大射主人代君賜爵而洗皆北面何也君雖使膳宰為獻主而膳宰所執則為賓舉觶之禮若南面則嫌以主人自居其升也從賓之後而由西階亦此義也賓西階上拜主人坐奠觶于薦西賓酢主人主人拜賓少退與鄉飲酒同主人酬賓賓拜而主人不少退與鄉飲酒異何也習射以明教即公士為賓致敬於州長亦宜與鄉大夫同鄉大夫為國求賢故於賓介受酬之拜皆少退蓋過禮以明尊賢之義也以施於習射之賓則義無所取故無此節主人西南面三拜衆賓衆賓皆答一拜注獻賓畢乃與衆賓拜敬不能並近似而實非也禮有宜分致者有宜合致者賓主獻酢自不宜使無事者立於其側如謂敬不可並則四時朝覲諸侯旅見天子與天子大合諸侯為壇於國外五等之君傳擯將幣饗禮同時而卒事君與臣皆為相瀆矣舉觶者西階上拜送賓反奠于其所舉觶者降特牲少牢之禮異者詳之同者則互見此篇自獻賓至舉觶於賓與鄉飲酒同而一一復見何也士大夫之祭禮衆所習知故可互見若鄉飲酒三年而一舉士不預教則始與於衆賓者或愆於儀如春秋傳鄭孔張失位立于縣間之類是也惟於州長教射詳之則進而與於賓興者可益深於禮意下而與於蠟賓者亦衆習其節文矣大夫若有遵者則入門左周官以三公為鄉老鄉之地廣興賢禮重故諸公樂道化之行而臨觀焉春秋習射即有居是州者亦無為來觀故遵者惟大夫耳尊者之禮不詳於鄉飲酒而具於是篇何也獻酬揖讓大夫即與賓同諸公雖貴禮無以加故獨著其加席辭賓去席之特異者至所自執之禮視賓主人每殺為遵之道則然公大夫一也鄉飲酒禮言遵者之入而不見其方亦末著入之深淺故互見於此以明主人之降正當遵者入門時也席于尊東鄉飲酒禮尊于房户之間遵席於賓東或疑繼賓席而東此曰席于尊東然後東西之位次顯然並遵席與賓正相對而尊之設也少南亦具見矣蓋賓與遵之席必逼近於室尊必少南然後出入於房户者可通而酌以獻酬亦便耳鄉飲酒遵者之禮綴於後此則與賓及衆賓相次何也鄉大夫興賢能三年而一舉國之重典也公大夫雖尊特來觀禮故正禮既終而後以接之之禮附州長習射乃政學之常大夫即州人也本當在衆賓之列可與衆賓列序而無嫌以遵有主道故序在衆賓之後若諸公而列序衆賓之後則非言之體升不拜洗大夫之不拜洗與介不拜洗酬而賓不拜洗同恐重勞主人之答拜非以其尊也鄉大夫之尊猶拜洗於學士州長與大夫位相近而以尊廢禮非所安也工則并不辭洗義可參觀再拜崇酒無介則於遵崇酒亦再二之義也蓋惟大祭三二賓禮雖隆不敢逾中祭故鄉飲酒雖公與大夫不崇酒席工于西階上少東鄉飲無射位工升自西階即北面坐故不言少東乃合樂獨奏合樂不惟志在射也鄉飲酒以興賢能故升歌間歌備陳君臣相悅上下志同之樂使觀感而興起焉學士習射則歌二南使盡志於修身齊家之要可矣工不興告于樂正曰正歌備鄉飲酒之樂四缺其三而曰正歌備何也凡樂歌必與禮事相應鄉大夫為國興賢必為忠為孝使民物安阜上下和樂然後可為邦家之基故必備升歌笙歌間歌合樂而其義始全修業於鄉學之士則所以養其德性而蒸於門內者二南備矣故正歌不過合樂也大師則為之洗州長習射不應有大師或大師即其州之人會公事之間樂與於斯禮又或公卿有賜樂而從以工師者使來襄事耳賓降主人辭降凡辭而終降者必有對對後必更見降者階下之事惟主人為工洗賓降則有辭而無對並不見賓階下之事蓋賓以降表意主人辭焉而遂止也使三賓大夫皆不降而賓獨降則其升也不可與主人同又不可後於主人與主人同升是與身受主人之獻無别也後主人而升則主人無以自安故惟辭焉而遂止為宜不洗遂獻笙于西階上示即無大師獻升歌之工必洗也主人以爵降奠于篚反升就席注謂兼以賓及衆賓升非也賓雖欲降以主人之辭而止三賓則並無欲降之文則反升就席者惟主人耳樂以樂賓故大夫三賓不言欲降不敢與賓同受禮也蓋賓及三賓之為大夫而降不獨以其尊也主人將與大夫為獻酢崇酒之禮賓及衆賓席位逼介於大夫不宜無事而相參若獻工與笙則賓與大夫三賓位在户牖間而主人别獻工於西階之上絶不相礙且其儀甚簡賓大夫衆賓何故又相牽率而辭降讓升費時失事以促正射之節使旅酬舉觶升堂無算爵之禮皆汲汲若不可逮乎主人降席自南方側降作相為司正惟賓酢主人主人升席自北方用升席之正禮尊賓也立司正及將徹俎主人降席自南方臨屬吏及弟子乃特變其方以尊主人注皆曰由便似非禮意具樂以樂賓故主人洗獻工而賓從降不敢坐視主人之勤而自安也立司正以旅酬則主人側降而賓不從不敢謂禮專為已也義不宜降而注以大夫尊為義失之矣鄉大夫尚為工降洗大夫乃不可從降與主人為禮乎西階上北面請安于賓立司正以紏儀而曰請安於賓蓋指不祭立飲不拜卒觶不洗而為言禮辭之體然也而此篇更有隱義焉教射禮嚴司射執撲以臨不勝者以觥代撲賓大夫皆就不勝者之位而飲方是時賓大夫酬主人之禮末備衆賓皆未受酬先舉罰爵而後舉酬所以愧厲之者切矣故先以主人之意請安於賓以示主人急於酬賓而會有司之請射禮之旁徨周浹曲得其次序類如此未旅司正所奠旅酬之觶也直待三射事畢然後賓取所奠之觶以行酬故於此曰未旅以明射事未畢而預請安於賓之義鄉飲酒立司正之後即舉旅故此言未旅以别之若不言未旅直承以三耦次於堂西則事之節次不明而辭氣亦不相貫敖氏之説前後皆失之司射適堂西注於相曰主人之家臣於司射曰主人之吏辭未别白以義裁之皆非也周官王朝大禮皆大宗伯相戴記有發則命大司徒教士以車甲司徒搢撲北面誓之州長會民而習射於序亦禮事之大者相與司射必於黨正取之主人之吏與家臣可使與賓大夫相揖讓且搢撲以涖羣士乎司馬命張侯司射所掌皆射之威儀節會所以觀其德也司馬所掌張侯説侯唱獲釋獲之節獲者負侯去侯執旌倚旌舉旌偃旌之宜至乏無停聲唱獲應宫商乃以預習師田之事所謂習射尚功也降自西階阼階下之東南堂前三笴西面北上坐鄉飲酒禮著工之降而不見所坐之地故互見於此彼注云降立於西方誤有司左執弣右執弦而授弓經於前後弟子所有事皆質言之而别言有司獲者則非弟子明矣注疏並以為弟子非也禮必有義弟子所有事皆簡便而易供若授弓矢唱獲必有司習事乃能無愆於儀度使以弟子任之設倉皇失措而取觥撻非所以誘教也不去旌注謂以不獲敖氏謂不主於中皆非也發而不中尚可以教射乎疑旌之高不掩正鵠倚於侯之中央在正鵠之下惟司射發必中的不失分寸故不去旌以為表儀使人則效是以誘射畢始命獲者執旌以負侯三耦射則去之正恐矢或集於旌而貫於侯也遂適階西取撲搢之以反位撲作教刑平時庠序之所用也至習射則必有大過而後撻其不中者飲之而已而司射非有事於堂上必搢撲正以示衆射者容體不比於禮節不比於樂皆由平時不盡志於此本當用撲而姑以觥代也而賓大夫主人亦因此各繹己之志矣周官閭胥掌觥撻罰蓋功事役事庶人則以撻罰禮事則吏士以觥罰耳司馬適堂西不決遂袒執弓教射而會鄉民儀可略不與射則不決遂執弓而不挾可矣大射則擇士以祭君親臨之故不射而決遂執弓而右挾禮宜嚴也右執簫南揚弓命去侯命去侯則揚弓揮之使行故高舉以為招也命取矢則揖弓俯拾於地故下指以示意也司馬出于下射之南還其後降自西階反由司射之南適堂西釋弓襲反位司馬升降皆紆道而由司射之南何也升降徑由堂東西者惟賓主人大夫不敢上擬又司馬位在司射之南三耦衆賓卒射而降皆由司馬之南適堂西釋弓説決拾故司馬先為之儀司馬命去侯升由上射之後立於物間故降還下射之後以適堂西與再射命去侯升自右物之後降還左物之後同理當如此别無深意注疏推説似迂遠獲而未釋獲州長習射黨正以下皆即事司馬司射宜取於黨正有司獲者釋獲舉觶者宜取於族師薦脯醢執爵者宜取於閭胥惟敷席設器乃主人之私臣耳若矢不備則司馬又袒執弓如初升命曰取矢不索必餘於所用之數以備鈎折不可索盡及時求之而莫給也至此而後發命何也初射惟三耦矢有定數再射則衆耦皆辨又初射之矢或有鈎折故宜多取以備乏匱也大夫雖衆皆與士為耦士當為學士之有德行道藝者注疏必以為在官之士非也鄉大夫之尊可與所興之學士為賓主州之良士即異日所賓興也大夫雖尊而為遵則有主道焉故可與學士耦而為下射若在官之士而居大夫之右則悖矣衆賓將與射者皆降衆賓謂三賓也主人教射賓以德行為表儀三賓亦尚德齒大夫來觀禮不欲射者宜聽之若羣士則先期師長必稽之詰其不能射者而督責之不使即事於射宫其來集者非適有暴疾不聽不與也經記無文蓋宜見於州長所讀之法而今無考耳賓主人與大夫皆未降主人較射宜於堂上監視之賓及三賓為射者表儀大夫來觀禮三耦升射無為久立堂下以相待故俟射事及已而後降也此與獻工賓大夫不降之義相發蓋賓主人大夫之席位與射位亦不相參順羽且興以兼矢於弣因順羽而興從便也大射則興而後順羽在君所儀詳也後者遂取誘射之矢兼乘矢而取之以授有司于西方而后反位古者甲劍多有銘識至弓矢則各因其人之志慮血氣以辨安危誘射之矢必别有識非然則與三耦同射何由知其為誘射之矢哉此時司射方比衆耦取矢隨作射若中輟其事自取矢以反於其所則義無所取而將再射初誘射之矢仍委於楅旁又非所以為義故使最後之下射兼取以授有司蓋節文必如是而後稱也衆賓未拾取矢未不字之訛司射作射如初射事畢皆以弓矢授有司於堂西誘射之矢三耦之後者以授有司則司射之射事畢矣故再射第舉作射如初示不復誘射也三耦三射皆與賓主人大夫與再射三射司射則一射而止何也誘射者教之射也賓大夫主人與焉則不敢教也弟子筋力方進故三射皆與以強教之賓大夫主人三賓則有年長者矣故射止於再而不欲與者亦聽焉皆禮之曲盡乎人情也不貫不釋注謂不中正不釋是也而於貫之義尚未切著蓋必射甲革椹質而後可貫必矢貫於鵠的而後有白矢襄尺剡注井儀之形故詩曰四鍭如樹也王制鄉簡不帥教者習射尚功習鄉尚齒州長之習射黨正正齒位正簡不帥教者之法也曰尚功則當以貫的為賢尚書傳所云貫革之射間於搜狩者謂甲革也周官圉人充椹質以習射於澤宫州長習射宜用澤宫之禮則所貫者椹質也疑士大夫雖畫布為侯必以木為匡蒙以布實草於其中而著於侯之背面以受矢故以剪草之工充椹質也若但畫布以為正則數貫之後不可復射且所謂特穿之而過無所為白矢白矢襄尺剡注井儀之式矣大夫袒決遂執弓搢三挾一個賓主人大夫皆自取矢不敢如國君使人授也三耦之弓矢則有司授之以共為弟子并教以授弓矢之儀大夫為下射大夫雖尊為遵則有主道故於衆賓亦遜焉勝者之弟子洗觶升酌南面坐奠于豐上注謂耦不酌下無能非也非獻非酬本無親酌之義投壺禮勝者曰敬飬而亦使他人酌則非下無能審矣蓋勝者張弓而先升不勝者弛弓而先降彼此相形實有難為情者雖法行於有司而同儕猶略見獻酬之意故使子弟洗酌坐奠於豐亦曰敬飬之義耳司射遂袒執弓挾一個不言決遂下適階西釋弓矢説決遂有明文也不勝者進北面坐取豐上之觶興少退投壺禮不勝者奉爵勝者跪曰敬飬主賓相歡無所謂榮辱也此則同耦相視絶無禮與辭有司行法私禮無所施有執爵者尚有三射弟子多與焉如每耦之弟子皆升洗酌費時而失事矣故别使執爵者代之惟於初升之一耦見其義執爵與獲者同稱則亦州之屬士耳賓主人大夫不勝則不執弓執爵者取觶降洗升實之以授于席前雖優尊者實與不勝者同罰蓋古者武事莫重於射君臣長幼莫不盡志於此無事則以習禮樂有事則以決戰勝所以保國衛民將於是乎在大夫州長即有事時之軍帥師帥也故老疾不能射者可辭於請射之初而與於射則不敢寬其罰蓋法不行於貴者則無以肅其下也騰酬爵以奠而不敢授為敬舉射爵則反之何也以飲為罰非獻酬以將愛敬之比故奠於豐俾自取飲使尊者自降而取飲則義不安故又使執爵者升授也獻獲者于侯獲者不宜得獻且有俎獻於侯示以侯而得獻也大射則服不先受獻於侯之西北設薦俎而後轉以祭侯示不寧侯本不當祭而服不私獻之也示獲者以侯得獻宜於鄉人挍射見之明不寧侯本不宜祭宜於諸侯之大射見之禮之變必有義而置之各有其所如此獻釋獲者于其位少南薦脯醢折俎有祭未射之先獲者傳呼至乏舉旌偃旌聲中宫商以習武節也故受命於司馬而獻之者亦司馬既射之後釋獲者從容釋算所共禮事也故受命於司射而獻之者亦司射賓主人大夫而外衆賓薦惟脯醢而獲者釋獲者乃有俎有祭何也以祭侯宜有薦俎也獲者釋獲者有俎而司馬司射無俎何也事有所專以主祭侯而有加俎猶大射所先薦者惟司正與射人而司馬則與羣士遍獻薦燕所先薦司正射人司士執幕者而大射正則與羣士遍獻薦也特牲少牢衆賓兄弟皆有薦脀何也祭自尸食以後皆與祝侑賓兄弟獻酬之時三射禮成餘時無多人人皆備祭肺祭酒之節日亦不暇給矣燕禮若射則不獻庶子義可類推也獲者釋獲者皆特受獻則皆族師之類而相與司射司正必於黨正取之決矣命三耦及衆賓皆袒決遂執弓就位下文各以其耦進反於射位則此所就為堂西序立之位明矣主人堂東賓堂西皆袒決遂執弓皆進階前揖及楅揖拾取矢如三耦賓主人大夫至三射而後取矢於楅者禮以漸而詳義以漸而深與三射而後循聲而發不鼓不釋同又以優尊者也大夫進坐説矢束興反位而後耦揖進自大夫以上矢有束必矢與其人之志慮血氣相應而不可混也脫束以矢當拾取也其自為耦則並行至楅南而脫之以拾取而同升就席也與士為耦則脫束而反位其耦乃進取矢俟耦反其位而後大夫釋弓矢以升故取矢時即分先後也大夫先脫束示欲與耦拾取也耦進而兼取乘矢示不敢與之拾也然後大夫亦兼取焉則尊不陵而卑不逼矣司射與司馬交于階前去撲襲升請以樂樂于賓初射再射欲其容體比於禮也至三射又欲其節比於樂初射再射欲其不失正鵠也至三射又欲其循聲而發射之初弓矢未調三射而後樂作俾循序而益致其精也射之終筋力既乏三射而樂始作俾嚴終而彌斂其氣也孔子曰射者何以射何以聽其事至難故聖人陶冶羣材而磨礲其德性者如是其曲盡焉其辭曰請以樂賓不敢質言之也賓喻其意故不辭而遂諾不鼓不釋初射所戒惟射獲獵獲而已再射不貫不釋射之實用在立武也管夷吾曰射不能中與亡矢同實中不能入與無鏃同實三射不鼓不釋射之精意在飬德也孔子曰循聲而發發而不失正鵠者其惟賢者乎奏騶虞騶虞天子之射節而士之習射奏之即興賢能歌鹿鳴之三魚麗之三之義也天下雖安忘戰必危而軍政寓於四時之田弧矢之利以威天下習射尚功而歌騶虞所以漸摩天下於仁義者深矣三耦及賓主人大夫衆賓皆袒決遂拾取矢如初矢不挾兼諸弦弣以退不反位以授有司于堂西凡射皆因習禮而寓軍令兵事以嚴終故必袒決遂拾取矢兼諸弦弣而後以授有司也據經文乃並就堂西敖氏謂賓自階下授有司於堂西主人則授於堂東豈因納射器時賓與大夫之弓矢陳於西序主人之弓矢陳於東序而此經曰不反位故意為此説與夫初陳於東西序乃因賓主人降階就取弓矢為便也至三射拾取矢於楅一如三耦射畢受弓矢者俟於堂西必同就堂西以授之於事乃便蓋後此尚有旅酬説屨升堂無算樂諸事節文宜省也大夫降席立于主人之西如賓酬主人之禮賓就阼階上酬主人即於阼階拜送觶主人就西階酬大夫亦如賓酬主人之禮皆欲節文之徑省也某酬某子注以字為卑稱子為尊稱疏曲為之解終不可通不知有司教射自當序賓以齒而射者私家之行輩又各有少而尊長而卑者設以父族母族之尊行次酬卑者而司正代為尊之之稱義無所取况以次相酬受酬者必少而轉為尊稱亦未見其安夫子孫祭告以字呼祖考則不得為卑稱明矣蓋因衆賓姓同者甚多設曰某子酬某子則不辨其誰何惟酬者稱字則所酬者雖以姓舉而不慮其相混矣但其中有同姓遞酬者則宜並稱字而記無文蓋既明於異姓相酬之稱則同姓之不得更稱姓者並以字舉可知矣賓與大夫坐反奠于其所未請安於賓未命弟子徹俎而預奠酬觶何也進退拜送坐興之禮説屨升堂後不可復行故預拜送坐奠於其所然後升坐而取飲可以不興不拜也若無大夫則惟賓大夫不與衆賓長可同於介之受酬而不可同於為介舉觶何也鄉飲酒之介乃德行道藝亞於賓以待後舉者故禮多同於賓而與大夫等鄉射之衆賓長非必德行道藝遠過其曹也主人繼賓而酬之乃所以達其意於衆賓若特為舉觶則義無所取而受者轉不能安矣賓取俎還授司正鄉飲酒主人大夫介之俎皆授弟子惟實俎授司正賓乃鄉之學士也司正鄉有司嘗治教之矣司正宜取諸黨正族長一旦賓興而為之傳俎所以明朝廷尊賢之義也此鄉射之賓或公士若州之君子則隆禮之固其宜也即州之學士亦必異日可興之賢故禮亦如之無算爵使二人舉觶賓與大夫不興取奠觶飲無算爵之儀節若於鄉飲酒具之則疑此篇義主於射或從簡略於此篇具之則鄉飲酒不侍言矣二人舉觶即舉賓大夫前奠於其所之二觶也賓大夫不興而取奠觶飲則命舉觶者取之明矣注未分明敖氏之説失之長受酬酬者不拜自是受酬者皆不拜矣故酬者以不拜先之非怠於禮不足於日也蓋日暮人倦受酬而拜尊者將答焉故轉以不拜為敬執觶者洗升實觶反奠於賓與大夫卒受者以虛觶奠於篚則無算爵止矣而復實二觶反奠於賓與大夫示飲酒之秩節有終而主人之歡心無已也猶三射既畢復袒決遂拾取矢兼諸弦弣以授有司於堂西示勤禮則敬心如始至立武則軍事以嚴終也曰執觶者洗示前一觶已奠於篚别於篚取二觶而新之也賓出衆賓皆出主人送于門外再拜拜送衆賓異於鄉飲酒禮何也鄉大夫國卿也惟既獻於王之賢能乃以賓禮寵異之故雖介不拜送若州長教射則概執主賓之禮可矣明日賓朝服以拜賜于門外賓為公士則朝服其正也即州之學士而攝用之亦宵雅肄三之義惟隱居之君子不宜朝服但既抱道不仕自不得以鄉射之賓強之别記曰無辭不相接也鄉飲酒及射禮既畢更無辭可致故拜於門外而不見士相見禮主人復見以還贄有禮與辭也使人速賓即司正無所用戒故速亦不必親也不拜衆賓謂無階下之三拜也正獻時衆實已不拜受爵敖氏乃云若獻則衆賓亦拜受爵而主人答之未知何據無司正息司正而更立司正則於敬賓之義微若有嫌不若無之為安以告于先生君子可也鄉飲酒鄉射至息司正乃告於君子何也君子抱道不仕賓興習射自不敢相屈至息司正則聞鄉之後進有成有造未必不惠然肯來耳鄉先生宜兼大夫以公事不得為遵及樂作而未入者鄉飲酒疏謂老人教於鄉學者尚未該教於鄉學惟士大夫退休者耳大夫與則公士為賓記注以公士為在官之士似未盡將取於國中上中下士則彼有官中之事不能棄其職業而為鄉遂之賓且春秋習射三鄉之賓十有五人遂亦如之公邑則又倍焉安得每州皆有六官之士若本州在官者則惟黨正族師乃州長之屬助主人以涖事者也不可以為賓然則所謂公士者蓋鄉大夫所興之賢能升於國學而未升於司馬故作以為賓俾羣士取法焉注又謂不敢使鄉人加尊於大夫故使在官之士益誤矣大夫與衆士耦且為下射以遵有主道也乃慮其為賓屈乎敖氏謂記言此明不可用處士大夫尊處士去之遠亦非也處士抱道者經所謂君子是也不敢以國法戒宿乃尊賢之道宜然故息司正必以告而至與否聽之至則當與大夫之遵者同禮使能不宿戒不能則不得與於射不待勝負分而已有所愧厲矣能者始得與於射則鄉大夫興賢能非德行道藝有可觀不得與於衆賓可知矣州長教射而徵學士事有故常無用先期而戒之其牲狗也注狗能擇人疏燕亦取可與燕者敖氏又云因大射之牲皆未安狗所以養老鄉黨莫如齒即興賢能三賓遵者必有耉老故曰習鄉尚齒射雖尚功而為鄉禮燕與大射則國之老臣必與焉故牲皆以狗西序之席北上堂上地狹故賓長之席止於三衆賓升受獻者宜特設一席而更進以行禮不宜若庭中比耦有東面北上者豈記所述乃西階下衆賓立位而誤為席與三耦者使弟子司射前戒之誘射乃教射也故使弟子先焉以弟子而能志正體直不失正鵠則凡射者皆自愧厲矣大夫布侯畫以虎豹士布侯畫以鹿豕注謂各畫其毛象其淺深純駁之物色也無物則以白羽與朱羽糅杠長三仞以鴻脰韜上二尋二尋以上乃韜則所韜五尺也曰韜上二尋其制已明而曰以鴻脰則五尺中必微曲如鴻之脰也衆賓不與射者不降三賓或有老疾而用為表義者故不能與射則聽之非若衆賓不能則不使也取誘射之矢者既拾取矢而後兼誘射之乘矢而取之經云後者遂取誘射之矢則為下射明矣疏謂上射誤大夫降立于堂西以俟射大夫與士耦則為下射以士方務學故屈貴以示下賢之義也而不與其耦同立於射位以位在司射司馬之南貴有常尊不可使有司臨之也大夫與士射袒纁襦耦少退于物敖氏謂少退于物則與君之耦同禮必無此是也蓋春秋以降大夫僭用君禮記者習而不察以為當然耳歌騶虞若采蘋疑賓主人衆賓之射皆歌騶虞有司學士並宜助流王化也大夫則歌采蘋以職位既有定耳疏以上下為别義不可通大夫後出主人送于門外再拜敖氏謂大夫雖多惟拜送其長蓋例以鄉飲酒禮賓出主人拜送而介則否不知其義各異鄉射衆賓出主人皆拜送况衆大夫乎若與衆賓同出則無以特伸其敬箭籌八十賓主人大夫三耦三賓已近十耦而箭籌止於八十蓋更迭用之君射則為下射此記有詳於鄉飲酒者其事本異獲者釋獲者之牲俎是也有與鄉飲酒互備者三笙一和而成聲之類是也興賢能三年而一舉即事用希故於春秋習射詳之射之器物度數儀節不具於大射而綴於是篇職是故也據經遵者惟大夫且或無大夫而記具公卿上至君射之儀使學士少而習之長而安之也若具於大射則侍君射與耦於公卿大夫之儀皆平生所未見一旦就其班而即事欲其從容中節難矣既發則答君而俟曰答者如侍於旁而答君之問也如曰對則似南北正相對君樂作而後就物敖氏云先言樂而後見君之射儀是燕射再射即用樂行亦變於大射似未安記於鄉射附載君射之儀即謂大射之禮三射樂作君乃就物耳燕禮附載燕射語亦甚略然曰如鄉射之禮則亦至三射然後用樂何所據而知再射即以樂行乎士鹿中翿旌以獲士用翿旌如君射於國中而命之射不敢自用其物以儕於卿大夫也儀禮析疑卷五
