body:
  text: 儀禮析疑禮類二儀禮之屬提要臣等謹案儀禮析疑十七卷國朝方苞撰苞有周官集注已著録是書大指在舉儀禮之可疑者而詳辨之其無可疑者並經文不録苞于三禮之學周禮差深晚年自謂治儀禮十一次用力良勤然亦頗勇于自信如士冠禮緇布冠缺項鄭康成讀缺如頍弁之頍敖繼公則謂以緇布一條圍冠為缺項别以一物貫之其兩相又以纓屬自來講儀禮者多用其説苞謂既有紒以束髪無為又以緇布圍冠據經文乃以青組為緇後屬缺項而前繫于兩相以結于頤下不知鄭氏讀缺為頍固為改字而别注云項中有􅕒疏謂兩頭皆為􅕒别繩穿􅕒中結之廣韻訓􅕒為闕類篇曰􅕒結也則鄭之此注大可依據明是缺項有布為之結然後加繩敖繼公説猶有未詳苞則去敖氏更逺矣士昏禮納徴元纁束帛苞云致幣之儀不具何也士庶人所通行人皆知之夫經文儷皮以下既曰如納吉禮則非以人所通行而畧之也且束帛為十端詳于周禮鄭注禮記襍記注十箇為束二端向相卷之共為一兩苞第云執一兩以致辭則一兩不知為何語矣有司徹侑俎二字葢總挈羊左肩左肫以下下節阼俎則以起羊肺諸品而苞以前文有侑有俎謂此衍文果如所説則與下階爼不配皆不詳考之故也然其用功既深發明處亦復不少于士相見禮辨注謂賓反見即有燕禮之非辨張侯下綱之文所以見于鄉射而不載于大射儀之故皆由周禮以通之于聘禮公答再拜擯者出立于門中以相拜以為待公既拜然後反還振幣于覲禮候氏近于惟門之外再拜解使者不答以王命未宣不敢受拜禮皆細心體認合乎經義其他稱是者尚夥檢其全書要為瑜多于瑕也乾隆四十四年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
