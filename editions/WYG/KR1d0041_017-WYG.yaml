body:
  text: 儀禮析疑卷十七翰林院侍讀銜方苞撰有司徹牲俎皆同何以至上大夫而有儐尸於堂之禮也蓋不儐尸主人齊立室中直至禮終而後出送賓雖强力者難支位至國卿則年過艾耆必矣故減損室中之禮事而儐尸於堂中間徹饌埽室攝酒燅俎陳鼎之時主人得少休息於其次周官掌次王大旅則張氊案設皇邸祭祀張旅幂設尸次則卿大夫有事於祖廟主人亦宜有次上篇室事之終主人送􅅪而退不著其還立之位正為此也乃議侑于賓以異姓就賓長而謀之也衆賓長以齒賓長必以賢故與之議或云主人自擇於衆賓非也曰議則非自擇之明矣司宫筵于户西南面又筵于西序東面惟著尸侑席位乃上大夫儐尸所獨也其他席位已見於特牲者不復載以皆禮之大節必不可缺又不容有異故舉下可該上主人出迎尸未祭尸像神故宿尸主人再拜稽首者再而尸答以揖儐則祭終而兼賓客之禮尸可答拜則主人宜出迎故禮終主人亦送於大門之外而尸不顧也主人先升自阼階尸侑升自西階曲禮主人入門而右客入門而左主人先升客從之蓋壹用主賓之禮司士合執二俎以從司士賛者亦合執二俎以從上篇載鼎升俎者惟正祭之牲體而儐尸則侑與主人主婦之俎並升是卒燅時諸俎之牲體已與祭俎肵俎更燅者並升於三鼎矣體既割制共升於一鼎而不患其無辨何也凡升於阼階上之俎皆骨體也尸及祝佐食之俎皆用右體祝佐食之俎既不再升則尸俎之外皆左體也體分左右有骨有名又各有俎實之數何患雍人之不能辨哉但俎之升有先後若骨體沒於湇中則左右先後難辨按下經惟尸與主人有湇而獻尸司馬執挑匕挹湇以注於疏匕者三則湇之入鼎者甚少加湇以為禮非充飲也無取於多故牲體皆不掩而可次第以出之耳雍人合執二俎陳于羊俎西並皆西縮覆二疏匕于其上主人有羊匕湇羊肉湇豕匕湆豕脀湇魚一與尸同使十俎並陳並反空俎於其所則紛擾而非所以為儀故但陳二俎更番而用之知然者以益送之俎實既載於羊俎皆執俎以降也但俎中餘湇不可以反於鼎必注於别器而更挹新湇以進經記無文必已别見耳疏謂肉從湇出俎中實無湇非也經以匕湇肉湇相對則匕湇中無肉肉湇有湇所以得名者顯然矣上列尸侑主人主婦之羊俎次著匕湇通用二俎次列司馬司士之匕載附以俎數及俎實之數而總之曰卒升則豕魚之俎同時並載而燔出自爨升入自門亦具見矣尸與侑皆北面答拜為尸設几而侑亦答拜何也立侑以侑尸也拜至時主人已拜侑特致其敬矣使尸降而侑不降尸升而侑不升尸拜而侑不拜則似與尸抗行以待主人之特禮惟正獻時尸拜侑不與俱以當特受主人之獻耳司士朼豕亦司士載亦右體上篇特言祝命佐食徹肵俎設於堂下阼階此篇首言燅尸俎此復言亦右體明儐尸所用惟祭俎肵俎之實及右體原存户内者室中之饋雖徹而仍設於西北隅祝佐食之俎則降設於堂下之本位而未嘗燅也右體專用於薦神儐尸之俎而祝佐食之俎少分焉故骨體皆備左體用於侑主人主婦又分之以實賓及長兄弟内賓之俎故骨體多不備理宜然也侑俎再見衍文阼俎羊肺一祭肺一載于一俎羊肉湇臂一脊一脅一腸一胃一嚌肺一載于一俎侑俎無羊肉湇而阼俎則有之何也儐尸卿禮也主人之年長矣故於阼俎獨設湇以優老也註謂不言左臂大夫尊空其文非也侑尚用左體則主人不待言矣卒升註專言載尸羊俎疏謂主婦薦籩豆後升尸羊俎因歴舉十一俎之事餘俎皆將薦始升皆非事理之實也卒燅後所升惟三鼎别無貯湇之器則湇與牲體並在鼎中明矣即湇少不沒牲體必諸俎同時盡升其體乃易辨而事不紛至卒升以後自宜首設尸之羊俎安得以羊俎之設謂所升惟羊俎乎長賓設羊俎于豆西主人之牲俎特牲設於主婦致爵時少牢則於尸酢主人時何也特牲事簡時暇主人主婦賓長之獻酢皆畢然後夫婦互致爵陳其薦俎宜也少牢正祭畢别為儐尸之禮故退於正祭之後薦於儐尸尸酢時豆籩羊俎既薦於尸酢時故二鉶及豕俎内羞薦於主婦致爵時尸升筵自西方特牲少牢正祭尸賓祝佐食主人主婦升筵降筵皆不著所自之方必已見於孤卿之禮而上下同之也儐尸而立侑惟上大夫有之故尸侑主人之升降獨詳二手執挑匕枋以挹湇註于疏匕若是者三曰疏匕示有雕刻以别於升牲之匕也曰挑匕著其用而形制之别亦可見矣司馬羞羊肉湇縮執俎尸坐奠爵興取肺坐絶祭嚌之正祭尸飯黍時已食舉食胾告飽故羞肉湇與燔惟嚌之而已至主婦亞獻乃嘗羊鉶司馬縮奠俎于羊湇俎南乃載于羊俎正祭已嘗鉶羮此又進湇者羮有和湇無和也既進匕湇又進羊肉湇者九飯時所加於肵惟牲體之祭嚌者其衆體皆宜併歸於羊俎而於是乎載也次賓所薦匕俎既執以降此時堂上惟有羊俎宜作縮奠湇俎於羊俎南傳寫誤衍湆尸左執爵受燔㨎于鹽坐振祭嚌之興加于羊俎賓縮執俎以降湇中羊肉宜載於羊俎故司馬奠湇俎於羊俎南而載之縮俎之燔則一而已尸祭嚌即以加於羊俎故羞燔者執俎以降别無事也司馬横執羊俎以升設于豆東尸酢主人設俎以長賓主人獻侑設俎以有司何也以侑之助尸而加敬焉其實則主人之屬士耳而使長賓羞焉可乎若主人則國卿也五官之士皆屬焉長賓不與執事則義不協而中心亦有違矣祭酒興尸啐酒以告㫖也主人啐酒以受尸之酢禮當同於尸也侑不敢自同於尸故減去此節尸受侑爵降洗特牲少牢尸酢主人祝酌以授而尸不離其位以祖考之道臨之主人宜進受爵也儐尸則尸受侑爵降洗而主人不固辭賓主之禮然也長賓設羊俎于豆西主人之俎實一與尸同何也祖考或士庶人而得用少牢皆由君賜故主人之俎不可加損而薦俎之人亦不可異同也用此知卿大夫之賓取諸公士若以僚友執友為賓則第宜設尸俎而不得並設主人之俎矣士之賓或以朋友及婣黨之有徳望者為之故惟主人酳尸以肝從而尸酢主人則不與也主人北面于東楹東再拜崇酒尸侑皆答再拜觀此益可徵崇酒非拜飲者之充滿矣如以酒薄拜飲滿則宜拜於獻尸尸卒爵時不當於尸酢主人主人卒爵時且侑於是時非受主人之獻非已酢主人而與尸同拜正為益酒以獻酬乃所以廣尸與侑之惠耳侑前此降立於西階西俾尸專與主人為禮也而此時乃升正為主人之拜崇酒非專為尸而已實同之鄉飲酒之禮賓與介皆酢主人主人皆拜崇酒蓋專習飲酒之儀别無二事其時寛也祭而儐尸則時廹而儀不能備故侑不復酢主人而主人惟於受尸酢時一拜崇酒次賓羞豕燔主人獻侑次賓羞羊燔侑不得儕於尸也主婦獻尸次賓羞豕燔主婦不得儕於主人也正祭尸所嘗惟羊鉶所食惟舉與胾湆燔不設故儐尸於主人之獻薦之所薦惟羊湆羊燔故豕之湆與燔於主婦之獻薦之豕有脀與主人獻之羊俎相當也加羊豕二鉶備物以致敬其義與正祭已薦豆籩而儐尸復設之同酌獻侑侑拜受爵主婦主人之北西面答拜於尸曰拜送爵於侑曰答拜所以别於尸也主婦答拜受爵酌以致于主人特牲禮賓獻尸畢主婦即致爵於主人而退祝佐食之獻於後少牢則正祭時祝佐食已受獻主人主婦已受尸酢至儐尸則賓再獻尸尸再酢主婦皆可緩故主婦先致爵於主人而退二節於後也於主人省酢主婦及致爵之節於賓省致爵於主婦之節不惟儐尸禮殺亦事增而時弗逮耳儐尸主人不致爵於主婦不儐尸亦然大夫之祭儀節繁多惟夫之於妻可無報禮耳主婦北面于阼階上答拜主婦獻尸侑皆拜送爵於主人之席北婦人與男子為禮必依其夫也致爵於主人而就主人之席則以狎近為嫌故特著阼階之位特牲主婦致爵於主人曰拜送爵此曰答拜必傳冩有誤婦之於夫不宜貴賤異辭至親不文當以少牢為正主婦設二鉶與糗脩如尸禮惟舉二鉶阼俎之牲體已前見也惟舉糗脩豕湆豕脀豕燔羊俎羊湆羊燔已設於尸酢也尸降筵受主婦爵以降主人降侑降特牲少牢正祭尸酢主婦儀皆略而獨於儐尸之酢詳之何也㕘用主賓之禮其儀節多正祭所未有也此主婦致主人之爵也而尸受之又不用以酢主婦何也雖承獻侑以致主人而本獻尸之爵故主人及侑雖與尸同降而不敢受爵尸獨受之以終前禮而後易爵以彰其别所以别嫌而明微也主婦入于房尸之降為洗爵以致主婦也主婦若辭洗則宜降階婦人祭禮事止於堂階故入於房以辟之主人揖尸侑主人從降代主婦以禮於尸也辭洗禮宜親之主人不得代辭故待洗畢揖尸侑以升尸酌主婦出于房西面拜受爵尸北面于侑東答拜主婦入于房㑹尸之酌則自出男女相為禮不親相與言亦不可使人致辭按節以赴而已即不辭洗而入於房以辟之義也特牲主人受角後曰主人退則進就尸位以受角可知主婦執爵以出於房立卒爵執爵拜則復執以入於房可知其爵亦賛者受之反於篚婦人賛者執䵄蕡以授婦賛者觀此則婦賛者與主婦同服必有爵者之妻益明矣不然則賛者再反房中取三敦以授主婦胡不使婦人賛者與遞代乎司馬設羊俎于豆南主人主婦之薦俎羞燔者特牲不目其人必隸子弟私人也少牢之佐食次賓以司馬司士類之必族人姻黨之有爵位者主婦執爵以出于房西面于主人席北立卒爵執爵拜尸西楹西北面答拜主婦入立于房酢爵於房内惟啐之及卒爵必對尸而拜昭神惠也特牲尸酢主婦於房中以室事未畢也儐尸室事既終不宜復入以擾室神故出於房以受爵入於房以祭薦復出而對尸以卒爵少牢正祭與儐尸禮互有詳畧鼎俎牲體之數陳器設饌之方舉鼎奠尊執匕設俎割制升載之法具詳於祝神之初以祭本為神而設也儐尸則畧舉陳設於尸前者餘無庸覆舉矣正祭主人獻尸惟舉尸祭尸食饋以食為本酳以安食非為飲酒也儐尸則薦豆籩備湆燔進飲進羞凡所以致養之道無不備焉正祭尸酢主人主於命嘏所取敦黍切肺二者而已儐尸既備養於尸故主人之籩實豆實俎實肉湆羞燔皆於是具焉主婦獻尸尸酢主婦與主人略同獻侑與祝略同而佐食則殺焉彼此互見義各有當也上賓洗爵以升酌獻尸主人獻而尸酢焉常節也然侑自質明待事以至祭終則獻不可以更緩故退尸酢主人於後也主婦獻而尸酢焉常節也然特牲之禮主人主婦並獻祝及佐食故尸各因其獻而酢焉使得更事禮節乃不煩侑一而已故主婦繼主人以獻而退尸酢主婦並長賓獻尸於後蓋正祭長賓已獻尸矣則儐尸之獻雖暫緩焉可也特牲賓三獻燔從而少牢無燔何也特牲體少故以獻皆有從為敬少牢牲體多故正祭亞獻三獻皆無燔至儐尸初獻羊燔從亞獻豕燔從三獻更以燔從則義無所取矣侑不升特牲少牢酬皆不及祝佐食侑之禮不得過於祝佐食也酬不及而同升以視主人之酬則尸與主人轉不能自安故俟尸受酬畢而後與尸及主人同升筵以受房中之羞乃羞宰夫羞房中之羞于尸侑主人主婦皆右之司士羞庶羞于尸侑主人主婦皆左之特牲自尸以下至私人羞同時與此異何也士禮至祭脀獻酢酬加爵舉奠之禮俱畢矣則同時而羞宜也大夫之禮至尸奠酬賓兄弟之獻酢及酬未舉内兄弟私人未獻薦俎未陳無先庶羞之理又尸侑主人主婦加内羞而賓兄弟無之異時而進乃理得而情安也主人降南面拜衆賓于門東敖氏謂未獻衆賓位在門東亦大夫之禮異於士者據疏士禮衆賓未受獻位本在門東獻賓于西階上長賓升拜受爵主人在其右主人就西階而獻酢致敬以禮賓亦殺儀以便事也蓋衆賓相繼而升辯受爵若一一反阼階而拜不勝其煩宰夫賛酌衆賓不拜既爵皆此義也其薦脯醢與脀設于其位敖氏謂此薦脀亦每獻設之異於士亦無以見其然乃升長賓主人酌酢于長賓西階上北面賓在左主人酢長賓乃先於尸酢長賓何也必終賓之酢酬而後可以獻兄弟故退尸之酢於後以便事也賓在左主人在右以賓北面若主人東面以酢之則嫌於相臨故向與之並凡自酢義非一端有尊其人不敢使酢已者主婦致爵於主人而自酢是也有如其禮以答之而不宜有異同者主人致爵於主婦是也有與衆人同得獻一人不敢專酢獻者探其意而自酢特牲賓獻祝佐食致爵於主人主婦而自酢此經主人徧獻衆賓升長賓而自酢是也蓋特牲賓承致爵於主婦之後主婦不得酢賓使主人專酢是自侈大而不讓於祝佐食也使祝專酢是自侈大而不讓於佐食與主人也一一親酢則禮煩而力倦惟賓自酢則於祝佐食主人主婦意皆達矣猶主人於衆賓之有旅拜也少牢儐尸主人徧獻衆賓與長賓之禮同使長賓專酢則似獨受主人之禮惟自酢而升長賓以視之則於次賓衆賓意皆達矣此記所謂深而通也宰夫洗觶以升主人受酌降酬長賓于西階南衆賓兄弟之酬皆飲於階上惟私人升受下飲正賓乃升酌而降酬何也就其位以酬之不敢如衆賓兄弟升之使受爵也特牲尊兩壺於阼階東少牢則皆升酌何也士禮質故設尊於階下以取便大夫禮文故升酌於堂上以為榮也且天子之禮獻尊外别有罍為諸臣之所酢諸侯亦宜然故大夫不敢與之同士則無嫌賓兄弟交錯其酬徧於子弟私人惟庭中地廣可行故自長賓即降酬示非殺禮於衆賓衆兄弟也皆若是以辯辯受爵特牲獻長兄弟如賓儀獻衆兄弟如衆賓少牢則衆賓與長賓同衆兄弟與長兄弟同位愈髙禮愈下皆所以厚人倫美風俗也主人降洗升獻私人于阼階上特著私人明有司執事者不在衆賓之列也國卿之尊於私人乃降洗以獻之而答其長以拜所謂治家者不敢忽於臣妾也故平時能得人之懽心以事其親而臨難則死其長先王以祀禮教敬則民不苟此其切著者宰夫賛主人酌敖氏謂自獻衆賓至此凡四節惟前後兩言宰夫賛見其閒二獻不言賛為省文非也酬長賓宰夫洗觶主人受酌卒爵後主人洗升酌則宰夫所賛惟降洗觶而酌皆主人親之明矣獻兄弟曰主人洗升酌獻内賓亦曰主人洗獻則二獻並中問無宰夫之賛至私人乃賛酌耳且主人降洗升獻則私人之長所答拜者未必非親酌宰夫賛酌者惟衆私人故其文係於若是以徧之下也衆賓數多私人分尤卑主人終日拜獻禮將終不能一一自酌故使宰代若酬則不過賓及衆賓長二人兄弟以族為限數亦無多雖有逺近不宜異同内賓更無使宰夫代酌之義尸作三獻之爵賓長獻而尸酢焉常節也繼獻侑正禮也乃退此二大節於獻私人之後何也蓋衆賓兄弟内賓私人自質明待事終正祭獻薦酢餕以及儐尸獻酢致爵之節雖强力者亦困憊矣而主人之酬尸尸侑主人主婦之薦羞又一節中事相聨而不可以俟更舉者故轉退二大節於後先王制禮體察物情運用天理曲得其次序如此故記曰廟中境内之象又曰聖人能以天下為一家中國為一人用此道爾尸降筵受三獻爵酌以酢之特牲賓獻祝佐食致爵於主人主婦自酢此不自酢而尸酢之何也特牲尸已酢賓故祝佐食主人主婦不敢專酢而賓因自酢以達其意此則尸卒爵後尚未酢賓故俟賓獻侑致於主人而後酢焉祝佐食主人義不得相統尸酢則義足以統主人與侑矣蓋正祭尸已酢賓儐尸再酢所以禮於賓者備矣故可退卒爵後之酢於後以統侑與主人也尸升筵南面答拜主人初奠俎以至尸酢主人尸皆北面答拜今賓授爵尸乃南面答拜何也尸主人子行也侑屬士也正祭畢自宜用主賓之禮若尸之酢賓則正祭時之秩節雖退於後而禮本像神自宜南面賓助主人以養尸自宜北面拜受爵耳尸遂執觶以興北面于阼階上酬主人獻酢皆畢而尸酬主人則益自卑抑故北面於阼階上卒爵而酌後即就酬於阼階以達其意也主人拜受爵尸拜送正祭及儐皆曰尸答拜至酬則曰尸拜送蓋禮將終壹用賓主之辭也主人送于廟門之外拜尸不顧下大夫及士無送尸之禮以出廟門則尸子行也上大夫則拜送於門外又以示爵祿愈盛則於父兄宗族不惟宜相親倍宜自下以教民厚也不儐尸從獻之棗糗有司薦之儐尸則侑之從獻主婦親薦皆三命益恭之義卒爵主人拜祝受尸爵尸答拜以下不儐尸禮此亦與儐禮同上下文皆曰如儐而畫此四語於外何也此節次之決不可略者故覆舉以為前後之分界經之通例然也主婦反取籩于房中執棗糗坐設之棗在稷南糗在棗南婦賛者執栗脯主婦不興受設之栗在糗東脯在棗東主婦興反位敖繼公謂此從獻之禮儐尸則闕之詳於堂上故略於室中得其義而未盡也籩為從獻義主於生人特牲少牢正祭酳尸以前有豆鉶敦而無籩及主婦亞獻雖祝佐食皆有籩則義主於生人審矣既儐尸則尸侑主人主婦之籩自不得於正祭薦之不儐尸而事尸於室中安得無從獻乎祝佐食有司也故有正獻之豆而無從獻之籩侑賓之選也主人主婦皆有從獻之籩則於侑不可闕矣儐尸之侑則從獻之籩及糗主婦親薦之不儐尸之祝佐食則雖有棗糗而有司薦之皆情理之宜也特牲獻尸宗婦以籩授主婦此自反取籩以正祭主婦自取羊鉶則不儐尸薦籩亦宜自取也卒爵主婦拜較儐尸禮無羊鉶匕湇豕脀牲同而薦不備蓋尸已實於正飯儐尸加鉶羮脀湇以示欲尸之饜飫而尸不過嚌嘗故可增損以别隆殺耳主婦反位又拜儐尸禮無此拜敖氏謂夾爵拜内子正禮儐則略之儐宜詳不宜反略也蓋儐禮主婦拜受爵以入於房於尸前重拜則義無所處於房中又拜則似與薦豆設俎者為禮故直至出房卒爵而後拜不儐尸則進受爵與反位皆在尸前故義當夾拜而别為卒爵之拜耳上佐食綏祭如儐特著上佐食之綏祭如儐者儐尸則主婦之俎實籩豆皆於尸酢薦之不儐尸則於賓長之致爵薦之皆主婦自取菹醢肺以祭惟正祭主婦獻尸尸酢主婦上佐食挼祭而主婦受之以祭其禮則同故特著之次賓羞燔如尸禮卒爵主婦受爵酌獻二佐食亦如儐正祭祝之豆俎牢肝皆於主人之獻設之故主婦之獻所設惟籩燔佐食之薦脀皆於主人之獻具之主婦惟獻爵故一與儐同賓長洗爵獻于尸尸拜受賓户西北面答拜爵止儐尸禮止爵在主婦致爵尸酢主婦之後此在主婦致爵之前何也主婦致爵尸酢主婦二節雖以儐尸而行於堂上本正祭室中之事也故先舉之而後酬尸薦羞及一切獻酬之事繼焉不儐尸則次第畢室中之事而後舉堂上庭中之事是以在主婦致爵之後也尸酢主婦則已於主婦獻後舉之矣佐食設俎臂脊脅肺皆牢膚三魚一腊臂主人之薦俎至是始設何也尸酢主人時佐食酌酢授祭主人受而祭啐尸親執黍以命嘏主人受而卒角懷黍自不得雜進主人之薦俎以混之過此則惟主婦之致爵可設故壹與特牲同惟儐尸則特設於堂上以尸酢主人並無他事也獻祝及二佐食特牲長兄弟衆賓長於尸有加爵而儐尸則無之不儐尸則次賓長獻尸以當加爵而長兄弟無獻長賓於佐食補獻而主人於主婦不致爵皆量時度事以權其輕重而損益之也賓答拜受爵酌致爵于主婦主婦北堂司宫設席東面正祭主人主婦雖受尸之酢而其薦俎從獻不於是焉設蓋方致其誠慤以與神明交不可以是閒之也不儐尸主婦之薦俎乃於賓致爵設之何也大夫禮主人不致爵於主婦舍賓致爵無可設也主婦位在房中故席設於北堂祝有本位而薦設於室中何也尸在室惟主人與祝不可須臾離主人出獻則祝侍祝出盥則主人侍至佐食則當事户外南面無事庭中北面故受爵於室而俎設於兩階之間儐尸尸在堂則設薦於房主婦出房以受爵祭薦畢出房以卒爵於尸前可也不儐尸尸在室中以象神而忽虚其位以授爵於北堂不可也況降階而洗爵乎賓則自獻尸而外本無位於室中則入北堂以授爵而主婦即於是卒爵焉事便而禮亦宜之卒乃羞于賓兄弟内賓及私人辯儐尸羞於旅酬後此獻畢即羞何也儐尸之旅酬者再故俟尸與侑舉旅之後薦羞此無尸侑舉旅之節則獻畢即羞可矣賓長獻于尸儐尸禮上賓獻侑衆賓之長惟獻尸而不及侑不儐尸衆賓長並獻祝而致爵於主人主婦蓋事簡時暇禮節可伸賓兄弟交錯其酬無算爵儐尸禮二人舉酬於尸侑賓一人舉爵於尸然後行爵無算敖氏及李寳之疑無此二節為文脱非也乃辟上大夫之禮而下比於士耳註不别白疏謂闕旅酬獨行無算爵非也旅酬之禮自天子達於士祭之大節也上大夫併儐尸於祭之日事充而時蹙矣猶不廢旅酬下大夫不儐尸而反闕焉何義乎蓋其禮既見於特牲饋食又見於少牢儐尸故文略耳且經既曰賓兄弟交錯其酬又曰無算爵辭意甚顯而曰獨行無算爵可乎況無算爵因旅酬而旁推之禮也廢旅酬而行無算爵則無其本矣李氏寳之敖氏繼公皆知註疏之誤而獨以經文不曰如儐為疑不知儐尸之禮乃上大夫所權制而旅酬及無算爵則上下通行之經禮也安得曰如儐禮乎賓兄弟交錯其酬則衆子弟必各為長舉觶亦文略也利洗爵獻于尸特牲長兄弟有加爵而佐食復有獻所以與賓長之獻衆賓長之加爵相疇同姓異姓皆再進爵也少牢則無長兄弟之加爵而次賓有加爵與特牲同終於利獻尸祝蓋利即佐食佐食必兄弟之賢者也如舊説佐食為異姓則賓長衆賓長獻尸之後復使異姓獻而長兄弟衆兄弟竟無事尸之禮惟與賓相酬義必不然然則儐尸之禮長兄弟何以竟不獻尸也時不逮也於主人之致爵於主婦賓之獻祝致爵於主婦三大節皆減去則無暇受長兄弟之加爵可知矣卒􅅪有司官徹饋饌于室中西北隅南面如饋之設既􅅪而復以饋饌於神側何也黍稷四敦尸所食惟上敦之黍及牲體之加於肵者􅅪增進一敦其二敦未動也􅅪所食惟舉膚鉶羮豆湆牲俎亦未動也故可重陳并納一尊以為陽厭而不為䙝乃孝子之心不欲神之遽離於室而非欲其更饗之也豆與敦始設者主婦宗婦而終則有司徹之以祭既畢尸祝主人皆出而有司尚有事於室中婦人不宜入室也故衆賓有司皆退然後婦人徹室中改設之饌儀禮析疑卷十七
