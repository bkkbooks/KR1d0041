body:
  text: 儀禮析疑巻十二翰林院侍講銜方苞撰士喪禮死于適室敖氏本引註作北墉是也亳社北牖使隂明也生人寢室北不宜有牖幠用斂衾大斂二衾註謂用其一以覆尸是也夷者等也大斂衣倍多衾必稱其廣狹而與之等故曰夷衾天子曰夷盤大夫士亦曰夷盤則夷當以等訓明矣斂衣有多少盤必與之稱故通曰夷盤覆柩之衾又宜與棺之廣狹相稱故通謂之夷衾覆柩而曰夷衾則不得以尸訓明矣復者一人以爵弁服簪裳于衣左何之扱領于帶爵弁士之上服也春秋傳魯叔孫豹聘於周王賜以三命車服將葬季孫使舍之其臣杜洩曰若命服生不敢服死又不以將焉用之則復宜用上服周官夏采以冕服復於太祖以乘車建綏復於四郊而不用大裘蓋大裘惟冬至祀天乃用之王之出郊不皆以祀天又廟宜用服郊宜用綏非以大裘為上服而不用也張爾岐曰扱領于帶平疊衣裳使領與帶齊别以物關之而非縫也故曰簪受用篋升自阼階以衣尸别記復衣不以衣尸謂斂也此云衣蓋暫覆之綴足用燕几張爾岐曰側立此几並排兩足於几兩脛之間以夾持之奠脯醢醴酒升自阼階奠于尸東張爾岐曰喪禮大端有二一以奉魄體一以萃精神楔齒綴足奉魄體之始也奠脯醢醴酒萃精神之始也乃赴于君主人西階東南面命赴者拜送告於君必親命赴者而拜送之若族姻朋友則所赴不一致辭各異且有在他邦者主人哀毁昬迷豈能一一自命故父兄代之檀弓記所云是也疏乃以為大夫士之别誤矣赴於君而不北面何也以赴者必南行出門拜送宜鄉之也入坐于牀東衆主人在其後敖氏云衆主人若有斬衰者亦存焉謂父主適子之喪而其子以斬衰隨祖後也女子在室者則從母後無母其從適婦之後與婦人俠牀東面喪大記並舉主人主婦道其常也此第曰婦人該其變也蓋或死者妻早亡則子婦不可以稱主婦主人哭拜稽顙成踊前此哭無停聲辟踊無算至是有君命以敬節哀然後成踊禭者入衣尸衣謂以覆尸也庶禭旋徹以適房惟君禭不言徹則襲與小斂後仍以覆衾直至大斂然後以覆於外而包庶禭耳親者禭不將命以即陳始喪親者在室不忍離尸且同宫同財雖宫分南北東西而並在都宫之中故使人陳衣無庸將命小功緦麻衆多或在他邦或貧不能禭又或以疾病事故身不能親故必使人將命其立於堂下者或執喪事或待弔賓亦不親禭也庶兄弟禭使人以將命于室主人拜于位父不主衆子之喪以卑幼而屈尊者以拜賓非禮也雖主長子之喪其所立之位與拜賓之時與地必與子異若禭者將命父拜於尸旁何以安死者之心必使其子拜無子則妻拜無妻則兄弟拜也君視臣斂即位於序端既殯而徃即位於阼大夫君臨其臣則即位於堂下是尊臨卑喪各以時義而異其立位也父主長子之喪室中之位宜負北墉其東西俠尸者必其妻子無妻子則弟妹父拜賓必俟其退而拜於階下舅主適婦則位不宜在室凡此類必已見於大夫之禮曰庶兄弟兼同族之小功絲麻及異姓之内外兄弟舅甥朋友禭親以進主人拜委衣如初退哭不踊惟朋友之禭以哭答親以禭進必死者所親厚故哀心之感不能自遏也何以必俟其退而後哭禭者本未哭也未小斂主人創鉅痛甚附身之事猶未營無庸以哭擾之小斂畢則朋友進襚以哭踊先之矣先王制禮親者陳衣而不將命小功以下使人將命而不親朋友親襚而不哭非畧襚者之儀節慮孝子致禮以傷生也自始死主人啼聲無停故轉以禮事之至而停其哭使少休息皆天理自然之節也踊必興襚者衆多使每哭必興踊力不能任矣為銘各以其物亡則以緇長半幅䞓末長終幅廣三寸䞓末以下皆緇度也物有定制不待言且大夫與上中下士各有等差不宜同用䞓末䟽雜帛者旗旌之縿以絳帛為之以白色之帛裨緣之其末亦不宜太短且狹竹杠長三尺置于宇西階上以是知肂依西壁其上亦為宇以吐霤不使零於肂也如指南檐為宇則汎言宇西不知置於何所陳襲事于房中西領南上不綪西領取以入室便也冠禮陳服於西墉下東領冠者入而服之便也戸在南此南上取以入室由近以及逺冠禮北上入而服之亦由近以及遠張爾岐曰衣裳少單行列去可盡不須屈轉重列鬠筓用桑長四寸纋中註䟽謂死者不冠以母之喪無筓决之非也男女冠筓乃責以成人之禮正望其受而全歸未有附身細物無一不備而轉削去首服之義况陳服器二弁與服並舉首設掩幎足結綦屨後承以乃襲三稱則幷包弁服明矣筓止四寸正以鬠外加弁弁外加冒不可更用生時關弁之長筓也母喪無筓亦以束髮為髻髻外加編次編次外加冒不可更用關編次之長筓也纋廣韻謂筓巾其文左方從絲則詁繞髪之巾於義為順纋中者生時作髻多向後死則圍髪於中央以便加弁而就枕也舊說死者不冠必謂冠則不便於襲斂耳以弁之遺制度之弁而加冒絶無妨閡即天子諸侯之冕旒但削約其方版前後無出而綴以旒自可以加冒何故奪其親身之元服乎瑱用白纊生時以玉石象角為瑱懸之當耳死則無所用懸故以纊裹瑱而塞之䟽因檀弓記角瑱鄭註專以君言遂疑人臣送死無瑱而直用纊塞不知檀弓雜記喪禮無以見其專主人君况角柶燕几君大夫士一也而士獨無瑱義不可通此經所以未著瑱用何物者蓋禮文全備時士之瑱别有所見而今不可考耳幎目用緇周官幂人註以巾覆物曰幂此經文義本明註改讀若葛藟之縈轉支而不切握手用𤣥纁裏長尺二寸廣五寸牢中旁寸著組繫長尺廣五寸乃以一面言其制宜合二面如囊大指最短小指亦短使囊之廣狹均則韜手不固故必削約握之前半旁各一寸然後中三指結束牢固其大小二指則稱其短長巨細而分韜之以組連結然後與手穩稱下經設決麗於掔為大指明矣又曰設握乃連掔正大指别韜而以組連結於握之徴也自大指及掌乃正廣五寸耳爵弁服純衣皮弁服禒衣不言素積冠衣同色舉皮弁則知白布衣素裳矣子羔之襲以素衣此則褖衣即𤣥端也襲斂自明衣以外皆用生時吉服則此經為正庶襚繼陳不用喪大記親戚之衣受之不以即陳鄭註謂不用以小斂此疏則云不用以襲至小斂用之蓋襲衣少自無用襚之理小斂十有九稱或主人祭服既畢則庶襚亦可用耳貝三實于笲惟大夫飯含未知何物莊子云未解裙襦口中有珠又引詩曰生不布施死何含珠天子諸侯用玉士用貝經傳有明文以差次卿大夫或用珠雜記又云自天子以下皆用貝蓋各記所聞其傳或異也管人汲不說繘屈之不言所授以淅米者祝而管人又受潘焉則與祝相授受不待言矣主人皆出浴者將入而主人皆出則前此皆未離牀東西之位明矣主人辟浴則婦人之出不待言矣至復入亦惟舉主人以衆主人婦人親者必入視飯含不待言也蚤揃如他日古蚤爪通考工記爪皆作蚤商祝襲祭服褖衣次張爾岐曰此但布衣於牀尚未襲而云襲者衣與衣相襲而布之也其布也先祭服次褖衣至衣尸則褖衣近明衣祭服在外主人出南面左袒必袒者逢掖長袖不利於飯含也死者南首主人尸西東面必用左手故左袒宰洗柶建于米執以從註於冠昬喪祭執事者皆曰有司而以府史當之古者府史胥數甚少僅足以供官中之事使為官中羣士執吉凶嘉禮之役日不暇給矣蓋凡執事而不以名見者皆主人之隸子弟也其假以有司之稱如宰史老祝宗人甸人管人之類及贊者使者則宜以姻黨及弟子能其事者充之惟冠與特牲饋食經特見有司之文則或同官中中下士耳周官黨正掌五族冠昬喪祭之禮事則同黨中下士宜與焉而昬喪無有司之文以執事者必其親暱也冠之宰宜為二十五家之里宰喪之冢人宜為掌墓地之有司其宰則隸子弟董其家事而假以是稱者非然則宰與老乃卿大夫之貴臣士無臣不宜有宰與老徹枕設巾徹枕者頭頸必直然後實米可盈也設巾者使孝子心壹於飯含恐哀痛觸而不能自持也主人由足西牀上坐祝受貝而後主人西受米柶而後宰西則始入皆立於尸東明矣蓋以待祝之入而受貝與米柶也牀西婦人之位主人有事於飯含而宰贊則婦人宜少退以辟之其不於牀東飯含何也飯含畢當移尸於牀而襲飯含時執事者必俟於牀東衣尸非商祝一人所能共必左右各一人佐之乃可舉執事者移尸然後主人自牀西而反位以視襲所以曲得其次序也據喪大記始死遷尸於牀仍疾時所臥也設牀襢第有枕乃含牀也浴畢宜有移尸於含牀之節飯含畢宜有移尸於襲牀之節經皆不見必己見於卿大夫之禮米貝皆及時授受襲衣及掩瑱幎屨笏決握冒無授受之文蓋上經陳祭服褖衣於襲牀時已設於左右也主人左扱米實于右三實一貝左中亦如之惟飯含主人親執朝夕進食至是而終不忍使他人代也乃屨綦結于跗連絇張爾岐曰屨繫既結以餘組穿連兩屨之絇使兩足不相離也乃襲三稱上經云祭服褖衣次則爵弁皮弁褖衣為三稱故明衣不在算也但衣可重而冠屨不可重足用皮弁之屨則首宜爵弁經記無文必前已别見也註引喪大記皆左衽結絞不紐䟽引禮記註皆以衽為衣襟非也衣襟無左衽之理朝祭之服及常服亦無改為左衽之法鄭氏孔氏蓋謂惟衣有衽不知凡物相掩皆可謂之衽大記蓋言衾之衽結於左耳即據此經以席幂鬲亦曰左衽况以衾斂衣乎詳見戴記本節辨明衣不在算張爾岐曰親體之衣非法服故不算設決麗于􅓲自飯持之設握乃連􅓲張爾岐曰其左手無決者則下記云設握裏親膚繫鉤中指結於捥是也重木刋鑿之甸人置重于中庭三分庭一在南既襲設冒親之形容不可復見故設木於中庭使神依焉此時尸尚在堂即殯後尸猶在柩而復立木以依神故謂之重至虞則親已離其室不可復言重故埋重而作主迎精而返宗廟之祭皆以為主也尸在堂則直其南尸在肂則直其東孝子居廬使觸目而感於心也夏祝鬻餘飯鬻宜作粥以口實之餘為粥而懸于重蓋親之養至是而終矣朝夕見之孝子之心有隱焉所謂以故興物也冪用疏布久之或曰久糾音之誤也鬲瓦器非以蔑索糾結其下不可以靲繫或曰鬲懸於庭中經風雨必以堅牢之物承之乃可久既夕禮木桁久之謂結甒于桁也祝取銘置于重不言置重之南北及銘所面何也幂重之席面郷北則銘置於重南不待言矣銘以示族姻賓友之自外入者則南面不待言矣婦人之帶牡麻結本曰婦人之帶則首絰以苴一同於男子可知矣牀第夷衾饌于西坫南小斂後尸當夷於堂故夷衾與牀第並饌於西坫南即奉尸侇堂後所用以幠也大斂二衾此衾宜入斂疏乃據啓殯幠用夷衾謂此衾本為覆尸覆柩不以入棺誤矣啓殯後覆柩之衾蓋别為之而與柩之廣狹等故亦曰夷衾此夷衾則註謂大斂所幷用之衾是也布席于戸内下莞上簟襲於牀衣少也小斂衣多必於地斂事始可展故布莞簟既斂然後奉而侇於楹閒之牀祭服不倒上經曰襲三稱并明衣已四重矣衣至數重雖生人難更加况死而手足辟戾乎襲後加冒則手足已囊小斂之衣不得如襲衣之穩稱於身與生時無異矣其薦於下而掩於上者宜不過三重餘則折疊卷搏以充其䧟缺蓋人之身中實而首之兩旁足之左右中閒皆虛故斂衣之橫從廣狹必與䧟缺相稱使上下左右停均平帖然後以衾左右掩覆而絞結堅牢也設牀第于兩楹之閒衽如初小斂後將奉尸侇於堂故預設以待事主人西面馮尸踊無算自始死君襚而外皆不踊哀痛充充衆事廹遽勢不能備禮也至此則附身之事小備親之容色髪膚欲再見而不可得矣故踊無算主婦東面馮亦如之用此知始死婦人俠牀乃變文以該無主婦者主人髺髪袒衆主人免于房衆主人乃大功以上親者以免於房知之也註專舉齊衰其實衆兄弟位堂下者亦宜免也朋友死於他邦為之主者尚免而况小功之兄弟乎上經著髺髮與免之異而統之曰衆主人無以見免者獨齊衰别記曰不冠者之所服無以見小功緦之不免也以小功皆在他邦加一等不及知父母與兄弟居加一等推之小功加一等則服與親者同矣如無主後而小功者王其喪飯含即大斂亦宜袒以致哀特禮文殘闕無考耳婦人髽于室曰髽于室則衆婦人之在戸外者不髽明矣即大功之婦人亦不宜髽喪服記婦人為父母舅姑惡筓有首以髽是也男子雖輕服必免婦人非斬齊不髽何也文王世子記族之相為也宜弔不弔宜免不免有司罰之雖輕必免所以厚恩也婦人朝夕侍舅姑故雖父母之喪卒哭後即易吉筓而以輕服髽則道大悖矣男女如室位踊無算喪事即逺此則親離其室之始也故踊無算婦人阼階上西面婦人位阼階上以尸在堂不得復入於房賓之襚者將升自西階也主人位阼階下便拜賓也大夫特拜士旅之士旅之非以其位卑而簡於禮也士之弔者多一一特拜力實不勝且衆兄弟朋友之襚已每人而拜之今旅拜可也襲絰于序東復位小斂以後主人終位於堂下何也尸在楹閒婦人阼階上西面賓及朋友繼襚者升降於西階惟房户之外可立而其地則嘉禮中賓位也在喪則功緦婦人立焉必位於阼階下然後便於送賓與繼襚者為禮且小斂以前親形未掩男女宜共守之既小斂則男女分堂上下即既殯後次分内外以中門為限之義也載兩髀于兩端敖氏謂兩端為俎之前後非也應為左方右方蓋髀賤先載居兩旁兩肩兩胉次之則脊肺正居中央其序乃順祝受巾巾之由足降自西階婦人踊婦人在阼階上惟見設奠而降故一踊丈夫在西階下故見奠者之升而踊降又踊其節宜然非哀有淺深乃代哭不以官小斂徹奠後乃代哭則前此哭無停聲遞代者必主人主婦衆子姓衆婦及女子子可知矣代哭不以官宜大功小功之兄弟姑姊妹兄弟之子之子婦也疏謂哭無時有三節惟練前葬後朝夕哭阼階下無無時之哭未安自虞至練日月甚長親喪未久廬中竟無哀心之感則非人理哀至而抑不使哭則非人情其然則朝夕之哭亦似強赴其節而不誠矣蓋父母之喪哭無時本無分於久近特其中自有䟽數耳賓入中庭北面致命君使人弔尸在室使者自西階升致命於堂上自當東面小斂後尸在楹閒主人在阼階下使者致命於中庭自當北面君襚致命於堂自當與弔者同入衣尸而不言其面位何也以自右而衣之不待言也知然者奉君襚不可遶足而由左賓升自西階出于足西面委衣如于室禮降出主人出拜送任賓自升委衣而主人不與之俱以襚者非一人毁痛方深水漿未入不能備禮也朋友親襚如初儀西階東北面哭踊三降主人不踊朋友哭踊而主人不以踊答何也辟踊哀之甚也親賓將襚宜各致其哀主人則不食三日哭無停聲若皆以踊答將病不能興矣小斂以後哭使人代義亦如此如必勉焉以觀衆人之耳目則反不得其情初儀謂將命擯傳至拜送之儀非如小斂前親襚之儀也小斂惟親者庶兄弟襚大斂然後衆賓襚必定制如此朋友則情親義重故大小斂皆襚襚必親襚者以褶則必有裳至大斂乃見此文明小斂不以褶也或以衆賓中有窶不能為禮者而不以物薄廢與古無木綿著必以繭宵為燎于中庭大斂增馮尸升柩攢塗三大節或君親視斂禮事繁重前夕必有夜事於中庭故為燎也小斂衣衰器物夙具斂日陳之事不紛前夕當無夜事若尸未入棺男女守之室中房中夜不息燭自不待言故無其文但尸侇於堂則及宵婦人當入於房主人及親者當俠夷牀經不言必己見於君卿大夫之禮耳厥明滅燎陳衣于房南領西上綪絞紟衾二死與徃日曰厥明則知襲以次日而明為三日之朝但言衾二不舉絞紟之數者喪大記小斂布絞縮者一橫者三大斂布絞縮者三橫者五小斂絞數已見上經而大斂不言非遺之也必已别見而不覆舉耳君襚祭服散衣庶襚凡三十稱始襲明衣之外加褖衣死者朝夕所恒服也再加祭服其命服也小斂則祭服在内近身宜尊服也君襚至尊而至大斂然後用者大斂之衣美者在外列之在先則被之在後鋪之在下則掩之在上君襚至尊無敢被其上者必如是而後大斂既畢惟君襚上覆而私服庶襚盡包其内耳古人儉於服用而襲斂之衣至五十二稱非獨不忍儉其親也死者朝祭之服子孫不忍服又不可以予他人惟以斂為宜三王之世禮敎彰明風俗淳厚生則比居死則族葬墓大夫居其中以守厲禁故含用珠貝襚服衆多而無意外之患至衰周而發塜探珠之變見矣然後知先王之道不行則人心風俗之變百出而不可防也五代時郭威至以紙為衣以瓦為棺而刻石墓道可哀也矣奠席在饌北斂席在其東小斂奠無席以尸未入棺不忍以神道事之也大斂奠席與斂席並陳東堂下以尸在堂上若神式憑焉既殯升奠於室中祝執巾席以先之若神實依而徃也義與宿奠徹而仍設於序西南吉祭遷尸薦俎敦厞於室西北隅畧同不知神之所在於彼於此焉耳棺入主人不哭奠之升降主人哭踊哀親之不復生饗也棺之入乃不哭冀親之魂魄安焉而不敢哭踊以震驚之也既奉尸斂於棺將蓋然後踊自是則與親永隔矣皆人情之實故先王因之以制節焉升棺用軸蓋在下敖氏謂郤蓋於棺下似未安蓋之形制未審可郤而置棺於其上否疑棺以軸升而蓋仍留階下俟置棺於肂然後手舉蓋以升也其升而置於何所無文必已别見祝徹巾授執事者以待上經祝徹盥於門外衆徹奠者並盥然後祝獨徹巾授執事者以待而先徹醴酒下取先設者則衆徹奠者也獨言祝徹明其主徹事也衆徹者之盥則不言可知徹饌先取醴酒北面吉祭祝先酌奠尸先執奠飯畢主人酳尸故喪奠祝亦先執醴酒俟豆俎既錯而後錯焉其徹也亦先取醴酒而後及其餘蓋以酒包食之始終而祝主祀事故始之終之者皆祝也帷堂未奠之前不惟堂以襚者尚欲見尸而委衣以致其哀奠時執事者方升降以饌徹也婦人尸西東面主人及親者升自西階出于足西面袒主人舉親者以疎者本位於堂下也女婦之疎者則無不出於房之義故統之曰婦人明亦與親者比次也不著主人及親者之位何也知婦人之位則知男子視此矣親者與主人同袒是小功以下衆主人不袒也小斂畢主人髺髪衆主人免不辨其親疎免者皆袒袒者哀之甚也先王制禮稱情以立文袒不及疎者所以責親者之致其哀又以明君親弔則衆主人皆袒以昭異敬也布席如初斂席之布與小斂同奠席亦下莞上簟如初兼此二義商祝布絞紟衾衣美者在外君襚不倒小斂祭服不倒則衆服倒矣大斂君襚不倒則祭服亦倒矣斂衣何以必倒非倒不可以斂也小斂之倒折疊巻搏塡實限缺以取平正至大斂之衣裳則並不能展布以襟衽相交惟結衽平布或自首順而下或自足倒而上鱗次相承以兩袖左右上掩而交於中央然後停均平帖可至三十稱之多等而上之雖百稱可加也此斂法之必不可不詳者而經傳無文必已詳於卿大夫之禮司馬温公嘗歎世俗有襲而無大小斂究其原蓋因古巻疊倒置之法無傳襲用四稱之後雖欲加而難為被也故諸大儒終無能用古斂衣之數者然聖人制禮必隨世變而後能與民宜自漢文帝時張釋之已云使其中有可欲雖錮南山猶有郄後世公卿富家以鐵石窆封發掘不絶則數稱之外亦無庸多加但以命服之尊者上覆棺中未實則用瀝青或以布衣葛草之類充之可也延陵季子葬其子深不至於泉斂以時服蓋己見其微矣士舉遷尸復位主人踊無算小斂既斂馮尸而後踊無算前事方殷也附於身者必誠必信目視而心注焉主於敬而不可以哀閒也大斂始遷尸而踊無算卒斂馮尸復踊無算蓋棺加塗又踊無算蓋自是與親之音容幽隔矣故心絶志摧而不能自己也卒斂徹帷小斂大斂第曰卒斂而斂之人數及絞紟之制結束之法胥無及焉必已前見也惟沐浴飯含襲事獨詳以其為貴賤所通用故於士禮見之使庶人可倣焉卿大夫以上不過所用器物加貴重耳其節次儀法則不容有異祭禮為貴賤所同者皆具於特牲其義亦然俾士無田及庶人薦於寢者可畧知其疏節耳主人降拜大夫之後至者北面視肂肂在西階上主人必北面於西階東始可視肂疏以不忍即阼階位為義失之矣尸在楹閒主人即阼階下位豈忍於遠親乎地限之耳衆子不視肂以賓位西階下更無地以容也婦人復阼階上位以工役方有事於西階不宜偪近也衆主人復位婦人東復位揭衆主人婦人之復位則主人奉尸斂於棺皆從至西階視蓋與肂可知矣遷尸者士則舉以入棺者仍此士而男女奉之皆如初亦可知矣聖人之經辭簡而事不遺義愈著皆此類也將浴尸衆主人婦人之出將含飯衆主人婦人之入經皆無文而此獨特文以見之何也在彼雖不言出入而無不出不入之疑在此不言復位將疑主人奉尸斂於棺衆主人婦人皆不從矣婦人不入於房而復阼階上之位何也尚未加塗也設熬旁一筐乃塗踊無算設熬即飯用米貝遣車載牲體之義如以惑蜉蚍則以置肂内而後塗是招之使入也殯而加塗直至啟而後見親柩故踊無算卒塗祝取銘置于肂死者不可别故銘以識之尸在室朋友親者尚入視尸在堂朋友親者弔賓尚升堂親致襚故銘置重南今既肂自當依尸柩而設之註在肂東敖氏謂在南俱擬議之辭註為長蓋介於殯與重之閒使賓出入皆見之也乃奠燭升自阼階祝執巾席從設于奥東面自始死至小斂奠於尸旁以親之魄體尚在室堂也古不墓祭以祭乃飲食之道宜在室堂既殯於西階不得奠於階前故當室之奥是廟祭之始也錯者出立于戸西西上祝後闔戸先由楹西降自西階錯者序立以俟祝出而讓之先降也祝降則錯者從之自二斂至遣奠有司陳薦主人不親祝亦不代獻侑蓋未葬以前主人創鉅痛甚即使視豆籩牲醴其心亦逐於物而閒其哀矣惟獻材井椁哭踊而視之附於棺者必誠必信也獻侑者生人飲食之禮而假以事鬼神也故必有尸而後有獻侑魄體尚在堂而使祝獻侑是誣於祭也故既葬而虞始用隂厭使佐食與祝代神祭於苴然後出迎尸蓋易事生之道以事死義各有所起而變必以漸也賓出婦人踊主人不踊以拜送賓不暇自伸其哀也而婦人踊何也唁弔者各還其家而父母舅姑之音容則永世不再見矣此正以故興物之節㑹也故成服朝奠亦以賓出為婦人踊節古者喪禮宫中必有相職此之由闔門主人揖就次既殯就次而後有苫有塊則未殯之前有坐起而無寢興明矣君若有賜焉則視斂君視士斂非公族姻親則同學於師氏保氏者非可以近幸而私為之賜也必有典則著於禮經今殘闕耳主人出迎于外門外見馬首不哭男子出寢門外見人不哭以謀喪事而見人非哭之時與地也若君親臨弔則震動感傷有不知涕之何從者故號泣而出迎但不敢徹聲使聞於君耳巫止于廟門外祝代之先君臨臣喪以巫祝桃茢執戈本掃除不祥之意但祝以通鬼神而巫主招珥以除疾病宫中方有死喪而以巫入似重以不祥相擬故止於門外且桃為鬼所畏執桃茢者巫也不以桃茢入恐死者惡之君釋采入門主人辟君入門而辟不敢以凶服近君也俟君升而後哭拜於中庭君升之而後就西楹以視斂哀敬並伸而義各有當如此卒公卿大夫逆降復位喪大記馮尸惟君及父母妻子兄弟此經君尚未馮公卿大夫逆降君馮後獨升主人則公卿大夫視斂而不馮尸明矣而後記大夫升自西階既馮尸大夫逆降何也以義揆之舅甥内外兄弟之親同學同官之久亦宜聽其馮豈君親視斂則主人主婦之外皆不敢馮若君無賜或重為之賜視小斂而大斂不臨則大夫之為親戚故舊者亦有馮尸之禮與蓋馮者哀戚之至也若姻賓之疏遠者皆馮則在馮者為非情而主人一一以哭踊答亦實不能勝觀斂襚主人之不踊則知衆賓不馮之義矣君坐撫當心主人拜稽顙成踊非君踊主人不敢踊則君坐撫興必踊别記云君稱言視祝而踊則始入而哭亦宜踊文皆畧者以禮終將出總言君要節而踊主人從踊著其凡也君降西鄉命主人馮尸主人主婦馮當踊無算故命之馮則君先降使伸其哀而馮者之踊亦不敢無算使君久立以待也君降不言立位入棺加蓋並不見其儀法必已於臨卿大夫見之據喪大記君視斂主人房外南面主婦尸西東面卒斂升主人馮之命主婦馮之此經斂時雖不見主婦之位但馮尸云主婦東面亦如之則斂時本在堂上明矣惟主人之位與面不同以義揆之則此經為正蓋君位在尸東則主人主婦宜皆向君且主婦位在尸西主人位在西楹卿大夫繼主人而東則去主婦位遠而又有主人之位閒之於禮意為得如記所云則卿大夫直當主婦之南又卿大夫北面而主人南面更非所宜君位堂東西鄉宜近北主婦之位宜如主人當西楹而近北然後於對君視斂皆順主人正當西楹主婦則正對尸故云尸西君升即位君加蓋而後升男女號踊君臨視之則瀆矣常禮主人奉尸斂於棺婦人東復阼階之位君視斂降立於階下而旋當升則主婦宜仍西楹東之位或退立於房外南面經記無文必已前見君出門廟中哭大斂後常禮賓出婦人踊主人送賓於門外入及兄弟北面哭殯此曰君出門廟中哭則不獨婦人踊於堂上而衆主人亦哭於階下矣所以不俟主人之入同哭殯者主人至是水漿不入者三日矣君親臨視拜趨益勞宜少息之也哭殯之禮乃因兄弟將歸者辭殯必哭而與之同哀非哭親之正禮也故主人送賓後亦不復哭皆人情之實也統於君故下賓出婦人不再踊貳車畢乘主人哭拜送君始至主人見馬首而入不敢以凶服迎君而使前君者見其迎君之歸不敢哭以送君而使從君者見其哭是謂連而不相及也襲入即位衆主人襲拜大夫之後至者成踊君不臨則殯奠丈夫婦人各二踊送賓後主人及兄弟哭殯今惟君踊主人從君出廟中一哭而奠升降無踊君在不敢私踊也惟拜大夫後至者成踊而不復與兄弟哭殯必拜大夫成踊時兄弟皆哭故即以當哭殯之節也經無文必已前見蓋至大斂禮終又重以君弔不惟主人力不能勝即兄弟亦憊矣故節文宜減皆天理之自然也三日成服杖拜君命及衆賓不拜棺中之賜朝夕哭不辟子卯成服大禮也必君有命故有公卿大夫之位拜即於殯宫拜也若親賓有含襚之贈而不及尸則告以既殯而辭不受故不拜註疏謂出拜君與衆賓之弔臨非也曲禮君弔之必有拜者雖朋友州里舍人可也乃以成服之日躬出拜衆賓乎且拜君之臨則不宜曰君命蓋此三節乃總言是日禮事婦人即位以下乃詳叙朝哭儀位耳必數來日以四日之朝為三日者或死在夜分以前而以死日為期則實未及三日孝子所不忍也婦人即位于堂南上哭時廟門未辟而婦人已位於堂上何也按雜記諸侯之夫人奔父母之喪入自闈門升自側階婦人自外入者由闈門以適側階由側階以入東房則自内出者可知矣蓋闈門本為婦人有事於外寢而設不獨主婦姑姊妹女子子婦凡宗婦及外宗皆然此經没其文必已别見也必南上主婦親者乃與肂相對而近主人堂下直東序亦以肂在西序相對而近也婦人哭見肂而哀心感也故丈夫亦入門見肂而後哭疏乃引雜記祥而外無哭者謂殯後門外皆有哭以下註為徴失之矣雜記謂大祥後門外堊室中無哭而朔月月半之奠殯宫内尚有哭耳男子出寢門外見人不哭自君視斂外雖初喪無哭於門外之禮下註乃言入門即位而哭耳門東北面西上門西北面東上西方東面北上門内外主賓之位皆分為兩重以當門地狹不能容多人門東西地寛必分行序列然後各居其所而不相雜也他國之異爵者無多人故其位正當門西其下則以位他國及本國之士門東門西下經皆目其人而西方不目其人蓋本國他國之公卿大夫位皆見經則衆士位在西方不待言矣本國之衆士不位於門東何也諸公之下尚有公有司及私臣執事者舍門東别無地以容且士為弔賓不宜與有司執事者同列故位於他國之士之下而統之曰西方下經亦不目其人也公有司及私臣之位不著於經何也冠昬私禮執事者微則不著其位或并没其人喪禮亦然與射鄉國事異乃經之通例衆賓位次至此始詳蓋未殯以前逺者未至且主人大事方殷不暇與賓序立也主賓親疏貴賤門内門外位次有同有異若兩番叙述不獨辭事重複且樊然殽亂觀者為之目眩矣此經前列其地後目其人或列其地而不目其人或没其人而并空其地彼此互證隱見相參而其人其地其位朗然在目凡聖賢之文簡而有法類如此不獨春秋為然主人拜賓旁三右還入門哭婦人踊婦人即位以前宜有丈夫婦人易服儀位主人入門哭以後宜詳與兄弟哭殯或升階或即在堂下位面此類大節目俱不見於經則前已别見無疑卿大夫在主人之南諸公門東少進他國之異爵者門西少進此既殯次日朝哭之禮即成服之朝也故卿大夫諸公他國之異爵者皆至必死者君之親舊或私與公卿有連敵則先拜他國之賓謂弔賓中有爵位敵者豆西面錯立于豆北南面籩俎既錯立于執豆之西東上立俟祝錯醴而從之適新饌也主人卒拜送賓前已拜送賓復拜送何也公卿大夫有國事者宜先出姻黨朋友去留亦不能齊故出者先後分二節而後送曰卒以顯其義無籩有黍稷張爾岐曰朝夕之奠無黍稷以下室又有燕之饌也既奠殯宫又奠下室莫必神之所在也主人拜賓如朝夕哭以是知古俗之厚也未葬之先賓蓋日有至者焉既葬之後朔奠猶㑹焉姻黨且然族未移者可知矣祭祀同福死喪同恤比閭族黨中忿爭鬬辨不戒而潛消矣曾子曰慎終追遠民德歸厚蓋深探乎先王制禮之原也筮宅冢人營之周官冢人掌公墓之地凡諸侯及諸臣皆授之兆均其禁故士之葬地授於冢人與庶民之掌於墓大夫者異也王朝冢人下大夫二人中士四人而胥十有二人徒百有二十人蓋鄉遂公邑都家皆有兆域冢人按圖以授定其邱封之度及樹數而使胥徒為之營居其中之室以守之者則有地治之中下士也掘四隅外其壤掘中南其壤南其壤者藏明器加折抗必自東西壤積則事難展也鑿壙掘壤井椁獻材獻素獻成雖小而具詳俾衆庶徧知其儀法也命筮者在主人之右以下卜日凖之命筮者宜宗人度兹幽宅兆基無有後艱兆基謂宅兆始定於此也張爾岐曰謂兆域之基址主人絰哭不踊主人免絰已前見而復曰主人絰示中無更易直待事畢而後反常服也自卜宅及井椁獻材獻素獻成皆哭而不踊其哭也感時撫事而哀不能禁其不踊也卜幽埏治明器以安親之魄體而哀不敢過皆稱情以立文也若不從筮擇如初儀古者族葬五服中兆域共一區故不從則左右可更擇也既井椁殯後椁材已散布及筮宅定將用之然後搆架於殯門外如井形卜日既朝哭皆復外位此與前筮宅皆言既朝哭井椁獻材無丈何也筮宅不言則疑主人皆徃兆域或如重喪既啟輕喪不奠而闕一朝奠卜日不言或疑昧爽行筮事而後朝奠視材獻器禮輕事簡則朝奠而後視不待言也族長涖卜曰族長斷自服内也設其人有君事或自有喪則以其次代記曰絶族無移服經特著其服之吉則為有服者明矣不以宗子或行卑而年少也左擁之喪禮絰垂以敬卜事而異其節故擁之與吉時雜佩有時而擁同義或疑三字義無著蓋衍考降無有近悔卜宅曰無有後艱恐宅不吉而後日有艱也卜日曰無有近悔謂在途陟降無有傾側顚頓之悔也近與後義相對舊説未析敖氏説尤未安西面坐命龜以涖卜所命命龜也告于主婦主婦哭筮宅告占主人加絰而哭此不哭何也墓在郊野親之魄體將於是焉藏哀心之感不能至家乃哭也故哭有再此則旋入門而哭理無容再卜日主婦哭則筮宅主人歸而哭主婦必同之矣告于異爵者使人告于衆賓註知衆賓謂僚友不来者蓋僚友来者及外姻執友則告異爵者即衆聞之矣曰使人告於其家之辭也儀禮析疑卷十二
