body:
  text: 儀禮析疑卷七翰林院侍講銜方苞撰大射儀宰戒百官有事于射者春秋傳趙孟曰武請於冡宰矣南遺曰冢卿無路以此經及聘禮參證則侯國亦有宰舊典也蓋假以尊稱以臨莅其吏民與五等之國皆稱公大國之孤亦稱公同義射人戒諸公卿大夫射司士戒士射與贊者曰戒士射則知贊者不射矣觀此則士旅食乃升於司馬掌於司士而未受職者作之以贊射事明矣用此推之鄉射贊者有司之類射皆不與前射三日宰夫戒宰及司馬射人宿視滌百官聞宰之戒則射前一日已官陳器與水三官聞宰夫之戒則届期已同視滌故下獨舉司馬之命張侯設乏也疏謂滌射器非也射器拂拭而已無所用滌自視滌至量侯道設乏張侯宿縣並射前一日事故以宿視滌貫之註云前射三日張侯設乏非也量人量侯定植巾車張之可同時而畢事若張設於三日之前必别具帷幂以備風雨非事之宜此篇主於射而言視滌則燕禮不待言矣戒三官之地所滌之器滌之之法視滌者之儀皆不載必已見於祭禮也大侯九十參七十千五十筋力不可强而侯道之逺近壹以貴賤為差何也臯陶陳謨以六德三德為有邦有家之差蓋居君卿之位而德器才識不能及逺則無以馭其衆臨其屬故寓其義於射傳曰為人君者以為君鵠為人臣者以為臣鵠志力不足以中鵠則君卿與有司同罰以示才德不足以稱位則不足以任國社而亦無以安於四民之上矣此義明則苟非至愚必將撫躬而自懼求賢以自助尚敢荒寜以自恣於民上乎位卑者雖力能中逺而非其鵠不獲亦教以職思其居而無越志也傳所謂射者各射已之鵠繹者各繹已之志其此義也與遂命量人巾車張三侯前承宿眠滌濯後接宿縣則為射前一日事明矣設乏西十北十凡乏用革西十北十之文重見以上乃司馬命量人定設乏之度此則巾車設乏之事也樂人宿縣於阼階東於樂人之縣復特言宿事更端也蓋張侯設乏與視滌同時而官事相聨無庸更言宿樂人之縣則宗司所掌也故别言之笙磬西面其南笙鍾其南鑮皆南陳建鼓在阼階西南鼓應鼙在其東南鼓磬西面而笙鍾與鑮皆南陳何也擊者東面而立擊西面南面皆便也鍾鑮所以必南陳者以編鍾同簴不可以西面也南陳之占地無多建鼓猶設於阼階西以辟君降揖卿大夫之位可縮簴而西面乎阼階之鼓聲南面西階之鼓鼙則東面何也凡考擊必用右手東面而擊者以南為便西面而擊者以東為便也笙鍾頌鍾以應笙管皆編鍾也鑮則大鐘以聲羣樂奏九夏者建鼓即楹鼔以木貫而建之遂以建名若以樹詀則下云一鼔在其南一鼓在西階之西簜在鼓西可矣皆特標建鼓義無所處於文為贅楊氏復承朱子之意為儀禮圖最有功於治經者但尚有宜補正處如燕禮但云樂人縣詳具於大射而樂器之陳設無圖後之君子宜詳訂焉一建鼔在其南東鼔朔鼙在其北鑮建鼔大鼙小故設於鑮與鼓之間而少北於鼔以便先擊鼙後擊鼔也冪用錫若絺綴諸箭蓋冪加勺又反之綴錫若絺於箭慮風之搖蕩也蓋冪謂以冪覆尊明勺加於冪上也又反之以覆勺也皆𤣥尊酒在北記稱上𤣥酒以陳尊南上𤣥尊在南也兩壺獻酒獻酒示為獻服不設也註讀獻為沙疏因言祭侯用鬱鬯故隸僕以下卑賤之人並得以鬱鬯獻漢唐人學而不思至此貿儒乃以不用註疏病程朱謬矣司官設賔席於戸西南面有加席大射之賔大夫也以為賔而有加席與卿同猶燕之主人士也以為獻主而與大夫偕薦也卿之重席陳而不設以卿終辭且諸公無加席而卿之加席久設於其位非所宜也小卿賔西東上諸侯之國卿以下别有小卿春秋傳魯有宗伯小司冦乃小卿也蓋禮事獄事最繁難以兼攝故特立小卿以主之其下各以大夫大夫之數所以必五人也冢宰則以司徒攝而不設小卿故見於春秋傳者無小宰吳楚僭王故有太宰少宰衛有右宰穀蓋僭設故易其名以自蓋也若有東面者則北上惟大射卿大夫在國者無不與小卿位於賔西五大夫繼之戸西不足以容其席位故有東面者燕則無此文衰老及有事於國中者可不與也士西方不著庭中南北之度以下旅食者在士南則其位約畧可知小臣師從者在東堂下南面西上非有禮事者不得升堂公將降階揖公卿大夫故從公者預負東堂而立也周官司士治朝之位王族故士在路門之右南面東上大僕大右大僕從者在路門之左南面西上亦擬王出視朝南面故從王者亦南鄉也彼或東上或西上以王位當路門之中也此皆西上以公降自阼階也燕禮小臣師一人在東堂下儀畧也大射儀繁故有從者賔再拜稽首受命燕以示慈惠故曰許諾大射以辨等威故曰受命文無㣲而不辨也小臣自阼階上北面請執冪者與修膳者乃命執冪者執冪者升自西階立於尊南北面東上膳宰請羞於諸公卿者羞膳者與執冪者同時而請而惟見執冪者升立之位何也羞膳者之職與其儀具詳於後也羞於諸公卿者亦然燕禮請羞於諸公卿者壹與此同而篇中竟不目其人必已見於饗禮公食大夫禮設洗如饗而畧之也觀此篇亦可互證賔及庭公降一等揖賔賔辟公之降揖同而燕則賔不辟何也燕主溥惠於羣臣而立一人以為賔禮猶輕大射擇士以祭賔有加席與卿同升奏肆夏與異國之賔同奠爵執爵興而樂闋且上擬於君故於君初接見時退辟以見其不敢當禮也公升即席奏肆夏燕禮記若以樂納賔則奏肆夏此經三奏肆夏皆燕禮之所無也蓋燕以示慈恵宜畧於儀節故納賔公即席及受獻皆不用樂大射以辨尊卑别賢能宜詳於度數故公即度受獻皆以樂尊尊也納賔以樂賢賢也大夫以下無脀而獲者釋獲者有脀報勤也肆夏之詩曰明昭有周式序在位又曰我求懿德肆于時夏與大射辨尊卑别賢能之義相應燕而摲用肆夏以納賔其必臣有大勲勞功伐而加隆焉以厲羣下與賔升自西階主人從之賔右北面至再拜賔答再拜主人從賔之後既升堂則北面而立俟賔就席然後拜其至故不曰拜至而曰至再拜也賔洗南西北面坐奠觚少進辭降主人西階西東面少進對禮與燕同而於賔増北面於主人増西階然後賔主所立之位愈明擯者以命升賔燕禮射人按節而升賔不復請於君也此曰以命蓋君重其禮而特命之宰胥薦脯醢由左房庶子設折俎燕禮輕獻公獻賔設俎者皆膳宰大射禮重轉以宰胥庶子薦設以士皆與射故薦設用不與於射者更爵洗升酌散以降酢於阼階下主人獻公自酢燕禮酌膳志恩禮渥洽而不可忘也大射酌散示等級分明而不敢苟也賔升席坐祭酒遂奠於薦東凡奠於薦東之觶不飲何也燕與大射公卿皆未得獻賓已受獻且隨當受君之酬故不飲主人之酬爵以示不敢再先於公卿俟受君之酬而以酬公卿大夫然後事順而情安也主人之酬爵君不可用以酬賓故别舉媵觶而薦東之觶又不得他用則俟禮終而徹之可矣鄉飲鄉射不用薦東之觶義與此同其舉薦西之觶以旅則以事各不同而節文亦少異焉耳公命長長謂五大夫爵列之尊者故小臣以次作二大夫而不復請於君也公為公卿舉旅曰若賓若長則非以長幼言可知皆奠觶再拜稽首上稽首拜媵爵之命也此稽首拜飲觶之賜也賓未酬而先賜媵爵者飲何也凡酬必先自飲而後致爵於人媵爵者之飲乃代君也酬爵四舉非有代者君豈能媵遂卒觶興坐奠觶再拜稽首執觶興公答再拜燕禮主人自酢賓受酬二大夫媵觶公皆答再拜大射皆答一拜惟此答再拜何也燕示慈惠故過禮以明恩大射辨名分主人士也君於士不答拜以為獻主而拜答焉禮已過矣賓與媵觶者大夫也本當答拜故一循其常而於二大夫卒觶時閒答再拜以别於士賓則公飲射爵而夾爵及媵觶於公并答再拜以别於衆大夫又所以稱禮之輕重而為之隆殺也賓降西階下再拜稽首小臣正辭賓升成拜拜下禮也故主人獻公大夫媵觶皆聽其稽首於階下而不辭惟於賓則畧君臣之分而執賓主之禮故命小臣辭而升成拜且始猶拜於下而後辭既則不待其拜而升之皆異敬也公以賓所媵觶賜人亦不待其拜而升之蓋所賜必諸公若諸卿之長或君之師保故與賓同禮然君雖有異敬而臣宜守常禮故至君命徹幕則賓與公卿大夫皆降拜稽首公雖命辭而終不敢升成拜賓告于擯者請旅諸臣祭祀賓客獻酬本無或遺而燕射舉旅必使賓請者自賓言之則不敢専惠自君言之則推惠於賓而使浹於上下也公卿之請所以推惠於公卿而使浹於諸大夫也卒爵者大夫大夫之請所以推惠於大夫而使浹於羣士也士舉旅而後獻庶子有司則士之請又推惠於士而以浹於庶子有司也惟賓之請見於經而燕禮記曰凡公所酬既拜請旅侍臣蓋據為公卿大夫士舉旅受爵者皆曰如初請酬之文惟見大射何也大射禮重於燕於燕舉之或疑大射辨尊卑簡賢能一稟於君命或無此節於大射舉之則燕不待言矣以告於擯者以射者無自請於君之儀也若膳觶也則降更觶洗升實散公命不易主恩也賓更觶臣禮也卿辭重席司宫徹之賓有加席而卿轉辭因其辭而遂徹之何也上則體君之意以致隆於賓下則不敢過諸公也乃薦脯醢卿升席庶子設折俎不指言薦脯醢者以庶子仍設折俎而獻大夫始言胥薦脯醢則公卿之脯醢薦者仍宰胥可知矣賓薦以宰胥一日之敬公卿貴有常尊不得降於賓若有諸公則先卿獻之如獻卿之禮席于阼階西北面東上無加席燕與大射諸公皆無加席與卿辭重席之意同以成君致隆於賓之義也又位在阼階若加席則上擬於君故設席時本無加席不待其辭主人洗觚升獻大夫于西階上燕禮為大夫舉旅在獻工之後笙入之前以其事與無算樂獻士相連故使媵爵者遞進而代獻以息獻主大射為大夫舉旅退於既射之後獻主之事至獻大夫獻工而中止則連而舉之可也胥薦主人于洗北西面脯醢無脀大射以辨等威故惟公卿有折俎雖主人亦無脀以此知薦獻獲者之俎以祭侯設而釋獲者亦得以類及也擯者升大夫大夫皆升就席獻公卿畢即為舉旅獻大夫直待射事畢而後為舉旅義主於射禮重事繁恐日不足也工得獻而笙否義亦然乃歌鹿鳴三終不合鄉樂射以擇士與彰女教之義無渉鹿鳴三終兼四牡皇皇者華左傳歌鹿鳴之三可證主人洗升實爵獻工鄉飲酒鄉射惟為大師洗以衆工不過族黨中知音樂者或國之中瞽下瞽耳燕與大射則歌者必大師小師即上工亦異日之小師大師也故皆洗以獻而並及於笙大射禮繁故省獻笙之節耳大師少師上工皆降立于鼓北羣工陪于後乃管新宫三終既無閒歌合樂則堂上之事畢矣故大師少師上工皆降也春秋昭公二十五年魯叔孫婼聘於宋宋公享之賦新宫昭子賦車牽則新宫有辭與南陔六篇異而獨以管奏射事殷故簡其節也敖氏以無管入之文遂謂即大師管非也上經工六人四瑟僕人正相大師僕人師相少師僕人士相上工則上工謂四瑟明矣此經既曰大師少師上工皆降又曰羣工陪于後則非衆管者而誰哉經於羣工陪于後下繼言乃管則管者即羣工甚明無事復言管入言之法當然耳擯者自阼階下請立司正鄉射主人自作司正政學之常有司及時而發命國君之禮則宜有請者公許擯者遂為司正鄉射禮曰作相為司正所作無定之辭也此則禮之秩節故曰公許擯者遂為司正無所用其辭也為政請射為去聲言為政典而請射主於事非指其人也國之大事在祀與戎故於禮辭特著其義曰為政若鄉射以教學士燕射以樂賓無庸及此註疏以為司馬之稱則司馬當自請於君不宜使司射請且君前臣名不宜𨼆其名而曰為政也遂告曰大夫與大夫士御於大夫侯國三卿五大夫或從王事或交於友邦或疾或喪不能成耦故以士御之公卿不能成耦者亦以大夫御可知敖氏云不言士與士略賤非也與尊者作耦自宜特文以見之上經云戒士射則皆與射而自為耦不待言矣主人士與梓人升自北階南堂之前射者司禮事者掌射政者共獻薦者樂器射器皆陳焉工人士梓人司宫畫物外别無所共之事故並立北階下升自北階自北堂由東房以至於堂也宗廟之祭婦人由北堂以入東房冠之日贊者入北堂以洗爵而酌於房中則東房與北堂相通明矣疏數容弓若丹若墨度尺而午兩物左右相去六尺然後射耦張臂挾弓矢乃有餘地又司正命去侯物閒可容其立也卒畫自北階下司宫掃所畫物自此階下工人士梓人司宫本待事於北堂下畫物掃畫畢仍反立於其所也大史俟于所設中之西東面以聽政鄉射鹿中此篇但言設中而不舉其名者侯有三則中亦宜三必己見於王朝禮又君射於國中則皮樹中大夫兕中見鄉射記則别見必多矣曰以聽政者匪獨擇士以祭其坐作進退趨走呼唱此次誓命視聽之節即軍政所隠寓也古者弓矢為長兵軍政莫重於此此聽政與上為政請射正相應燕列祝史之位以或因燕而射則祝當釋祭侯之辭也禮主於射則祝必有事不待言矣卒遂命三耦取弓矢于次此下司馬命張侯繫左下綱獲者倚旌文皆不具以其於射事為必不可闕之節於射者為必容有異之儀有司羣士自州長教射習之有素故可與鄉射互備而不復舉耳其他與鄉射大同而小變者具有精意存焉不覆舉則不可得而辨也司射入于次大射有次非獨以國君具官有張耦次者也州長㑹民於序習射尚功以角材力習威儀與射者皆少壯强有力之士無所用次大射則公卿大夫皆與焉老者立而待事必有所休息以安其筋骸貴者降於階庭必有所隠蔽以肅其體貌又鄉射舉於春秋而擇士以祭則兼冬夏嚴風烈日勢不可以無次若鄉射禮亦宜然則黨共射器何難具幄幙帟案哉由下物少退誘射誘射之儀與鄉射各有詳略互備也卒射北面揖卒射大節故北面而揖示為誘射而射君之侯如復於君也鄉射之主人州長也故司射南面而揖大射君在阼司射在堂而南面對君以揖則義必不可蓋臣在君所奉命而執事時或南面司馬揚弓筮人抱蓍之類是也行禮則未有不北面者故雖聘賓啐醴必降筵北面註謂不背卿則鄉射公卿之位亦在尊東而南面揖敖氏云為下射與君同物不可南面然司射少退乃不敢踐君之射位非北面揖之正義也遂取扑搢之以立于所設中之西南東面鄉射無次故司射先立於中之西南使三耦立於其西南以俟射大射先比三耦於次北面命取弓矢俟誘射畢然後定位於中之西南也司馬正適次袒决遂執弓右挾之出周官一曰正掌官法以治要二曰師掌官成以治凡謂六官之正與貳也此經司馬師司馬正敖繼公以為射時所立之官經指始明註義亦可通周官大司馬教振旅辨鼔鐸鐲鐃之用伍長與二十五人之長皆得假以公司馬兩司馬之名則因射而立監得假以正與師之名明矣知非司馬之卿與貳者卿貳席位在堂此正與師射時與司射聨事而終獻獲者則非卿貳决矣周官軍司馬下大夫四人輿司馬上士八人行司馬中士十有六人侯國爵列雖降員數雖減而職司必具司馬正宜取諸軍司馬司馬師宜取諸輿司馬行司馬鄉射司馬不决遂以教射而不與於射也大射之司馬亦不與於射而决遂特備射儀以為衆式耳升自西階適下物立于物閒鄉射鈎楹物當棟也大射物在楹間故升階徑適下物卒射右挾之北面揖鄉射皆執弓不挾而此右挾擇士以祭儀彌謹也鄉射南面揖此北面對君之儀也上射降三等下射少右從之中等並行上射于左階下陿各持弓矢必中空一等乃無掛礙庭中寛廣故盡階履平地然後可並行公許遂適西階上命賓御于公諸公卿則以耦告于上大夫則降即位而後告初射命三耦有辭此命賓有辭惟公卿則惟以某公與某卿耦告而不敢命以命辭有軒輊也命大夫之耦曰子與某子射告于大夫曰某御于子命大夫之耦與告於大夫同事而異文義宻而文辨蓋如此遂命三耦各與其耦拾取矢鄉射取矢必拾有司教射習儀不厭其詳也凡與於大射皆習儀有素者又耦多儀繁恐時不足以周事故初射不拾至再射設楅取矢於庭中於是觀禮則不可以或略矣鄉射命三耦拾取矢後司射反位此經無之註疏推説義皆無據蓋未詳繹上下經文而考其事義也大射三耦衆耦位皆在次大夫立於三耦之南司射東面於大夫之西以命衆耦一人取矢未畢司射不得反庭中之位及衆耦皆還反次中以俟射則司射作之以升遂適阼階下請釋獲於公備命射事直至命上射不貫不釋之後然後退反庭中之位中閒實無反位之事安得有此文哉鄉射始命三耦取矢司射即反位者司馬之位在司射之南三耦之位在司馬之西南衆賓繼三耦而立司射適堂西比衆耦命三耦取矢後必反其庭中之位乃可作三耦衆耦取矢於楅而次第作之以升其所立之位命事之地絶不相同而欲以彼例此宜乎皆不得其義也皆内還南面揖觀此則司射卒射北面揖之義益顯著矣司射在堂君在阼階雖不正對君而揖則君見之故不可以南面君在阼階上射耦在庭中雖南嚮而揖君不見其面又揖後始適楅南則出次時在楅北進而及楅面必南故因之南面而揖也退者與進者相左相揖退釋弓矢于次説决拾襲反位鄉射三耦及衆耦自始至終皆拾取矢執弓立而俟大射之初則取矢於次而不拾再射三射皆取矢於楅退釋弓矢反位何也有司教射則宜使久立待事以固其筋骸將祭而擇士則宜休其神氣使盡志於當射之時也鄉射之終賓主人大夫獨釋弓矢反位待事至旋取以升大射至再諸公卿皆取矢於次中三射雖取矢於楅與大夫同而隨升就席則釋弓矢臨事而後取以優尊者明矣賓先待於物樂作而公就席義亦如此於尊者為優則於衆耦為休其神氣而使盡志於射益明一耦揖升如初上經三耦大夫衆射者皆釋弓矢於次襲反位此直曰一耦揖則旋取弓矢不待言矣蓋拾取矢於次儀不可廢故使預習而復休之所以曲體人情也大史釋獲小臣師執中鄉射一人執算以從而大射無之何也事輕人微鄉射獲者自執中尚有執算以從者大史釋獲小臣師執中則别有一人執算不待言故文略耳中離維綱揚觸梱復公則釋獲衆則不與離者麗也矢麗維綱而不中鵠也梱謂植之横於上者仰觸於相下落而經正鵠也雖不中不逺於侯故君猶可假唯公所中中三侯皆獲三侯南北正相值故鵠之見以差矢少揚力過强則或誤中其髙且逺者矢少留力稍弱則或誤中其卑且近者故有中非其侯不獲及唯公則獲之法司射遂進由堂下北面視上射命曰不貫不釋以耦告則先公卿大夫而後及三耦尊卑之序也取矢以射則三耦先公卿并先君仍前誘射之義也不貫不釋賓與公卿之所同而於三耦命之言各有當也司馬升命去侯如初司馬下當有正字公就物小射正奉决拾以笥大射正執弓皆以從于物射以擇士不中者不得與於祭篇中射人司射大射正小射正司馬正司馬師自始至終各有所待之事無暇身與於射疑當以祭有常職如鄉師肆師膳夫鬱人之類攝之非必取諸射人羣司馬也其餘百官有事於射者則供其本事之暇當仍更互比耦而與於射如獲者釋獲者倍其人數則皆可更番合耦經記無文必己見於邦國祭禮大射正立于公後以矢行告于公下曰留上曰揚左右曰方不中而以其矢告俾君自省以勉於後也人君於事物之理不中常苦不自知射失其宜而不中則易明於心亦所以示君當繹思己過也凡此皆所以防縱弛養德性事近而義深矣公還而後賓降諸公卿升射降反位皆如三耦惟君初曰就物事畢曰還凡要節而揖君皆無之也蓋惟燕食賓初入君揖而進之大射之賓亦然及正射則無為對羣臣而揖亦無為向物而揖也君不揖而賓揖則疑於揖君故不揖與君同若兩君好㑹而射則揖當各循其節矣諸公卿取弓矢于次中君將射諸公卿始適次君射畢即於次中取弓矢而升貴貴優老不敢過勤其筋力也至三射則又與衆耦同取矢於楅蓋公卿民之師保百僚所式故使為衆耦之表儀以示儀皆素習雖貴且老而不敢怠於終焉司馬袒執弓升命取矢命取矢以下六節皆三射之始事也再射之算尚未視獲未數賢獲未告中算未釋豐未設射爵未舉侯與有事於侯者未獻而汲汲於此何也以此時儀節甚繁閲時甚久而司馬與司射所掌之事與用事之地各異故乘司射發命之隙使有司各供其事並行而不相悖而司射既請三射於公可直入次而命三耦矣禮之所謂連而不相及茂而有閒此其可騐者也賓之矢則以授矢人于西堂下再射賓取矢於堂西故以矢授於西堂下以備三射之取也舉賓之矢以見例則公之矢以授於東堂公卿大夫之矢以授於次中可知矣射畢凡與射者皆授有司弓矢故不列數也矢人即初納射器之有司勝者之弟子洗觶升酌散南面坐奠于豐上降反位鄉射禮執弓反位以弟子皆與射也大射弟子不與故反位不執弓蓋洗觶本未執弓也東面于三耦之西出師之禮司徒搢扑北面誓之故鄉射禮司射搢扑北面於三耦之南以三耦州之子弟可以師長之道臨之大射之三耦皆士而公卿大夫並列射位故司射之面位必異一耦出鄉射曰一耦進以立於中之西南也此曰出以位在次中交于階前相揖適次耦次在洗東南鄉射禮相揖出於司馬之南遂適堂西彼射者州之學士也必過於司馬之前以察其儀度大射之耦則公卿大夫士降階而徑適次於禮乃宜賓升再拜稽首公答再拜公酬賓賓再拜稽首公答一拜至飲射爵賓致爵則答再拜者四不惟答賓之親獻及夾爵隂以示事有未當雖尊者宜為理屈重自抑下所以養成其德性俾凡事不敢自是而求助於賢臣所謂各繹己之鵠也公卒觶賓進受觶公卿大夫飲射爵亦於西階示法行於貴而後可以齊衆也君則卒觶於阼階之位貴有常尊也公卿大夫之飲耦不升君則賓親獻而夾爵上下之辨則然而飲不勝之爵與衆耦同又使君知罰不敢行而躬宜自省也司宫尊侯于服不之東北鄉射禮酌堂上之尊以獻獲者此别設尊以國君之禮與州長習射異所祭者不寧侯也不得與堂上同尊故設尊之初即正其名曰獻酒示主獻服不而非為祭侯也此曰尊侯不沒其實也不曰大侯之乏之東北而曰服不亦以見此尊主獻服不而服不轉以祭侯司馬正洗散遂實爵獻服不飲食之道祭必先於生人唯祭侯則先獻服不以義取不寧侯無特祭之義故使服不以所受獻爵祭之蓋服不以侯得獻故私以祭報而又申攻責於祝辭以為戒也司馬正西面拜送爵反位前司馬正獻服不註云洗酌皆西面疏因謂獻旅食尊後酌者為背君此北面不嫌背君以南統於侯曲説也諸侯堂髙七尺禮行於階下庭中君不見故雖南面無背君之嫌况西面乎鄉射衆賓燕獻大夫皆不拜既爵故送爵即反位卒錯獲者適右個薦俎從之司馬獻服不薦俎錯焉示非為侯設也服不不祭啐而適右个不敢以己之餘祭侯也終則仍設薦俎於乏南明獲者雖以祭侯而薦俎本為獲者設也五帝三王之世凡冦賊姦宄聽斷於士師其阻兵倡亂敢為不寧者皆强横之諸侯蚩尤有苖觀扈洗邳徐奄之類故射之正鵠取義於不寧侯使貴賤少長同心於貫之以示敵王所愾之義義取於不寧侯而又祭之何也祭有非報功而以聲其罪者攷工記所載天子祭侯之辭乃周官太祝詛祝所謂攻説也燕義所稱則諸侯燕射樂歌非祭侯之辭師禡所祭於經傳無考而後儒以為祭黄帝蚩尤祭黄帝則禱祈也祭蚩尤則必以攻説之詞記曰禡於所征之地必以蚩尤為戒使不寧之方毋侮毋忽也卒祭左个之西北三歩東面設薦俎立卒爵以此見祭侯之時執俎而不設至獲者反位卒爵而後設之司馬師受虚爵洗獻隸僕人與巾車獲者皆如大侯之禮張爾岐曰觀此則前註謂司馬正容獻服不與其徒之誤明矣服不本下士其徒即得獻亦宜在隸僕巾車之後註謂不言量人此自後及先可知敖氏謂量人或不與此獻指皆未明蓋大射自公卿大夫庶士以及士旅食者庶子皆受獻隸僕人巾車參干二侯之獲者職卑事鋭疑不得與於獻故特著之若量人制燔脯與鬱人舉斚瀝於祭有常職當與卿大夫並受主人之獻於適士中若使司馬師與僕隸等同獻於侯側則非其倫矣洗觚升實之降獻釋獲者于其位不近酌獻獲者之尊而實之於堂上則别設獻獲者之尊以祭辭稱不寧侯不可與堂上同尊益明矣司射倚扑于階西適阼階下北面請射於公如初再射升堂而後請特見於經此如初謂如初之請於階下耳反搢扑適次命三耦皆袒决遂執弓序出取矢司射先反位方命三耦取矢即反位與再射異何也再射司射之事皆在次中三射則事在庭中不得不先反位也再射時大夫羣士始即事恐其或愆於儀故就次中監視之至三射則次中之儀皆前見矣而諸公卿始繼三耦而出就楅與衆耦同拾取矢司射命三耦後宜先反庭中之位以待事且再射止見大夫庶士次中之儀而未見其取矢於楅之儀至是始一一監視之三耦既拾取矢諸公卿大夫皆降如初位與耦入于次三耦本在次中諸公卿大夫之初位亦在次中既曰如初位又曰與耦入於次義不可通必傳冩者誤倒其文也若作諸公卿大夫皆降入於次如初位與耦皆袒决遂云云則理得事順而辭意亦坦然明白矣敖氏謂入次有淺深據經文所書亦無以見其然若士與大夫為耦士東面大夫西面再射言為耦之上下三射言所面之東西互見且相證也士與大夫耦再射即有之而至此始見以君射之儀賓與諸公卿大夫升降進反揖讓之數具詳於再射禮重文繁無暇及士與大夫耦之末節故補叙於二射亦列事之儀法宜然公樂作而後就物稍屬再射於授矢言稍屬三射於樂作言稍屬蓋以君之血氣有强弱志慮有緩急且無暇專勤藝事故四矢之行不過與拾發之節稍相屬而已求以疏數如一不可必得也不過與鼓樂之節稍相屬而已求以循聲而發不可必得也故少寛之亦所以使自循省而知職任之重且大也公又舉奠觶唯公所賜若賓若長以族於西階上如初合燕與大射觀之凡曰酬者公先自飲也曰賜者即以其爵賜也凡言賜者皆無先自飲之文燕禮為公卿舉旅曰酬為大夫舉旅始曰賜蓋事主於燕時寛而禮可備也大射為公卿舉旅即曰賜事主於射時蹙而儀當略也賓已受酬而為公卿舉旅復言賜賓者若賓如子産叔向為一國之望則公或再賜爵以風有位而公卿亦以下賢為樂也為大夫舉旅仍曰若賓若長者如再舉觶以賜公卿則三舉觶或仍以賜賓也燕禮為大夫舉旅在未立司正之前以工歌之後隨立司正説屨升堂即閒有射事亦用以為歡其禮極簡觀大射旅後復射之儀可知自當繼公卿而舉旅於未安諸臣之前以别於羣士大射則大夫志專於射必俟射畢舉酬然後理得而其心可安也公卿即不與射而廟有著位事有秩節大夫則射不中者不與於祭庶子正徹公俎王朝庶子下大夫二人中士二人侯國正必上士副必下士也徹公俎者庶子正則俎服不之庶子必周官諸子職所作之羣子也服不在王官為下士則侯國必不命之士而使當官之下士設其俎不亦舛乎大夫祭薦受獻時不祭脯醢省其節文俾盡志於射也故三射既畢升堂坐飲而後祭薦士之獻以數多射前無暇及此必待脱屨升堂别有執爵者主人無堂上之事而後可徐徧耳乃薦司正與射人于觶南北面東上司正為上司正即大射正也司馬之事與司射等而不與於特薦以大射主於習禮觀德而義不兼於立武也司馬且不與况司士與執幂者疏謂文不具非也按上下經文似羣士皆受獻立於東方而後徧薦焉司正射人執射政之總故獻時獨薦於觶南以優異之猶燕禮之主人士也而與大夫同薦舊説俱難通燕以示慈惠故并及司士與執幂者大射以辨名位程德器故惟射人特薦義之宜也主人就士旅食之尊而獻之鄉射之射事及獻薦弟子所共實多國君官備燕與大射獻酬射事皆官共之庶子惟設折俎弟子惟洗射爵酌奠而已庶子執事有列而門内無位士旅食者一無所事而位在士南特為設尊繼士而獻則為升於司馬之士司馬作之以從㑹同賓客者無疑矣蓋士旅食者及庶子即他日之命士卿大夫也猶鄉射之弟子即他日之學士可賓興者也使之觀禮則志氣有所感興使之習事則政法日以練達所以成其德達其材者即於是乎寓焉至於祭祀之有旅酬所以盡主賓之敬又以使族婣鄉黨情意周洽而潛消其怨争鬭辨之萌燕大射之有旅酬所以溥君公之恩又以使少長尊卑分誼詳明而即是為協恭和𠂻之本聖人縁情制禮徧布周宻本末兼該而一以貫之如此燕禮有士旅食而庶子弟子不與焉何也射節禮容威儀辭命莫詳於大射乃庶子弟子所未見而宜早知者燕則君臣相樂惟將仕者使觀禮可矣賓升再拜稽首公答再拜賓坐祭卒爵再拜稽首公答再拜燕禮公答賓主人媵爵者卿大夫皆再拜大射皆一拜惟答賓前後兩再拜於飲射爵見救過之道在自下於賓媵觚見禮賢之儀當厚終也然賓始升及卒爵答再拜而奠爵仍答一拜輕重之衡寓焉外此惟始媵觶者卒觶後答再拜以此觶乃代公飲酬爵也無算爵受賜爵者答再拜以受者非賓則公卿亦禮厚於終之義公坐取賓所媵觚興惟公所賜士不得升坐獻與酬必俟卿大夫升坐之後等威之辨嚴矣而公為士舉旅坐取賓所媵爵興而授爵酌膳敬禮不殊於公卿大夫此士之報禮所以至於忘身亡家也所賜者興受爵降席下奠爵再拜稽首公答再拜公為賓舉旅再拜稽首公答一拜則為卿大夫舉旅皆答一拜可知矣而無算之受賜者獨答再拜示君之待臣宜厚於終也猶燕禮公命徹幂公卿大夫皆降拜稽首而不復升拜示臣之事君於終彌謹也儀禮析疑巻七
