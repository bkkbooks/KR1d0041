body:
  text: 儀禮析疑卷十一翰林院侍講銜方苞撰喪服儀禮十七篇自漢唐以來皆以為完書余幼讀喪服傳至尊同則不降覺反之於心實不能安而無以詘之及見漢書王莽傳居攝踐阼稱明堂位以定其儀而二戴所述皆無是篇乃知為莽歆所偽造故當時不敢顯布其書至東漢馬融始與呂氏月令並增入禮記也厥後治周官凡為後儒所指摘病民盡利悖情逆理者皆若為莽之亂政開其端兆循是以剃芟之則五官所列無一非運用天理即乎人心者乃悟尊同則不降亦莽歆所增竄公孫祿所謂顛倒五經使學士疑惑此尤其顯著者也蓋莽自知為天下所詬詈莫過於稱奉漢大宗之後不服母喪故於喪服傳增竄尊同則不降之説齊衰章則於大夫為祖父母適孫下增為士者大功章則於大夫為世父母叔父母子昆弟昆弟之子增為士者又於雜記竄士之子為大夫則其父母不能主也三條以示大夫士相去一間耳而於父母祖父母之喪紀即有變更况踐阼居天子位奉漢大宗而可私屈為母喪主乎傳之悖謬注疏間亦覺之而於其旁見側出以為尊同不降之徴者則必屈為之説蓋謂經文乃周孔所定不敢置疑不知莽歆欲竄傳記即先增易經文以合之且有全造經文者今取經記傳內涉於尊同則不降者一一剃芟則傳之辭意間涉膚淺而經所列則皆天理人情之自然是乃程朱所未辨正然心理皆同後之君子當切究之左本在下傳疏以下為內云重服統於內以痛心從內發非也母之喪右本在上則痛心不從內發乎苴杖竹也削杖桐也傳經不言竹與桐蓋有爵者或必以其物若農工商賈則取苴之色用削之度可矣土各有宜設無桐竹安得不以他木為之無爵而杖者何擔主也非主而杖者何輔病也傳擔任也為喪主凡事皆身任焉則病必甚然創巨痛甚衆子所同故皆授以杖使自致其哀也童子何以不杖不能病也婦人何以不杖亦不能病也傳婦人謂衆女庶婦不主喪者童子不能病心無主而哀敬有時移也婦人不能病事不及而筋力未嘗憊也傳者首明此義則成人而有童心主喪而不致毁者宜內疚於心而外怍於人矣朝一溢米夕一溢米傳敖氏引小爾雅一手之盛謂之溢兩手謂之掬一升也以今之升計一手之盛約一合於古當一合有半是為近之喪大記曰食之無算則既殯以後自朝及夕中間苦飢仍可量進但不得過一溢耳寢不説絰帶傳聖人依人性而作儀莫著於喪禮喪禮至切要者莫如男女各有次不脫絰帶虞後寢有席或脫絰帶正晝則終喪不脫所以清其內行使邪慝無自而萌廬堊室之中不與人坐非喪事不言所以絶其外緣使哀痛不至有間修身者能持此則四端日以充長治家者能謹此則門內由此敦睦為政者能以此防民即孔子所謂齊之以禮之根源也朝一哭夕一哭而已傳敖氏謂哭於次中是也未葬魄體在堂朝夕有奠故見奠而哭既葬主設於殯宮惟朔月月半有奠則哭於次中與階下等也先王之制喪禮所以發人子忠實之心而不責以力之所不能使既殯之後欲如未小斂之哭無停聲不能也既虞之後欲如未葬哭晝夜無時不能也小詳之後欲如未期之朝夕哭於次不能也於所不能而強責之則偽生焉節哀順變而不肖者尚不能從則罰禁間之所謂不孝不弟之刑是也荀卿子曰將由夫愚陋邪淫之人與則彼朝死而夕忘之然而縱之是曾鳥獸之不若也夫安能相與羣居而不亂乎故叛禮者有誅又所以止亂也既練舍外寢傳注於中門外屋下壘墼為之中對外而言猶內門耳疏謂天子諸侯有中門大夫士惟二門而曰中門者以門內外皆有哭位義甚迂且失注意父為長子傳不曰適長何也所辨者身之繼祖與否而不在子之適庶也記曰妾為女君君之長子三年小功傳曰妾為君之黨服得與女君同退君於女君之下而曰長子所以明庶長之服同也然則其以長為斷何也設庶子受重而夭殙者相繼則服有不能持矣或問何如而可以為人後支子可也傳繼父之適不可以後祖以繼父之小宗為重也繼祖之適不可以後高曾以繼祖之小宗為重也百世不遷之大宗則子姓衆多不患無支子以繼之為所後者之祖父母妻妻之父母昆弟昆弟之子若子傳父舉正統而母黨則詳焉何也正統有重服嫌或同於庶子母黨有徒從嫌或同於前母之子故著之也母之黨然則父之黨無降殺可知矣或問女子子在室為父舊説女子許嫁於旁親逆降蓋據此經惟為其父也然此斬衰之目自宜獨舉其父於父見例則凡喪皆以在室出嫁為别可知矣其或疊遭大故愆期既久舅姑篤老不能更待間有以權制而降旁喪者舍此決無逆降之理布總箭筓髽衰三年不舉此於妻為夫之前何也婦人所異者惟髽與總筓退於後然後知衰裳絰帶杖屨一與男子同而無容覆舉也若冠於前而不覆舉則事義有缺覆舉則文贅不係於子嫁反在父室之後何也小記曰未練而出則三年既練而出則己未練而反則期既練而反則遂之概以髽衰三年則不足以該喪期之變矣三年之文至此始見何也於輕者舉之然後可以包重也或問李光墺曰露紒謂去纚也始死括髮以麻免而以布成服用緦皆去纚而露紒故謂之髽士喪禮丈夫髽則男女同子嫁反在父之室諸經言嫁皆通貴賤其别言適人猶娶之别言有室或授室耳康成謂女行於大夫以上曰嫁據齊衰三月章傳云嫁者嫁於大夫謂行於士庶人曰適人據齊衰不杖章女子子適人者為父母昆弟之為父後者不知皆莽歆所增竄也如其言則嫁於大夫者雖父母之服可降乎公士大夫之衆臣為其君布帶繩屨詩書多言卿士戴記諸侯之大夫入天子之國曰某士左傳晉士起歸時事於宰旅是也曰公卿則似專言王朝之公卿曰公士乃可包大國之孤及列國之卿父卒則為母父殁為母齊衰三年何也不二斬者原母之情而不敢並於父也加以再期原子之情而著其本不異於父也杖之削也絰之右本也取諸天地陰陽以為象焉耳非謂恩義之有重輕也記曰三年之喪如斬期之喪如剡不曰斬衰之喪如斬齊衰之喪如剡也然則父在為母期所以逹父之情而非子之情有所殺便父之事而於子之事無所變也決矣或問則者急辭也但父卒即得為母伸疏引三驗皆不可通有故二十三年而嫁蓋舉父母之喪以為極而未暇記及於並有喪耳如所云必女遭父喪定以正二月父喪既畢遭母喪亦定以正二月然後可強合少有前後即二十五年而嫁矣况喪期二十五月而畢而曰大祥後即嫁其不可通者一也服問注母既葬衰八升孔氏穎逹已辨其誤當為七升説甚具其不可通者二也且是二者皆鄭注非經記惟間傳為母既虞卒哭衰七升與為父對舉正父在為母之服疏於下齊衰期章亦云降服齊衰四升既葬七升而於此章乃云是父服除後乃為母伸之升數其不可通者三也觀曾子問並有父母之喪及君與父母之喪或先或後其禮節母皆與父同何獨於降服則父殁之後猶不得為母伸乎慈母如母慈母如母何也非天屬也婦人同室志常不相得今使字他人之子故重其義以生恩也又緣其恩以起義也或問妾之無子者妾子之無母者父命妾曰女以為子命子曰女以為母傳士之妾子無母理亦宜然注專言大夫未安疏謂必舊有子而今無乃可命養子非也設妾為父母所愛或久故勤勞而為立後以養其老亦情理所宜又或慈良敬慎可託無母之子反舍之而别屬乎母為長子父在為母齊衰期而母為長子三年何也痛先祖正體之摧而與夫同其戚夫斬衰之期內不可以脫衰與父既脫衰子不敢伸母之服以相感動義相發也父在為母父在為母齊衰期何也所以逹父之情而便其事也期之外父居服寢樂作矣而子纍然哭泣於其旁是使父不自克也若父之喪則母與子同戚憂故不慮其相感動也古者大夫有出疆之政則祭必攝期之外祭當攝而廢焉是使父不得伸敬於祖父也然則父殁為母三年何以不慮祭之廢子以哀而不得伸敬於祖父情也以子之哀而使父不得伸敬於祖父是傷父之志也然則後世加以三年易以斬衰而衆安焉何也古之為喪也責其實後世之為喪也侈其文古者服有厭降而居處飲食一如其常期是文雖屈而不害其實之伸也若實之亡而徒以三年為隆是相率而為偽也父母何别焉又况斬齊苴削象於外以為文者乎或問妻為妻齊衰期何也古之為夫婦者嚴於始而厚於終故三月而後反馬微不當於舅姑而遂出焉其能成婦順則父母得其養兄弟姑姊妹得其親三黨得其和子姓得其式夫苟亡常以死責之其擔負至死而後弛故於其喪服以期而非過也然則一同於母乎妻則期之外寢可服樂可作矣母則居處飲食猶三年也漢戴德喪服變除天子諸侯庶昆弟大夫庶子為其母哭泣飲食居處思慕猶三年也何以知其然也諸侯絶期而公族有死罪素服居外不舉不聽樂如其倫之喪况所生之痛如斬者乎大夫之適子何以不降其妻也舅姑為之大功則去期近矣祭之宜攝而廢也僅矣或問出妻之子為母出妻之子為母與父在為母同何也父之匹敵身之所自出也雖去父之室服不可降於期然自是而終矣其無别於父之存殁何也為父後者無服則祭可攝矣義既絶於父雖逹子之哀而不慮其相感動也其為外祖父母無服何也從服也母出則無所從矣轉而服繼母之黨矣别記曰妾從女君而出則不為女君之子服用此見婦而不婦不惟自絶於舅姑且絶其子於已之父母不惟自逺其子且絶其子於娣姪雖終於父母之室而終身怍焉所以重懲婦行之放佚而使不敢犯也或問以義權之以期為斷及出而他適者也若終於母家及惡疾則服止於期而居處飲食哭泣思慕則三年其哀痛宜視母之考終者有加焉妾子於生母之棄絶而不改適者亦然惟不事父母與淫佚則宜無服而心喪期年蓋為父之罪人且悖於人道惟心喪以志生育之私恩可耳出妻之子為父後者則為出母無服傳父沒無服以有服則不可以祭故伯魚為出母服期孔子得以權制也母之恩而可以無服者君之庶昆弟於生母無一日之服而居處飲食哭泣思慕猶三年凡降絶之服視此繼母嫁從為之服報繼母嫁從為之服期何也此以權制使背死而棄孤者無所逃其罪也夫無大功之親相養以生守死義也而孤則無與立矣嫁而以從於死者猶有説焉故母子之恩不可絶也古者同財相養何以不及小功之兄弟聖人不以衆人之所難者望人蓋專其責於所親也因母嫁而從者無文何也其服同也何以知其同無可加也或問何以期也貴終也傳於妻之義雖未終而於母之恩為有終故子不可不終其恩也世父母叔父母父在為母期而世母叔母亦期母為衆子期而夫之昆弟之子亦期何也恩之所難屬也故重其義以維之幼失父母舍是無依也嫠而獨舍是無歸也故非其母也而母之所以責母之義也非其子也而子之所以責子之義也記曰叔母世母疏衰踊不絶地又曰叔母世母故主宗子食肉飲酒故知責以義為多或問大夫之適子為妻大功章適婦通士庶人服問君所主大子適婦即此傳亦通上下而言大夫之三字乃莽歆所增竄父之所不降子亦不敢降也傳庶婦服見小功章敖氏謂降而無服誤也若無適無長而庶子為父後記所謂為君母後者則其妻當與適婦同大夫之庶子為適昆弟兼言弟者庶子不得為父後無適長必以次適傳重故庶兄亦無服期而不降也周道適子死則立適孫適無孫則必以次適承父後蓋大夫兼孤卿或有賞田賜邑應嗣宗職故未仕者於君夫人太子服士服傳所謂門子記所謂正室自不容以庶長繼承也李清植曰天子諸侯為適長服期則羣王子羣公子於適昆弟亦服其本服可知專言大夫者以為君之長子特見於下經也適孫適孫為祖父母三年而服以期何也三年者代其父也原父之心致痛於尊者之惸獨無終極也故纍而相承雖高曾無殺焉適子之服既三年矣原子之心見父母之致哀於卑者惟恐其或過也故適孫以期斷此先王所以逹人情權禮義而不可損益也曰適孫而不曰祖為適孫故知祖母同夫承高曾之重則妻何服凡祭必夫婦親之父卒為祖父後者斬則妻從服如舅姑可知也高曾視此矣然則母在宜何服原祖之情不忍以孫之亡而逺其婦緣婦之義不敢以夫之亡而逺其祖則服如舅姑可也然則婦姑同服可乎義之重均則高曾之服同齊衰三月恩之輕均則從祖父母諸父昆弟同小功安在婦姑不可以同服也適孫婦服不見經何也文脫也適父不為舅姑後降而為小功則適孫婦為後者加而為小功可知矣注謂適婦在則孫婦不得為適亦禮意也凡祭必夫婦親之孫為祖後其婦從焉適婦嫠不與於祭凖以有適子無適孫之義則失之矣三條皆或問為人後者為其父母報何以不得比於衆子而不杖也既為人後舍晨昏之定省復就其兄弟而居堊室則所後者難乎為情杖於所後者之側尤難乎其為情也既殯之後當有事則往事畢而旋歸使旋杖而旋釋之則於禮為虛而比於慢矣為人後者為其父母昆弟姊妹適人者之外服不見經何也以親兄弟之子而相後則三者之外服皆同也以是知古之立後親者盡然後取於疏所以則天經而定民志也或問為人後者孰後後大宗也傳疏據何休説謂小宗無後當絶小宗子之繼父祖者父為之斬而忍聽其絶乎大夫之庶子為適兄弟不降而忍聽適長繼父祖者之絶乎公羊高傳春秋於祭仲衛輒大亂君臣父子之義而何休篤信之則其心之蔽陷宜矣尊者尊統上卑者尊統下傳敖氏專以天子及始祖所自出諸侯及其太祖言似偏大宗百世不遷則其尊之所統者逺小宗高曾遞降則其尊之所統者近不曰逺近而曰上下者曰上下則由高祖等而上之以至於始祖所自出等而下之以至祖禰皆可通直曰逺近則諸侯之祀太祖卿大夫之干祫及其高祖不可以言近矣下記曰太宗者尊之統也正申明此義而敖氏乃云與大宗為族人之尊統者義不相關特假此以發明之殊不可解婦人不二斬也傳疏據雜記與諸侯為兄弟者服斬謂婦人為夫并為君得二斬婦人為舅姑期則於君更無加隆之道大夫為君居廬士居堊室庶人齊衰三月尚有等差而婦人之從服乃加隆於父母舅姑其義何居賈氏蓋未逹於與諸侯服斬及昏義為天王斬衰皆以命夫言而未可以槩其婦耳為夫之君期經有明文而孔穎逹戴記外宗為君夫人猶內宗也疏亦云於君服斬蓋唐之學者篤信鄭學迷誤至此試思國君之女兄弟嫁於諸侯或鄰國之大夫而為兄弟服斬何以對其夫與舅姑周官大喪具列外命婦之哭位喪衰則后有服甚明而此疏據鄭注謂臣妻於夫人無服尤不可解婦人雖在外必有歸宗傳謂出於父殁後必歸其兄弟之為後者繼父同居者繼父同居者服期何也所以存孤而使人不獨子其子也鳦之喪其故雄者常護其子而卒莫能容非其族也能卵而翼之有父道焉故正其名重報以教民厚也古者大宗收族而禮文復具此何也人事或有所窮也如單微轉徙之類或問夫死妻稚子幼子無大功之親傳妻雖稚而子有大功之親子無大功之親而妻之齒非甚稚皆可以立孤注乃以未滿五十為稚謬矣為夫之君疏謂臣妻於夫人無服溺於鄭注而未嘗詳考經傳也周官大喪辨內外命婦之服位者不一而足司服職為后服齊衰服母之義也戴記服問外宗為君夫人猶內宗也則臣妻為夫人服明矣古者男女之辨至嚴故嫂叔無服而羣臣為君斬為夫人齊視猶父母也而其妻反不為夫人服其義何居姑姊妹女子子適人無主者女子適人而無主者不為父母斬何也父母之於女服可加者仁之通女之於父母服不可加者義之限也服過於期則疑於去夫之室矣然則姪與兄弟之期何以報也期其本服也小功皆在他邦加一等况適人而無主後者於其兄弟乎故加期以報而無所嫌焉耳或問妾之事女君與婦之事舅姑等傳夫於貴妾緦而女君則無服何也娣姪有親疏同室有久近恩義有淺深而或間以異姓宜各以其等為心喪而服不可定也夫則極於緦而以貴為凖又所以間私情而正家則也或問敖氏謂娣姪親疏不同則其服亦異是也又云當以出嫁降一等服之則未安小功皆在他邦加一等不及知父母與兄弟居加一等娣姒婦以同居室中生小功之親則娣姪從嫁恩當有加而服不得反降明矣苞兒時見黃岡杜先生濬謂先君子曰堯舜亦不能無過使二女共事一夫不有傷於羞惡乎先君子曰周公制禮國君以上媵必以娣姪士大夫則聽之詩曰問我諸姑遂及伯姊蓋以御敘有期各當其夕於義無傷而所全甚大每見鄉里間嫡妾相忌害如仇讐異母之兄弟鬩牆者十八九使能用周公之禮則和睦之風式於閨門同氣之好延及子姓人倫為之厚禮教為之明矣古者后夫人無子嗣立者先左右媵所以定民志遏亂萌端由於此杜先生作而曰微子不能正我之過言婦為舅姑婦為舅姑齊衰期何也稱情以立文其情適至是而止也婦之痛其舅姑信及子之半可以稱婦順矣其義之重比於孫之喪其祖不可謂非隆矣虞杖不入於室祔杖不升於堂謂可以舍杖而仍焉是作偽於其親也婦為舅姑後世易以斬衰三年將責以誠乎抑任其偽乎此以知禮非聖人不能作也或問女子子為其祖父母正統之服不可入大小功九月以下無齊衰故女子已嫁者無可降也三月以上無齊衰故曾祖父母無可加也大夫之子為世父母叔父母子昆弟昆弟之子姑姊妹女子子無主者為大夫命婦者唯子不報説者謂周人貴貴故服有厭降而尊同則不降非也夏殷忠質禮節未詳如五服之外同姓可婚之類至周公制禮然後貫通事理曲盡人情古者喪三年不祭唯祭天地社稷越紼而行事天子諸侯所承之統大使用卿大夫之禮期大功廢祭則祭之得行者僅矣不敢以旁親卑幼之喪而廢宗廟百神之祀猶不敢以親喪而不親天地社稷之祀也卿大夫則必降焉而後可承王事與國事記曰既葬君言王事不言國事大夫士言公事不言家事君既葬王政入於國既卒哭而服王事大夫士既葬公政入於家既卒哭辨絰帶金革之事無辟也大夫之適子必從降而後可攝祖禰之祭大夫之庶子公之昆弟必從降而後可以為尸皆事理之不得不然非貴貴明矣惟君在庶子不服其母似為君與夫人所壓然觀公妾大夫之妾於其子得伸則庶子非以貴壓而義起於為尸可見矣此節乃莽歆所增竄宜削之蓋公之庶昆弟大夫之庶之為母妻兄弟已降列大功章母且降則世叔父母以下不待言矣試思母既降為大功而於庶妹庶女之嫁於大夫者則加期設同時而喪屆期將除母之服而留庶妹庶女之服乎設同時而有數喪諸姊諸姑之嫁於士者皆降為小功而庶妹庶女兄弟之庶女嫁於大夫者反服齊羣聚於喪次不識其心何以自安又何顔面以對降為小功者之戚屬乎門人問濮議朱子曰試思仁宗濮王同坐於此英宗侍側終不成皆唤為父便知道理不可如此悖理逆情害義傷教敖氏辨其謬誤甚詳但未知其為增竄耳大夫為祖父母適孫為士者祖父母適孫已明著於上經而復竄此以為尊同不降之證如其言則祖父母之為庶人者亦降矣此與堯及瞽瞍北面而朝舜荒謬略同而先儒莫辨蓋以儀禮早列於學官疑其為完書必周公所手訂耳不知莽招羣士記説逸禮於庭中正為欲增竄無稽之言於既列學官之書使學者疑為庭中所記述耳妾不得體君得為其父母遂也傳敖氏謂女君雖體君亦未見有重降其私親者是也莽不欲為母服歆上議曰禮庶子為後者為其母緦傳曰與尊者為體不得顧其私親攝皇帝奉漢大宗之後不得顧私親故又竄為此傳以示妾不得體君故得為父母遂與攝皇帝與尊者為體不得為父母遂反對也寄公為所寓失地之君不宜遽與民同而特制此服俾守宗廟社稷者知一旦可降為鄰國之庶人而慎乃有位也孔子對哀公曰君出門而望亡國之墟必有數蓋焉平明而聽朝諸侯之子孫必有在君之庭末者蓋國君敬懼之心惟此可以發之宗子之母在則不為宗子之妻服傳疏母在年未七十則自與祭故族人為之服非也祭必夫婦親之故舅沒則姑老冢婦所祭祀賓客每事請於姑則宗子之母不得與祭明矣族人所以為之服者雖不與祭而族人合食及將嫁之女教於宗室領之者必宗子之母其妻不敢代也考工記內鎮必宗后守之不曰王后而曰宗后以王后雖承祭而內治必一稟於王之母若大母耳為舊君君之母妻既列為舊君君之母妻而後復重出舊君何也舊君之服本為去國者設若在國則宜曰先君此經兩列舊君之服所以該事之變也此傳云仕焉而已者謂以罪廢服已褫爵已奪而等於齊民故不敢與士大夫同服注乃以老疾致仕者當之則悖矣以老致仕則君之禮必將有加焉以疾致仕則君之恩亦必無改焉其於君夫人之服宜一同於有位者雖不能廬於君之宮當持服於家一如其常期惟以罪廢則不敢君其君故易先君而稱舊君以别之何以知非為去國者以為君之母妻決之也首列此條以身雖廢黜而尚居父母之邦也故身在外而妻與長子在國者次之是田里未收反不反未定者也獨舉舊君者終焉是終去不反而妻子亦徙家者也故惟服舊君而君之母妻則無服焉身服舊君而妻及長子則不服焉蓋必分而為三然後事義明而言之倫序不失耳或問庶人為國君康成據此謂圻外之民為天子無服非也曰國君者以明大夫君則臣有服而民無服耳周官太宰職以九兩繫邦國之民一曰牧以地得民則雖諸侯不過為天子之繫屬此民與師長主友之屬等而謂侯國之民不為天子服不亦悖乎喪期之變自漢文帝始詔曰令到出臨三日皆釋服母禁娶婦嫁女祠祀飲酒食肉則漢文帝以前天下之民皆齊衰三月不得嫁娶祠祀飲酒食肉明矣妻言與民同也長子言未去也傳命婦為君期以夫既去國故與民同觀此則大夫以老疾致仕者其妻仍以命婦服君夫人而傳所云仕焉而已者乃以罪黜益明矣大夫之適子為君夫人世子如士服則以老疾致仕者其長子仍從士服亦於此可見矣大夫既去而妻子尚留與民同服則從徙於異國於舊君君之母妻世子皆無服可知矣蓋即未遽受職於異國亦不敢以逐臣之妻子而服舊君及君之母妻世子也惟大夫於君不忍不反服耳曾祖父母喪服不及高祖何也與曾祖同也何以知其同無可殺也何以知其非無服也未有旁服以是屬而反遺於正體者也服之有差所以責其誠以義則高曾等重而恩亦未見其有差也後卋易曽祖為五月高祖三月而例以小功緦麻之月數未逹於先王稱情以立文之義也或問君掃其宗廟傳掃注疏誤歸宜從石經宗子去國庶子為壇而祭則歸其宗廟於何人哉主祭者出其留者不敢辟廟門故君命有司春秋掃除示望其歸守先祠以相感動耳曾祖父母為士者如衆人曾祖父母非宗子之比也宗子疑可降故既列衆人之服復言大夫之不降正體相承設遭變故雖天子諸侯亦無降服之理不宜於大夫轉以為疑且曰為士者則為庶人者遂降而無服乎抑易以他服乎凡此類皆以為莽事比證而不知其偽亂之迹即此可按而不能匿其情矣女子子嫁者未嫁者為曾祖父母齊衰則無以易三月又不可損益也故嫁與未嫁同傳注甚無味敖氏辨之並宜刪子女子子之長殤中殤古之詳於殤服何也先王之制喪禮一以哀死一以衛生也悲哀志悶氣盛故袒而踊之所以動體安心下氣也水漿糜粥量而後納恐其有所滯壅也哭泣奠告所以致其思慕也蓋必備其禮逹其情而後哀可節焉人之愛其子也於所親為甚服可除其情不可抑而絶也故子婦之愚蠢者乃過時哭泣以傷長老其敬順者或攝隘以傷其生用此知古之道所以達人情之實而不可易也或問夫之昆弟之子女子子之長殤中殤為兄弟之子女子子之殤無文而於妻見之何也不可以先叔父姑姊妹之殤也然則子與女子子何以可先於叔父姑姊妹也人情於子之殤其哀心多過於叔父姑姊妹故首舉之以示喪服之制皆以責人情之實而不可偽也於妻之從服列之則所從者不待言矣公為適子之長殤中殤國君絶期而為適子之長殤中殤大功何也痛先祖正體之摧也用此見父為長子三年通乎上下或問大夫為世父母叔父母子昆弟昆弟之子大夫為世父母叔父母子昆弟昆弟之子何以降而大功也殺其文以便事也齊衰之重次於斬期而杖者雖公門不脫焉不杖者脫衰而仍絰焉八者之服至衆也不降則不可以服王事與鄰國之事矣先王制禮貴者恩每隆哀每篤是故百官備百物具不言而事行者扶而起言而後事行者杖而起謂以尊而降其親非禮意也然則尊同者何以不降也此莽歆所偽亂所謂顛倒五經使學士疑惑者也或問大夫之子大夫之妾所不降者已見於齊衰而大夫所降尚未見於經以降為大功宜於大功正服見之也自莽歆於齊衰章竄入為祖父母適孫為士者一條此節又增為士者三字疏皆曲為之解而康成無主則其心必有疑焉天理之具於人心者終豈能蔽哉公之庶昆弟大夫之庶子為母妻昆弟大夫之庶子公之昆弟何以降也為為尸也卿大夫將為尸於公未受宿有齊衰內喪則廢是以降而大功也古者尸必以孫無親者然後以其屬傳曰公子厭於先君之餘尊信乎非也公妾大夫之妾為其子與父母皆不降則服之降非以尊厭審矣妾得伸以不與於祭焉爾大夫之庶子為適昆弟不降父之所不降則祭與尸皆無事焉爾庶子之子為父之母服不見經何也大夫之庶子父在為母服大功父殁則其子從服而每降焉可知也不嫌於以之配祖而卑其祖與庶子父殁為母三年不嫌於以之配父而卑其父也先王制禮恩與義並行而不相悖别記曰有從輕而重公子之妻為其皇姑則君夫人在既以正其姑之名而服以婦之服矣庶子得服母之黨庶子之子乃不得從父而服父之母乎二條皆或問獨舉大夫之庶子以適子於母妻不降庶子從父而降兄弟則適子之降不待言矣先君餘尊之所壓不得過大功也傳君在則羣公子當為祖尸其數少故雖母之喪無服先君殁則君之昆弟當為曾祖尸其數多故正期可伸而大功以下降義起於為尸則皆有倫次曰先君餘尊之所壓則大夫不聞壓其子何為與公之昆弟同降乎大夫之庶子則從乎大夫而降也傳大夫之庶子從而降以祭或宜攝也攝主不厭祭不旅不假不綏祭不配其辭於賓曰宗兄宗弟宗子在他國使某辭以是知有出疆之政則祭必攝也春秋傳大夫聞君之喪攝主而往雖與曾子問不合足徴以公事出疆祭必攝無子然後攝以兄弟祭禮嗣舉奠喪服大夫之子為君夫人世子如士服故知無子然後攝以兄弟大夫之祭內喪齊衰大功皆廢期雖降祭仍不可得而攝也期降而大功然後大功可降而小功也匪是則祭之得行者僅矣殤之期再降而小功亦此義也或問皆為其從父兄弟之為大夫者伯叔父兄弟姑姊妹皆降而從父兄弟之為大夫者不降此奴𨽻所不能平也而聖人制為典禮乎大夫之妾為君之庶子大夫之三字竄入刪女子子嫁者未嫁者為世父母叔父母姑姊妹未嫁者三字亦竄入蓋欲見許嫁於大夫即逆降其親屬以示禮辨貴賤若此之嚴以為莾奉養皇太后不得私服其母之徴也注疏謂何以大功也三句當在上大夫之妾為君之庶子下脫誤在此得之但未知未嫁者亦莽歆所增妾為君之黨服得與女君同傳惟此傳前後皆莽歆增竄二句為經傳本文賈疏及敖氏亦覺其悖謬可徴心理之同妾為女君君之長子三年何也婦人之性惟猜妬為難化也故以禮明彰其義而潛移易焉一人有子三人緩帶所以同其喜服為女君君之長子三年所以同其憂如此則女教明家和理而下型於兄弟矣婦為舅姑期其情適至是而止妾為女君君之長子三年將責以誠乎責以誠也舅姑以考終常也長子死家之大變也先祖之正體摧君及女君痛如斬而不與同其憂非事人之道也其曰女君君之長子何也無適雖庶長不可殺也或問大夫大夫之妻大夫之子公之昆弟為姑姊妹女子子嫁於大夫者君為姑姊妹女子子嫁於國君者大夫為世父母叔父母子昆弟之子已前見則其妻與之同服女子子已在其中矣公之昆弟大夫之庶子為母妻已前見此補所未見宜舉昆弟昆弟之子而後及姑姊妹女子子莽歆欲實其嫁於大夫之説故專舉姑姊妹女子子而併大夫大夫之妻大夫之子公之昆弟混而同之竟忘大夫之子公之昆弟於昆弟昆弟之子之降服不宜竟不見於經又忘大夫之妻於姑姊妹宜降在小功而與女子子異先儒皆習而不察耳若果行此則於不降者為附勢為過情於降者為寡恩為愆義國君卿大夫父子兄弟戚屬之間離心離德瑕釁百出而禍亂隨之矣莽匿情悖行至末年妻子皆怨叛其明徴也為王事國事而降為攝祭為尸而降乃人事之匪是則窮天理之反心無愧者降服者不飲酒食肉御內本各如其喪期經傳可徴人心允愜自竄入尊同不降諸條前儒詁經皆以為貴貴而王事國事攝祭為尸之實義蔽晦以終古賊經誣聖莫大於此學者宜審思焉期之喪逹乎大夫中庸有明文古書中未有言天子諸侯為旁親之期者上下各以其親檀弓已辨其為古禮春秋傳所云為王姬服乃魯莊公之慝禮耳諸侯之子稱公子公子不得禰先君公子之子稱公孫公孫不得祖諸侯此自卑别於尊者也若公子之子孫有封為國君者則世世祖是人也不祖公子此自尊别於卑者也是故始封之君不臣諸父昆弟封君之子不臣諸父而臣昆弟封君之孫盡臣諸父昆弟故君之所為服子亦不敢不服也君之所不服子亦不敢服也傳此傳當繫公之庶昆弟大夫之庶子為母妻兄弟下以竄入諸條簡錯在此繐衰者何以小功之繐也傳小功布十升以上此四升半以同小功布縷之細故曰繐衰裳諸侯之大夫為天子康成據此傳謂諸侯之大夫以時接見於天子故為天子服而士無服不知繐衰七月在大功之下小功之上則士服繐五月以别於庶人之齊衰三月無疑矣大夫有雖聘俯而不得接見天子者行人職小客則受其幣而聽其辭是也士有從君而王朝且任之以事者掌客職凡作事王之大事諸侯次事卿次事大夫次事上士下事庶子是也使從君朝覲適遭大喪卿大夫繐衰庶人縞素而士獨吉服不惟不可以列朝夕哭位即行於道路出入於客館亦顔面無所容而大駭入臨者之視聽矣諸侯之大夫以時接見於天子傳傳以接見天子為義已失經指注疏遂謂士庶人無服又云大夫未聘於天子者亦無服悖謬極矣天崩地拆凡食土之毛者無不為之變豈惟義不可以苟安即情亦不能自已唐堯之聖百姓如喪考妣宋仁宗崩深山窮谷莫不悲號尚云恩德足以感人周自幽厲以後王澤既竭而衛詩曰伯也執殳為王前驅秦詩曰王于興師與子同仇以此知天澤之義乃民生而自具之本性也天子之喪而諸侯聽其臣民不為一日之服尚可望以敵王所愾乎尚可教以親上死長乎漢唐諸儒治經雖勤程朱既作取其不當於理者辨析而更易之誠懼經之本指以之蔽晦况害義傷教如此其甚者乎諸侯之大夫為天子服世子誓於天子而不為天子服何也古者繼世以象賢故君薨子承嗣三年之喪畢類見於天子天子錫之命而後其位定未類見視天子之元士以君其國今父在承嗣與定位不可知故其服不可得而制也古者諸侯覲於天子既事肉袒請刑世子不為天子服皆所以使自戒懼而不忘其事守也然則無變乎喪之通禮父有服宮中子不與於樂則既為之變矣或問小功布衰裳澡麻帶絰五月者小功大功絰同牡麻於殤之降服言澡則正服與大功之不澡可見矣據經文大功始言布帶則齊衰以上皆麻也此經曰澡麻絰帶别記亦曰帶澡麻不絶本蓋以麻為帶也使用布為帶則何本之可絶大功布帶而小功之帶轉用麻何也本齊衰大功之親哀其無受而用麻故經與記特著之倒帶於絰上者如曰澡麻絰帶則似絰以麻而帶仍用布矣大夫庶子為適昆弟之下殤庶子或十年或九年則適昆弟並有服大夫之祭至大功以上始為之廢則兄弟小功之殤似無容分異未詳何故為人後者為其昆弟從父昆弟之長殤本期大功再降而服同必有訛不可強為之説或曰從父昆弟衍為姪庶孫丈夫婦人之長殤男子十六有父道女子十四有母道或凶荒殺禮或孤幼無依先期而早婚既為丈夫婦人疑不當以殤降故著之也必周以前早婚而殤者以成人服之故禮經具此大夫公之昆弟大夫之子為其昆弟庶子姑姊妹女子子之長殤大夫之子又分而為二庶子為適昆弟之下殤尚有服而適子於昆弟之中殤下殤則無之小功不廢祭何故創此悖情逆理之制乎疑亦為尊同不降之證從祖父母世父叔父期則從祖宜大功而服小功何也大功之親皆屬乎祖與父者也從祖則屬於曾祖者也其恩不可強而同且服止於五而窮於緦若從祖大功則三從之緦施於六世矣朱子語類所載乃門人之問非朱子之答也或問從父姊妹孫適人者舊截孫適人者别為一節義不可通蓋從父姊妹及女孫適人者皆降在小功也從母從母之服乃隆於母之兄弟何也與母同生而又同類也故親其姊妹之子常過於舅之親其甥是以稱其情而為之服也或問外親之服皆緦也傳外親服廣外祖父母從母之外無小功故以緦蔽之娣似婦者弟長也傳弟長謂兄弟之友恭也家之乖恆由婦人嫂叔既無服故緣弟長之義而制娣姒之服以教親睦所以內和而家理也春秋傳穆薑稱聲伯之母為姒叔向之嫂曰長叔姒生男似據二婦年大小而曲禮曰坐以夫之齒豈坐則從夫之序以正家則而稱則從已之年以示撝謙與以為相與居室中則生小功之親焉傳古者大功同財而異宮期之兄弟未有異居者以問寢視膳佐餕羣子婦所同也故娣姒婦曰相與居於室中夫之從父兄弟之妻都宮則同而所居分南北東西故曰相與同室大夫大夫之子公之昆弟為從父昆弟庶孫姑姊妹女子子適士者從父姑姊妹女子子在室者已降為大功適人者自當降為小功士當作人傳寫之誤也或劉歆增竄以為尊同不降之證注疏又從而為之辭誤矣尊同不降之説最害義傷教者莫如大夫之子降世父叔父兄弟而於庶子兄弟之庶子為大夫者則不降母降為大功而庶女兄弟之庶女嫁於大夫者服加於母曾祖父母必為士而後服不降是三者於莽事尤為切近莽過禮以奉大將軍鳳因此得舉故忍為此説隱然謂先王制禮於庶子兄弟之庶子為大夫者即加隆焉况世父之尊位冠百僚而主國政乎庶女兄弟之庶女嫁於大夫者即加隆焉况祖姑配先帝為天下母而身受天位於此人者乎雖曾祖父母正統之尊必為士而後服不降則莽之父以蚤死獨未受封其母功顯君之喪以供奉太后而不為之服亦心安而理得矣後之儒者若尚以芟剃此數條為疑是失其本心而自比於逆亂也大夫之妾為庶子適人者大夫之妾為君之庶子大功則庶女適人者自當小功注疏之誤皆由惑於尊同不降之説耳妾為女君之黨女君雖死服不絶而於君之黨則子女而外無延服何也妾雖卑賤愛君之子女不宜異於女君若君之尊親同輩而服延焉則與妻無别矣所以辨微而防其漸也庶婦婦人為子婦小功而夫之兄弟之子婦大功何也報服也姑之於婦則不可以言報夫之兄弟之子婦服不見經何也以婦服夫之世母叔母知其報也何以知其報也旁親之相為服無尊卑皆報或問君母之父母從母傳曰何以小功也君母在則不敢不從服君母不在則不服傳以不敢不服為義則君母不在而不服傷於恩而愆於義矣蓋外祖父母從母不必於己有恩而君母之痛如斬如剡則庶子當與同其憂至君母不在則心實無所感而強為之服義無所處也然則因母死不為繼母之黨服何以與此異也雖與繼母同其憂而服則不可假也假之服則疑於因母之出矣君子子為庶母慈已者慈母如母服至重以子無母母無子也貴人之子自有母以三母有慈己之恩故服加於庶母不宜以父殁異從父昆弟姪之下殤姪字或衍或姊妹二字傳寫遺其一而又訛焉夫之叔父之中殤下殤婦人於夫之叔父之殤猶為之服所以與舅姑同其哀而成婦順也所以助夫之慟而使益篤於同氣也抑於此見夫之兄弟無服為逺同等之嫌故曲禮已嫁而反不與同席而坐同器而食專指兄弟而不兼姑之於姪世父叔父於兄弟之女也有死於宮中者則為之三月不舉祭因是以服緦也傳觀此則大夫之妻大夫之適子從大夫而降專為服重且多而廢祭益明矣君之昆弟大夫之庶子之從降專為尸必以孫而大夫之庶子亦有時而攝祭亦見矣士為庶母父妾之無子者不得稱庶母庶母有服所以篤兄弟之恩義也雖適長亦然貴臣貴妾貴臣乃祖父之室老猶文王世子篇所謂貴宮貴室於已有保持之義者貴妾則攝女君者歟大夫於庶母無服而服臣妾此以義起者猶天子諸侯絶旁期而有三衰為諸臣弔服也乳母注義尚渾疏則專以大夫之子言謂三母內之慈母有他故使賤者代之俱未安備三母而别有食子者國君之禮也食子者本不在三母數中大夫之子未必皆備三母而必有食子者此經所謂乳母是也若士之妻自食其子而或死亡疾病豈能不使人乳至庶人之家有故而代乳則其恩倍篤豈可不以服報乎君母之昆弟君母之父母兄弟妾子皆為之服而不報何也以是知妾子之服乃與君母同其憂而義不起於其父母兄弟也若女君之父母兄弟而使為女之庶子服則不論女之存亡而情無由生義亦無所處以是知先王制禮雖緦小功之輕服亦必緣哀心之感以為之質而非徒外之文也公子為其母練冠麻麻衣縓緣記戴德喪服變除天子諸侯庶昆弟大夫庶子為其母哭泣飲食居處思慕猶三年也彼於天子諸侯曰庶昆弟則父殁後也故曰三年此曰公子則父在時之服也其不食肉飲酒居外寢則不以父之存殁異大夫公之昆弟大夫之子於兄弟降一等觀此記而經傳中本無尊同則不降之文益明矣記皆補經之缺此記自首至妾為私兄弟如邦人皆記禮之變也此條及為人後乃變之尤大者故雖已見於經記仍略舉其要以該衆目如降服中有尊同不降之例則變中之再變且為經文所缺必特書而詳闡其義矣莽歆於經傳遍布增竄而獨於此記遺焉蓋民彞不容終晦故作偽者必有時而自敗露焉耳兄弟皆在他邦加一等不及知父母與兄弟居加一等以事之變而生其恩故不得服其常服也别記曰生不及從祖父母諸父昆弟而父稅喪已則否情之所不屬不可作而致或并其服而去之所以責服其服者之誠也或問戴記専指小功蓋以小功以下為兄弟與不及知父母與兄弟居加一等決之也古者大功同財雖異居而同一都宮則幼室父母與大功之兄弟居者多矣豈能遍加齊衰重服必無大功之親而後依小功之兄弟耳夫之所為兄弟服妻降一等妻從夫而服其親族皆前見於經記惟兄弟無服此約舉其大凡而傳寫者誤衍兄弟二字也庶子為後者為其外祖父母從母舅無服觀此則大夫之子有降服為為尸或攝祭而非以父之尊厭益明矣有死於宮中者三月不舉祭故庶子得為其母緦雖適子亦得為庶母緦以庶母死於宮中祭己為之廢也外祖父母雖尊親而為外喪則祭不廢祭不廢無為脫衰而即事則無服而心喪焉其可矣然則小功而祭不廢者非脫衰而即事乎父族之小功皆自高曾以下一體而分焉者也父母在殯而逺兄弟之喪可往哭即斯義也改葬緦昌黎韓氏曰此謂子之於父母其他則皆無服衛司徒文子改葬其叔父問服於子思子思曰禮父母改葬緦既葬而除之不忍無服送至親也非父母無服無服則弔服而加麻或曰經稱改葬緦而不著其月數似三月而後除也子思則曰既葬而除之今宜若何曰自啓至於既葬而三月則除之未三月則服以終三月可也命婦弔於大夫亦錫衰必於所弔大夫之妻有連或彼此皆春官世婦與之屬公事其夫死不容不弔唁其妻故具是禮何以言子折笄首而不言婦終之也傳傳言婦與子不同宜齊衰惡笄以終喪也女子居父母之喪既練而歸卒哭後何以事暫還夫家故易吉笄而折其首蓋恐舅姑以為嫌與養有疾者易服之義同耳其事畢而還父母家仍宜惡笄禮以權制而旋反其常者類如此疏謂婦人以飾事人雖居喪不可廢修容悖矣考定儀禮喪服附大夫之子為世父母叔父母昆弟昆弟之子姑姊妹女子子無主者為大夫命婦者唯子不報為大夫命婦者六字劉歆竄入削之則經義坦然明白傳曰大夫者其男子之為大夫者也命婦者其婦人之為大夫妻者也無主者命婦之無祭主者也何以言唯子不報也女子子適人者為其父母期故言不報也言其餘皆報也何以期也父之所不降子亦不敢降也大夫曷為不降命婦也夫尊於朝妻貴於室矣無主者無祭主也唯子不報言其餘皆報也傳本文宜止此此傳義悖辭舛全不可通鄭氏止辨唯子不報專主女子適人者之非而不知無主者下增命婦之三字則非命婦雖無主亦降顯與經背况此經本言父族正服之期而兼及姑姊妹女子子無主後者而首曰大夫者其男子之為大夫者也命婦者其婦人之為大夫妻者也使人莫知其所指且于其餘皆報也下忽接何以期也父之所不降子亦不敢降也更不知其義之所屬矣至謂大夫不降姑姊妹女子子之為大夫妻者乃為其夫尊於朝則苟有人心者忍為此語乎蓋經文本無為大夫命婦者六字歆既竄入故復竄傳文而故亂其緒使人莫解正與文王世子篇所增竄周公踐阼等語及莽傳奏議詔誥悠謬恍忽之語略同使果有尊同不降之禮則經文當云大夫之子為世父母叔父母子昆弟昆弟之子姑姊妹女子子之子為大夫命婦者姑姊妹女子子無主者唯子不報其義始明其辭始順以是知為歆所偽亂無疑也大夫為祖父母適孫為士者上經已明著祖父母適孫不宜復有此經此傳莽歆之意蓋謂大夫于祖父母之服尚疑於降而特著其不敢降則等而下之者之降絶無疑矣此皆陰為莽不服其母解爾曾祖父母為士者如衆人為士者如衆人亦歆所竄也正統之服齊衰三月而猶疑於降絶乎不仁人之言其流毒逺矣女子子嫁者未嫁者為曾祖父母傳曰嫁者其嫁于大夫者也然則嫁于士庶人者曾祖父母之服有異乎合下二語皆歆所竄大夫為世父母叔父母子昆弟昆弟之子為士者傳曰尊不同也尊同則得服其親服甚乎哉非莽歆不能為此言也經有為士者之文亦歆所竄也服之有降義别有在與所服者之為士與否何與乎增之以為尊同不降之徴爾公之庶昆弟大夫之庶子為母妻兄弟義别有在傳亦失之女子子嫁者未嫁者為世父母叔父母姑姊妹傳曰嫁者其嫁于大夫者也未嫁者成人而未嫁者也蓋謂許嫁于大夫而未嫁者即逆降其世父母叔父母姑姊妹之服也異哉是之謂人而畜鳴者與鄭氏譏其不辭抑末矣大夫大夫之妻大夫之子公之昆弟為姑姊妹女子子嫁于大夫者其文重出與文王世子篇周公踐阼之疊見同皆故亂其緒以設疑而惑衆也公之昆弟乃以姑姊妹之嫁于大夫為榮乎儀禮戴記而外無言服有厭降者何以知非莽歆所偽竄也事有所窮則禮從而變乃殺其文以便事而喪之實無加損也詳見喪服或問王子有其母死者孟子曰是欲終之而不可得則服有厭降非莽歆所搆造明矣君為姑姊妹女子子嫁于國君者期之喪逹乎大夫封君之孫盡臣諸父兄弟則其服皆絶矣而于姑姊妹女子子嫁于國君者不降聖人制禮乃若是其傎乎儀禮析疑卷十一
