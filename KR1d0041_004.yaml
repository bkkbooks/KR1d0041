body:
  text: 儀禮析疑卷四翰林院侍講銜方苞撰鄉飲酒禮將興賢能其德之蓄行之恆藝之習惟鄉先生教之久知之深故就而謀焉若州長習射黨正正齒位則賓之爵齒德久著於衆無待於謀注謂鄉大夫興賢能不可易也習射正齒位乃平時所以教士故可遵用其禮敖繼公乃謂此士與其同鄉士大夫㑹飲於鄉學之禮誤矣三者皆國政故有司掌之若大夫士會飲無為著於國典亦不宜行於鄉學賈疏謂鄉飲酒義乃黨正正齒位之法不知通篇皆正解鄉大夫興賢能習射正齒位有賓而無介也中間覆舉鄉飲酒之禮五十者立侍以聽政役特約略黨正之正齒位以附之耳至黨正職曰飲酒於序鄉飲酒義曰主人迎於庠門之外不過字形相近而訛或庠序乃鄉學之通稱羣儒辨說紛綸存而不論可也此禮不得為士大夫㑹飲其徵有三先生異爵者請見士必終辭而先走見此則禮辭即出迎以興賢能乃國典上以誠求下以實應無庸辭至再三也鄉大夫戒宿再至其門而不往答以賓興之禮未成不敢預拜其賜也士大夫㑹飲徵惟所欲所徵者宜各自其家而至此則介與衆賓並集於賓之門而從賓以入正以鄉大夫興賢能乃功令非私招不可或先或後耳注謂專指侯國之鄉大夫亦未安蓋冠昏士相見鄉飲酒鄉射乃鄉黨之通禮王畿與列國宜通用之士相見禮附載見國君侍食於君周官司士掌擯仕者膳其摯則雖見天子當無異法惟大射燕聘公食大夫士喪禮祭禮十篇經有明文為侯國之禮耳王朝之射聘燕食諸侯天子之喪祭儀物數度截然不同當别見邦國禮若喪服則自天子達於庶人皆具焉覲禮惟王朝有之而先儒臆決謂前五篇為侯國之禮不知事在鄉黨不獨大體略同即儀物數度亦不容有異即如此篇賈疏據有磬無鐘決為諸侯之鄉大夫不知此非鄉大夫之燕飲也興賢能義起於士士為賓即以天子之鄉老鄉大夫舉之止宜用士禮觀燕雖諸侯舉之而以大夫為賓樂亦無鐘惟大射以有事于宗廟故備金石耳至大夫以上之無冠禮則記已明辨之昏禮攝盛用墨車則雖王朝之大夫亦不容有加矣若孤鄉再娶必廟見之後乃請于君而命之其始嫁亦不得遂乘夏縵夏篆也記曰夫人之不命于天子自魯昭公始周官外命婦之服亦王官共之禮經殘缺學者宜折衷義理而證以羣經不可以舊說自錮也主人就先生而謀賓介先生鄉之致仕而教於黨庠州序者也周官黨正書德行道藝而州長考之以贊鄉大夫廢興其法必二十五家之孰歲升其秀民于黨而庠之師聚教焉是黨正所憑以書其德行道藝而待州長之考者也序之師則時㑹而問試省察焉是州長所憑以考其德行道藝而贊鄉大夫之興者也故三年大比鄉大夫就之而謀賓介即周官所謂使民興賢出使長之使民興能入使治之也古者官得其人而事無不治皆由於此禮終息司正以告于先生君子而始不與君子謀何也鄉大夫致仕者及庠序之師鄉必有之有大德行而不仕者則未易數覯也即有之亦不敢以謀賓介煩其往來酬應觀禮成之後以所興之賢能告而不敢以燕請則知尊賢之體宜然主人戒賓賓拜辱主人答拜乃請賓賓禮辭許主人再拜賓答拜主賓往來無稱拜辱者惟此篇戒宿再言拜辱示所舉不稱恐為舉者之辱也賓拜賜主人報禮亦稱拜辱示功罪榮辱彼此共之也始出迎賓主各一拜既請而許則主人再拜示為國求賢之重使士進身之始即知不可苟於自待也鄉射禮主人戒宿賓不言拜辱而賓拜賜主人答之則稱拜辱何也習射國政也以公事相戒非私禮於賓無為稱拜辱射禮或公士為賓則非其屬也不可不拜其辱而既有此禮即學士為賓亦不容異同蓋其德行道藝異日宜與賓興之選以貴下賢辭過于恭亦所以勵士節也乃席賓主人介不言所席之地何也自聘饗燕射下及冠昏賓席於户牖之閒乃一定不移之位也下文云衆賓之席皆不屬焉鄉射禮曰衆賓之席繼而西則位與賓並明矣下文又云尊兩壺於房户之閒鄉射禮曰尊於賓席之東則尊當房户之中賓席于户西牖東而遵席于尊東具見矣蓋以尊為節三賓則繼賓而西諸公與大夫則相繼而東位正相配地始可容也尊之左右既無地可以席介自當席於西序而與主人相對矣少牢下篇席主人於東序席侑於西序義亦然介之位不繼於賓所以伸賓之尊也不與三賓同列又所以伸介之尊也衆賓之席皆不屬焉鄉射禮衆賓之席繼而西彼州民習射故席相屬以示鄉黨齒讓之風此國興賢能故不相屬以彰朝廷尊賢之義又於此經見鄉射之賓席相屬於鄉射見此衆賓之席亦繼而西也尊兩壺于房户閒房户閒東西之度鄉射禮曰尊于賓席之東則在户外而南北淺深之度具見矣疏冠醴子昏醴婦尊皆在房隱見其質冠醮子及鄉飲鄉射特牲少牢尊皆在顯處見其文非也房中户外辨于賓之親酌與否與酒醴文質何涉乎冠昏洗在北堂故尊於房中以便事也房中北堂皆婦人所有事醴惟一舉使贊者洗酌以授賓於户外可耳醮則三洗三酌賓皆親之使賓數出入於房中北堂則幾于瀆矣鄉飲鄉射獻酬皆在堂階自無尊于房中之義特牲少牢則尸祝賓侑主人主婦之籩豆鉶羮皆陳於房尸之黍敦亦陳焉而主婦宗婦贊者女賓皆立而待事故尊于户外寧使主婦時出而酌獻即長賓長兄弟非獻尸薦俎不得出入于房户况衆賓衆兄弟之獻酬無算而可使入酌於房中乎凡此乃禮以義起顯著而無可疑者不可以曲義汨之見於經傳祭先聖先師及有道有德者皆於國學周官州長以禮㑹民而射于州序黨正飲酒于序以正齒位不聞有祀事韓氏愈云鄉先生沒而可祭于社雖未知語所從出而可知鄉學無祀事而堂室房户略同于廟制何也必如此然後習射習鄉席位禮器陳設具宜而士之升降揖讓及執事于其閒者皆可以預習宗廟朝廷之儀法且州黨庠序之師與學士講習于堂燕休于房而寢息於室亦體嚴而事便也賓及衆賓皆從之戒與速注疏言至賓門而不言其所賓介或取于一黨一庠之中而衆賓散布五州二十五黨之內若戒速于其家不惟異黨異州之士不能羣萃以待于賓之門如賓介各處一偏則亦不能同日而戒况羮定而後速乎其法必州黨之師賓介之當興衆賓之觀禮者前期聚於某州之序而後鄉大夫就問焉及期則賓介衆賓次于近序之庠故可俟羮定鄉大夫躬速而賓及衆賓皆從之也鄉不設學何也鄉大夫以六鄉攝不能親教事且以便學子俾各近其家而省勞費耳主人一相迎于門外再拜賓賓答拜拜介介答拜揖衆賓主賓之禮交擯傳辭故聘禮上介問下大夫尚以三介從鄉大夫國鄉也而一相以賓乃鄉民之秀無擯可陳承鄉大夫之命而相厭以入無辭可傳若陳擯以臨之則非降尊以下賢之義故惟用一相也其不曰擯而曰相以主于相禮非接賓也鄉大夫不可以獨出與賢士接又不可使胥史閒厠故惟以相禮者從賓主獻酬進退拜興之節㑹有目視不能及者皆相者詔之故於出門迎賓特著一相以見凡禮皆相贊也冠昏相見無此文其禮皆目視所能給擯者特傳辭耳祭祀之衆賓半主人之屬吏而主人拜送于門外飲射之衆賓終不拜送始則揖之而使自入何也祭者主人之私事故大夫雖尊衆賓長之獻則交拜焉衆賓之出則拜送焉同之於賓所以報其勤也興賢能教射則國政也賓介乃德行道藝之越衆者故特申其敬屈貴貴之禮以尊賢而衆賓不得與之儕異之于賓所以厲其德行道藝也然皆得獻於堂下而主人汜拜之以其亦後此之賢能又所以别之于有司贊者也敖氏云主人于介亦再拜非也介於戒速禮一同于賓故並曰介亦如之惟迎賓再拜而介一拜故特文以著之蓋戒速于私家故同之以見用貴下賤之常迎于公所故異之以示為國選賢之序義兩行而不相悖也主人揖先入賓厭介入門左介厭衆賓入衆賓皆入門左北上惟鄉飲酒鄉射賓介衆賓有相厭而入之禮何也賓介衆賓皆鄉大夫州長所治所教之士民也故主人先入而相引以從之非主賓之常禮也賓主獻酬交拜無少退之禮亦惟鄉飲酒鄉射有之何也學士見賓禮以致身故重其禮以答主人主人得賢才以報國故重其禮以厲賓也鄉射之禮雖較輕于興賢能然獨立一賓而無介故賓主之交相重不異賓興亦所以淬礪羣士觀示鄉民也君臣之禮更嚴于師長而燕無此儀何也燕禮之主人代君獻也若賓見其拜而少退則疑于當君之禮矣賓之拜拜君賜也若主人見其拜而少退則疑于代君受禮矣故主人之無變乃自比于舉觶賓之無變乃自比于受酬也既曰介厭衆賓入又曰衆賓皆入門左見介引手以招衆賓而衆賓序入不復自相厭也鄉飲酒義至于門外主人拜賓及介而衆賓自入可與此相證賓復位當西序東面但云當西序東面猶未見南北之節也上言賓進東北面辭洗下言主人坐取爵沃洗者西北面則知賓階下之位在洗之南矣蓋主人南面而洗賓宜面嚮之不宜退立其後也主人坐取爵沃洗者西北面沃者西北面以洗者南面也主人南面洗以賓復位當西序東面在洗篚之南也鄉飲酒之洗爵别有沃洗者而鄉射則無之何也鄉射之賓或以公士則州長之匹儔也獨立一賓即取諸州之君子及羣士必德行道藝迥出於衆者主人執自洗之常禮可也鄉大夫則國卿也雖親洗以下賢能而别有沃洗者使衆著於貴有常尊之義也至於冠則贊者洗酌而賓不與以賓乃冠者之父行不惟洗不親酌亦不必親也輕重之權衡蓋如此賓西階上疑立疑當作凝賓西階上拜主人少退獻則主賓皆少退酢與酬皆于拜受爵時少退禮備於初以漸而殺也拜受爵時既少退則拜送爵無庸再退矣主人阼階上拜送爵主人拜送爵轉在賓拜受爵之後何也爵既實而以授人非若未洗之先既受之後可因事之閒而奠之也故受者必先拜而後受授者必既受而後拜雖尊如尸貴如君其禮皆同酬則先奠爵而後拜自酢亦然以其爵乃自飲而不以授人也舉觶騰爵亦奠于薦側而不授蓋燕與大射乃不敢煩君之受而鄉射鄉飲酒因用于賓大夫以致異敬故賓大夫必辭而坐受以示不敢當也賓升席自西方自西方乃不與主人背主人阼階東南面辭洗鄉射燕大射皆賓盥洗而後主人辭惟鄉飲酒主人辭於賓盥之先何也燕與大射膳宰以君命禮賓自當待其盥洗而後禮辭鄉大夫為國求賢故賓未盥而先辭過禮以示下士之誠也若州長習射即賓為公士亦州中有位於朝者則循禮之常可矣賓東北面盥坐取爵卒洗揖讓如初升階下之位主人在洗北賓在洗南故賓辭洗少進東北面而盥洗亦如之主人辭洗西南面而盥洗亦如之主人坐奠爵于序端阼階上北面再拜崇酒賓西階上答拜鄭注辭意蒙晦敖繼公謂賓崇重已酒而飲之既故拜謝之其然則其節宜在賓卒爵主人答拜時無為拜於賓酢主人之後也周官酒正職大祭三二中祭再二小祭一二注疏五齊以祭不敢副益三酒人所飲故就其尊而益注之義取獻酢既畢則尊中酒減而益注以崇之栁宗元文載肉于俎崇酒于觴則唐之中葉學者已不用注疏所詁矣惟賓介有崇酒之文正所謂再二蓋比於中祭也賓介獻酢所減無幾而以此為崇酒之節者旅酬無算爵皆因賓介而及之耳卒拜進坐奠觶于薦西燕大射薦西之酬觶賓時不舉而相授受備其儀以觀示衆人也少牢儐尸之酬爵亦然惟鄉大夫興賢能州長教射則主人奠觶於薦西賓移置薦東而不相授受以當其時不舉則略其儀教士以信直也主人已奠觶賓復遷之以此觶終當取酬主人故更奠以示已受耳主人以介揖讓升拜如賓禮疏言主人與賓三揖至於階時介與衆賓亦隨至階下無庭中三揖非也主人與賓三揖至於階三讓以賓升此時介與衆賓尚在門左繼乃以介揖讓升拜如賓禮則自門左三揖三讓皆與賓同可知矣凡賓主同升有讓無揖此篇及鄉射主人揖升燕及大射賓揖升皆獨升也使無庭中三揖則曰以介讓升拜如賓禮可也鄉射無介主人于衆賓初無三揖是以與賓獻酬既畢然後泛拜衆賓主人介右北面拜送爵主人獻介及答拜皆就西階何也必正主人之位以拜者惟賓一人故禮介必少異于賓又賓介衆賓工笙大師序進為禮而主人遍獻酬使一一反其位而拜不勝其勞故自賓以外漸損趨走之節以息主人也不嚌肺不啐酒不告㫖示禮為賓設而已不敢當也介降洗主人復阼階降辭如初凡自酢多由受獻者自卑而不敢抗敵者之禮以相酢也自酢者皆自洗自酌惟鄉飲之介不敢抗禮以酢主人又不敢煩主人親洗故降洗而後以爵授主人蓋燕與大射主人獻公而自酢則更爵而自洗宜也特牲饋食禮主人主婦交致爵則仍其爵以自酢宜也賓致爵於主人主婦更爵而自酢亦宜也介之義則宜洗爵以酢主人主人之義則不宜洗爵以自酢故其儀獨異焉介降立于賓南在禮離坐離立毋往參焉况鄉大夫興賢能州長教射賓主相為禮而以無事者參其閒則無以為儀故將延介而賓降將延衆賓而介降設不降而凝立於堂以視衆賓之交拜則近於汰故獻酢甫畢即降以自儕於以次而升受爵者主人西南面三拜衆賓衆賓皆答一拜衆賓長而外皆獻於堂下故於堂下遍拜之如賓升堂而主人拜其至也主人揖升坐取爵于西楹下降洗升實爵于西階上獻衆賓衆賓之長升拜受者三人主人揖兼堂下不升之賓故實爵後特言獻衆賓以揭其義既實爵然後賓長三人升拜受耳疏謂一一揖之而升似未安主人拜送不言其地介之獻猶就西階而拜於其右則衆賓可知注云於衆賓右非也主人在堂衆賓在堂下當作賓長衆賓獻則不拜受爵不拜受爵不敢煩主人拜送也獻爵而不拜可乎主人之拜衆賓衆賓皆答一拜正為衆賓儀略故總行拜獻拜受之禮於階下主人三拜所以達其意於衆賓衆賓各答主人所以止於一拜耳衆賓並無拜受爵之禮則上文主人拜送爵乃於三賓之右益明矣主人以爵降奠于篚揖讓升賓厭介升介厭衆賓升衆賓序升即席覆言衆賓序升猶入門時覆言衆賓皆入門左以示衆賓不相厭耳一人洗升舉觶于賓此觶用於樂畢之後而舉於工笙未入之前何也工之升降拜興也艱故歌畢即獻所以達情而便事也衆賓既獻樂宜作矣而賓介與主人酬酢未畢衆賓皆未受酬故先舉後酬之觶以示工先受獻乃禮以權制也工四人二瑟瑟先相者二人皆左何瑟後首挎越內弦右手相左手挎越則弦自向內矣相瑟者以有荷瑟之儀故著之瞽必有相故於歌者不言樂正先升立于西階東燕及鄉飲鄉射樂正皆先升大射則從工師而升何也鄉飲鄉射工與笙之入及獻各分先後燕則中有閒事使從升歌之工師而升則似堂下之樂事非其所掌故先升而並監視之大射惟堂上之工師有獻則從之而升與之俱降以監視堂下之工可矣所以然者燕及飲射時暇則儀可展大射事殷則節必殺觀下管之無獻則其義益顯矣燕及飲射並稱樂正而大射乃小樂正何也大射禮重相工者僕人正僕人師而掌樂事者小樂正則燕不待言矣蓋惟宗廟社稷之祭大樂正乃與焉與周官祀五帝及大神示享先王冢宰贊玉幣玉爵而餘皆小宰贊之義同以事實按之惟鄉大夫興賢或公家之小樂正與焉州長習射必有司假其名以攝事如司馬司射司士之類耳况黨正之蠟祭乎獻工而不及樂正何也長官不得與工同獻也終篇無獻樂正之文何也樂正司正凡有司及弟子並包於衆受酬者記曰主人之贊者無算爵然後與則公有司弟子皆與酬明矣工飲不拜既爵授主人爵祭酒祭薦皆使人相則工執爵而相者以適阼階可知大師則為之洗大師乃為之洗則衆工實爵而不親洗終則使人以爵奠於篚而主人不親具見矣主人獻之于西階上以獻笙見獻工亦於西階上以獻工見獻笙亦於阼階上拜送爵各舉一節以互相備也於笙不言相不言受獻不言相祭義同乃閒歌魚麗笙由庚歌南有嘉魚笙崇丘歌南山有臺笙由儀堂上樂歌具存堂下笙歌皆亡何也樂歌乃學士所循誦雖經秦火口授耳熟笙則有聲而無辭與陔夏同惟矇瞽識之周衰疇人子弟散亡其音調不可復識也若本有其辭則當日何不以笙應詩如堂上之瑟而六篇中竟無一為學士所傳誦哉工告于樂正曰正歌備觀此則無算樂不限於閒合之所歌明矣必於正歌中取之則不得為無算如以疊奏為無算則復而厭矣主人降席自南方側降疏謂主人側降賓介不從以方燕禮輕非也樂以樂賓故主人為大師降洗賓介從遵者為賓興而至故主人迎賓介從若立司正以監酒儀則主人之事主人自命之可矣與賓無與何為而從降哉作相為司正易相為司正者前此雖飲酒而義主於相禮後此雖行禮而義主於謹酒賓筵之詩曰其未醉止威儀抑抑曰既醉止威儀怭怭祭之末尚有跛踦以臨者况獻酬樂備之後乎故以董正為名使皆震動恪恭以赴禮之節㑹也司正洗觶升自西階阼階上北面受命于主人時尚未請安於賓賓尚未許而預洗觶者司正之立本以警怠察儀以罰其不如法者故執觶以請於賓賓既許即實之自飲以為儀法也司正立于楹閒以相拜自主人與相迎於大門之外即主賓交拜而至此始言相拜者前此揖讓進反拜興辭對之節繁相者無不贊至旅酬以後則所相惟拜耳敖氏云凡相拜皆有相之者經不悉見似未安曰立於楹閒則所相惟賓介主人之拜於衆賓曰相旅則呼受酬者而進之不相其拜之辭也司正實觶降自西階階閒北面坐奠觶退共少立燕與大射奉君命以紏儀法故司正奠觶皆南面鄉飲鄉射以屬吏共事於長官之前故皆北面也坐取觶不祭遂飲卒觶興坐奠觶遂拜執觶興洗北面坐奠觶于其所退立于觶南自此以後司正賓主人皆不祭蓋主人賓介衆賓畢飲而以餘酒祭則䙝矣司正先自飲而拜非為酒謝也如謝主人之酒則主人宜答拜蓋自退共少立取觶卒觶奠觶洗觶坐飲拜興退立皆以為受酬者儀法俾既醉而知其秩故主人義不得答拜耳奠虛觶於其所欲衆無失儀此觶終虛而不用也鄉射記射者有過則撻之則飲而失儀罰以觥觶可知矣詩曰既立之監或佐之史必史書其過越日而行法以正日禮殷無暇及此又事分彰疸不宜相干也周官閭胥掌觥撻罰之事則鄉之飲射掌罰者必閭胥經不言行法之地與時必已見於春秋四時所讀之法也燕大射掌罰者亦必别見於邦國禮而今皆無考耳祭祀獻酬尤繁而不立司正以非德性安重而謹於儀者不得與於祭詩所謂奏假無言時靡有爭是也不洗實觶東南面授主人賓鄉民之為士者也以已所飲觶授鄉大夫而不洗何也法之行必自貴者始而後可以畏民志禮之行必自貴者始而後可以感人心度時量事旅酬以後必不能以洗為禮故不洗而授觶自鄉大夫始而興教勸學之誠愾乎上下矣一事之中禮有相反而適相成者賓介相厭以入主人之贊者不與於酬禮之兼乎法以辨名分者也有順乎情以通和樂者拜無不答酬皆不洗之類是也凡此皆聖人運用天理之實也司正升相旅曰某子受酬此專呼受酬者必受之於介無疑也鄉射曰某酬某子或大夫或賓長酬者無定故必目其人衆賓工笙畢獻主人以一人而儔數十人之拜興雖强力者亦倦矣故自介以下酬爵必遞相致然後衆賓有司弟子可遍而主人得自息也後此舉觶皆使人代非惟禮殺亦主人之力不能繼耳辨卒受者以觶降坐奠于篚辨後不言遂酬在下者與鄉射禮異也鄉大夫國卿也以君命興賢能則參用朝廷之禮堂下之賓皆賢能之待興於再舉者故得升堂受酬而有司執事者不與以示國之重典非賢能不得與獻酬也若州長習射黨正正齒位主人位非甚尊而其禮為教法之常其事為少長貴賤所能習故獻酬終於沃洗者以洽衆情而示禮教之無不遍亦所以興起之也若謂與鄉射禮同而文不具則執事者之受酬與否乃禮之大間鄉射鄉飲酒義饋食記公有司私臣皆獻酬宜詳其受酬於此經而鄉射從略以見其皆同非若面鄉行由之小節可以彼此互見而昭然無疑者以此知賓賢能之禮無遂酬在下者之事也祭之末輝胞翟閽皆有畀焉故主人之贊者無算爵亦得與使二人舉觶于賓介俎尚未徹而觶先舉何也脫屨升堂後拜興受送之儀皆不可展惟受爵于公乃拜故先舉觶於賓介以行酬賓介不飲而奠焉至無算爵則仍令二人舉此觶也凡舉爵而奠之必下事更端使請安徹俎之後舉觶而行之於事甚順而必先舉何也君子勸禮則不敢緩求安則不敢急亦三揖而進三讓而升之義也鄉飲則舉觶於賓介射則舉觶於賓大夫示主人不敢專惠且遞酬而交錯主人力不能遍俾得少自休息焉耳二人舉觶不於諸公而於介何也此禮為賓介而舉諸公雖尊乃為觀禮而來自不得主舉酬之事鄉射無介則大夫與賓各舉一觶可矣俎實則特存臑肫以薦公大夫而介薦以胳又以明貴有常尊之義也賓辭坐取觶以興介則薦南奠之介坐受以興敖氏據鄉射禮言介亦宜辭與大夫同特文不具非也鄉飲酒之所興羣士也故凡事不敢與正賓同若鄉射則無介大夫之重過於賓無所嫌而並辭故經特著之介不辭所以尊賓也不舉觶於遵所以尊介也退皆拜送降賓介奠于其所司正所司旅酬之儀也故前此卒受者以觶降奠然後司正可降復位若舉觶者則拜送觶而事畢矣故先降而後賓介自奠觶賓取俎還授司正司正以降惟賓之俎以授司正鄉民之秀者可以出而長之故重其禮以厲羣士也若有諸公大夫則使人受俎如賓禮敖氏據鄉射禮云人亦謂弟子非也鄉射之大夫不過本州中爵列少尊者一州仕者寡習射禮輕故諸公不與故俎授弟子與主人同鄉飲酒之遵者諸公之下尚有諸卿故使公士受俎特異其文曰使人又申之以如賓禮謂如賓之俎使司士受乃公士而非弟子也若使弟子則一與主人介同更無所謂如賓禮者而經贅設此文義無所處矣說屨揖讓如初升坐燕大射但言賓諸公卿大夫說屨升則君說於堂上明矣排闔說屨於户內惟長者一人卿大夫爵齒並尊以興賢能與賓同說屨於階下蓋降爵齒以明尚德之義也無算爵此篇為鄉禮之首而無算爵之儀乃見於鄉射何也恐人疑州長教射不得用鄉大夫之禮故於此篇揭其名而於鄉射詳其事則凡鄉之禮事皆舉無算爵之禮明矣蓋使羣士預習其儀法惟鄉射為宜興賢能三歲而一舉秀民之與于衆賓者亦希蠟祭歲終而一舉以聽政役且與衆為一日之澤耳惟州射則族黨之學士歲再與焉使數與於禮則有所感興而益厲於德行道藝閭里慕之則風教寓焉矣無算樂舊說仍用前歌與閒但疊用數篇周而復始亦比於慢矣疑若春秋傳所載賓各賦詩工以瑟與笙應之其不歌者亦聽以無定數故謂之無算耳以不出太師所陳十五國之風故曰鄉樂賓出奏陔主人送于門外再拜主人禮先於賓者十有三其大節六賓許出迎拜至崇酒立司正拜送皆再拜一拜者惟獻酬耳賓之禮先於主人者十有二皆一拜蓋鄉大夫興賢能士當以道自重不敢重拜疑喜於得舉而翕翕相附也周公制禮教士以難進易退而公卿為國求賢致敬盡禮以相勖厲者可謂切著矣戒速賓介禮同至拜送則介不與焉以是知賢能之書所獻惟賓也蓋介乃德行道藝次於賓而可備後舉者故戒速一與賓同所以異之於羣士也而登於天府者惟賓至於後舉則羣士之德行道藝或有先於介者矣故禮終惟賓得拜送而介與衆賓不與焉又所以儕之羣士俾介與羣士皆有所觀感而興起也鄉射賓出衆賓皆出主人拜送於門外蓋習射乃有司之學政凡在列者皆宜加禮不可以分差等此則送賓而不及介以賓乃所興之賢能而介仍鄉之學士也敖氏乃謂此士大夫私飲於學中之禮固哉主人迎揖讓升公升如賓禮辭一席使一人去之遵者宜先次於門外一人舉觶相者使人告而公大夫遂入主人乃降而迎迎而不拜以遵有主道也必要其節者使早入則主人之禮不得專於賓介故入於一人舉觶之後示衆賓之酬爵既奠禮之連而不相及此類是也去席宜公之從者大夫辭加席義與公辭一席同任其委於席端而主人不徹則公自使人徹之可知矣大夫則如介禮有諸公則辭加席委于席端主人不徹疏謂如賓厭介而入之禮非也鄉之學士宜從鄉大夫以入蓋主人雖敬執賓主之禮而賓介則不敢抗禮也大夫與鄉大夫比肩事主不宜使厭而升尤不可使公厭大夫以升如介禮謂不拜洗不嚌肺不啐酒不告㫖送爵崇酒拜皆不於阼階之類與介同耳蓋介不敢正當禮以讓於賓大夫不敢正當禮以讓於諸公其義正同經乃總言諸公之禮一如賓大夫之禮一如介惟加席及辭席有異而疏誤以為升階時禮異又見升階時主人揖讓升降介一與賓同故轉而為賓厭介之說不知其决不可通也明日賓鄉服以拜賜主人如賓服以拜辱主人釋服乃息司正據經文乃特著賓之鄉服與鄉射之朝服異也主人為國興賢朝服不言可知故經略焉而記乃詳之而賓之服宜辨故特著其為鄉服即修業於鄉之服𤣥端是也蓋冠禮可攝盛即鄉射亦可攝盛惟鄉大夫興賢能則朝士與鄉民之分界也故雖升於司徒未入於國學則仍鄉服而鄉大夫之拜辱亦如之蓋報禮於賢士與之同服示不敢以貴臨也鄉射大夫為下耦禮一同于士義正類此息司正則改朝服以即事示國政以嚴終也若鄉射之賓則宜多公士即閒用學士亦可假以朝服蓋春秋學政之常假以朝服亦以騶虞為射節之意耳習射禮輕故𤣥端以息司正與鄉飲相變義各有當也注謂服鄉者所服之朝服似未安賓之服經未前見而以前所服為義則不可通矣記獨補主人之服正以賓之鄉服已見於經耳經記𤣥端與朝服每分言之士冠禮三加朝服既冠改服𤣥冠𤣥端以見於君則其别顯然矣特牲饋食禮冠端𤣥注𤣥冠有不𤣥端者蓋謂朝服則緇衣也六入為𤣥七入為緇衣色稍異而冠則同故注疏或混而一之如士冠禮主人𤣥冠朝服注謂衣與冠同𤣥是也豈對文則有别散文則可通與無介據經文以告於先生君子兼召知友蓋先生君子既不可屈為司正之介知友又不可為介而先於先生君子故無介為安以告于先生君子可也但以告而不敢請來與否聽焉敬老尊賢之義也鄉先生外别有君子以是知先王興賢育材有不敢强以仕者必如是而後禮賢之義傋也孟子曰大有為之君必有所不召之臣春秋戰國猶有周豐段干木泄栁之儔為時君所不能屈周公之教思可謂無窮矣周之士也肆其此之謂與遵者亦不告以禮輕不敢復煩尊者賓介不與不與者惟賓介示衆賓尚有與者上經曰徵惟所欲則必德行道藝為主人所心許然後召之非衆賓皆與也人情於得失榮辱之界可徵其器量使周旋於鄉先生君子之前則有不能自掩者矣此與以五物詢衆庶之義同鄉先生君子微辨其德器衆庶明徵其行藝皆所以振興羣士以為後舉所依據也若賓介已受正禮而又以飲食之道召焉則䙝矣鄉朝服而謀賓介記注鄉人謂鄉大夫非也記曰習射尚功習鄉尚齒又曰觀于鄉而知王道之易易蓋古者惟飲酒之禮名曰鄉以鄉大夫興賢能退而以五物詢衆庶黨正正齒位皆鄉禮獨言鄉乃可以該之若鄉射之得名則以别于大射耳其不言主人何也以經有明文兼明所就謀賓介之先生亦朝服也皆使能不宿戒興賢能國政也惟其人之可無事宿戒故及期而速之賓惟禮辭尊綌幂賓至徹之凡事皆於諸篇互傋此經通例也尊有蓋蓋上加幂幂上加勺又反之以覆勺大射禮幂用錫若絺綴諸箭蓋冪又反之此篇及鄉射皆賓至即徹自獻酌至禮終不再覆祭則陳饌時徹幂酌奠隨覆之神事尤宜潔敬也少牢啓二尊之蓋冪奠于棜上加二勺于二尊覆之故酳尸之後獻酢相繼無復神事則徹而不覆特牲記明日卒奠幂用綌即位而徹之賓祭之尊惟有司以時啓幂而已燕大射更有執幂者每酌於膳尊旋啓而旋覆之敬君之禮不異於饗神也觀散尊幂徹則不再覆其義顯然矣燕禮至無算爵君命徹膳幂亦不再覆以酌無算不可以旋啓而旋覆也賓俎脊脅肩肺主人俎脊脅臂肺先脊脅而後肩臂何也鬼神不享味而貴氣臭故骨體以次升生人所食惟肺脊故㛰禮夕食及朝饋舅姑所舉惟肺脊從其質也賓禮所嚌惟肺而骨體之陳亦以平時所舉為先用别於神享也樂正與立者皆薦以齒舉樂正司正之薦而不及弟子何也此日之弟子即他日可為賓介列衆賓者也有司與酬則弟子可知矣不言與酬而言薦何也言薦則酬見言酬則薦不見而或疑於無薦也凡舉爵三作而不徒爵此謂無算爵也古者於旅也語既受三爵則必以善言相告戒或歌詩以見志如以不徒爵為薦則衆賓辨有脯醢立者皆薦安得以獻賓獻大夫獻工為三舉爵且又去介而著工乎又以見爵雖無算而一人受爵亦不過於三故詩曰三爵不識矧敢多又主人介凡升席自北方降自南方主人及介升席自北方經有明文而記復舉此何也主人之降席無文介之降席雖見於受獻而將徹俎賓主介降席皆不目其方故舉此以著升降之凡例而賓降席之方亦可於升席自西方比類而得之矣凡旅不洗與酬者衆每人而洗日不暇給矣注云敬殺未安主人之贊者西面北上不與無算爵然後與特牲饋食記公有司獻次賓此則與酬而不獻何也彼以公有司而助已之私祭義近於賓此以公有司給公事義不得比於賓也特牲私臣獻次兄弟此無獻并不與酬何也士之私臣隸子弟也義同於兄弟此所興賢能則將使出長之入治之者也賓興之日可使私臣與賓介同獻酬乎事各異則義從而變也鄉飲酒義旅酬終於沃洗者與此經異何也彼所釋黨正之飲酒於序以正齒位也故曰六十者坐五十者立侍以聽政役而豆之數各以年為差安得以混賓興之禮乎儀禮析疑卷四
