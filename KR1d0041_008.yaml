body:
  text: 儀禮析疑卷八翰林院侍講銜方苞撰聘禮遂命使者疏謂命聘時不言其國以既受行出見宰問幾月之資决之非也未有命聘而不及所之之國者蓋本事有淹速在途有經過故道齎不可定耳使者再拜稽首辭君不許乃退以此知君臣之禮惟饗食燕射乃答臣之拜其命以事或臣有復逆則再拜稽首而不答也既圖事戒上介亦如之復言圖事蓋君與宰以遣聘之故及所謂之事國勢邦交更與使者共圖之也非然則前已言君與卿圖事戒上介亦如之宜直承乃退下無為復言圖事如疏所云以示别命則宜曰更命上介亦如之第曰戒者戒以事而不與圖也於衆戒曰不辭則上介之辭亦同於使者衆介皆逆命不辭逆謂迎而受之與周官太僕聞鼓聲則速逆御僕與御庶子同義及期夕幣既命既戒而期則無定何也凡在行者各有宜庇之家事也視幣必以夕何也陳之即載而舍於朝乃可與使者同時而就道也且在禮已受命君言不宿於家必夕幣然後厥明使介告於室神而進受於君事乃順禮乃安官陳幣皮北首西上加其奉于左皮上馬則北面奠幣于其前圭璋璧琮不陳非獨以其寶貴也天質自成雕鏤有度無事臨期而覆視之纁帛則有精粗馬則有駑良皮則辨毛色非有司别擇而君卿大夫臨展不敢以輸所以重邦交達誠悃也宰執書告具備于君授使者使者受書授上介將行宰以書授使者而君不視周官作大事宰贊王命則列國聘使之䇿書君與宰已詳視之矣及夕幣君不視宰及使者亦不視蓋宰命宰夫官具則宰夫一一審擇之陳幣之時卿大夫已共見之矣此三代盛時百官得其宜萬事得其序君相所以得從容論道以盡其裁成輔相燮理之宜也公揖入周官司士掌朝位射人掌射朝之位惟見王之揖法不見羣臣拜禮觀燕射君揖公卿大夫無答者蓋不敢答也以此推之惟朔月之朝羣臣小大皆宜稽首其常朝必君以事命或臣有復逆然後再拜稽首明矣上介視載者所受書以行視謂以示之也使者以書授上介故上介以所受書示舍於朝者使與幣並載以行若詁監視載者所受書則以行於文為贅覲禮天子賜侯氏車服諸公奉篋服如命書於其上則聘書宜與玉幣同載明矣厥明賓朝服釋幣于禰將告於禰遂稱賓為國客自兹始也入廟則稱主人對祝史之辭也載旜受命于朝稱使者對君之辭也古者五十為大夫積功纍勞以至國卿則年必長矣故出釋奠反獻薦皆曰於禰道其常也惟至所聘之邦受饔以祭筮一尸上及於祖該其變也蓋閒有篤老而父尚存者主人立于户東祝立于牖西此卿大夫士廟制户于室西南之徵也下經賓館有右房又有西夾所館者乃大夫士之廟則不獨天子諸侯有西房西夾矣諸疏之說必以經傳折中乃得其實上介及衆介俟于使者之門外必備集於使者之門然後序入於朝而無參錯衆介亦告於祖禰文不具耳賈人西面坐啓櫝取圭垂繅不起而授宰以此知夕幣不陳玉也宰與使介遞相授而終以屬賈人責有所専也繅藉韋版絢組之說注疏俱未分明依事以測義則周官典瑞所謂天子大圭鎮圭繅藉五采五就繅謂裹圭之褶帛與繫繩即聘禮所謂絢組藉則薦圭之韋版也朿圭又别有組執之則以組末挽指閒以防失墜所謂圭中必也韋版之用則天子祀天朝日諸侯朝天子執圭而有拜事既拜仍坐取興執之圭為重寶非若爵觶有足有臀可以奠於地也故以韋版薦之至享禮之璧璋加於帛上則必有繅用韋版與否則無考矣宰執圭屈繅自公左授使者使者受圭同面垂繅以受命既述命同面授上介上介受圭屈繅出授賈人衆介不從賈人垂繅袒圭以示宰也宰屈繅既視而掩之以授使者也使者垂繅復啓視以授上介也上介屈繅既視而掩之以授賈人也正聘時賈人垂繅以授上介上介屈繅以授賓義亦如此宰屈繅以授使者以使者必垂繅袒圭以授上介也上介屈繅以授賓以賓必去繅袒圭而後執之以行事也惟上介之授賈人似不宜屈繅然啓櫝出圭者本賈人則亦不必復袒圭以授矣皆事理所宜不獨以相變為貴執圭以受命見親受於君付之瑞節以昭其信又夕幣未陳圭使得於君前一展視也慮使者聽之未審故使覆述所命以不忘於心又使上介重聽之設使者有故可代之傳也下大夫取以入告許遂受幣曰遂受幣者聘禮賓私覿私面皆先入陳幣於門內擯者辭以其幣出請受然後賓復以幣入相授受假道禮略故大夫取其幣以入告而不煩次介入陳及出許遂受其幣而不煩相授皆體過賓之心每懷靡及不欲稽留也注疏推說皆未得其理餼之以其禮上賓大牢積唯芻禾介皆有餼餼以牲牽道或回逺中有停止可自為節適也芻禾不可猝具故官致之米薪百物隨在可市使者計月而請道齎正用之於此必如此然後主國不困客亦可安春秋時齊桓創霸資糧屝屨皆所至之國供之故陳轅濤塗以為國必甚病而詭辭以誤之也士帥沒其竟周官訝士邦有賓客則與行人送逆之誅戮暴客者春秋傳晉欒盈出奔楚過周周西鄙掠之盈有辭於王乃使候出諸轘轅則官常之廢久矣誓于其竟事之序當在次介假道之前而退於士帥沒竟之後何也所過非一邦故原始要終以該在途假道之事矣朝服無主無執也介皆與北面西上言介之面位而賔無見何也曰無主無執則賓之面位一如正聘時不待言矣玉為瑞節在途不敢輕執慎之至也上經賈人不起而授宰義同賓朝服立于幕東西面展幣則使者為主故從主人之位以與肄儀異故特見之賈人告于上介上介告于賓幣玉上介親視賈人告事畢上介則告賓以所視皆完好也聘使自受玉於君前以授上介其後三展皆不復親蓋國卿多老耆不欲煩以事故記曰官盛任使所以勸大臣也有司展羣幣以告記曰問大夫之幣俟于郊自不得與公幣同載同展然其幣則受自公家無疑也賓與上介私齎幣馬義雖未安力或能具士介何從具此周官校人共使者之幣馬侯國宜同之疏乃謂彼天子之使與諸侯異以曲護其說固也及館展幣于賈人之館如初聘幣有圭璋璧琮故載用任輦恐馬牛之車時有㒹僨入竟而展及郊再展及館三展雖任輦尚虞仆蹶頓撼又皮帛則燥濕不時宜風日也展於賈人之館而不於賓館已造國都不敢復移動直俟將命之日然後以造於朝慎之至也觀孔子執圭勃如戰色足蹜蹜如有循則知就展於賈人之館之義賓揖先入受于舍門內周官司儀賓受勞使者受儐皆升堂聽命下拜登受此經則授於舍門內而不升堂當以此經為正蓋下拜登受惟天子有賜於諸侯則然周衰禮壞臣於君皆不拜下故君有賜皆登受於堂有司莫能正久之且以新儀易故籍而成周之舊典遂失其傳惟聘禮則肄習者多故籍尚未改耳勞者再拜稽首受儐幣乃友邦之君官授聘使者故如見友邦君而稽首也與賓前後稽首同義奉君命而出勞則如見與國之君賓再拜稽首送幣疏引歸饔餼賓儐大夫禮謂注受送當作授送證據甚確敖氏仍從注未安夫人使下大夫勞以二竹簠方諸侯之邦交歲相問殷相聘者必兄弟婚姻之國也若同州之國皆行此則物不能具人不能供記曰若兄弟之國則問夫人明非兄弟之國無問夫人之禮故有聘享夫人之禮而主國之夫人亦使大夫答禮焉其相朝而大饗主國之夫人亦與焉王后惟二王之後有祼大賓客宫卿詔后禮事九嬪從必后之母家王之近屬伯叔父兄弟也內宰掌致后之賓客之禮漿人共夫人致飲於賓客之禮則為王及后夫人之親戚明矣考之春秋惟齊晉宋衛與魯交聘入春秋之始陳為望國一聘於魯春秋之末鄭視諸小國為强大一聘於魯秦楚吳越之聘則以盛强而窺東夏用此推之則周初舊典惟大國物博易具官備能供乃舉殷聘若次國小國雖兄弟婚姻慶喜弔憂而外惟問可時通當殷聘之期則小聘耳下大夫勞者遂以賓入至于朝主人曰不腆先君之祧既拚以俟矣賔曰俟閒致命受聘以至之明日禮有常經而帥以至於朝緣賓之心使事未通不敢就館也主人曰拚以俟示聘君有嘉命迫欲受之也賓曰俟閒設主君有疾病事故當擇日而行事也受聘於廟而禮辭則曰祧何也几邦交多逺承於上祖或在已祧之列禮行於太廟則凡主皆在祏也公再拜賓辟不答拜再拜重友邦君以好來命也故賓辟而不敢答公揖入每門每曲揖注卑不踰尊者之迹謂主君由門中而賓入不中門偏近闑則不踰君之迹介與擯各拂闑則不踰君與卿之迹士介拂棖則不踰上介之迹疏似未達上介不襲執圭屈繅授賓垂繅者使玉體呈露而不結束故見組未之垂屈繅者周回而結束之也故賈人始啓櫝授宰及聘授上介皆垂繅使受者目擊其完好也宰授使者上介授賓皆屈繅蓋結而授之使便於執也注謂屈繅並持之辭未分明其謂並組約圭而兩手各持組末與介皆入門左北面西上司儀職及廟門惟君相入本兩君相見之禮羣介皆入人臣奉使之禮也周衰大夫强僭不肯循臣禮之常如衛孫林父聘魯君登亦登之類又不能强上介從已以入而顯用兩君之禮故盡止羣介於廟門外而惟主君之相入耳與受勞受儐之升堂同皆有司失其傳賓升西楹西東面旅擯於大門賓北面對君之禮也至升堂則東鄉而與主君正相對傳己君之命也及至命則公左還北鄉而拜凡敵者之禮拜皆北面如親見聘君也若東面則似答使者矣擯者退中庭公與賓方升階而致命擯者無事焉堂髙七尺若立階下轉不見楹閒所有事故退立於中庭然後可要節而進以釋辭相拜也賓三退負序此經三退即司儀所謂三辟也同有事於楹閒退之外别無辟法注疏强為分别似未當公側襲受玉於中堂與東楹之間敖氏謂公西面賓東面以授似尚未安凡敵者之禮授受並鄉故變其鄉而不並然使東西相對則使臣仍過於抗按賔致命主君北面則楹閒拜後進至中棟宜右還西南面賓三退負序後宜進就主君東北面進玉以答其敬義乃盡情乃安中堂言南北之度東楹之閒言東西之度故曰與賓出當之坐攝之俟賓之出而當之以攝示親受於賓也公側授宰幣皮如入右首而東前士受皮者自後右客注約私覿牽馬者自前西向出敖氏謂與受馬之儀相變此注右首變於生敖氏謂右當作左義甚瑣細存而不論可也賓奉束錦以請覿疏引春秋傳公㑹晉師於瓦證晉卿乃從君見主君法非也經書㑹晉師則君不在師中明矣傳亦無君在之文未可曲證公出迎賓以入聘享不出迎緣使者之心欲敬將君命而自致其為臣之禮也至是而出迎權主君之義不宜竟以內臣之禮待故轉於其私覿自抑下耳賓進訝受几于筵前東面俟疏謂受几受醴不北面以禮未成義尚未備受几時將俟公之拜而以几辟公拜送非於阼階則東序端而賓筵在户牖閒若北面則不見公之拜無以要其節而為禮矣受醴後亦然公一拜送賓以几辟北面設几不降階上答再拜稽首主君受聘享各再拜受夫人之聘享亦如之賓皆不敢答至是禮賓故見君之拜即再拜稽首於階上以示震動恪恭不敢當此盛禮而不暇循降拜升成拜之常也燕禮公親酬食禮公拜至揖食將飯受有幣皆先降拜而後升成拜受几受醴賓皆不降所以自别於主國之臣也主君於聘賓受聘享不出迎以臣禮待之至私覿而後以賓禮迎焉聘賓於主君初拜於階上以見其為異國之臣及禮終拜稽首於階下然後一同於己國之君屈伸先後皆天理之自然也擯者退負東孰要其節而出不復受命於君故逺退於東孰以便事也公用束帛建柶北面奠于薦東賓建柶奠觶以將降辭也公用束帛下疑落酬字升公北面再拜賓入門奠幣再拜稽首主君不答不敢受其臣禮也故於其升則再拜焉賓三退反還負序反還負序至牆然後旋而東鄉也蓋其退也轉面而西鄉不敢見主君之拜也至序而後東鄉則主君拜已畢矣以是知致命之初主君當楣而拜賓逆退負序面猶鄉東所拜者聘君之命也使者宜辟逺之而猶可以見主君之拜焉耳擯者曰寡君從子雖將拜起也公辭下拜多矣惟此著其辭何也燕射乃本國之臣即聘賓之拜醴幣亦奉君命將公事雖辭不必如是之懇至也惟私覿下拜以送幣故獨釋此辭而他無見焉上介奉幣皮先入門左奠皮公再拜賓介私覿主君皆拜於未受幣之先既受幣之後則賓介再拜稽首主君皆不答示始入之拜乃執主人之禮與拜至相類而非重幣物也惟享幣再拜而受如主君親授故執敵者之禮介出宰自公左受幣上言北面授幣公受之也介出而宰自公左受幣則受於公可知蓋公側授宰幣已見賓覿故於介省文公答再拜擯者出立于門中以相拜士立門外不見公之答拜擯者立門中要其節而贊然後得聞而辟焉正聘時公拜賓雖三退而面猶鄉公私覿反還負序則退時轉面而不見公之拜矣至士介則公拜於庭中而士辟於門外辟之中亦有差焉惟上介之辟無文蓋儀與賓同士介門外猶辟上介無視公之拜而不辟之禮其轉面南鄉而三退待公既拜然後反還振幣無疑也但庭中廣且深去門逺非若堂上有負序可表故並沒其文使讀者上下比類而知其必然耳主君於賓介之覿皆拜於未受幣之前猶燕與公食大夫之禮之拜至也及送幣再拜稽首皆不答至士介則惟賓代之辭公答再拜時衆士已出辟中門之外其幣則使宰夫受之等威嚴辨如此蓋天下有王卿大夫士皆王爵也故異國之臣亦得以君道臨之所以辨上下定民志也周之衰始於霸國㑹盟擅易周班其終至於涉他成何衆辱衛侯列國皆有叛志晉亦不能復宗諸侯而六卿且不有其君記曰以舊禮為無用而棄之者必有亂患可不懼哉士介皆辟士三人東上坐取幣擯者執上幣以出時士介皆出門公拜辟於門外之後三人復入坐取幣也不言復入可知也公出送賓及大門內公問君賓對公再拜公問大夫賓對公勞賓賓再拜稽首公答拜周官司儀出及中門之外即大門內也諸侯相為賓主君出郊以勞故於聘君必出廟及大門而後問示不敢即安若欲就客而問之也司儀問君君拜則客辟勞客君答拜則客趨而此經缺焉何也賓始至入門左公拜賓辟勞賓君答拜賓三退負序拜君之命使者猶趨辟則更端而問君之起居禮義尤重趨辟不待言矣公醴賓拜送几賓以几辟公受覿再拜賓三退反還負序今釋辭以慰己之勞苦禮義尤勤趨辟不待言矣且儀禮所詳禮之細目也周官所布禮之大綱也問君勞客之辟列於職官人莫不知故不復詳而惟詳於司儀所未列者耳腥二牢飪一牢外復有二腥牢何也飪鼎及簠簋豆鉶即日所需也腥鼎則翼日所需始至未暇自割牲故主人先奉以至也卿行則自有司下逮隸圉其為人多矣非此不足以供億故上介士介每減焉皆稱從者之多寡以為齊量也饌于東方亦如之堂上之饌為飪牢設也東西之饌為腥二牢設也堂上之饌加隆焉以賓將以祭其祖考也餼二牢則以備無事在館時所需其牲牢不必同時而用之醯醢百罋以供調和鼎俎豆鉶簠簋諸器賓館自具無事於致餼時預陳也腥二牢既體解以載於鼎則宜於羮者亦可以實於鉶故並列焉米百筥周官侯伯之積米百筥醯醢百罋而次國之卿與之同何也君行師從卿行旅從疑惟軍旅㑹盟則然非朝聘之法也韓侯之百兩以入覲兼親迎春秋傳百兩必千人伯國求多而幣重也先王制禮厚往而薄來安用百兩且諸侯同時旅見使皆百兩千人則畿內候館不足以容矣以是揆之侯伯朝覲車徒必寡約而卿大夫聘於鄰國禮幣略與君行等則車徒亦不能過損故供積亦同皆稱所用而為之具耳賓降階西再拜稽首拜餼亦如之大夫辭升成拜辭其下拜而命之升成拜本國之臣禮也賓受酬幣下拜公辭賓升再拜稽首而不曰升成拜見不敢以臣禮待賓若賓自拜於階上與前受几同此則曰升成拜以賓欲盡敬於主君大夫不敢固辭以存國體而亦以達賓之意焉耳賓升一等大夫從升堂大夫致命則先升一等崇主君之體也賓儐大夫而先升一等從主人之常也賓降堂受老束錦大夫止敵者之禮主人降賓必從而大夫止何也奉君命歸饔餼幣雖已所受而禮則為答君之貺故不降以存國體而亦以達賓之意賓北面再拜稽首以送幣正此義也賓致幣以在異國不得稱致命耳出聘之時即齎儐幣非君有命可出之內府乎大夫再拜稽首正以重聘君之賜耳注謂非君命義亦滯大夫對北面當楣再拜稽首受幣于楹閒南面退東面俟賓再拜稽首送幣大夫受儐幣南面以所將者主君之命也然受幣雖南面而將受則北面再拜稽首以致幣者賓而實友邦君之賜也同等宜再拜而不稽首大夫既稽首以拜聘君之賜則賓亦宜稽首以送幣矣匪是則不稱明日賓拜于朝君歸饔餼下逮士介則賓拜禮於朝上介與士介皆從可知矣西夾亦如之筥及罋如上賓牢以頒之從者故賓介數異豆鉶簠簋之實與醯醢所以奉上介者自宜與賓同至筥米之數羣介皆同乃始至所用其門外之米則視牢數為多少也士介四人皆餼大牢米百筥設于門外周官掌客諸侯相為賓凡介行人宰史皆有飱饔餼又云諸侯之卿大夫為國客則如其介之禮以待之是凡介皆有飱饔餼也而此經獨有餼者惟餼具大牢禮盛故特著之飱饔從略耳致飱衆介皆少牢則饔可知矣如無饔則始就館未暇自割烹賓與衆介之所同也宰夫朝服牽牛以致之疏士有生餼無死牢則並無芻薪米禾非也芻薪米禾不致客焉取之蓋飪與腥亦如飱之少牢凡醯醢簠簋豆鉶之屬亦每減以其為日用必需之物更無不致之疑故略之周官掌客日致乘禽而此經缺焉記始補之皆以禮非盛而文不具耳無儐禮無不答聘禮用財最廣故惟主君於賓有醴主君夫人致禮賓有儐若問卿私面而有儐則大夫餼賓賓亦宜有儐不勝其費故雖尚文而亦有所止也大夫對北面當楣再拜受幣於楹閒南面退西面立問卿大夫北面受幣則授者必南面此南面受幣則授者必北面也私面似可用敵者之禮然大夫於聘君之問聽命受幣皆北面一如對本國之君禮不可以無報故於私面北面而進幣蓋不敢如將君命之南面而奉君命而為邦交又不敢用私家敵者受授同鄉之禮也還玉則賓主同鄉以彼此皆將君命耳大夫受幣再拜而不稽首以别於聽聘君之命也問卿賓東面致命而南面授幣私面大夫北面拜禮而南面受幣皆禮意之曲而當者擯者出請衆介面如覿幣賓及上介士介於主君之覿卿大夫之覿與面皆同幣蓋稱已之所宜致而不以所致之尊卑為差等也飱積饔餼之數則以所致之尊卑為等各稱其所需也擯者執上幣立于門中以相拜士介皆辟一與覿君之禮同何也擯者下大夫也使下大夫相拜而士介與國卿覿面而相為禮則彼此皆不能安故禮以有所窮而同擯者退大夫拜辱擯者下大夫也以同僚而共己之私事故拜其辱擯必以下大夫者介乃下大夫也將聘君之命以問卿若使公士或私屬為擯則禮不稱卿有故不能親饗食公作同等大夫為致義亦如此夕夫人使下大夫韋辨歸禮問卿大夫既畢而後夫人歸禮何也主君之禮已答於聘使而聘君之禮尚未達於主國之卿大夫而再受禮非使者所安猶聘享既畢賓請覿非主君所安故辭之而請醴也夫人所歸惟籩豆兩壺不待頃而可畢故於夕為宜儐之兩馬束錦夫人所歸無牢禮歸之者大夫而儐之一如君君夫人敵體禮不可有加損也聘使卿也而六豆六壺六籩一同於子男大國之卿當小國之君周制也夫人無殷膳饗食諸侯世相朝故盛禮可備聘使則嵗時不絶供意繁費更不可有加矣老牽牛以致之賓再拜稽首大夫私餼而賓稽首何也賓請有事於大夫而主君許焉則後此之歸餼亦主君之命也猶問卿升堂北面聽命賓致命卿降階北面稽首所謂禮有報也公于賓一食再饗燕與羞俶獻無常數賓介皆明日拜于朝上介一食一饗敖氏謂賓介皆明日拜於朝當在上介一食一饗之下非也凡賓受禮而拜於朝介與羣介必從舉例於前則上介之食饗賓及羣介皆同拜於朝可知矣若退其文於上介一食一饗之後則似賓受禮拜於朝者惟賓上介受禮拜於朝者惟上介而羣介皆從賔介而拜之禮義不可得而見矣介惟食饗惟賓乃有燕而燕以介為賓賓為苟敬則非以尊介乃所以優賓義益著矣賓皮辨襲迎于外門外不拜帥大夫以入大夫還玉答聘君之正禮也故使者不敢拜猶始至聘享君致主君之正禮也故主君再拜使者亦不敢答大夫出賓送而不拜義與此同既無拜禮無暇與大夫為小禮故但帥以入而不揖賓自碑內聽命升自西階自左南面受圭退負右房而立大夫南面致圭如主君親臨之也賓不北面受而並受如聘君親受之也於本國受圭璋時北面並受乃臣在君前相授受之禮與此異注若鄉君前未安大夫降中庭賓降自碑內東面授上介于阼階東言東而不言阼階下者自碑內授則在階下明矣又經通例堂西堂東皆謂堂下則階東西為階下更不待言觀此則碑在中庭以北明矣上介出請賓迎大夫還璋如初入不言大夫之出何也曰上介出請又曰如初入則大夫已出在門外明矣蓋圭璋不容並執故主國之賈人執以待於門外還圭之後復出而取之此節經文疑有錯衍宜曰上介出請賓迎大夫入賓裼大夫還璋如初賄用束紡云云乃事得而辭順如本文則辭不别白事不分明大夫出賓送不拜大夫則承君之命而為君還玉賓則終聘之事而為君受禮故皆不敢拜聘享夫人之聘享問大夫送賓公皆再拜四者皆答聘君之正禮故知主君必申其敬而賓不敢親見也若親見則拜送不可以不答拜聘享又再為前退辟之禮問大夫又别為之儀皆非所安故並以辟為敬焉介可以視主君之拜者義不敢答也問大夫而主君乃拜焉示聘君為己而加禮故大夫轉不敢私拜於賓館也賓不敢見而主君拜送示好命之有終猶始見將命而拜其至也觀主君為大夫拜問而大夫受幣賓受大夫私餼之稽首皆如對友邦君其義益著矣於儀禮見聖人盡精微之學而聘禮若微有缺焉主君於使者拜無不答終又總其大節而再拜者四焉聘君遣使時宜再拜而送之而經記無其文豈告廟卜聘筮日筮使之禮皆包於君卿圖事之中而所述直自命使者始前此卜筮告廟為聘事而拜者屢矣故命使之後轉無拜禮與公辭賓退賓不拜而退所以示主君之拜乃答其君之禮而已不敢尸即致辭不曰拜辱而曰請命之義也賓辟則公拜於賓之館公辭而賓不拜於君之朝何也拜聘享使者不敢代君夫人答也公為問大夫拜使者又禮無可施也三禮不拜而専拜公之館送則轉似敵者之禮鄉飲酒鄉射之終賓主皆拜辱而不相見是也故公辭而遂退以示不敢當公之拜送舅為婦降洗婦辟於房中而不敢辭洗亦此義也司儀職曰賓從拜辱於朝探其從而請命之意也此經不曰拜辱以公辭賓退實未嘗拜而以拜為文則辭與事不應矣賓三拜乘禽于朝公之饔餼饔食燕羞俶獻賓皆明日拜於朝惟乘禽日致未嘗特拜故禮終而後稱言凡禮之重者三拜故總拜亦以三公就賓之館賓不見而拜送於禮為過故轉以從公之命而不敢答拜為敬辭於朝乃以拜乘禽為言且不稽首仍不敢與公抗禮之義也公使卿贈如覿幣還玉及賄在賓將行時贈幣則於出舍於郊之後與出聘時公幣載於朝問大夫之幣俟於郊同非獨公私有辨異期易地然後可從容裝載也乃入陳幣于朝報君之禮玉使者親執以反命則介宜執幣以從故所陳惟賓介所受之幣也圭璋璧琮自夕幣後在途之肄不展入境及郊就館三展皆賈人拭之上介視之而以告於賓蓋王朝所命之瑞節不惟懼或失墜即久陳於席上亦非恭敬奉持之義也束帛各加其庭實皮左曰各加其庭實以庭實或皮或馬各相從而設也皮幣並列而皮左則幣置於馬之前不待言矣上介執璋屈繅立於其左同時反命於君前使者既垂繅袒圭則上介屈繅相變以為儀無妨也與相授受者事殊而儀亦異矣某君受幣於某宫受聘宜皆於太廟而曰某宫者或婚姻之好始於某君則宜於某君之宫也禮玉亦如之前注謂禮於君者不陳非不陳無可陳也賄幣賓執以告授宰有明文禮玉亦如之則賓執玉以告士介執帛以從賓授宰玉士介亦以帛授宰士明矣外此尚安有可陳之公幣哉執禮幣以盡言禮賜圭璋瑞節使者所執以反命也禮玉退在賄幣之後一循主國還玉時致禮之次第也公事畢然後可言己所受幣曰賜者所受於主君也曰禮者卿大夫所致也其事繁賾不可勝言故以盡言禮賜括之經文辭約而事詳如此公曰然而不善乎然字斷句謂其然則汝於使禮果盡善而無缺誤乎喜之甚而若有難也大夫使無失言無失儀然後主君親饗食燕勞而備禮焉君使宰賜使者幣昭公四年左傳杜泄曰夫子受命於朝而聘於王王賜之路復命而致之君君不敢逆王命而復賜之王賜且然則鄰國之賜必待君之復賜宜也介皆送至于使者之門乃退揖使者拜其辱揖而退恐勞使者之答此亦以不拜為敬者也拜辱宜各至其門注疏謂即拜於退揖時以未告於禰自不暇報禮於介之門也筵几于室薦脯醢觴酒陳席于阼薦脯醢三獻觴酒陳叙於薦脯醢下見脯醢觴酒第薦陳於筵上以明無尸亦不用祝代神祭酒也士虞禮尸未入佐食代神祭黍稷祝代神祭酒不言孰亞獻孰三獻以主婦不與從者不與則為居守之室老貴臣無疑也先列阼席與薦而後言三獻明主人獻爵後隨受酢然後亞獻三獻繼舉敖氏謂主人酌以自酢非也凡自酢必所獻者非一人而無敢專酢或應酢之人自卑而不敢酢奠告無尸祝酌象神賜宜也若主人自酌酢則似以逺行而自勞義無所處矣一人舉爵獻從者行酬乃出一人舉爵示洗酌皆此人為之以授主人而親獻也所獻惟從者之長一人餘則遞酬以遍所以息主人之勤也逺役始歸敬如君所對命禮終雖强力亦倦怠矣况國卿年必耆艾乎是以告廟之禮甚略也古人御下非獨恤之必接以禮國卿行役歸告禰廟先獻從者而後入見家人師出而反王親弔勞士庶子大司馬相所以誠無不通而人忘其死也聘遭喪入境則遂也經文曰入境注遂謂關人未告則反既抵關主國無不納之義即使者亦無遂反之義朝聘稱先君以接之乃邦交之為非為一人也且立關或因山川之要綰或度人民所走集非若四封之有植也其入境而未達於關者多矣經曰入境而不曰叩關其是之故與春秋傳魯宋並朝於楚及漢聞楚子卒宋人遂反蓋本不願朝楚故曰俟立君而為之備非朝聘之常禮也不筵几正禮設筵几以受聘示先君之靈實式慿之也今君之魄體尚在堂則與親受同其義與使者以尸將命可相發也不賄不禮玉不贈喪之殺禮非為財用之竭子則創巨痛甚無心於外事臣則治喪營葬不暇接朝聘之賓客故受而不報以俟喪畢而報聘耳遭喪將命于大夫主人長衣練冠以受疏引春秋成公十七年邾子來朝傳謂踰年可朝他國他國來朝亦可以吉禮受之廟迷亂極矣三年之喪畢然後入見天子乃踰年而私相朝以吉禮受於廟乎赴者未至則哭于巷衰于館既以君喪聞於使者而不並告主國何也告終之禮必具册書遣行人特告於天王遍赴於同好始喪薄遽未暇及此且使主君既聞喪而嘉服以受聘則非情所安及使臣未成服而常服以將命則於義為可也其禮節當以傳遽書方先告於使者俾即致命聘享聘享畢乃哭於巷衰於館受禮不受饗食受禮所包甚廣自郊勞致館以及飱積饔餼皆是也所不受者惟饗食耳在禮為君食粥疏食菜羮不御也而受飱饔何也飪腥已具不受則主國將焉用之且惟賓介士介及有司為公士者不食耳僕從隸圉無疏食之禮是以得受而朌之也赴者至則衰而出使者聞喪即私布於主國及赴之未至而吉服以將事矣聘禮既致則衰於館而不復出赴者至則主國亦不得留賓即日奔喪其來弔唁者當往拜而後行故衰而出也唯稍受之周官大行人職賓客出入皆有積此經略之故記詳焉行人職諸侯相為賓致積有常數此待鄰國之聘使故旬而稍敖繼公謂稍乃漿飲乘禽之屬非也舍致積之重禮而詳漿飲乘禽於義無處歸執圭復命于殯升自西階不升堂君殯在西階無堂事故不升與介入北鄉哭明子臣皆哭乃在國諸臣使介以復命未畢於時不哭故既出復入以致哀也若有私喪則哭于館衰而居不饗食上經曰不受饗以公喪賓介皆不受也此曰不饗食則主國並戒賓介而有私喪者則固辭不往上賓死則上介不忍受饗食而終辭以君弔而主其喪則禮之主於酒食者不可復與也歸使衆介先衰而從之注謂君納之則朝服而反命君子不奪人之親既以國事不得送死又不使速歸而哭殯非情也其義與在所聘之國異邦交禮重更舉為難故於凶問始至吉服將命即日終事而後盡其私焉蓋其期猶在未成服以前也反其國則介可復命又使脫衰而朝服毋乃傷恩而愆義乎賈疏又云出公門釋朝服反常服三日成服而後去之益無義理聞喪不得奔喪則成服於所適之國記有明文主人為之具而殯異國賓館無肂而加塗之義云殯承為之具而言凡輤裧裳帷屋衾綍披皆載柩以歸殯之具也介受賓禮無辭也使者死以尸將命則喪具之外仍歸賓禮於主國之義乃安禮之歸以重邦交非為己也故介受而不辭士介死為之棺斂之注不具他衣物以時服斂非也延陵季子使而反在途故子死斂以時服古人重送死賵賻含襚雖不逮事猶越國而致禮焉使者死於其國而斂缺衣物非主國所安同使者亦難為情康成蓋以為之棺句謂獨具其棺而斂以親身之服不知經意正謂為之棺而具衣物以斂耳小聘曰問不享有獻不及夫人不能備禮而以國之所有獻友邦之君可也不用玉帛而以器物獻夫人則䙝矣記云既覿賓若有私獻則此為聘君之公獻可知且下經面不升私覿之前不宜先有私獻注不可通主人使人與客讀諸門外記古者册書之辭簡要大者百名以外恐言不盡意必叩之使者乃知情事之詳周官內史讀四方之事書以簡書之辭出於內史先與客讀然後為王誦之而後可發命也侯國禮亦宜然問大夫之幣俟于郊為肆又齎皮馬為肆賓介羣介之幣各一列問下大夫嘗使者之幣又一列也幣兼玉帛皮馬既曰幣俟於郊又曰齎皮馬何也明掌載各有人也不曰賚而曰齎何也或本國少皮馬而所經之地多有之則道齎外别授以市皮馬之齎卿館于大夫大夫館于士士館于工商注謂館必於廟以禮事皆在廟也然受禮必於廟而起居飲食必别有館舍車馬必别有所納徒御必散舍於里黨之閒唯天子巡狩可舍於諸侯之祖廟耳友邦聘使嵗時數至而使舍於羣臣之祖廟則室神弗得寧矣曽子問曰為君使而卒於舍禮曰公館復私館不復何謂也孔子曰自卿大夫士之家曰私館公館與公所為曰公館公所為者即卿大夫士之家而公命館客者也由是觀之使臣之公館必本設數區聘者麇至然後命館於私家耳飱不致賓不拜沐浴而食之賓初至力乏事紛故飱不致重煩賓答禮也賓亦不拜正聘諸大禮皆在厥明無暇拜小禮也故夫人夕歸禮之後乃曰明日拜禮於朝然必沐浴而后食造次必以禮也宗人授次次以帷敖氏據司儀車進謂朝君未嘗入次但雖不入次次亦宜張使未傳擯之先禮成之後朝君或有私急不能就舍無次可乎將授志趨其義與士相見禮執幣容彌蹙類蓋將授玉而操心愈専慤也魯論勃如戰色足蹜蹜如有循則志可想見矣授如爭承下如送君還而后退如爭如爭取物不遽釋手也主君既受猶以手承君之手不如初送玉者然防主君握之或未固也君轉身而后退則必無隕墜之虞矣蓋致己之慤恭兼防受者之失誤也多貨則傷於德幣美則沒禮春秋傳庭實旅百乃天子大饗宗廟六服諸侯各薦國之所有非侯國之事也玉帛之外不過乘皮或代以乘馬若如秦針將幣八反季氏賂齊百兩一布則受者成貪而致者亦為貨取德為之傷矣制幣度數有常錦文色象有定若竒巧華靡則禮意為之沒矣賄在聘於賄在察也與戴記在視寒暖之節義同凡執玉無藉者襲圭璋手執不連韋版所謂無藉也故聘則賓襲璧琮加於束帛必繫於韋版或薦以褶帛故享則裼既覿賓若私獻奉以將命私獻如魯壺宋斤及飲食珍異之物所聘之國無有者非聘享之法物而君以相遺則䙝矣故使使者私獻而稱君命以將之幣之所及皆勞下大夫常使至者幣及之不惟卿也敖氏謂以幣不及已而不勞恐非禮意非也若聘幣遍及小卿五大夫而遍勞焉豈惟財力難供日亦不暇給矣賜饔唯羮飪筮一尸若昭若穆君賜腥必熟而薦之太牢之飪乃人臣所不得用以承君命而得賜於異國之君不敢以自享也故薦於先人朌肉及廋車周官掌客諸公之臣相為國客惟賓介有牢禮則羣有司惟歸稍而無牲賜卿行旅從隸圉厮役之多無若掌車馬之官故以腥牢朌之乃可遍也其餘有司及府史胥徒家僕私人則各以飪牢朌之可知矣賓腥二牢上介腥一牢皆稱其車馬之衆寡而為之制其飪皆一牢古者屬吏事其長府史胥徒家僕私人甚少飪一牢已綽有餘裕矣賓祭之事惠澤及下不遺一人故饔餼牢禮之盛如此非此不足以供億也用財之厚豈惟聘義所云以故邦交而弭侵陵之患也旬而稍宰夫始歸乘禽日如其饔餼之數以十日為期則主國君臣饗食燕皆寬然有餘矣有故而留則惟致稍與乘禽雖用財至廣亦未嘗不節以制度也曰乘禽以其雄雌相乘而為偶也故致之亦以雙凡獻執一雙委其餘於面注具賓介拜受之儀恐未安飱稍不拜乃日致乘禽使賓僕僕而亟拜乎疑禽獻與稍廩乃有司以致於賓之宰故無拜禮將行三拜乘禽之賜特揭於禮辭職此故耳既受饔餼請觀訝帥之自下門入各以其爵朝服請觀下疑有闕文蓋事微故不特請而假於致饔餼者以達之也其入觀之日則惟主君所命非受饔餼之日旋請旋帥以入也其期宜介於饗食與大夫致餼之中間必主國無他禮事而後可帥賓以觀如所觀為宗廟朝廷則聘享饗食已數有事矣所請蓋觀其國之舊典及方志如韓起聘魯而觀書於大史氏或國有名山大川因國先哲之遺蹟也所觀者官府之典册則入自下門而觀者朝服若山川古蹟各就其地而觀之則服其常服也凡餼大夫黍粱稷筐五斛周官稻人掌稼下地中原所寡有也江淮以南飯稻羮魚之國春秋以前皆未通上國河南北山東西建國有稻地者少而賓客饔餼甚多故惟用土之所宜反幣諸本俱屬上重賄下義無所取宜屬下禮辭蓋還玉之後公隨至賓館而拜聘享之命故以拜命之禮辭繼之也不曰還玉而曰反幣者賄用束紡禮玉束帛乘皮同時而致致之者即還玉之人也賓於館堂楹閒釋四皮束帛賓不致主人不拜君命館賓而以幣酬賓若致則館人宜固辭館人終辭則賓自視缺然故必不致不拜而後於情安於理得也有大客後至則先客不饗食致之以大國卿大夫後至而不親前聘者饗食之禮雖衰亂不可行况王道盛明之世乎所謂大客乃諸侯來朝或王使過賓未暇與先客為禮而列國三卿五大夫各有國事或使者所聘非一國豈能久待後客之歸而後受禮故可以情告而饗食皆以幣致耳儀禮析疑卷八
