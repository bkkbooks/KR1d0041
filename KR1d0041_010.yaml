body:
  text: 儀禮析疑卷十翰林院侍講銜方苞撰覲禮注謂覲遇禮省故享獻不見似竟無享獻疏遂云獻謂三享後私覿私獻益誤矣聘使鄰國之臣也故公享之外覿獻皆曰私諸侯入覲正享之外不得有私庭實各以土之所有即魯壺之類亦器貢也周官太宰職所謂玉幣即此經初享之束帛加璧所謂玉獻即此經之庭實亦執玉以將之耳至于郊王使人皮辨用璧勞勞鄰國聘使以束帛則諸侯入覲以玉勞宜也而璧不合以束帛受山川土田民社而來述職惟以天子之禮貌為榮若以財物厚之則禮轉輕而不稱也春秋傳先王卜征五年而歲習其祥則諸侯入覲必貞卜於祖禰圖事既定必筮介筮日前期必陳幣玉皮馬如聘禮將行必告於祖奠於禰命祝史告於社稷宗廟所過山川命五官道而出如曽子問所記出疆則有假道請帥之禮在途則有與同覲諸侯相遇之禮入王畿則有誓衆謁關人習覲享展羣幣小行人出勞所經致積之禮一切不具而自至於王郊始蓋凡此皆具於春朝夏宗而無庸覆出也其與聘禮同者則一如聘禮而加詳焉不待言矣敖氏所謂初無四時之别與周官所謂秋見曰覲之義異未之思耳諸侯勞聘使各以其爵則二王之後勞者必三公二伯諸侯以卿伯以大夫子男以士故統之曰使人至賜服命則五等之國皆賜諸公蓋天命有德三公坐而論道與王同執維綱也書傳略説孝經注必緯書之類其言天子使世子郊迎非惟害義亦勢不能行賈疏以為異代之禮惑也侯氏亦皮辨迎于帷門之外再拜侯氏再拜而不稽首以王命未宣拜使者之至也使者不答以王命未宣不敢私受侯氏之禮也無聘禮出諸入告禮辭之節聞王命即出迎不敢同客主之禮也敖氏謂天子於諸侯有三勞逺郊宜使中大夫近郊宜使卿此惟一勞與周官異非也已於朝宗具之侯氏升聽命降再拜稽首遂升受玉聘禮受勞幣於庭中此升受玉者王命不可宣於階下故使者不讓而升堂升侯氏使聽之侯氏降拜稽首而後升受體當然也使者乃出當有以玉授有司之節文不具使者降以左驂出侯氏送于門外再拜侯氏遂從之聘禮夫人使下大夫郊勞玉人案有十二寸棗栗十有二列夫人以勞諸侯周官酒正職載王后致飲於賓客之禮則於諸侯有郊勞明矣以皆前見故文不具天子賜舍致館當使卿故注謂使司空而周語曰司里授館蓋司里乃冬官之屬故各以所宜授之館告而司空致之猶聘禮大夫帥以至館而後卿致耳侯氏再拜稽首儐之束帛乘馬此下當有設飱之禮及期侯氏有展幣之禮聘則陳幣於廟門外賓禮也朝覲職貢宜展而奉之及時乃入布於庭中以皆前見故文不具天子使大夫戒曰某日伯父帥乃初事聘禮先造於朝而後就館主君之命未逹不敢即安且賓禮可徑造於主國之朝也覲則就館而不造於朝蓋既以入覲告進止遲速一聽於王命臣禮也聘禮賓至厥明即迓賓於館同盟之國來聘者少以速接為敬也侯氏賜舍之後戒以某日帥乃初事則逺近無定之辭使大夫戒亦不著其為何日蓋來王者多必俟其會集數宜旅見而後期可定故大夫往戒之期亦不可預定諸侯前朝皆受舍于朝同姓西面北上異姓東面北上春秋傳曰非天子不旅見諸侯凡朝覲皆旅見不獨會同也蓋六年五服一朝而侯甸男三服朝期尤密若日受一二國四三國之覲享而兼以饗食則日不暇給凡祭祀師田學校喪紀諸大事皆不能舉矣必積至兼旬度可衆見而後一舉以次歸之然後館舍有以容饔積易以致注乃謂來朝者衆顧其入覲則不得並誤矣至其饗食燕則不惟王有喪疾凡祭祀入齋期搜狩既卜日皆可以幣致也若時會殷同則必刻日以至受享禮賓命事涖盟既併於一日則饗燕亦必擇用其一同日而畢事使之遄歸然後王命速逹禮事無壅其來會者侯甸而外必州長卒正始召焉此分東西受舍正旅見之禮也諸公至少侯伯旅見之次日子男繼之則車逆送之度亦不至參錯矣掌客凡朝覲者饗食燕皆有定數秩敘則然以義揆之惟饗禮最重必一舉侯伯七獻共一饗子男五獻共一饗燕無分於爵等惟食禮之舉甚難其鼎俎豆籩簠簋各異又必每人而與之為禮勢不能遍又不可遺惟以幣分致為宜是以王禮諸侯見於詩及春秋傳者惟饗燕而未嘗有食也掌客所列饗食燕之數或王之師保周親或有大勳勞者間備其數未可以為常式侯氏裨冕釋幣于禰聘使筮尸若昭若穆以國卿或有耆艾而父尚存者諸侯繼世故釋幣必於禰也使臣以好將命苟無愆儀無失辭可安然而受主國之禮故至受饔然後筮薦若諸侯入覲則必在國能謹於侯度述職咸順於王心然後可保天子之寵命小有譴呵則負先君之付授而無以歸臨其臣民故將覲而幣告於禰事畢而肉袒請鉶乃先王崇禮消萌養諸侯而兵不試之道也國卿非出聘無由受太牢之饔飪故非薦於祖考不敢先嘗若諸侯則先君之受饗燕於王朝舊矣無為以饔飪薦也敖氏謂朝以裨冕與周官大行人異非也大行人以九儀之命同邦國之禮兼諸侯諸臣在國之服命而言故曰上公九章侯伯七章子男五章至朝覲會同天子衮冕以臨則雖上公不得與天子同服自宜禆冕以朝若有事於圜邱方澤四郊明堂天子服十二章之服則公侯伯子男自宜各服其上服而不用裨冕矣天子衮冕以享先王故朝覲會同服不得踰而諸侯各服其次服禮各有當也注謂遷廟之主而云禰親之非也按曾子問惟天子巡狩諸侯師行所載必遷主諸侯適天子告於祖奠於禰則所載必禰主蓋若得過於王或至易位而建置宗支則遷廟之主仍當留於本國不宜載也諸侯去國然後祝取羣廟之主以行至諸侯相朝惟告於禰則禰主亦不宜載所載必奠告之幣帛皮圭凡此類皆禮以義起者不可執彼以例此乘墨車三享後肉袒請命天子辭焉然後更賜車服故有乘墨車之禮使入覲之始凛然於車服之不可常反國之後時懼職貢業命之不修而無敢自恣也載龍旗弧韣載而不斾也弧在韣所以明之乃朝以瑞玉有繅曰瑞玉明必以始封錫命之圭也瑞玉必朝覲乃親執之則聘使所執其倣命圭之數度而為之者與聘使所執之圭上介臨事而授之或有繅而不用韋版侯氏瑞圭入門而奠於地非承以韋版不可經不言亦前見也嗇夫承命告于天子侯氏之入王都禮莫先於授館司空主之故因使嗇夫承命侯氏入門右坐奠圭再拜稽首擯者謁侯氏坐取圭升致命王受之玉瑞玉有繅奠於地又有韋版侯氏取圭升致命後受繅與韋版者何人王受玉後以授何人經記皆無文必前見無疑也周官冢宰職大朝覲會同贊玉幣玉獻則受玉於王者必冢宰而受繅與韋版者亦冢宰命之與聘使致命致聘君之命也侯氏親見天子而曰致命何也朝覲述所職也小大庶邦各有所命之常職其不朝之間又或有隨時而命之事今來王所皆親致於王下經所云聽事是也故賜舍之禮辭亦曰順命於王所侯氏降階東北面再拜稽首擯者延之曰升升成拜乃出國君燕射諸臣降拜稽首小臣先辭君必答拜諸侯覲享降拜稽首天子惟三揖蓋必能肅之以禮而後可懷之以德也周衰下堂以見諸侯王臣下聘而諸侯不答究察世變可以知先王制禮之意矣司儀王土揖庶姓時揖異姓天揖同姓未知始入泛揖之或稽首時以揖答經記無文必已前見四享皆束帛加璧庭實唯國所有三享儀法不具皆前見也注分三享無徴敖氏削去三牲魚臘籩豆之實得之而仍以龜金丹漆絲纊竹箭為次享則非也凡此類皆每嵗九貢之常不宜用享以義測之享王庭實以馬享后庭實以皮三享則以寶物良器如九江之大龜泗濱之浮磬雍州之球琳琅玕及魯壺紀甗之類然惟國之所有不可致逺方難得之物以上供也周官太宰以九貢致邦國之用大府職凡邦國之貢以待弔用蓋王朝之用無多而仍用之邦國也大夫所以専言弔用者以侯國有死亡凶札禍災圍敗天子所以勤恤賙委者其用大且多外此則下經所云重賜大行人所云時聘間問不過以方物非其土産者頒之耳匹馬卓上卓者迥立神駿之象侯氏升致命王撫玉侯氏降自西階東面授宰幣西階前再拜稽首享而曰致命凡職貢皆王所命也曰王撫玉則侯氏進玉可知既降受幣而後拜正以降時執幣授宰而後可拜也親相授受敵者之禮也至尊不可以下夷且旅見非一人禮煩則日不暇給故惟撫之而使人受也事畢三享訖宜更享后王后之禮事多以大宗伯攝其儀法宜見於春夏故以事畢括之乃右肉袒于廟門之東乃入門右北面立告聽事朝覲以述職故既享告擯者以入聽天子辨其所述之職事也肉袒以請懼有獲罪事故辭於侯氏直曰伯父無事出自屏南適門西遂入門左北面立侯氏肉袒請鉶則凛於王命至矣故有歸寧爾邦之命則使入門左以客禮待也天子賜侯氏以車服迎于外門外再拜迎拜及送皆與勞者同惟受命稽首蓋入覲則與內公卿同為王臣稟於一尊非受王命一以同列之禮交接與聘使及主國之臣受私禮而稽首以尊友邦之君異也重賜無數在車南重賜與命書車服同頒何也六服來王旬月無虛若命賜異日加之以饗食燕勞雖旅見分班受禮亦不勝其擾矣王所加禮則或賜以禮樂之器及典册彞器餘惟方物即他國用享之庭實也注引重錦而詁以善但重可以包善善不可包重也致事之璧琮侯國則别以璧琮報享王朝則宜并還其享玉蓋使受而不報則侯國以屢供為難而王朝則積於無用若以他國之享玉相報是君臣而降從鄰國之禮也故有賜物而無報享其詳必己見於朝宗故不覆舉耳或以周官內府受四方幣獻之金玉齒革兵器為疑不知與金及齒革並言則為九貢中未琢之玉明矣若璧琮琥璜則玉瑞也宜藏於典瑞典瑞職及玉人記天子於諸侯惟用瑞節為信無以璧琮琥璜賜者尚書分寶玉於伯叔之國乃始封時所分其有大勳勞賜以圭瓚大雅江漢之詩宣王以賜召虎則內公卿膺侯伯之命與山川土田同錫非常典也聘禮還圭璋外别言報享之禮玉則受其享禮之璧琮而别以璧琮報可知覲禮但言重賜郊勞賜館並無束帛則不惟無報享之玉而所賜并非錦文帛皮之類明矣侯氏升西面立太史述命周官太史掌建邦之六典以逆邦國之治其事與冢宰相聨故王賜諸侯服命諸公奉篋而太史述命也侯氏降兩階之間北面再拜稽首周官朝士外朝之位三公北面射人射朝之位三公北面諸侯在朝亦北面則三公居中而諸侯左右分列明矣劉歆偽撰明堂位謂三公中階之前北面東上亦據此二職此拜於兩階之間與射朝位同蓋近東西階而中央則空之以避三公之位也同姓大國則曰伯父其異姓則曰伯舅同姓小邦則曰叔父其異姓小邦則曰叔舅禮文殘缺惟聞伯父叔父之稱蓋舉其尊者而言其實同姓在子孫行者辭必有異呂命伯父伯兄仲叔季弟幼子童孫蓋其凡也尚書稱小子封小子胡皆弟也况子孫行而可冒伯父叔父之稱乎異姓姻近而行卑者亦不宜稱舅其同庶姓専舉其爵曰侯氏伯氏與以國大小為别亦未安饗禮乃歸聘使始至即致飱饔饗燕既畢將歸而後贈賄侯氏則賜車服重賜並頒及將歸而後饗禮何也奉使而誤不過主君不親饗食而邦交如故也故次第致禮而後賄贈使歸報其君侯氏而有干王章或賊賢害民暴內陵外而不寧於其邦雖時會來王不遽加以九伐之法必將有削地降律之罰焉故必肉袒請聽事待天子有無事歸寧爾邦之命更賜車服重加命書然後繼此得為諸侯於是乎榮以饗食厚其燕好而歸之此先王制禮之精意也諸侯覲于天子為宮方三百步四門壇十有二尋深四尺加方明于其上記字宜冠此節之首而誤置篇末也周公振綰綱維運動六服養諸侯而兵不用莫大於朝覲宗遇會同之禮而會同所關尤重五官之長皆涖事焉盟書則登於天府六事本各為一篇至周之衰惟覲禮尚存諸侯朝覲適當朝日夕月之期天子常帥以用事焉救日且帥諸侯陳五兵五麾則朝日可知記者雜述舊聞以補經所略因拜日而並及方明之祀故事無首尾辭氣亦斷缺不完經文之體無是也若正述會同之禮則宜詳載發禁施政要言載書刑牲歃血之事而無一及焉且會同禮重春秋皆宜有之故周官或謂之大朝覲不宜附於覲禮之末而闕略至此其為記者掇拾於禮亡之後決也方明者木也自為注釋通經所無記文多此類設六玉注謂設玉者刻其木而著之蓋以在下之璧非陷置木中則難於設不知言設則非陷置於木中明矣且玉所以禮神也方明之木象神則禮神之玉亦不宜附著於木蓋主於匰蒩有館方明未設宜有類匰館者以函之及設有類几案者以承之其度較廣而虛其中以設在下之璧圭則薦於方明之上四方之玉奠於四旁雖經傳無文然非此則義不可通上圭下璧天氣發生於春則圭宜用東方之色地氣凝結於冬則璧宜用北方之色上玄下黃木用天地之正色則玉宜用青玄以間之圭之體方璧之體圜又陰陽互藏天地交泰之義也四傳擯擯者各就其等傳王命以升諸侯其從者唯奉旗之上介也據周官司儀三享皆於壇則非羣介皆從不足以展事未審壇階三等何地以容之豈但將玉幣而庭實則陳於宮外别有人相授受與禮日于南門外禮月與四瀆于北門外禮山川丘陵于西門外上文拜日於東門外此又易拜為禮以示非秩祀之期有拜禮而無奠祭也春夏陽故皆禮曰秋冬陰故禮嶽瀆山川五嶽尊於四瀆不宜有瀆而無嶽必傳寫誤嶽為四而後儒莫辨也周官司儀載合諸侯於壇而不及拜日與祀方明據此記序次則祀方明之前日當於壇宮堂北張帷承幕以設方明為外設黼扆或皇邸質明諸侯各就其旗而立王入壇宮升堂以次傳擯朝享受禮畢王乃帥諸侯拜日於壇宮門外反徹帷幕以祀方明祀畢王乃發命使諸侯受命於方明有不協則歃血而盟載書藏於司盟無不協則册書藏於太史諸侯各記其事於辭而歸按春秋傳楚子會諸侯於申宋向戍獻公合諸侯之禮六鄭子産獻伯合諸侯之禮六則天子大會同載於河間獻王所獻邦國禮者必甚詳惜唐以後竟失之耳注所引朝事儀似天子自王宮帥諸侯以朝日於東郊然後退而朝諸侯於壇宮與此記及司儀俱不合其辭意亦不分明蓋必既朝諸侯而後可帥以朝日則不得云退而朝諸侯必曰退而為會盟乃可通也祭天燔柴祭山丘陵升祭川沈祭地瘞天神地示之祭四者該之人鬼設尸以代饗則惟理墮於階間而已不及日月何也三辰麗於天祭義云郊之祭大報天而主日配以月則幽宗之祭亦用燔燎明矣秦始皇三十六年使者自關東夜過華隂有人持璧遮使者曰為我致滈池君明年祖龍死人忽不見置璧而去御府視璧乃二十八年濟江所沉也先王制禮通幽明之故而知鬼神之情狀燔瘞升沉以逹其氣豈苟然哉偏駕不入王門記王門王都之門也天子五路惟玉路不以賜人金路以下諸侯始封偏得其一故曰偏駕入王都而羣駕天子之車則使人疑故五等之國並乘墨車所以彰臣節定民志也不入王門則行於畿內得乘可知矣奠圭于繅上或記者即以韋版為繅或奠圭時以繅韜圭而加於韋版但繅不宜直措諸地耳儀禮析疑卷十
