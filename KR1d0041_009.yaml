body:
  text: 儀禮析疑巻九翰林院侍講銜方苞撰公食大夫禮賈疏謂不言賔介以小聘之上介乃士專言大夫然後可包大聘之上介小聘之賔得之而義尚未盡專言大夫明士介不得與又本國之臣有大勲勞亦用此禮春秋傳魏絳和戎晉侯與之禮食使佐新軍是也賔出拜辱大夫不答拜賓拜大夫之辱而大夫不答以君命未將明惠出於君而已不敢與也即位具謂羣臣即外朝之位以待君出也蓋諸侯三門外朝在大門之内故序立以待君出然後延賓入大門東轉鄉廟而卿大夫從君以入也鼏若束若編若束若編著其異於尊鼏之用布也可束可編以覆者惟茅為善故知以茅於尊鼏明著其以綌而鼎鼏則以製作之方見其物周人之文簡而愈明類如此設洗如饗燕與食存而饗禮則亡蓋其禮甚嚴几設而不倚爵盈而不飲故諸侯苦其難行而去其籍䘮祭惟大夫士之禮存亦職此之故耳春秋傳趙孟欲一獻衰世之人怠於行禮如此飲酒漿飲俟于東房無獻酬故無尊而惟具飲酒一食之頃無用六飲故惟胾漿曰俟蓋酒人漿人奉之待事至然後實觶以授宰夫也他禮酒尊多設於户外嫌或俟於堂東故特著之凡宰夫之具饌于東房大射禮薦君之脯醢亦特表其出自左房則燕禮具官饌於寢東在堂上而不在房中明矣食禮在廟凡廟祭籩豆簋鉶設於東方夫人親薦諸侯相饗夫人亦有事焉此聘使禮輕故使宰夫饌具於此大射在射宮房中無禮事亦可使有司饌具若路寢之東西房則君之几席書册食閣皆列焉此燕禮所以饌具於堂上與大夫立于東夾南西面北上此以見東西之節而面北之節並見矣曰東夾則知夾在東墉之外曰東夾南則知夾室之基齊於箱之檐霤而不並於堂基蓋兩夾之基必内縮然後堂東堂西乃有待事於堂下者之立位也射禮三耦俟於堂西司射適堂西取弓矢於階西所謂堂西乃西夾之南又其南則階西也堂東階東之節亦然至此始見羣臣之位明公入然後從而入公與賓升堂然後羣臣與介各就其位也知非先立於廟以俟公之入者饌具者必先有事於廟羣臣則宜從君介從賓以入而位次羣臣之後則同時而就位明矣冠禮主人之兄弟及擯者就位在未納賓以前明其先立以俟也使羣臣先立以俟則其文當在饌具之後納賓以前而公與賓升之後惟著介位可矣主國羣臣至是始從君而入以是知篇首即位乃卿大夫士即位於外朝以俟君之出也宰東夾北西面南上内官之士在宰東北西面南上鄭本西面下有南上二字註古文無之敖氏從古文是也宰獨立於此南上之文無所用之註以為宰夫之屬疏因謂非止一人以曲附南上之義獨不思篇中兩稱宰大羮湆亦可云宰夫之屬執以授公乎大夫皆位東夾南宰獨位其北何也賓客之事皆小宰及宰夫所掌内官之士亦屬内宰故宰位東夾之北西面以監視饌具於東房及内官之士由北堂而即事於東房者莫尊於宰而位序在大夫士之後職是故也侯國無冢宰當以司徒兼攝詳具春秋傳春秋傳晉趙孟欲一獻曰武請於冡宰矣以専主賓客之事也内官司宮之類故立於宰之東北而少退以皆無堂左右庭中之職事也大射禮司宮工人士梓人皆有事於堂上而降立北階下義與此同記曰宮宰夙夫人疏謂侯國無内宰誤介門西北面西上聘禮介從賓入以介各有覿又賓當為士介辭也食惟賓與上介不過受賓侑幣耳故後賓而入立於門西公當楣北鄉至再拜賓降也公再拜翁荃曰士昏禮鄉飲酒鄉射但言再拜而不言至賓主敵體始相接主人先拜則拜賓之至無疑也若燕射則義為君臣使宰夫攝主人朝夕在朝疑無拜其至之禮故特著之燕射乃本國之臣故拜至者宰夫公食聘賓則親拜其至以是推之公與客燕介為賓禮殺拜至者亦宰夫而本國之臣有大勲勞而與之禮食則君亦宜拜其至前再當作一或作公賓西階東北而答拜不言階下既降而未升則不待言矣不言稽首凡答鄰國之君拜鮮不稽首亦不待言也公降一等辭曰寡君從子雖將拜興也賓栗階升不拜命之成拜階上北面再拜稽首凡再拜稽首而不升拜惟膳宰送爵於公大夫媵爵大射賓始受命燕射之終公命徹幂卿大夫降拜則然至公酬賓賓媵爵於公則小臣雖辭賓升即成拜而公亦無再命惟食禮升而不拜再有命而後成拜何也以本國之臣而君拜其至禮過於恭即他國之賓始聘拜其至饗拜其至至是而三勤亦過矣故賓終拜於下而升不敢拜自同於膳宰之送爵大夫之媵觶以明其震悚不寧之意也惟賓以不敢拜明異敬故公又以命成拜為優禮也惟聘與食釋此辭蓋賓之盡禮於主君者莫重於送幣而拜稽首與本國之臣奠贄同也莫重於以賓禮接而降拜稽首與本國之臣為賓者同也故辭加廹焉而賓之升拜又各異聘賓則已拜稽首於階下故以升而即拜為敬一循臣禮之常也故公亦不命之拜食則公先拜至賓降又降辭施禮過重故以升而不拜為敬示不敢成拜一如本國之臣拜稽首於階下而不升故公命之升而後成拜也旅人南面加匕於鼎退疏謂旅人即燕禮旅食者非也燕禮尊士旅食於門西與士相連而同位則知為庶子學士之觀禮者此與饔人聨事而别之曰旅人則饔人之屬士大夫長盥洗東南西面北上序進盥退者與進者交于前卒盥序進南面匕饗禮亡燕之牲以狗用為脯醢無所用匕惟食禮專主於食具太牢公親視饌故大夫匕士載以致其隆也三牲魚腊腸胃倫膚人載一俎故大夫序進以即事蓋食禮大夫士無他職事惟助君以養賓故儀繁而不殺宰夫自東房授醯醬公設之賓辭正聘禮賓公授几賓不降而拜於西階上所以自别於本國之臣也此公親設醯醬賓辭而不拜至揖食然後降拜升成拜所以自比於本國之臣也相接之初自别以示禮之異正禮既辨自比以示敬之同皆義之宜也或謂公拜送几故賓答拜設醯醬涪粱公不拜故賓亦不拜近似而非也使非自别於本國之臣則公授几時亦宜降拜俟主君辭而升成拜無為兩拜於堂上使非自比於本國之臣則公親設醬亦可以拜於堂上俟公揖食然後降拜升成拜隨時以變而稱事之宜所以盡在物之理也旅人取匕甸人舉鼎順出奠于其所此文宜繼大夫既匕而退之後而别舉於此何也非一時之事也蓋公當降盥賓從降揖讓而升使取匕舉鼎者閒厠其閒則瀆慢而不恭即俎未陳設而使取俎者與出鼎者交錯亦亂雜而無紀故必待公立於序内賓立於階西豆俎既陳而後終階下之事贊者負東房南面告具于公註疏本一人贊者無義意可求敖氏據石經削之但上文先者一人此時事畢宜退疑本文乃先者一人降而傳冩者落降字也經於執事要人無見其升而不見其降之義公再拜揖食凡送爵惟拜而食加以揖何也躬親獻酬則送爵而受者自飲之可矣食禮公弗與故拜饌而興又推手以速賓之食興以授賓賓祭之賓祭之則受可知矣受不言興祭不言坐以其儀詳具祭肺故省文註謂獨云贊興優賓難通註豆祭似當作際傳寫誤也下註又云每肺興受祭於豆際則非作際義不可通矣魚腊醬湆不祭醬為食殽之主而不祭以其為朝夕恒設之物也大羮公所親設而不祭以三牢既各有肺祭又以柶扱鉶取其肉之羮者而祭之則其中已有湆矣且醬湆與酒醬異酒醬之質清潔酹於地則徐自乾醬湆滲漉雖旋掃除甓色必為之變矣宰夫授公飯粱公設之于湆西醯醬品味之主也大羮湆禮所重也粱加饌之首也故公皆親設蓋執豆如宰言執於蓋豆之閒文當然也曰執蓋豆則似蓋加於豆而兩手共執之曰執豆蓋又似所執惟蓋先言蓋後言執豆而曰如宰則分執之與左右手並著矣此經文之竒而法也宰進大羮湆所執鐙也如曰執蓋豆如宰則似宰所執亦豆鐙辭意之無微不辨如此先者反之由門入升自西階先者反之明衆騰羞者亦反取豆以進不獨先者一人也正饌之豆出自東房牲俎升自碑南惟庶羞入自門升自西階者正饌祭而不食飯用湆醬則所食惟庶羞故比時而升自爨鑊取其温也正饌惟大羮由門入義同其升自阼階則以當授公故耳先者一人升設於稻南簋西閒容人旁四列西北上膷以東臐膮牛炙炙南醢以西牛胾醢牛鮨鮨南羊炙以東羊胾醢豕炙炙南醢以西豕胾芥醬魚膾衆人騰羞者盡階不升堂授以蓋降出此節事緒使秦漢以後人筆之必先言豆之數升堂而羞惟一人嗣言衆人騰羞者由門入升自西階盡階不升堂然後言先者一人升設然後言其次皆以所執豆授先升者然後言授豆者皆以蓋降然後言衆騰羞者皆反取豆而復進之然後言設羞畢則降者逆出如此則文倍焉而其節始具且與上下文義轉未能脗合無閒經則以逆為順簡而愈明自衰周無能為此者矣取粱即稻祭于醬湆閒醬豆湆鉶之間也賓北面自閒坐左擁簠粱右執湆以降公所親設大羮為重加饌至粱而食物傋左擁右執則無暇及其餘矣賓升公揖退于箱尊卑分殊主賓未習而與之共食不惟於主君為䙝而賓轉不能自適故退於箱以俟之庶羞惟所欲而不言所舉亦此義也以是知諸侯之廟有東夹也聘禮西夾六豆設於西牖下饌於東方亦如之則是大夫士之廟亦有東西夾也蓋中室之前為中堂左右房之前為東西堂左右夾室之前為東西廂上下同之特深廣之度異耳如今逹官富人家聽事所中閒三以並東西有墉墉外各附一閒外異其屋脊而内相通古制則中棟之北以為室房中棟之南以為堂廂則異耳觀尚書顧命西夾敷王之几席聘禮豆設於墉下則中棟以北東西房之南必鑿墉闢户以通於夾室觀此經公退而待事於箱則堂前東北墉必包檐柱留餘地以逹於箱而容人之往來堂前隆起以逹於階者基必深非深不可以布主賓之席展進退拜獻之儀也兩廂之基必淺非淺無以容堂東堂西待事於下者之立位也賓升再拜稽首受幣當東楹北面退西楹西東面立聘賓三退負序以執圭當進授辟公之拜於堂上以逺為宜也此則公拜送幣賓當降辟於階下以速為宜故近立西楹之西賓北面揖執庭實以出庭實乃執者以出而不目其人何也下文上介受賓幣從者訝受皮則别有執皮者而非賓兼執不待言矣取粱與醬以降西面坐奠于階西明知己所當得而不敢必主君之以歸謙也東面再拜稽首公降再拜惟敵者主人拜迎於門外公始迎賓再拜於門内不敢以臣禮待之也惟本國之臣有拜於階下而不升成拜公拜至賓降拜而升不拜欲自同於本國之臣也故公必命之成拜以升而成拜友邦之臣之所同拜於階下而不升與升而不復拜者本國之臣之所獨也大夫騰爵者拜而不升公命徹幕卿大夫降拜稽首升而不復拜食禮既終賓拜稽首於階下又自同於本國之臣也公降而答拜使賓無庸復升終不敢以臣禮待之也主賓各盡其敬上下皆得其安是謂因人性而作儀賓取粱與醬以降則賓者以告於箱於時賓自拜於階下公要其節而降拜因以送賓也如公自箱入堂則賓降時公宜辭公降時賓又辭節文滋繁義無所取蓋自聘享禮賓覿問之後饗禮既行敬文皆備至於食而主賓益渥洽矣故儀可漸省也介逆出公食賓介不與焉其從而至以當為賓受侑幣耳其逆出以待賓之授也主君絶不與為禮以介當特受食蓋賓介可同獻酬而不可同食食之饌具多賓介異等難並陳即並陳主君亦難與為禮故簡其節而異其期然後事易舉而敬可專也有司卷三牲之俎歸於賓館卷者振取俎實而置於篚也牲體有脂膏或别有以裹之如遣奠之包敖氏謂并以俎歸則其文當曰以三牲之俎歸於賓館明日賓朝服拜賜於朝拜食與侑幣皆再拜稽首此篇於賓即位曰如聘於設洗曰如饗拜賜已總見於聘其詳必已具於饗而覆舉之何也經於禮之大節必一再舉之故至燕禮然後文多畧焉食與侑幣分拜明羞與俶獻無幣則止於再拜也上大夫八豆八簋六鉶九俎魚腊皆二俎上大夫之禮乃附見於下大夫何也以示豆籩鉶俎之數雖各依爵等而主君徳意之厚體貌之隆則上下如一所以固邦交而彰禮信也若舉上大夫之儀則疑每下而差减矣豆實實于罋陳于楹外二以並北陳簋實實于筐陳于楹内兩楹閒二以並南陳豆實簋實雖分外内而並陳於兩楹閒故總見之皆自阼階降堂受授者升一等賓止也主人取醬湆降自阼階故客亦就阼以便主人受授皆於中等以授者升一等見之而賓止於中等而不更降主人之降沒階而後升執醬湆幣者俟於階下並見矣聘禮歸饔餼賓儐大夫降堂受老幣大夫止與此大夫降取侑幣賓止不降同以旋當拜稽首於階下故儀之小者可畧也然聘禮大夫之止又以賓欲盡敬於主君將命者不宜固辭此則與主人降受醬湆相連受醬湆止而受幣降嫌輕禮而重財義非一端可盡也賓執粱與湆之西序端主人辭賓反之敖氏謂此下當有辭於主人降一等主人從十字非也賓既受湆更執粱與湆以之西序此時主人在堂上賓即有辭無為降階若辭侑幣則主人不許其辭當以授其介或私臣故降一等而主人從之以對耳受侑幣再拜稽首主人送幣亦然平敵而稽首以主人稱君命以將幣也聘禮賓雖私獻猶遥稱君命以將之况食他國之卿大夫有不奉命而私有事者乎惟稱君故受者如受主君之賜而送者亦稽首也辭于主人降一等主人從不言主人退辟何所以下文皆如公禮包之也平敵相食而不與賓共之以承君命而食異國之賓不敢用同國相食之禮也其他皆如公食大夫之禮其他謂賓三飯而後以幣侑受侑幣後賓入又拜之類不見於經恐疑無此二節也若不親食則公作大夫朝服以侑幣致之大夫不能親食公猶使他人以侑幣致之則賓介私面大夫相食之禮幣皆官給可知矣是以受者必稽首也饗以訓恭儉燕以示慈惠而其閒復設食禮何也惟饗為待賓客之正禮其義極嚴几設而不倚爵盈而不飲故復食之以示饜飫焉燕禮本為諸臣而設蓋以酒獻酬可徧於多人故於本國用之而閒用於國客則簡其儀節記所載不嚌肺不啐酒經之禮辭亦曰請吾子與寡君須臾焉是也若食則並立賓介而延食者惟賓蓋介宜别食揖使自食即時而畢其禮極簡可無費時而壅國事也經記於國客多言饗食而與客燕惟附見於燕禮之末以其事甚希周官小行人掌待四方之使大客則擯小客則受其幣而聽其辭禮官之司及大小行人司儀掌客絶無王朝饗食使臣之禮蓋禮不可瀆事亦難周也春秋傳王饗管仲與晉鞏朔宴乃周室陵夷為此慝禮非周公舊典亨于門外東方記翁荃曰儀禮亨或於門内或於門外註於燕禮言臣所掌意謂君禮亨於門外别於鄉飲鄉射臣禮之在内而無解於少牢臣禮饔爨亦在門外此註言大夫之事意謂同於少牢大夫禮之在外而無解於鄉飲鄉射亦大夫之事而亨於堂下且燕食皆君禮其臣而分二義亦無所處國君備官燕食羣臣國賓相示以禮自以亨於門外為宜鄉飲鄉射亨狗於東方以表養賢優老之内心自以門内堂下為宜故諸侯之鄉大夫國卿也州長黨正大夫士也而飲射皆亨於堂東大夫之祭主婦籩豆簠簋鉶羮之事多故視爨與饔並使有司共事於門外士則公有司私臣甚少故主婦爨於堂西而有司亨於門外體事制物各有所宜故耳拜食與侑幣皆再拜稽首臣拜君賜皆稽首無待於言必周衰大國之卿驕亢有不稽首如孔子所稱拜乎上傳稱孫子與魯君齊登者故因記上文大夫之禮而特著之儀禮析疑巻九
