body:
  text: 儀禮析疑卷一翰林院侍講銜方苞撰士冠禮古者十五入大學九年而後出學冠者不宜有任職之士其用士禮與昏禮之墨車同乃攝盛也蓋公卿大夫元士之適子並入成均即士之庶子亦恆為學士舍不帥教而屏之逺方鮮不登于天府者故其始冠俾攝用士禮及三十而娶則有九年出學而升於司徒升於大學升于司馬者故攝用大夫之墨車若農工商之子雖能為學士而其父非任職之士冠不得用士禮其室居不足以陳服器親賓不足以展禮儀也疏義支離皆緣鄭注任職居士位必欲強伸其説謂冠者身為士故援喪服小功章大夫為昆弟之長殤以證之喪服小功章大夫公之昆弟大夫之子為其昆弟庶子姑姊妹之長殤以兼公之昆弟大夫之子故不得去兄與姊乃割截經文曰大夫為其昆弟而謂兄為殤則大夫之冠不以二十其謬顯然前儒莫辨以未詳讀經文故耳至小記之文乃丈夫冠而不為殤而疏作大夫則其誤又不待辨矣既謂大夫冠不以二十故據大戴禮公冠篇謂公冠四加又據家語冠頌謂王大子之冠擬公不知公冠篇四加元冕不過約此經三加爵辨而意為之説冠頌則又傳會公冠篇而為之説耳天子之元子士也天下無生而貴者則其為妄説明矣如其言士三加用爵辨其上服也公侯當以衮冕鷩冕為四加而以元冕何義乎陳氏祥道又謂天子之冠宜五加皆無稽之言據左傳諸侯十二而冠因援尚書王與大夫盡辨而以大戴記文王十三而生伯邑考證之不知成王之時周邦新造三叔流言多方攜二故禮以權制既葬而冠如家語所云是不可知若千八百國之諸侯上統于天子下監以方伯連帥夾輔以守卿嗣子幼弱正當從容督教以徐觀其性行必象賢而後繼世不宜定為十二而冠之禮以長其驕惰也秦王政年二十有一而冠載在秦紀則變易周公之典禮者至少可知矣魯襄公之冠或衰周慝禮晉侯不察而使魯行焉至文王十三而生伯邑考則理必無之詩曰文王嘉止大邦有子適當其年之謂也周公自述父母之事列於雅歌豈反有不信而可以尨言亂之乎蓋漢平帝生九年而嗣立三年而莽以其女配焉故劉歆承其意竄此於大戴記以示文王早婚亦年十有二云爾筮于廟門凡朝聘饗食及冠昏之禮事皆行于廟堂而筮則于門外何也天子則普天之下莫非先王之臣庶也諸侯則二國之先君固比肩王朝而同方嶽者也士大夫之姻親朋友亦可以祖宗臨之卜筮外神故用事于廟門之外以獨伸其尊及嘗禘郊社尊無二上之義也主人玄冠朝服緇帶素韠即位于門東西面主人注謂父兄非也若兄可主則將冠者不宜紒而迎賓二辨非私家所服故用玄冠門東閾外之東偏也以筮人進受命于此知之有司如主人服即位于西方注謂有司主人所自辟除府史以下非也府史胥徒乃庶人在官者豈得與主人同朝服而即客位蓋族黨內中下士也周官黨正職凡其黨之祭祀喪紀冠昏飲酒教其禮事掌其戒禁則雖庶人之冠昏亦必使其屬監臨而教戒之况士之子既冠而得見于君見于鄉大夫鄉先生者乎士喪禮公史讀遺所謂筮人宗人即閭胥中明筮習禮者所謂宰即所屬之閭胥所謂賓即他族之師也黨正掌冠昏之禮事正以有司蒞事者可於五族中各擇其所知耳敖繼公既覺注疏之非而曰宰宗人筮人皆公家所使給事於私家者不知春官所屬之筮人僅下士二人豈能及私家禮事而尚書戴記所稱宗人則官中之師與司宰則六職中並無此官也惟取于族黨中明筮習禮者其人本中士下士故可假以筮人宗人之稱亦猶夏官之兩司馬公司馬耳二十五人之長在鄉曰閭胥在遂曰里宰故命筮告期皆贊主人以主人則家之尊閭胥則邑之長男女始生必書于閭史故冠昏之禮蒞事者必閭胥也惟國中之士賓贊有司或取諸官中及他官之僚屬若鄉遂公邑縣都則舍同黨五族之士安所取哉如主人為中士下士之不命者則宰祝宗人當取諸隸子弟之曾為學士而不升於司徒者其禮無傳然義不得謂之有司故此經皆就上士之冠其子者而言筮與席所卦者具饌于西孰所卦者注謂所以畫地記爻似未安土可以木畫若地已甓則木畫不能成文且可分隂陽而不能别老少又人所踐踏畫爻於其上非所以尊筮也少牢饋食禮云卦以木蓋以木為小方刻老隂老陽少隂少陽于其上各六方四營成易則釋一方六爻備乃以筆别書于大方以占玩耳所卦者謂所以為卦之物也若以木畫則當稱名如朼畢籌朴之類不宜曰以木曰所卦者蓋以木為四象故不敢别為之名筮人執策易大傳乾之䇿二百一十有六坤之䇿百四十有四策乃蓍之正名也句中有二筮故實指其物而易以策言之法宜然敖氏謂此傳寫之誤證以特牲少牢皆云執筮按特牲筮人取筮于西孰執之少牢左執筮于丈義皆不必易筮以策則此非傳寫之誤也卒筮書卦執以示主人書卦即卦者書之也以緊承上文卦者在左又特牲少牢有明文故不復言卦者書卦耳至此始言書卦則上文所卦者謂刻識隂陽老少之木而非以木畫地明矣苦不吉則筮逺日如初儀下始云徹筮席明即于是日再筮也不然則當如少牢禮云不吉則及逺日又筮日如初主人再拜賓答拜主人退賓拜送鄉飲酒鄉射主人戒賓賓拜辱主人退賓又拜辱疏謂此篇文不具禮則宜同非也鄉大夫興賢能州長禮先于學士或州之公士自當拜其辱以僚友而請賓以冠其子何為拜其辱哉義各有當也前期三日筮賓如求日之儀戒賓于十日之前而前期三日始筮賓何也以三族之不虞近其期庶可保也筮賓已定又至前夕乃宿之者至前夕則知可無奪于國事矣若更出意外而奪于國事則當擇于衆賓以攝之以事不常見故經不具耳宿賓賓對曰敢不夙興則以前夕為期明矣乃宿賓注云宿進也疏謂義與速同案祭統前期旬有一日宫宰宿夫人似不宜以進與速為義蓋先事而與之要也擯者請期宰告曰質明行事筮日請命于主人而宰贊焉為期則宰專命而主人不與何也擇日以行禮主人之家事可自專也為期則期衆賓兄弟有司以時至以里宰命之則儼若承黨正之教戒矣問胥里宰凡事掌觥撻罰使宰命告者亦所以肅禮事故主人不敢與也昏冠掌于黨正國法行焉故筮日宰亦贊命擯者告期于賓之家正賓或有國事喪疾不及更筮必以擬筮之次賔攝則次賓亦宜告主人親宿贊冠者禮同於賓亦宜告獨舉賓則兄弟有司既告於其位不復告于家矣陳服于房中西墉下東領北上贊者立于房中負東墉將冠者房中南面當户近于西故服陳西墉下取之便也凡著衣必挈其領故東領亦取之便也玄端玄裳黃裳雜裳可也此為緇布冠陳之緇布冠乃庶人所常著始加用之明身本庶人也三加而至爵辨亦宵雅肄三之義黃裳雜裳有司及衆賓可用主人正賓冠者必冠裳同色緇布冠缺項青組纓屬于缺緇纚廣終幅長六尺下經賓受緇布冠右手執項左手執前則缺項即謂緇布冠後當項處缺之敖氏謂以緇布一條圍冠為缺項别以一物貫之兩相又以纓屬皆非也既有紒以束髮無為又以緇布圍冠據經文乃以青組為纓後屬缺項而前繫于兩相以結于頤下耳今幽燕士大夫燕居之冠後多兩岐以組屬之以便或卷而髙或垂而下閭巷間人則出入皆冠之疑上古之緇布冠制類此爵辨皮辨緇布冠各一匴執以待於西坫南南面東上賓升則東面待于西坫南賓升自西階負西序而立取之便也賓未升執匴者南面賓升時面宜鄉之也賓既升則東面以賓自筵前降取冠辨在西階上之東宜東面以授之苦早東面則賓升時背之矣服可以陳於筵爵可以奠於筵而冠辨必執以待示將冠者以自敬其身之義也主人玄端爵韠不言冠者篇首朝服用玄冠則玄端之冠不待言矣兄弟畢袗玄玉藻無君者不二采謂未仕及去位者衣裳上下同色也此兄弟蓋未仕者袗玄即所謂不二采也衆皆袗玄即間有己仕者亦降服以從同故曰畢也敖氏謂盡服玄端則經文宜曰畢玄端此經于主人擯者玄端之中特揭袗玄而昏禮于從者曰畢玄端於女從者曰畢袗玄則異制明矣伯叔父不與何也不可與主人同位于序端不可與兄弟同立于洗東也贊者玄端從之敖氏謂贊者以下之衆賓皆俟于賓之門從之立于主人之門外非也鄉大夫興賢州長習射國政也故羣士承之而有此禮冠則賓贊之外執事者皆私臣也即親黨中有來觀禮者亦不宜俟于賓之門主人揖贊者與賓揖先入每曲揖主人當與賓讓而入故揖先贊者後賓然後每曲與賓揖而贊者從之也主人升立于序端西面冠者筵于東序少北則主人惟序之北端可立敖氏謂不立於東序辟子之坐且不參冠禮非也使主人立于東序則迫近冠者之筵而礙執事者之往來立于序北端正臨視冠者之禮儀而曰辟其坐義無所處贊者盥于洗西升立于房中西面南上贊者一人而云南上故注疏皆謂與主人之贊者序但主人贊者陳衣後更無房中之事則此經南上乃所立之地宜近南非與人列序也猶下經設篚一物而曰南順注云北為上蓋冠者在房中南面贊者西面必立于其南乃可相覿如立于北則冠者非側身不能見又席東鄉西鄉以南方為上則無席而立者亦宜上南主人之贊者筵于東序不舉冠者之筵經記有明文也賓贊之事條舉之則布冠者之筵陳服執冠辨與徹之不目其人並屬主人之贊者可知矣贊者卒不言卒纓以兼治其屬于缺者統言卒乃可以該之冠者興賓揖之適房服玄端爵韠出房南面據經文似冠者自服而出蓋被服束帶納屨事褻且自成童已習為之故不敢以煩贊者敖氏謂皆贊者為之未知何據服素積素韠容出房南面賓之容在始加之先示冠者以威儀宜于冠之始也冠者之容在再加之後示衆人以威儀宜于服之盛也服纁裳韎韐始加舉玄端爵韠而不言裳以陳服時雖列三等之裳而冠者正服必玄裳不待言也再加三加不言衣以皮辨之色白爵辨之色赤而微黑則衣冠同色不待言也周頌絲衣其紑載辨俅俅則辨服皆絲亦不待言也不言帶緇帶三加所同也不言屨後有明文周頌孔疏云惟爵辨絲衣後儒從之皆據此經爵辨純衣耳但三加皆不言衣以冠則衣用布辨則衣用絲二辨同服不言可知若皮辨衣仍用布宜特文以表之徹皮辨冠櫛筵入于房初加入房服玄端爵韠以出則采衣委于房矣次加服素積素韠以出則玄端爵韠委于房矣三加後徹皮辨冠櫛筵以冠者不復入房俟門內之禮終而後易服也而再加三加後贊者捧緇布冠皮辨與櫛並奠于筵具見矣贊者洗于房中洗在北堂而曰房中者自房中入洗故蒙其稱以此推古之廟制北堂宜隔取東夾室之半而厰其北房之東北隅有戶以通于堂然後祭之日主婦宗婦女賓可自北堂入于東房鄭注北堂房中半以北賈疏房無北壁故得堂名非也棟以北僅兩架取一架以為室房復隔房之半以為北堂則祭之日籩豆鉶敦具陳于此主婦宗婦及子婦襄事觀禮者畢集于此主人且入獻內賓何所容其席位乎况無北壁則嚴冬凜冽婦人豈能終日待事于此為此説者蓋未達于士之廟皆有東西夾室耳室房所取惟一架亦臆説非事禮之實也側酌醴凡尊必有玄酒惟冠獨陳醴故云側凡酌未有使人助者不宜言側蓋傳寫誤衍冠者筵西拜受觶賓東面答拜鄉飲酒鄉射主人乃鄉大夫州長賓其所涖士民也故北面以答此以父之行為賓而答子弟之拜故東面冠者奠觶于薦東或醴或醮皆啐而不飲何也未見于尊親恐不勝飲而或愆於儀即此示以成人之禮也降筵北面坐取脯降自西階適東壁北面見于母母拜受子拜送母又拜冠者無見父之禮何也父為主而親臨之故冠後無庸更見即見贊者而不見賓之義也凡以爵相授受必拜父不可與子為賓主之禮故藉手于賓猶燕禮君不可與羣下交獻而以屬宰夫也祭于廟中則父可以答子之拜何也弟子之舉旅以廣神惠故長賓長兄弟答焉嗣舉奠尸且答拜故為上𧃊而拜酳爵父亦答焉以示宗祊付託之重也父子主恩自孩提以後視其寒燠而加之衣賜以餘􅅹而使之飲數數然矣使親以冠加而醴之則習為故常而無震動恪恭之義不若使賢者臨之有所感發而是則是效也子未拜送而母先迎拜何也肅拜也禮成於廟中故迎拜以示宗祊之重而拜止于肅則雖無改俠拜之儀而不為過禮也少儀婦人吉事雖有君賜肅拜其頓首惟見舅姑與祭獻爵稽顙惟主夫及長子之喪與臨君夫人之喪耳庶子之冠母答之無異禮何也設長子死舍庶子無從故不容有異也凡內事主婦位于房中冠則受脯於東壁何也將冠者房中南面尊甒服屨陳于西墉贊者負東墉而立則無地以位之其不可待于北堂何也三加畢贊者將入洗觶男子婦人無禮不相接祭之日主婦出獻賓祝佐食主人入獻內賓義不容已故禮答焉冠子而母與贊者數相面則義無取而禮與辭亦無可施是以出待于闈門外也其不于內寢何也母喪疾則使人受脯于西階西階無受者而母不在東壁則疑于父存而母殁爾入見姑姊如見母不目其地何也姊必于母之寢姑必于大母之寢遭變則通焉不目其地然後辭約而義該不言妹文闕也兄弟姑姊妹皆見則伯叔父大父母不待言矣父殁而冠見伯父叔父而大父母無文亦此義也伯叔父或異居則見君之後見于其家然後見于鄉大夫鄉先生時義宜然乃易服服玄冠玄端爵韠辨服可攝而不可常也故易之而後出乃醴賓以一獻之禮士惟祭備三獻鄉大夫賓興州長教射雖國政賓不過一獻故冠昏不得踰也注謂醴當作禮非也與昏禮醴婦于房中同義贊者皆與贊冠者為介此贊者謂主人之私臣也贊冠者賓之贊也篇首但列兄弟有司之位而不見衆賓蓋姻黨中行輩或來觀禮無多人當與兄弟列序其餘執事者皆有司也又于此見冠禮姻黨中尊行不與使與則宜特見衆賓之位若不醴則醮用酒周公制禮以宰制羣衆宜定一尊使知所遵循而或醴或醮或殺牲或否並著于禮典疏以為夏殷之禮非也五方之民異性循而習之者異俗修其教不易其俗齊其政不易其宜聖人之道所以曲成萬物而平易近民也或醴或醮因其國故焉爾或殺牲或否稱家之有無焉爾若殺則特豚載合升曰若殺則三醮之乾肉折俎非特殺明矣冠重禮也而醮之終乃加乾肉總一醴則惟脯醢降及庶人禮物尤殺是以比戶可行也若不殺即禮賓止脯醢乾肉而酬必用束帛儷皮又以見古人薄于飲食之奉而特重交際之禮也注云明亨與載皆合升下文離肺實于鼎不宜預闌入載俎事疏云鼎直有升名俎則升載兩稱不過以經文連載與升曲為之解義無所取敖氏以載為衍文乃定論也吉祭用右體虞祭用左體此合升蓋半用于冠者之俎半用于賓俎三醮攝酒如再醮加俎嚌之皆如初嚌肺疏謂再醮之薦不徹三醮因之而加俎敖氏謂不宜相因是也疏蓋因再醮不言徹薦三醮不言加籩豆而臆為是説不知殺牲之再醮未言攝酒經乃遙承不殺之再醮而曰攝酒如再醮則再醮之徹薦三醮之更陳籩豆皆包於其他如初內矣經文之簡而有法類如此卒醮取籩脯以降有折俎而取籩脯者執以見母濡肉非所宜且脯非一脡可取其完者牲體則皆所嚌之餘也若孤子則父兄戒宿冠之日主人紒而迎賓周官黨正凡祭祀喪紀昏冠飲酒教其禮事掌其戒禁則有司宜與事者皆官紀之大夫士之子雖孤得用士禮有司皆本族中下士或共黨别族之士皆將冠者之等夷儔輩也故筮日筮賓為期可自主之若賓則必其父行不可以不冠而與為禮故戒與宿必諸父諸兄主之直至冠之日然後紒而迎賓以接時而加冠也父兄可戒宿而不可迎賓何也未與賓接而自往戒不若父兄戒宿為安若為主而命冠則父之事不忍以諸父諸兄攝也故寧使孤子自為主而迎賓猶娶有日而父母死哀痛方深自致命于女氏不若伯父致命為安若饗婦而授之室則父母之事不敢以伯父伯母攝也故寧使老醴婦而饗則廢禮于阼父在則冠于阼暫筵于主人之位以著代也醴醮于戶西暫筵於客位以昭敬也孤子自為主人冠加于阼而復就客位以受禮則義無所處矣故醴醮並于阼禮有父母而賓客之者遣之包牲是也所以重孝子之哀也有子孫而賓客之者冠之醴醮是也所以責成人之禮也若殺則舉鼎陳于門外注疏孤子尊得伸盛禮非也孤子為主而以盛禮自伸其尊非義所安或謂不忍仍父在之故地亦非也鋪筵席設服陳器一仍其故而獨不忍于陳鼎乎蓋鼎陳于門外賓燕之禮也冠而殺牲本為其子故不敢陳于賓燕之地孤子自主冠則陳于門外示特殺以盡敬于賓而非為己也不于賓燕之地以見情也禮之忠質也于賓燕之地以義起也禮之敬文也其他立于序端拜于阼階下乃義之不得復仍其故者爾苦庶子則冠於房外南面遂醮焉敖氏謂此指父在者父殁則禮同似未安古者期之兄弟未有不同宫者適兄在而庶弟冠于阼其義何居觀庶婦之不饋則知庶子不得冠于阼矣必庶子孤而無兄弟然後禮同于適耳冠者母不在則使人受脯于西階下不在或以疾或冠有期而歸視父母伯叔父兄弟姑姊妹之疾或出而不肯改適以待夫之命或有期九月之喪未卒哭不得反夫家也疏謂歸寧不應迫冠期而歸敖繼公謂出母如已改適或雖未改適而志有他義不得受子之脯某有子某將加布於其首願吾子之教之也冠加二辨乃攝用有位者之服使冠者自砥于德行道藝然是乃未然不可必之事故禮辭告賓但據緇布冠以為言言不過物且使庶人可通用也故祝醮之辭惟勉以德祈以福夀皆貴賤所同兄弟具在以成厥德初加祝辭曰棄爾幼志順爾成德略以冠而成人之義示之也再加曰敬曰淑曰慎內外交養樂善謹幾成德之實事也三加曰兄弟具在以成厥德修身以及家成己以成物所包之義益深以廣矣蓋必如是而後成人之德備也始加元服兄弟具來孝友時格永乃保之注詁格為至與具來義復敖氏云兄弟皆來乃汝孝友之德有以感格之無為不相戒勉而先漫為讚美之辭推經意似言兄弟具來汝必能以孝友相感格乃可永保同氣共族之恩耳凡人百行之敗多由兄弟恩薄大傷祖考心而睦姻任恤皆推之無其本矣故于始醮即此戒勉而再醮三醮惟祝其承福慶也祝辭則以是終而欲其兼成兄弟之德義更深逺矣屨夏用葛玄端黑屨青絇繶純純博寸素積白屨以魁柎之緇絇繶純純博寸爵辨纁屨黑絇繶純純博寸冬皮屨可也不屨繐屨退屨在後又不言設之之人所陳之地何也與冠事者多羣士主人之僚屬也冠可使之執服可使之設以屨煩焉則瀆矣必主人之贊者陳服而别使御者置屨其人微不可登于典册也不言其地既加冠適房易服而出則並易屨不待言矣無大夫冠禮而有其昏禮古者五十而後爵何大夫冠禮之有公侯之有冠禮也夏之末造也天于之元子猶士也天下無生而貴者也繼世以立諸侯象賢也以官爵人德之殺也死而諡今也古者生無爵死無諡記首言大夫有冠禮之非次言諸侯之有冠禮見于夏之末造則虞夏以來諸侯之子必既冠成人能象賢而後立之以繼世殷周聖王革而正之久矣次言天子之元子冠用士禮則諸侯大夫别為冠禮之謬不待言矣然推其所由來則以諸侯世國而不論其賢大夫世官而不論其德故有不安于童稚者而為此慝禮耳繼世以立諸侯本為其能象先君之賢故誓於天子然後為世子免喪類見然後命為諸侯安得有諸侯之冠禮乎任官然後爵之以德為等殺初試為士其德未成其業未著故必待五十命為大夫然後有爵有諡今士無爵而有諡其悖甚矣大夫有冠禮士有諡不言周之末造而第言古者無此此聖賢之言語氣象也儀禮析疑卷一
