body:
  text: 儀禮析疑卷三翰林院侍講銜方苞撰士相見禮所載不獨士禮而統曰士相見何也自卿大夫至於士惟所贄之物及受贄還贄辭讓之節相與之辭異而所贄之飾執之之儀以及士見于大夫卿大夫交相見卿大夫見于君異國之臣見異國之君凡為臣者燕見于君傳言之法相與言之事侍大人侍父言與視之宜侍君子進退之度侍飲食于君之禮自稱于君之辭先生異爵者之禮先於士無一不與士同故依類列叙而以士相見名篇贄冬用雉夏用腒凡請見皆使人奉贄以從及致辭于将命者及奠贄然後親執焉但入門升階必揖讓不可以授人又不可委于地豈古之揖止推手而少下之故無妨于執贄耶鴈與羔皆索維故知雉不用生也曰夏用腒則冬用鮮可知左傳惟君用鮮謂所得上殺之禽非謂生得者某子以命命某見雖有先容主人無願見之言義不得漫相就故禮辭首掲焉某也不依於贄不敢見初辭曰不以贄再則曰不依于贄何也贄以達禮而将其敬不依于贄謂不依于禮也正與不足以習禮相應但正言不依于禮則似以主人為失辭盖言之體宜然出迎于門外再拜賓答再拜主賓相見之禮或一拜或再拜各有義存焉冠禮戒賓主人再拜以卑幼之事勤尊長也昬禮主人再拜重先人之遺體而拜其以好來命也故使者不答以拜非為已鄉射戒賓則賓先再拜長吏以國政而親臨焉故重拜其辱也此篇主人再拜以賓自屈而禮先也特著賓答再拜以見凡答再拜者之通例也故他篇答再拜者第云答拜以既於相見禮舉其凡其三拜再拜而答一拜者又特著于經也惟鄉飲酒主人為鄉大夫其禮先于士再拜者六而士之禮先于鄉大夫皆一拜義尤大且深詳見本篇賓奉贄入門左主人再拜受賓再拜送贄出先言受而後言送與受爵同盖執贄以授必既受而後送者可拜也賓主相見皆受贄于大門内惟士昬禮受鴈於堂以筵几設戶牖間臨之以先祖與致禮于生人異也聘禮私面大夫亦受幣于堂以賓所將乃友邦君之命不可于堂下受也送贄即出待主人之請而後反見者示交有道而不可暱就記所謂小讓如偽也主人請見賓反見退主人送于門外再拜註謂賓反見即有燕禮非也物不可以苟合裼襲之不相因示民以毋相瀆也主人未報禮而以飲食留賓是瀆也賓遂留是自輕也康成盖因後有燕見于君之禮而云然不知燕見乃君以事召或有復于君非必有飲食之事也其或燕見而適㑹君之膳與稍事亦于下賜食賜飲之禮包之賈氏乃多為之徵而于君在堂升見亦云兼反見之燕益誤矣主人復見之以其贄不别用贄以贄本卑者見君長之禮故主人固辭然後暫受而即以其贄還不敢易也聘之享幣可易以報禮而圭璋則還亦此義也賓對曰某也非敢求見請還贄于将命者已得見矣以不敢更煩主人之接待為恭故設辭云爾賓奉贄入註云異日則出迎同日則否賈疏比類推説義皆無當敖氏謂賓不待迎而自入亦近似而非也不迎而入奠贄曾為臣者見其大夫君之禮也主人而以待其舊臣者施于賓賓而以事其故主者下其友無時焉而可同日異日義何所别而以此亂禮之大經不亦悖乎盖迎拜如前儀而簡殘文闕焉爾出主人送于門外再拜以是知古人之交不苟合也以恒情言之賓還贄而出主人宜如初見請賓復入以示眤好乃聽其别而不留盖不敢遽相親附也交接之禮有相趨而不相揖者有相揖而不相問者有相問而不相見者至相見進此則為朋友矣志之同道之合非久與相處不能知其真故有相見而不為朋友者慎之至也士見于大夫終辭其贄于其入也一拜其辱也賓退送再拜士與大夫比肩事主而相見不出迎入而拜乃一答送賓不出門不已倨乎盖侯國三卿五大夫兼攝六職凡有聨事他官之士亦相臨長平時必使明于等威然後體統肅而教令行觀晉先縠不用元帥之命以喪晉師薰隧之盟鄭公孫黒矯君之位包藏亂心子産亦無如之何則知禮嚴于爵等所以大為之坊也大夫於士之見不親答士朝不坐燕不與所以遏賤妨貴之萌也黨正以飲酒正齒位六十者坐五十者立侍以聽政役所以妨少陵長之漸也履之象曰君子以辨上下定民志履者禮也禮以消患于未萌盖可忽乎若嘗為臣者則禮辭其贄敖氏謂因此知士大夫相見用贄不獨始見為然非也此乃家臣始升于公而見大夫君之禮猶周官射人職三公孤卿大夫因射而朝則有贄耳若每朝而有贄士大夫每見必有贄不勝其擾矣賓入奠贄再拜主人答壹拜嘗為臣者乃以一拜答則外此皆答再拜不必言矣某也命某某非敢為儀也嘗為臣而稱名以辭贄何也既升于公則宜以公士待之矣不迎不報謁存故義以循其本而辭贄稱名重自下以厚於終主人之辭益恭故賓自謂賤私以効其情禮之所以曲得其次序也下大夫相見以鴈飾之以布維之以索如執雉雉不可生服鴻鴈尤難雖布纒其翼索維其足能禁其首之揺喙之啄乎奠授之際何以為儀以是決其為舒鴈也上大夫相見以羔記曰諸侯之上大夫卿以周官小宰小司徒類皆中大夫而推之也此云下大夫相見以鴈上大夫相見以羔則王朝侯國之卿大夫士其贄同與后勞諸侯及卿大夫案列惟分二等同義以難一一區别禮窮則同也春秋定公七年公㑹晉師于瓦左傳范獻子執羔趙簡子中行文子執鴈魯于是始尚羔如士相見之禮士之類非一國中與鄉遂異地已升與修業者異向聞聲相慕朋友為合其交故有相見之禮若由士而大夫由大夫而卿則涉公事及以鄉黨之禮接者非一日矣而復有見禮盖始進為大夫為卿必就見同列之先進也庶人見于君不為容進退走古者天子諸侯耕耤廵方省耕省斂大詢時田皆與庶人接故庶人有見君之禮疏專以庶人在官者言未安士大夫則奠贄再拜稽首君答壹拜覲禮諸侯稽首王皆不答周官司儀土揖庶姓時揖異姓天揖同姓傳謂天子于宋有喪拜焉則餘無拜禮諸侯于其臣燕食及射皆答拜則執贄以見答拜宜矣舊說君拜以空首盖以敵者頓首而差之君于士不答拜也而受爵始見則答焉父至尊也而嗣舉奠為𧃊則拜焉舅至尊也而婦始見饗之則拜焉盖過禮以致敬使卑者震動恪恭以職思其居也賓對曰君不有其外臣臣不敢辭再拜稽首受凡敵者之辭讓必至再三惟異國之君則曰不敢辭者以事君之禮事異國之君則于禮為過也春秋傳季孫宿如晉有加籩辭曰下臣君之隸也其甘自屈辱乃欲固外援以内制其君觀此可以知先王制禮之意凡燕見于君必辯君之南面若不得則正方不疑君疑當作擬立必正方非徒自正亦欲君因而自檢也若便辟側媚之臣必擬君之欲其就已而邪嚮之此正心術邪正之辨君子小人之分岐也辯辨别也註訓正敖氏訓視不若本文切著凡言非對也妥而後傳言曰傳言則義與出言異周官小臣掌三公孤卿之復逆御僕掌羣吏之逆萬民之復侯國制亦宜然復者君有詢而覆對也逆者已欲有言也所覆對則小臣御僕轉達之所欲言則必俟君聽政畢安坐無事而後白掌復逆者入告某欲有言或轉達其言乃所謂傳言也與君言言使臣人君治政成民一日萬幾而要道莫如使臣能使大臣羣臣皆稱其職而各盡其材則萬事得理而民無不安矣孟子草芥冦讐之喻後世或以為過言不知此正對君之禮經戰國諸君之鍼石也與大人言言事君事君獨與大人言何也始仕者雖有職事尚未得自逹于君故曰出則事公卿必能以忠信自達于其長然後能獲上治民故與居官者言但言忠信至于大人則忠信不必言當勉以事君之大義所謂以道事君是也與衆言言忠信慈祥與居官者言言忠信忠信足以包慈祥居官而偏于慈祥則容奸引惡而反為民害矣非衆人之比也凡與大人言始視面中視抱卒視面毋改終皆若是毋改者毋倐而上下其視也抱謂袷之下帶之上盖俯首而聽大人之裁度也故卒復視面以觀其意色終皆若是謂自進見以至于退即疊言數事儀法終始如是也古文作衆豈一人與君言則同見及列侍者視皆以為式與若父則遊目視父遊目以當㣲察意色所謂視于無形也凡侍坐于君子君子欠伸問日之早晏以食具告改居則請退可也或御者告食已具或君子遷坐他所則侍者宜請退也若君賜之爵則下席再拜稽首受爵升席祭卒爵而俟君卒爵然後授虛爵燕禮無算爵君賜之爵受爵而後降席拜以急欲傳君之賜徧于衆人惟恐時之不逮也此偶侍君飲君獨賜已爵則降席而後受爵升席而祭然後卒爵可也燕之受賜爵也将傳致于衆人故不敢先君而飲俾君知宜要節而卒爵此獨受君賜則義比于侍食之先嘗而君之卒爵則遲速惟君可矣燕則受執爵者以酌行此受虚爵則其事本異非相變也賜食不祭何也君已祭臣先飯而徧嘗膳至食時又祭則䙝矣酒異爵則祭無嫌饋食禮尸毎獻必祭祝佐食主人主婦又各祭酒是也君為之興則曰君無為興臣不敢辭君若降送之則不敢顧辭遂出古者君臣之禮自一命以上其始見也拜必答其燕見也飲食可共其退也必興其辭也猶降送士所以守官臨難而不敢讓其死也故曰體羣臣則士之報禮重非報君之恩賜也上經與君言言使臣即告以使臣之禮臣不敢辭預以後不敢顧辭遂出之情告也以士之卑而君禮之如此所以厲士節而養人君禮下懿恭之德也燕禮孤卿與焉而無送法侍食侍飲則士亦降送何也燕雖以示慈惠而為國典專送賓則嫌簡于孤卿徧送公卿大夫則非人君之體若侍飲食則君之燕私故可伸存故尊賢之義耳大夫則辭退下比及門三辭君臣朋友皆以義合故聖人制君臣之禮坐起揖拜迎送辭讓略與朋友同盖必如此然後上下交而其志同言可以盡其誠道不至有所屈自秦變周禮尊君抑臣限隔堂陛專恃爵禄以招延趨勢慕利之庸臣是以人臣自視若徒隸罔上行私恬然而不知恥此萬事所以墮壞于冥昧之中雖有賢者亦為所掣曳而不得行其志也辭不得命則曰某無以見辭不得命将走見先見之無以見謂無道術可資諏度也先見之謂不俟辭贄先出門拜見也非以君命使則不稱寡大夫士則曰寡君之老士當作使以音同而誤也春秋傳天子之老不得為寡君老皆公卿之辭士安得為此稱盖以君命使則擯者稱寡大夫以身将命不必稱君而知其為君事也若以私事遣使則使者稱寡君之老盖其身不在焉必以君統之註引檀弓多之老二字兼失本義執玉者則唯舒武舉前曳踵展足僅一武而踵又不離于地也宅者在邦則曰市井之臣者疑若字之譌儀禮析疑卷三
