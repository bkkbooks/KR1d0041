body:
  text: 儀禮析疑卷十五翰林院侍講銜方苞撰特牲饋食疏謂無問廟數多少皆同日而祭畢是也又云皆先祭祖後祭禰則失之矣獻有多寡每獻同時而畢事然後節簡時寬禮意浹洽若祭分先後即兼祭祖禰亦日不暇給而況三廟五廟乎至天子祫祭惟隂厭俎豆鉶簋並陳啓户宜徹於堂東西尸入更次第以進既祭既嚌旋以俎簋降然後能畢獻視羣下室中之禮必大有變通惜今無可考耳惟牲則廟各一牢洛邑蒸祭歲文王騂牛一武王騂牛一是也士祭祖禰宜用二牲大夫三廟宜用三牢而經記無文必已附見於公孤之禮也神俎尸俎必用右體特牲不足以充四俎少牢不足以充六俎故聘禮賜饔飪一牢九鼎而筮一尸若祖若禰正為牲體有定雖太牢不可以並祀祖禰耳魯頌曰白牡騂剛公羊傳曰周公白牡魯公騂剛羣公不毛祫祭羣廟之主皆合食於太廟則主各異牲明矣疏大夫有公事及病祭使人攝士則廢而引公羊傳士不及兹四者則冬不裘夏不葛為徵非也記曰士不攝大夫士攝大夫惟宗子蓋大夫之祭鼎俎服物與士庶乂絶殊器與名不可假人故嗣子幼則惟宗子之為士者可攝是以特著之若士則凡兄弟之為士者皆可攝故文略耳經傳中不見庶人攝大夫士之祭蓋雖一命之士其賓與公有司私有司不可以庶人臨之也公羊傳所云乃士之失田祿而不祭者未可援據周官王不與祭祀則大宗伯攝位量人職凡宰祭鬱人受斚歷而飲之而諸侯朝覲國中之祭不得使人攝何也王在是而以喪疾命攝義可通也諸侯出國則匕鬯不可假人春秋傳云君怒未怠子姑歸祭季氏亂臣不難逐君故敢干大禮耳以宰與宗伯之攝位知諸侯在國亦如之以諸侯入王之廢一時祭知王之巡狩亦如之然不可以終歲而缺宗廟之祀也其諸祠而出歸而蒸與子姓兄弟如主人之服主人之子嗣舉奠者也主人之孫亦老而傳之後舉奠者也故先於兄弟敖氏謂以服之親疏為序似未安有司羣執事如兄弟服冠禮如加𤣥端則𤣥冠𤣥端通乎庶人之服故士之子姓兄弟及執事者服皆同𤣥冠𤣥端同而於有司羣執事則曰如兄弟於尸於賓則曰如主人尊卑各以其倫亦言之序孝孫某筮來日某諏此某事適其皇祖某子方舟曰適其皇祖某子則有二廟者迎禰主而合祭於祖廟明矣命筮之辭不及於考祖既許則父必從之也迎禰主或於前夕或於祭之晨二尸三尸入廟入室受獻行酬之儀經記無文必已詳見於諸侯孤卿之禮也注謂不言妃容大祥後禫月之吉祭非也禮同則互備少牢特牲是也相類則參見鄉飲與鄉射燕與大射是也已前見則後不覆見覲禮未及郊以前已見於朝宗則闕是也享祖考未有遺先妣者必邦國禮已前見也少牢復著之示臣下之禮同也既見於少牢則特牲不待言矣虞未全吉故吉祭猶未配附記於虞特牲饋食全吉而同於祥後禫月之不配則義無所處矣時祭所卜惟一日則祫無疑也少牢特牲惟見祖而不見禰獻酢及酬亦唯見一尸之禮而不及羣尸記曰周旅酬六尸尚書作洛蒸祭歲文武牲異而日同則並獻羣尸與羣尸揖讓酬酢之儀必已見於王室邦君之禮故於羣下不復言正與此經不言妃不載嘏辭覲禮闕未至王郊以前之義例同耳卒筮寫卦疏引士冠禮注謂彼乃筮人書之此則卦者書之非也二篇文義未有殊異皆卦者書於方而筮者以示主人耳筮某之某為尸注謂連言其親庶幾其馮依之非也尸未必即所祭者之孫屬有親疏非舉其父不可辨也虞祭有無尸者必五服之外不用也天子諸侯之時祭則不可無尸同姓皆可卜曾子問卿大夫將為尸於公是也乃宿尸宿者夙戒而兼齊肅之義也古人重禮既聞期則尸與賓亦當各次其齊宫及祭之日齊亦三日矣主人辟皆東面北上於門外北面以祖考擬尸也尸出則辟而東面不敢正對尸而旁立亦侍尊者之義主人再拜尸答拜主人之拜尸猶答焉擯者尚未釋辭也然已知應為尸故不迎拜宗人擯辭如初卒曰筮子為某尸占曰吉敢宿張爾岐曰如初者如初筮曰孝孫某諏此某事適其皇祖某子乃易去下二語而曰筮子為某尸曰吉也尸入主人退主人與尸相見於門外何也尸主人子行也在門外乃可以神道接入其門則宜兼家人之禮故尸入而主人遂退也凡賓主相見之禮擯者傳言而後主人出尸則聞主人之至而遽出父之行不敢以賓接也凡戒賓出迎於門外皆面交辭惟宿尸相見而後擯傳言以像祖考不可以親相與言也古者卜尸必以孤子非孤子則祭之時父或宜加爵也宿尸時不可以父不出而使子迎也某薦歲事吾子將涖之注以前無戒賓之文而云吾子將涖之遂謂賓在有司中非也詩書所稱宗廟之祭賓之重幾並於尸詩曰畀我尸賓夀考萬年士大夫之賓當以屬世交執友或州黨之有德譽者苟以公有司為之則上不足為宗廟之榮下不足為兄弟子姓衆賓之式且以屬吏而致爵於主婦尤覺不倫按記序俎實賓及衆賓與公有司私臣各别公有司獻次衆賓則卑微甚矣而可為賓長乎篇首筮日有司羣執事位在門東是時賓不與也經所以不具戒賓之節者冠與鄉射飲酒戒賓之禮衆所習也曰宿賓則前已戒可知矣篇首所謂有司者在鄉則閭胥里宰之類在國則官中下士假以祝宗人筮人雍人之號即記所云公有司也篇首所謂羣執事者乃隸子弟即記所云私臣也經於筮日舉有司羣執事乃供筮事及省牲濯器者别言宿賓則佐主人事尸於室中舉酬於堂上者可混而一之乎棜在其南南順實獸于其上東首牲在其西北首東足獸臘去毛不宜置地上其體微以加於棜髙下乃與牲平排其足於棜上為伏狀故但言東首牲則縛其足而寢之故並及足所鄉也主人及子姓兄弟即位于門東如初賓及衆賓即位于門西東面北上宗人祝立于賓西北東面南上此又賓非有司之徵也主人及子姓兄弟賓及衆賓門東西正相對祝宗人以事先於賓故立於賓之北少退而西以示不敢與賓並舉宗人祝之位則其他有司羣執事立於賓之西南而東面北上不待言矣約略言之而其人可包位亦可辨惟儀禮有此義法張爾岐曰宰在門西與賓同行皆與筮位異故不蒙如初之文宗人舉獸尾告備舉鼎冪告潔祭前一日設器陳牲省牲視濯之儀主人兄弟賓長衆賓之位具詳於特牲而少牢則闕焉牲體之數實鼎升俎之人陳俎執匕割制升載之法具詳於少牢而特牲則闕焉何也牲牢鼎俎豆籩至大夫而倍加於士則陳執割制升載之法自宜詳於少牢若士用特牲魚臘牲用肺脊幹骼肩膚則已見於虞祭無庸覆舉也設器陳牲省牲視濯上下同之主人承祀而兄弟子姓從賓長備獻而衆賓助亦上下同之匹士以上始得廟祭其儀自宜具於特牲大夫以上宜小異而大同如上大夫儐尸下大夫不儐尸之類至庶人祭於寢則時物惟力所能共并無主賓祝佐俎豆之儀法故祭禮自士始夙興主人服如初張爾岐曰按下記惟尸祝佐食與主人同服賓及兄弟筮日筮尸視濯亦𤣥端至祭日則朝服𤣥端緇帶緇縪羮飪實鼎陳于門外曰實鼎而不言割牲之人以及牲體之數骨物之别升俎之法饋設之位一切不見皆以見於少牢也祝筵几于室中東面方舟曰周旅酬六尸惟太祖尊雖設尸而不相酬士大夫之禮祖禰並宜設尸即已附見於諸侯或王朝卿大夫之禮其次主之位獻酬之法亦宜略見其大者而經記之文皆似止一尸者此十七篇內莫解之疑姑發之以俟後之君子土婦纚笄宵衣立于房中注據舅殁則姑老謂姑雖存主祭者乃主人之妻是也然嫠而主祭者有二焉戴記曰大功者主人之喪有三年者則必為之再祭則子幼或無子虞祔練祥族子可攝而共主婦之事者必嫠也魯語公父文伯之母季康子之從祖叔母也祭悼子康子與焉酢不受徹俎不宴繹不盡飫則退時文伯尚幼故敬姜主祭而康子攝文伯之事之二者必别見於他篇而今無考耳羣儒或援喪服傳妻不敢與焉謂妻不改適者不主祭而猶與於祭非也子幼族子攝祭嫠為主婦可也子受室妻為主婦而姑從其婦可乎宗婦之事不可使姑執不可與內兄弟同居賓位不可與主婦同居主位不可與宗婦同立北堂不可如冠禮之别在東壁而位於東夾蓋立於東壁俟冠者以脯見也若祭祀而母在廟中則主人主婦之獻長賓之致爵當次於尸而特舉焉事紛禮黷而義無所取不若齊居於內私致其哀敬為安也主人及賓兄弟羣執事即位于門外如初不言子姓衆賓及門東西以曰如初則其人其位不必具詳也主婦盥于房中饋食之饌惟主婦為最先以生時盥饋主婦職也薦先兩豆象生時恆食先陳醯醬也主人在右及佐食舉牲鼎凡事宜尊賓而舉鼎則主人先所以致養於親者必自盡其力而後可求助於人也主人降立于阼階東雖不迎而不敢安於堂上也至阼階東而止立視尸之盥待其升而從之不敢與為禮也尸入門左北面盥雖為尸未即席猶有子姓之道故北面而盥尸至于階祝延尸尸升入祝先主人從招延延佇延頸皆面嚮而望之之辭玩此經文義亦祝先而延尸以升注謂由後詔相曰延蓋據少牢饋食禮尸升自西階入祝從決之但少牢尸入室祝從非謂升階時祝亦在尸後也主人拜妥尸尸答拜執奠祝饗主人拜如初隂厭主人再拜稽首及尸入則拜而不稽首何也隂厭乃事祖考之正禮致其恍忽以與神明交非稽首不足以見情尸以象神則宜微有别矣不見主人之面位何也虞禮尸拜受爵主人北面答拜則拜尸皆北面可知矣父母舅姑生時子婦拜皆北面故祭亦如之若西面則主婦拜尸之位西北面則主人答祝佐食之位也少牢祝與主人同拜妥尸何也祝貴不宜以私臣為之大夫之祝必官中屬士也故與長官同拜士之祝則朋友姻親即同官下士亦僚友無隨主人拜妥尸之義祝命挼祭命疑當作詔以後命爾敦而誤祭于豆間豆間兩豆間之隙地也惟虞祭隂厭祭於苴恐汚席則餘皆委於地也自冠婚至大射皆不言祭所委之地脯醢則於豆旁肺則於俎旁不待言也惟公食大夫曰上豆之間以有六豆也士虞特牲饋食皆兩豆故曰豆間於特牲覆舉之著吉祭與虞同也少牢四豆亦曰豆間以取韭菹辨㨎於三豆祭於豆間則於上豆之閒不待言矣乃食食舉篇名特牲饋食以食為主此承上經邇黍稷舉肺脊而言故先食食繼以食舉下經乃承此而曰三飯告飽也疏乃以食為食肺則不言食食而曰三飯辭事有缺以乃食為食肺食舉為食正脊則指意不明當以敖氏為正主人羞肵俎祭俎多主人既舉鼎以致敬故使執事者設之而親羞者惟肵俎以此俎專為尸設也尸三飯告飽祝侑主人拜前此啐酒告㫖嘗鉶告㫖後此送爵主人拜尸皆答拜惟侑食之拜不答何也九飯者饋食之正禮也卒飯尸親執黍以嘏主人故侑食時亦若神式馮焉是以聽主人之拜而不答也尸實舉于菹豆前云食舉此復實舉於菹豆代神受饗不敢盡食也肺周人所尚脊牲體之正故不置肵俎而實於菹豆示欲留以嘏主人也佐食復自菹豆舉之以加於肵俎示神俎之肺脊宜歸於尸而所以嘏主人者專用黍稷為宜也嘏辭獨言宜稼於田肝亦加於菹豆而佐食不以加於肵嗣舉奠尸將舉以授之也主人洗角升酌酳尸尸拜受每三飯主人拜尸皆不答至酳始拜受酒以行氣舉爵而拜興可也方食而數拜興易至哽噎故公食大夫禮賓再三飯皆飯畢而後降拜聖人體性作儀或兼涵兹義祝受尸角曰送爵皇尸卒爵尸受角時主人已拜送祝受角又曰送爵言所送之爵皇尸已卒主人宜先拜尸之既爵也或曰言尸既卒爵而將還送於主人也主賓相為禮皆受爵者先拜而後授者拜送爵蓋爵方在手必已授已奠然後可拜執爵而拜惟主人受嘏則然而受者急於拜禮不敢俟其拜送也尸神象也故待主人拜送而後答拜主人拜受角尸拜送送爵必拜雖尸酢主人亦然於士祭見禮之常至大夫則曰答拜與士妻獻尸不俠拜而內子俠拜義同示貴者事尸益嚴而尸之體益尊也主人坐左執角受祭祭之祭酒啐酒進聽嘏受酢禮輕而先於受嘏何也必酳酢之小節既畢然後傳神語始足以明主人自始至終盡慤盡敬僾見愾聞之誠而彰神賜之重也啐而不飲何也尸代神賜爵必待嘏辭既傳稽首受黍而後敢飲神之福也佐食搏黍授祝祝授尸尸受以菹豆執以親嘏主人古人於福不敢妄邀榖食人所以生雖庶人寢祭必具葅豆故以受黍而牲鼎服命之隆嘏辭無一及焉言不過物而不願乎其外也上𧃊之嘏惟胡夀建保室家義亦如此主人拜妥尸之面位升鉶祭鉶之儀賓長羞肝牢之法祝侑尸主人之辭一切不言皆見於少牢主人左執角再拜稽首受復位詩懷之實于左袂挂于季指卒角敖氏謂拜不奠爵異於大夫是也云受黍不祭則未然乃與少牢互見而文略耳黍者尸所親執以嘏也未有祭酒而不祭黍啐酒而不嘗黍者此亦如黍非搏不可以授人雖搏亦不可以手承故各舉其一於特牲見少牢之黍亦受以菹豆於少牢見特牲之黍亦搏而授耳興取肺坐祭嚌之興加于俎祝佐食主人主婦賓長之俎不言設者其人微也義例於少牢主人獻祝設俎目佐食而設佐食之俎者不言見之不言陳俎以待薦之地何也執事之俎設於階間則祝佐食主人主婦賓長之俎非與祭俎肵俎並陳於阼階西無地可陳且少牢儐尸主人主婦之俎與尸侑同升並陳則特牲可知猶特牲執事之俎設於階閒則少牢可知皆互備也以肝從不言其人微者也酌獻佐食佐食北面拜受角佐食必非異姓其徵不一記云宗人獻與旅齒於衆賓佐食於旅齒於兄弟其明著者也見於經者北面受獻而無燔以其為族姓子弟也蓋薦俎與衆兄弟同設於階下室中無薦俎而設從獻則無是理與衆兄弟同薦而獨加肝燔又無是情也長兄弟為加爵致祝而不及佐食非以其為同姓則義無所處矣主婦洗爵于房此篇無房中設洗置篚之文而曰主婦洗爵于房何也少牢饋食禮司宫溉豆籩勺爵觚觶几洗篚於東堂下勺爵觚觶實於篚卒溉饌豆籩與篚於房中是房中别設篚有篚則有洗士禮宜同觀此則知凡儀物宜具而經無其文者皆以别見而略也宗婦執兩籩户外坐執籩以宗婦燔從以兄弟長而不使衆子婦者支子不祭所以示正體之重耳其致恍惚以交於神明則與主人主婦同佐食挼祭主婦左執爵右撫祭祭酒啐酒入卒爵如主人儀主人主婦之薦俎皆設於致爵時而佐食授祭不言取於尸俎已見於尸俎之實祭肺三也婦人受爵祭啐宜於房中卒爵宜在尸前惟士妻各於其所內子則受祭祭之並在尸前以儐尸别舉獻薦於房中也然則不儐尸受祭卒爵何以與儐尸同别於士妻也與士妻之撫而不祭以自别於內子同義獻祝籩燔從如初儀不言易爵洗獻者贊者易爵以授主婦於房中主婦洗爵獻祝已見於少牢及佐食如初祝之俎豆獻於室中燔亦從焉佐食雖受獻於室中其薦與衆兄弟同陳於階下且無燔而云如初者惟拜獻相答之儀同耳賓三獻如初主人主婦之後不繼以長兄弟而以三獻屬賓長何也蓋以義言之祭得嘉賓乃可以為親榮兄弟之長者未必其皆賢也即以情言之其為執友則厲學輔仁吾親德誼所賴以成也其為僚友則當官共事吾親職業所資以盡也其義有過於同生而情有親於同姓者矣與之共襄祀事以致祖考之歡心繫族姻之觀聽最為重大况佐食取於兄弟既與主人主婦同初獻再獻矣於同姓則取其情之親於異姓則取其德誼之著此禮之所以義盡而仁至也主婦洗爵酌致爵于主人獻祝佐食拜其相助之勤也夫婦自致爵是亦不可以己乎此緣祖考存日之心凡有嘉慶燕賜必與子婦俱然後其心暢然亦祭義所謂思其志意思其所樂之切近者也嗣子少長即使舉奠亦此義也凡事宜夫倡而婦隨致爵則婦先而夫從何也承獻祝佐食之爵又飲乃致養之事不宜夫先於婦也主婦答拜受爵酌醋敖氏謂婦人承男子後多不易爵非也按祭統夫人薦豆執校執醴授之執鐙尸酢夫人執柄夫人授尸執足夫婦相授受不相襲處可以婦人而承男子口澤之餘乎見於經者惟尸酢主婦主婦受之卒爵無易爵洗爵之文蓋以義言之則尸神象也婦餕舅姑之餘則受尸之賜何必更洗况易爵乎以分言之則尸子行也世母叔母乃大親仍其爵何嫌乎惟主婦受主人之卒爵而自酢無易爵洗爵之文蓋婦承其夫無所嫌且更爵易以敬也尸以神惠酢主婦主人以卒爵授主婦自酢何為易爵以致敬乎洗爵以致潔也尸及主人之爵主婦以為不潔而新之可乎及主人致爵於主婦然後降洗以示女之不相瀆雖夫之於婦猶以敬彰别此聖人因事制宜以盡精微而各不可易者也有獻有酢而後禮成夫婦一體異於尸賓祝侑故主人卒爵主婦受爵示不敢煩主人之酌主婦卒爵主人亦如其禮以答之主於質以見情簡其儀以便事也主婦拜受爵主人西面答拜或稱拜送爵或稱答拜義例不一吉祭稱拜送爵喪祭則曰答拜哀痛方殷不忍循獻酢之常儀也特牲禮主人獻祝佐食稱送爵獻賓則曰答拜祝佐食主事神故用獻尸之辭賓與衆賓兄弟同助祭故與衆賓兄弟同辭也少牢獻祝佐食及侑皆曰答拜大夫尊於祝佐食及侑有相臨長之義也主婦致爵於主人稱拜送爵主人於主婦則曰答拜婦宜自卑不得用敵體之辭其餘皆可以是類之惟卒爵皆曰答拜舍答拜無以為辭也主人更爵酌醋主婦自酢所受於夫之爵不宜復洗主人自酢所致於婦之爵不可不更義正相發三獻作止爵尸卒爵酢賓三獻爵止乃尸止而奠之俾主婦與主人交致爵故至是賓請尸舉所奠之爵而尸卒爵以酢賓也尸止爵時祝佐食已再得獻原主人之意必急欲致敬於賓而夫婦之相致爵乃先焉何也原祖考之意惠之所加莫先於主人主婦也賓作止爵又不即獻賓以主人初獻主婦亞獻尸隨酢焉而三獻尚未酢則主人之獻自不得先於尸之酢也爵既授於賓則賓又不可遺祝佐食之獻矣以初獻亞獻禮行於尸必繼及於祝佐食也既獻祝佐食則主人主婦又不可遺蓋不於此時致爵而更端以起事則禮繁而時費若於主人獻後答禮則無由及於主婦故先並致爵而主人獻賔轉退於賓酢主人後耳酢下疑脫賓受爵三字洗爵酌致于主人主婦賓有酌致於主人主婦之禮何也賓長非祖考之至交即鄉里之耆德也嘉姻親故舊得良子婦以守宗祊故於正獻之終特酌以致慶焉所以作主人主婦之孝恭而為足弟子姓宗婦女賓所觀聽也其或廢事而失儀或素行之不類則受禮於稠人廣衆中必有愧生於中而大懼人有後言者矣此先王制禮所以隂感乎人心而漸積為風教也賓長必主人之尊行故不曰酌獻而曰酌致更爵酢于主人主人主婦獻尸後即獻祝佐食拜其勤也賓亦獻祝佐食體主人之意也致爵於主人主婦慶孝子之能追養也洗爵而後致於主人示易以敬又以此爵將傳致於主婦也更爵以酢主人以主婦所飲之爵不可不易而遂自酢也致爵雖兼主婦而所酢惟主人禮統於尊者又尸於主婦子行也故有酢而賓異姓故不酢以自别也主婦獻祝而不獻賓祝為公有司地逺而無嫌也義與賓異矣凡獻之後必有酢以賓於主人主婦不可以言獻故易名致爵其實獻也故因而酢焉執祭以降西面奠于其位位如初薦俎從設主人受尸酢旋寫嗇主婦受尸酢旋獻祝佐食賓受獻後無他事宜反其位故自執其祭以降義當然也凡祭禮終則掃而埋之周官守祧既祭則藏其隋是也祭委於地故曰隋主人洗觶酌于西方之尊西階前北面酬賓尸於祝佐食無加禮而所酢惟賓主人於祝佐食無酬而所酬惟賓何也祝佐食三獻皆繼尸而受爵而賓惟一受尸之酢故主人之獻繼以酬則賓亦三受爵矣況佐食相主人以養尸而未嘗親獻爵則尸無因而與酬酢主人主婦既各有獻又無暇更為酬酢也尊四壺於兩階下本為衆賓衆兄弟弟子皆酌於堂上而酬於階下則禮繁而時費耳然長賓長兄弟亦酬於階下宗祝亦與衆賓齒佐食亦與衆兄弟齒又以見尊於堂下乃簡節以便事而非於衆賔衆兄弟有慢心也賓坐取觶鄉飲酒之賓學士也鄉大夫以國政興賢能故賓於酬爵必辭而後取特牲饋食之賓鄉黨中齒德並尊者也主人以私祭求助故賓於酬爵不辭而取之揖復位獻畢而復位無揖法酬則揖何也獻尸則以卑而飲尊者獻祝佐食則以尊而飲卑者惟旅酬則同等者用以為歡故揖復位也至尸與主人主婦亦平等而致爵所承者則尸酢賓之爵以廣神惠故亦無揖法主人洗爵獻長兄弟于阼階上如賓儀獻用爵酬用觶於酬言酌於階下西方之尊於獻言酢於阼階上則酌於上尊不待言矣如賓儀則主人亦自酢也使長賓長兄弟酢則似主人專與為禮惟主人自酢則禮意達於衆賓衆兄弟矣至內賓則不便親致爵於主人故主人自酢以達其意禮有經而等者器位儀法尊卑略同則彼此互見特牲少牢或詳或缺者是也禮有推而進者則於士禮道其常大夫之禮詳其變士獻長賓長兄弟之禮與衆賓衆兄弟異而大夫則同或以示少不得並於長禮之經也或以示貴尤當下於賤義之權也洗獻內兄弟于房中不言內兄弟之位已見少牢主人西面答拜更爵酢獻賓長而自酢所以該衆賓而達其意也獻長兄弟而自酢所以該衆兄弟而達其意也賓兄弟酢於其始內兄弟則於其終以兼姑姊妹與宗婦酢於其始則不可以相統必皆獻而後酢可該也賓獻祝佐食主人主婦而後自酢亦此義也入復位酬賓揖復位乃復阼階下位以旋獻長兄弟衆兄弟也獻內兄弟入復位則主人獻事已畢復室中西面之位也以是見主婦長賓有事於室中主人皆不離其位至旅酬則室中侍尸者惟主人故尸將謖然後主人出長兄弟洗觚為加爵如初儀不及佐食賓獻佐食而長兄弟之獻不及焉以佐食取諸子弟不敢受長者之禮非祝比也衆賓長為加爵如初敖氏謂此加爵宜用觶似未安此承長兄弟之加爵宜用觚後此旅酬乃承用主人酬賓之觶耳嗣舉奠盥入北面再拜稽首尸未入祝酌奠於鉶南以獻神也故尸入執奠祭啐告㫖而仍奠之不敢專神惠留以待嗣舉也至是親執以授之俾知自義率祖之重隂厭主人再拜稽首者再而尸入則止於拜嗣飲神奠再拜稽首者再及為上𧃊受主人之酳及酢主人則止於拜義有大小長短於此類見之舉奠洗酌入尸拜受嗣子並無獻賓事疏云獻賓賓皆酢之賓當作尸尸祭酒啐酒奠之嗣酌進尸啐而奠之利獻尸不再言啐奠與嗣獻同可知也自主人酳尸至衆賓長加爵尸卒爵者五矣嗣與利分卑雖啐而不飲可也舉奠出復位復子姓兄弟堂下東方之位兄弟弟子洗酌于東方之尊阼階前北面舉觶于長兄弟如主人酬賓儀張爾岐曰此下言旅酬前主人酬賓已舉西階一觶此弟子復舉東階一觶皆為旅酬啓端因於此時告祭設羞蓋旅西階一觶加爵者即作止爵次旅東階一觶次並旅東西二觶而神惠均於在庭矣酬者主賓導飲之禮兄弟非賓故主人不酬使弟子舉觶而用酬賓之儀又賓長衆賓長兄弟衆兄弟已備受獻而賓子弟兄弟之子自質明待事以至旅酬故使各舉觶於其長而先自卒爵以習禮亦以均惠也周官大司徒以本俗六安萬民三曰聨兄弟五曰聨朋友春秋時祭族姓姻賓衆㑹數聚而交致其敬各盡其歡則所以聨之而作其親睦齒讓之心者周浹而深固矣宗人告祭脀使衆賓衆兄弟內賓各於其獻時祭脀則日不暇給矣必獻時各設薦俎於其位而總告祭脀然後禮成而時不費賓坐取觶阼階前北面酬長兄弟兄弟弟子既舉觶於長胡不使長兄弟就酬賓而轉使賓酬長兄弟也主人已親酬賓長矣無為又使兄弟酬蓋以賓雖異姓而繼主人主婦而為三獻則亦獻主也祝佐食已受賓獻而致爵且及主人主婦矣故使先酬長兄弟以終其為獻主之事而兄弟報其酬於禮義乃安祭之末俾賓長兄弟長衆賓衆兄弟相勸酬交錯以遍而子弟與執事焉又有無算爵使親交相屬各引其曹自公卿大夫以及庶士比次而行之相厲以禮儀相尚以敦睦則孝友睦姻任恤之風化而怨懟忿爭鬬辨之端息皆由於此所以達孝子敬宗收族之心而又以助流政教也為加爵者作止爵如長兄弟之儀前此賓與長兄弟相酬而交錯以辨此衆賓長又作止爵與長兄弟相酬而交錯以辨然後衆賓長衆賓衆兄弟皆各受三爵賓弟子及兄弟弟子洗使弟子觀禮於廟中舉觶於其長耳濡目染以至於成人則禮儀之度和敬之德習與性成矣長皆執以興舉觶者皆復位答拜長皆奠觶于其所皆揖其弟子弟子皆復其位爵皆無算旅酬之爵前既以次而遍矣如再以次行酬則不勝杯棬者不能强而善飲者不得盡其歡且拜受拜送之節衆煩而難舉故無算爵長賓長兄弟各執其觶不相授受而奠於所欲致者之所所致者既卒觶其弟子為之酌又執以奠於所欲致者之所而盡去彼此拜興之節兩觶並行不依其人之次不計其爵之數故總之曰無算爵也通經之例未有奠爵而不目其地者此獨為無定之辭而曰奠於其所謂其人所立之位不可以指定也論語居其所而衆星共之易大傳井居其所而遷卑者不可以揖尊而尊者可以揖卑天子揖諸侯諸侯揖羣臣是也酬終奠觶必揖故長亦揖其弟子兄弟之子以同姓而來觀禮宜也賓亦率其子弟而至何也不命之士及農工商賈有寢而無廟有薦而無祭無由習禮而其子弟固有學於黨庠州序者故使為主人之姻婭及公有司私有司者各率其子弟而至以觀祭祀賓客之儀又使為人子孫者知必得廟祀然後可以盡追養之心將父勉其子兄勉其弟而衆厲於德行道藝矣非僅為代長者舉觶宜與主黨之弟子相匹也祝佐食賓長長兄弟獻酬已多而衆賓衆兄弟僅一受獻故旅酬之後又為無算爵使既醉者可節飲少者可充聖人制禮本末兼該而一以貫之如此利洗散獻于尸酢及祝獻尸時祝已酌長賓有獻長兄弟衆賓長有加爵故佐食終事亦獻於尸又因獻尸而與祝相酢以佐食為同姓於祝又有主道也祝命嘗食𧃊者舉奠許諾敖氏云當為祝命𧃊者嘗食舉奠許諾是也嗣子為上𧃊先於長兄弟者異日當承祀為主人也主人西面再拜祝曰𧃊有以也此戒專為嗣子設也若德之不類則宗廟之犧將變而為畎畝之禽矣所為申戒以至於三也酳有與也其意略同而不可强為之解或曰主戒嗣子而並及長兄弟謂今日得有田祿以將祀事皆以先人之德𧃊者不可忘所自也不易以為似義亦可通上𧃊洗爵升酌酢主人嗣子獨酢異日將代父承祀故因登餕受酳而獻爵以昭敬養也是以下𧃊有酳而無酢少牢𧃊者不酢非嗣子故也主人拜受爵受嗣子之爵而卒爵又拜神惠之餘不可以子將之而有異也其服皆朝服𤣥冠緇帶緇韠記主人冠端𤣥以致隂幽之思內心乃合漠之本也賓兄弟有司朝服私有司且假大夫之臣之緇韠以外心見儀物之盛所謂致其濟濟漆漆也尸祝佐食宜與主人同心故服亦同覆兩壺焉蓋在南明日卒奠冪用綌即位而徹之張爾岐曰覆壺謂倒置其壺口下腹上以漉滌濯之水至明日尊於户東始注酒焉蓋即綌冪未奠不冪卒奠乃設之奠祝洗酌奠鉶南也即位尸即席位賓與長兄弟之薦自東房其餘在東堂長賓長兄弟薦於階上則陳於東房為便其餘設階下則陳於東堂為便不言祝主人主婦者階上之薦尚出自東房況薦於室中者乎佐食于旅齒于兄弟士祭其祖諸父皆與焉大夫祭曾祖從祖皆與焉而經但言兄弟蓋各於其輩行齒序非於主人為兄弟也長兄弟蓋屬尊而年長者佐食若取諸伯叔兄弟子姓則各於其輩行齒尊兩壺于房中西墉下南上內賓立于其北東面南上宗婦北堂東面北上北堂宜在東夾之北而户於西墉之北以達於房或南上或北上皆以嚮明者為上也宗婦亦東面以受主婦之酬又兼有賓道也主婦及內賓宗婦亦旅西面時祭各有祖禰而女兄弟宗婦得羣聚於祭者之家何也惟命士立廟然後召延族姻祭於寢者禮必甚略即同為命士筮日各以其吉筮前祭後皆可以相助也其長者於是毖禮儀其少者於是觀奠贊尊卑序列獻酬相屬女教因以明彰睦姻由此深固矣賓從尸主人無送尸之義故尸之出使祝先而賓從賓非主人雖以示送之意而不交辭不為禮與主人宿尸再拜稽首而尸遂入意同蓋彼時尸於主人此時賓於尸無辭之可致無儀之可展即以無辭與儀為禮之節而上大夫儐尸則拜送於門外又别有義此記所謂深而通也衆賓及衆兄弟內賓宗婦若有公有司私臣皆殽脀先王制禮皆因人情之實以為事物之節故精粗畢貫而性命之理順焉如祭祀之有獻酬緣祖考之心必浹於子姓親賓下逮私臣而後慊而使與祭者習動作威儀之節以礪德隅作敬讓親睦之風以逺鬭辨此固制作之精意也即以粗迹而言雞鳴而起質明行事以至於昏若無獻酬飲食之節則雖有强力之容肅敬之心亦不免倦怠而跛踦以即事矣祭之事惟祝佐食主人主婦甚殷故初獻再獻即並受爵焉其次則賓長長兄弟其次則衆賓衆兄弟至於旅酬則子弟私臣宗婦內賓遍有殽脀蓋不如此則禮意之倣徨周浹者未能盡達而人情之饑渴疲勞者不能自支也天子諸侯祭末畀輝胞翟閽義亦如此儀禮析疑卷十五
