body:
  text: 儀禮析疑卷十六翰林院侍講銜方苞撰少牢饋食曰用丁巳有事於宗廟據尚書武成名誥畢命及春秋所書魯事無非柔日惟洛誥蒸祭歲日用戊辰豈事屬創舉則禮從而變與筮旬有一日特牲筮日無期以旬有一日上下所同也天子諸侯惟致齋乃不二事散齊於外以國事不可廢也卿大夫士私祭散齊宜朝而聽事事畢反齊於家古者祭必於仲月國君之祭卿大夫皆宿齊宫若私祭常散齊於家則是月之中王事國事皆廢矣主人曰孝孫某來日丁亥用薦歲事于皇祖伯某士之祭稱某子以該其祖之為大夫者大射禮於大夫曰某子大夫之祭稱伯某以該其祖之為士者大夫祭三廟皇祖即其曾祖也凡逺祖皆可稱皇詩曰周公皇祖春秋傳曰皇祖伯父昆吾張爾岐曰注某伯且字也謂其字無可指且言某以擬之且者聊解經言某之意也非謂人之字為且字也疏大失注意士喪禮筮宅注某甫且字也若言山甫孔父彼處疏云孔甫是實字以某甫擬之是且字却甚分明可證此疏之失又注云大夫或因字為諡顧炎武云乃氏字之訛以某妃配某氏古者諸侯不再娶以媵攝內事則配享者可定於一宗子雖七十無無主婦則卿大夫以下娶有再三者矣而配止一人故加以某妃配於某氏之上以别其為元妃繼妃也若元妃見出而承祀者繼妃之子則以生母配無疑矣若婦德無虧殁於中道而子孫不以配是私其所生而黜先妣於殁後也經傳無明文故朱子不從伊川以生母配之説而以顔真卿家祭並配為宜後聖有作不可易也矣士二廟尸必二大夫三廟尸必三而惟曰皇祖何也所筮之日同命筮之辭同舉尊者則餘可知矣尸有尊有卑入廟而相見必有儀儐尸而旅酬必有法經記無見焉何也蓋諸侯五廟天子七廟卜尸延尸之禮必前見且不一見矣故於大夫士略焉左執筮右兼執韇以擊筮韇不可舉以擊筮蓋以蓍觸韇而振動之文義與李牧銜劍徵之於柱以自刺同乃官戒宗人命滌宰命為酒命滌注兼宗廟之掃除非也若黝堊丹漆則非前期十日所能辦掃除事輕易舉當包於官戒中宗人所命惟滌濯祭器耳前期十日始為酒故初成尤濁滓汁相將記曰縮酌用茅明酌也又曰盞酒涗於清汁獻涗於盞酒以初成之酒濁故用舊醳而清者以明之前宿一日宿戒尸士前期二日宿尸以助祭者少按曾子問喪奠至士乃有不足則取之大功以下不足則反之之文義可類推比時其物必躬親之於前夕視濯視牲故宿尸以前二日大夫之祭官宿其職則祭之朝視濯可矣特牲祝命爾敦而少牢不命義與此同皆因事之情而為之節耳明日朝筮尸士筮尸於三日之前而大夫以祭前一日何也卿大夫數少若早筮尸或諸侯來朝王使及貴國之賓當以祭之日至不易期則國事不能供易期則諸事皆宜重戒故僅為一夕之期然後事可必耳士則數多僚屬相攝國事不廢故期可早定若遭變事宜廢祭如曾子問所列則士與卿大夫略同無為筮尸之期有異吉則乃遂宿尸特牲主人親宿賓祭之日賓即位主人再拜少牢不宿賓並無接賓之儀位何也宿賓之儀已具於特牲故此篇直至盥匕而後賓見於經猶戒賓之儀已見於冠與飲射故特牲惟見宿賓之節而戒則無文也尸送揖不拜大夫能亢其宗故雖尸之尊猶揖以送若不吉則遂改筮尸祭日既定不容更緩也既宿尸反為期于廟門之外注謂大夫尊宿尸而已餘使人宿之非也筮尸乃祭前一日事也樂器既陳以待展聲祭器既陳以待滌濯則賓及執事者皆在列矣何事又使人宿哉惟宜卜為尸者反於家以待卜耳士之筮尸前期三日故不得不宿賓而以祭日並祭前一日視濯視牲之時告耳劉捷曰不舉接賓以下儀節以賓及子姓兄弟之位拜送之節視濯告具視牲告充之儀一與特牲同故不言而惟舉其異者蓋祭之晨雍人廩人司宫但言溉器則前夕已陳而濯之不必言矣司馬刲羊司士擊豕則前夕已視之而告充告備不必言矣主人門東南面特牲主人東面此南面以賓即公士卿大夫亦有相臨長之道也視殺特著有司北面則為期賓及衆賓一如特牲之東面可知矣司宫溉豆籩勺爵觚觶几洗篚特牲兩敦几席並陳於西堂以待設此篇不言所陳之地以大夫四敦陳於房中與特牲異故總於主婦之薦設見之几席則陳於西堂與特牲同可互見故文略耳卒溉饌豆籩與篚于房中放於西方設洗于阼階東南當東榮於房中舉篚則洗並設可知文略者以下篇主婦洗於房中見之也几不言所陳之地已見特牲司宫筵于奧祝設几于筵上右之特牲祝筵几以神席與器物異不可以私臣設也大夫官具故二人共之又於所共别差等焉公食大夫則司宫設几輕重之權衡具見矣主人出迎鼎除冪士盥舉鼎主人先入士禮以舉鼎屬賓長佐食及執事之人故主人以身先之大夫不親舉鼎又除冪而先入非以尊而怠於事也官宿其事則主人專致其內心以與神明交而僾見愾聞焄蒿悽愴之精愈著矣喪禮百官具百物備不言而事行者扶而起言而後事行者杖而起亦此義也又大夫則年非壯盛或不能以筋力為禮陳鼎于東方當序南于洗西庭中地廣故特揭序南則知在庭之北而邇於階不惟鼎之位著洗之位亦愈明矣東方即特牲所云阼階洗西即特牲所云阼階西序南洗西位次詳於少牢故特牲文略宗人遣賓就主人皆盥于洗長朼卒脀而後主人盥則此時尚未盥也曰賓皆盥於洗可矣而曰遣賓就主人皆盥於洗何也無此文則似賓祝主人各以其時就盥而事不相聨於升牢之初言就主人與後卒脀相應則升牢時主人就洗以臨視並見矣特牲不著主人與祝及賓之盥以此篇既詳具也前此並無宿賓之文已見特牲也曰賓就主人則除冪後主人先入立於洗北並見矣卿大夫之祭賓宜與士異魯語天子祀上帝諸侯會之受命焉諸侯祀先王先公卿大夫佐之受事焉不聞諸侯之相會祀也則卿大夫之祭同列不得為賓且祭必於仲月三卿五大夫俟君祭事畢各擇日以祀其祖禰亦無暇助同官之祭其正賓必於命士二十七人擇其有德譽者鄉射禮大夫與則公士為賓其次賓必取諸執友姻黨能自修飭者若有道有德隱居不仕之君子則射鄉國政亦不敢屈為三賓卿大夫私祭必無相助之義注謂長朼長賓先次賓後是也敖氏乃云賓即二佐食及司士蓋以下文未見賓之事耳不知匕之外賓别無事而升載之儀數實繁賓以匕出之於鼎佐食以手承心舌之下上本末牲體之或縮或橫魚臘之宜進宜順必以手治非匕所能為升而載之於俎其事本分特牲禮亦主人長賓匕佐食升載至儐尸之俎即用朼者升載殺其儀以示辨特揭於下篇則此為賓朼而佐食及司士升載的然無疑矣特牲注以佐食為賓羣儒遵信但佐食於尸最切近每事必助焉宜以夙所親愛之子弟為之宗人之獻與旅齒於衆賓佐食於旅齒於兄弟則非異姓明矣又主人舉鼎與佐食俱尸酢主婦佐食授主婦祭少牢以上佐食為上𧃊下佐食為次𧃊長賓次賓為兩下正為𧃊本子姓族人之事故賓後於佐食猶嗣為上𧃊長兄弟轉為下𧃊耳佐食上利升牢心舌載于肵俎心舌不登於神俎何也古者物各有象尸為祖考之心之所寄而代傳嘏辭故並載於肵俎若享神則貴氣味肺為氣主周人尚之齊酒牲體羮燔黍稷菹醢皆用氣味也心皆安下切上安特牲載心立謂立而載於俎也必下平立之始安故曰安下肩臂臑膊骼在兩端脊脅肺肩在上疑肩臂肩字衍蓋臂臑居左端膊骼居右端而置脊脅肺肩於四體之上也卒脀祝盥于洗升自西階主人盥升自阼階以此知祝設几後即降立於洗旁與主人同視匕載也主人立洗旁以宗人命賓就主人皆盥於洗見之祝則以不言自某所進盥於洗見之婦贊者執敦稷以授主婦不曰宗婦而曰婦贊者何也士卑凡宗人之婦嫻於禮者皆可贊大夫尊贊者必士之妻然後可攝盛而錫衣侈袂與主婦之服同也贊者再反房中取三敦以授主婦而惟一人以必士之妻而後可贊耳觀尸盥事至簡而用二宗人則知婦贊者不能多人之故矣佐食啓會蓋二以重蓋二以重以黍稷二敦南北相次會之啓不得各從其敦故重之而並設於下敦之南兼明所謂會者即蓋也祝延尸尸升自西階入祝從如注疏則經文當云尸升自西階祝由後延之升入祝從其義始明其揭祝延於尸升之上綴祝從於尸入之下正以明升階則祝前而入户則祝後耳蓋承上文祝出迎尸於廟門之外祝先入門右尸入門左正以當前尸而導之也故及階則延尸以登即主人先登客從之之義也惟自中庭及階尸行宜導升階宜延至入户則位定筵設無所用其導矣故及户則退從尸後耳主人升自阼階祝先入主人從貴者多儀疑主人將入祝復出户以導之經無文猶特牲主人先祝而升祝先入主人從不言主人俟於堂以待祝至而讓之先也如敖氏説則上云尸入祝從此第云主人升自阼階入其入之先後本明無為覆舉祝先入以明其入在主人之先也祝主人皆拜妥尸尸不言大夫之祝必專立之祝官如都宗人家宗人之類即或用官中屬士平時涉公事相臨長舊矣故與主人同拜妥尸於少牢乃曰尸不言以禮辭視特牲每詳也尸答拜遂坐祝反南面注謂不啐奠不嘗鉶不告旨以大夫之尸尊又云初不饗為曲而殺疏推其義以為不敢與人君同皆非也不饗乃事之節與特牲異也饗者薦神之辭特牲隂厭時未饗故至尸挼祭而舉之少牢既饗於隂厭時則挼祭何為而覆饗哉士始得田祿具牲鼎故以致味徵追養之誠大夫祿厚官具備盛禮以致享則酒與羮之旨不足言矣故嘗鉶而不告旨至儐尸始用賓禮啐酒告旨則正祭不告旨可知也但尸祭豆敦俎實未有不祭酒者祭酒未有不啐奠者而經無文豈簡殘而文闕耶抑以祭酒啐奠已見於特牲而不告旨之義又於儐尸見之故文略耶大夫之尸尊惟祝不敢命挼而尸自取之不命爾敦而佐食自爾之則禮體宜然又挼乃禮之大節祝不命挼肺兼羊豕二事與特牲異故舉其大略而細節則不具焉上佐食取黍稷于四敦下佐食取牢一切肺于俎以授上佐食上佐食兼與黍以授尸尸同受祭于豆祭承上經取黍稷於四敦而曰兼與黍以授尸則兼稷無疑也下經曰爾上敦黍則不兼稷無疑也所以然者緣尸之意已所飯不敢同於神祭也尸酢主人上佐食取四敦黍稷以授祭則主人所受兼黍稷無疑也下經曰二佐食各取黍於一敦則不兼稷無疑也所以然者緣主人之心受神惠以祭先炊不敢用其半而致嘏於已則不敢受其全也張爾岐曰豆祭即韭菹之祭於豆間者上佐食舉尸牢肺正脊以授尸上經舉一切肺此曰舉尸牢肺正脊明上所取肺以墮祭此肺脊乃尸所食也其餘牢幹骼肩魚臘皆曰尸以舉肺脊牲體皆入肵俎而牢幹骼肩魚臘則有入肵俎者有留神俎者故並言尸以别之然則特牲之肺脊幹骼肩魚臘亦加於肵俎而不言尸何也少牢物備俎多故遍言尸以見其禮之盛特牲之俎無多其儀法已詳於少牢而一一言尸則義無所處胾用兩豆羮用兩鉶則幹骼肩羊豕並舉可知也上佐食羞兩鉶取一羊鉶于房中坐設于韭菹之南下佐食又取一豕鉶于房中以從但言取鉶於房中而不言實之之人初設之地以實豆籩鉶陳於房中已見於特牲則雍人實之於雍爨而升設於陳鼎時可知與不言几陳於堂西同三飯特牲每三飯祝侑主人拜尸答拜少牢則祝惟八飯時一侑而不拜主人惟九飯時一拜侑何也牲牢鼎俎倍加則儀節益繁公士私臣益衆則獻酬難遍使掌鉶侑食一與特牲同賓侑主人交拜則日不暇給矣豕鉶祭而不嘗與二佐食卒爵而不拜𧃊者不拜受爵皆職此之由上佐食羞胾兩瓦豆有醢亦用瓦豆亦與特牲互見於鉶言房中故於豆不復言天子諸侯有籩人醢人卿大夫無考但據少牢有房中之羞則似內子所共惟糗餌粉餈酏食糝食豆籩亦有司共之以各有定職故不言實之之人以雍人例之可知也尸又食食胾上佐食舉尸一魚特牲舉幹骼肩皆以獸魚從以合九飯之節也少牢分魚臘為二又以魚附於胾以成十一飯之數也上佐食受尸牢肺正脊加于肵張爾岐曰牢肺正脊即上文所謂食舉以特牲禮約之方尸三飯佐食舉牢幹時尸蓋置舉於菹豆至此十一飯畢乃取於菹豆以授上佐食也卒爵主人拜祝受尸爵特牲祝相爵而少牢無之少牢尸嘏主人有辭而特牲無之皆互見也蓋賓禮既爵有拜尸則不拜既爵而主人先拜故祝詔之士禮既詳則大夫不待言矣嘏辭既詳於少牢而特牲曰聽嘏則其辭無庸覆述矣尸醋主人主人拜受爵尸答拜主人西面奠爵又拜受爵而俠拜視特牲禮有加與下經出門拜送尸同義位彌髙禮彌卑也凡俠拜不復答故尸於主人受嘏後奠爵之拜答此又拜則不答也特牲尸酢主人主人拜受角尸拜送少牢則曰答拜大夫尊而尸以祖考臨之轉用尊長答卑幼之辭與士與下大夫不送尸而上大夫儐尸出門拜送同義皆使人不敢以富貴加於父兄宗族也上佐食以綏祭惟此宜從敖氏為授祭蓋尸之墮祭神食也故既祭而藏之尸酢主人主人以祭始為飲者則與常時飲食之祭同耳安得為墮祭乎尸酢主婦上佐食綏祭亦然皇尸命工祝承致多福無疆于女孝孫來女孝孫使女受祿于天宜稼于田眉夀萬年勿替引之方舟曰周官不耕者祭無盛士無田則從庶人之禮薦而不祭故雖卿大夫之尊祝嘏所謂受祿於天者不過宜稼於田而已其他福祚不敢妄求也雅有楚茨大田頌有載芟良耜自天子以至於庶人但能知稼穡之艱難則百行有本所以為萬福之原也古者祭有嘏辭所以大警主人敬懼之心也使不能受祿于天則宗廟之犧為畎畝之禽矣稼不宜於田則祭用下牲而不敢備物矣於其身則願其眉夀而承多福於勿替於其子孫則願其萬年而引多福於無疆當致誠致慤以交於神明之際而探祖考之志意諄諄然命之其心有不怵然者乎上𧃊之嘏曰胡夀建保室家辭意尤明顯而後儒或以為無益之虛文誤矣主人獻祝設席南面祝拜于席上坐受主人西面答拜祝即公有司其爵等亦與大夫懸隔故主人獻祝不拜俟祝拜而後答也注謂室中迫狹疏推論大夫士廟制合室堂五架中棟以北二架最北一架為室似不可通即以官師之廟言之昭穆二筵各陳俎敦籩鉶登豆一架中何以容況東房又隔一架之半以為北堂乎君子將營宫室宗廟為先意者雖五架而廣輪之度與七架等中棟以北取三之二以為室房空其一以陳尊布席耶佐食設俎牢髀橫脊一短脅一腸一胃一膚三魚一橫之臘兩髀屬于尻特牲祝祭肺然後以肝從少牢祝俎無轉無肺之理疑髀乃肺字之訛也經記每連舉肺脊髀賤不宜序脊上以特牲取肺坐祭有明文故少牢獨云祭俎敖氏求其説而不得遂謂祭膚未知所據不言右體所升皆下體則用神薦之餘可知矣卒爵興祝不拜既爵不敢煩主人之答也祝且然則佐食可知矣其曰卒爵拜拜衍也上佐食户內牖東北面拜佐食受獻於户內則筵祝於室中不待言矣佐食北面則祝南面而負北墉可知矣佐食俎設於階間則祝俎設於筵前可知矣佐食祭酒卒爵祝不嚌膚不拜既爵佐食不啐與賓獻祝而不及佐食同義以將儐尸日不足也注皆以為賤似失之俎設于兩階之間其俎折一膚敖氏謂下篇獻衆賓以至私人皆有薦有脀佐食不宜反有脀而無薦是也疑經文本薦設於兩階之間而薦訛俎也觀獻下佐食其脀亦設於階間正與薦設於兩階之間相應且薦以豆曰薦設乃與其俎相應若上句為俎設則下句復言其俎義無所處而於文為贅矣尸祭酒卒爵主婦拜特牲豆俎敦鉶並饌於隂厭尸食羞肵俎故留籩燔於主婦亞獻薦之少牢則别有堂上之亞獻籩豆鉶俎加以匕湆脀燔故主婦於室中有獻而無薦蓋專薦籩燔則不宜鉶俎湆脀未薦而先燔兼薦牲物則更無以為儐尸之薦必有獻而無薦義乃曲當故不儐尸則亞獻薦籩燔與特牲同上佐食綏祭主婦西面于主人之北受祭祭之特牲少牢尸酢主婦佐食授祭皆不言所授何物敖氏謂亦黍稷肺祭蓋以少牢尸酢主人上佐食取黍稷下佐食取切肺以授祭而類之也所異者士妻適房則佐食亦於房中相授耳位於室中及受祭祭之與士妻異皆所以優命婦主婦以爵出贊者受易爵于篚以授主婦于房中司宫饌篚於房中爵觶實於篚士禮略主婦獻尸祝佐食並用內篚之爵而更洗之內子則室中堂上皆使有司取爵於下篚宗婦傳致而內篚之爵專以酬內賓宗婦於房中以著威儀之盛耳主婦洗爵獻祝祝拜坐受爵特牲主婦獻祝籩燔從而少牢無之以增儐尸禮不能更備薦籩羞燔之儀於祝也故不儐尸則籩燔與特牲同而儀法皆詳於此賓長洗爵獻于尸尸拜受爵特牲三獻有燔從而少牢無之以增儐尸禮主婦之獻無籩燔而賓獻以燔從則頗其類矣然則不儐尸主婦之獻仍薦籩燔而賓獻亦無燔何也士牲體少故再獻三獻各以從薦為儀少牢二牲骨體加骼肩肉加胾饌已盛矣主婦亞獻已兼薦羊豕之燔故三獻無薦用别於上大夫以示抑損也祝酌授尸賓拜受爵尸拜送爵賓坐奠爵遂拜主人受酢俠拜故賓體其意而與之同尸酢主人主婦始受爵時皆曰尸答拜於賓則曰拜送爵當名辨物各有義法於此益顯著矣賓獻尸酢始受爵時皆曰拜送卒爵皆曰答拜以所卒者即拜送之爵也祝祭酒啐酒奠爵于其筵前祝不卒爵賓獻不及佐食以儐尸儀節有所益則不得不有所損也上佐食盥升下佐食對之賓長二人備𧃊親者之事也嗣不舉奠則以二佐食為上𧃊若皆異姓則佐食不得先於賓敖氏之誤皆起於謂宗人所遣之賓即佐食司士耳資黍于羊俎兩端義與孝經資於事父以事母資於事父以事君同蓋資取所進於佐食二敦之黍置於羊俎之兩端以食長賓次賓也皆不拜受爵特牲祝𧃊主人再拜者三酳上下𧃊答拜者二祝酳拜者一兩𧃊卒爵答拜者二少牢前後旅拜者再主人授爵不拜而𧃊者亦不拜受爵以勞主人之答四人卒爵皆拜而主人總答一拜非為大夫位尊也其齒必長筋力難自竭耳上𧃊親嘏特牲祝再戒𧃊者而少牢無之少牢𧃊嘏主人而特牲無之何也特牲之𧃊嗣子及長兄弟也故主人與祝原祖考之意以戒之少牢之𧃊族子弟也且有異姓之賓何為申戒於族子弟及異姓之賓哉若祭之終有嘏乃原祖考之心欲子孫常保天祿族子弟為佐食故可以傳嘏辭若特牲之上𧃊則嗣子也本非事神佐尸之人安得傳神語以致嘏哉特牲饋食廟祭之節備矣故少牢獨著其禮之異者而同者則缺焉如祭之前夕陳鼎於門外主人子姓兄弟宗祝衆賓之位視濯告充之儀詳於特牲蓋其義通乎上下故於士舉之而知上焉者之略同也鼎實之名數器具之設張牲體之差等割制升載之儀法則詳於少牢蓋其事備於尊者故於大夫舉之而知下焉者之差減也至於視殺之節迎尸之儀命尸告神祝嘏之辭主婦不嘏之義亦通於上下然於特牲舉之或疑大夫之有異也於少牢舉之則知士之無以易此矣又有禮之節會不得不二篇並見者則各以小節之微異者相間故不厭其復制禮之由紀事之法無微不達是謂聖人之文儀禮析疑卷十六
